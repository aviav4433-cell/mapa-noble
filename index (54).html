function unitsCheckAll(on){ Array.from(document.querySelectorAll('.uchk')).forEach(function(c){ c.checked=!!on; }); }
function unitsChecked(){ return Array.from(document.querySelectorAll('.uchk')).filter(c=>c.checked).map(c=>c.value); }
async function doCreateUnits(iid){
  var q = Number(el('f_uqty').value);
  if(!(q>0)) return toast('ЧӣЧһЧ•ЧӘ Ч—Ч•Ч‘Ч”', true);
  var r = await act('createUnits',{item_id:iid,qty:q});
  if(r){ toast('Ч Ч•ЧҰЧЁЧ• '+r.created.length+' ЧҷЧ—ЧҷЧ“Ч•ЧӘ: '+r.created[0]+' ЧўЧ“ '+r.created[r.created.length-1]); unitsModal(iid); }
}
async function doDeleteUnits(iid, mode){
  var ids = unitsChecked();
  if(!ids.length) return toast('ЧңЧҗ Ч Ч‘Ч—ЧЁЧ• ЧҷЧ—ЧҷЧ“Ч•ЧӘ', true);
  var run = async function(){
    var r = await act('deleteUnits',{item_id:iid, unit_ids:ids, mode:mode});
    if(r){
      toast('Ч ЧһЧ—Ч§Ч• '+r.deleted+' ЧҷЧ—ЧҷЧ“Ч•ЧӘ'+(r.blocked&&r.blocked.length?' В· '+r.blocked.length+' Ч‘Ч©ЧҷЧһЧ•Ч© Ч•ЧңЧҗ Ч ЧһЧ—Ч§Ч•':''));
      unitsModal(iid);
    }
  };
  if(mode==='hard') confirmManagerPin('ЧһЧ—ЧҷЧ§Ч” ЧһЧңЧҗЧ” Ч©Чң '+ids.length+' ЧҷЧ—ЧҷЧ“Ч•ЧӘ. Ч”ЧһЧ–Ч”ЧҷЧқ ЧҷЧҷЧһЧ—Ч§Ч• ЧңЧ’ЧһЧЁЧҷ Ч•ЧңЧҗ Ч ЧҷЧӘЧҹ ЧҷЧ”ЧҷЧ” ЧңЧ©Ч—Ч–ЧЁ.', 'ЧҗЧ©ЧЁ ЧһЧ—ЧҷЧ§Ч” ЧһЧңЧҗЧ”', run);
  else confirmModal('ЧңЧ”ЧЎЧӘЧҷЧЁ '+ids.length+' ЧҷЧ—ЧҷЧ“Ч•ЧӘ? Ч”ЧһЧ–Ч”ЧҷЧқ ЧҷЧҷЧ©ЧһЧЁЧ• ЧңЧ”ЧҷЧЎЧҳЧ•ЧЁЧҷЧ” Ч•ЧңЧҗ ЧҷЧ•ЧӨЧҷЧўЧ• ЧҷЧ•ЧӘЧЁ Ч‘ЧӘЧҰЧ•Ч’Ч”.', 'Ч”ЧЎЧӘЧЁ', run);
}
async function doResetUnitCounter(iid){
  confirmModal('ЧңЧҗЧӨЧЎ ЧҗЧӘ Ч”ЧһЧ•Ч Ч” Ч”ЧЎЧҷЧ“Ч•ЧЁЧҷ? Ч”ЧҷЧ—ЧҷЧ“Ч” Ч”Ч‘ЧҗЧ” Ч©ЧӘЧҷЧ•Ч•ЧҰЧЁ ЧӘЧ§Ч‘Чң ЧҗЧӘ Ч”ЧһЧЎЧӨЧЁ 1.', 'ЧҗЧӨЧЎ ЧһЧ•Ч Ч”', async function(){
    var r = await act('resetUnitCounter',{item_id:iid},'Ч”ЧһЧ•Ч Ч” ЧҗЧ•ЧӨЧЎ');
    if(r) unitsModal(iid);
  });
}
async function doScrapUnit(uid,iid){
  if(!confirm('ЧңЧ’ЧЁЧ•Чҳ ЧҗЧӘ '+uid+'? Ч”ЧҷЧ—ЧҷЧ“Ч” ЧӘЧҷЧ’ЧЁЧў ЧһЧ”ЧһЧңЧҗЧҷ вҖ” ЧӨЧўЧ•ЧңЧ” ЧЎЧ•ЧӨЧҷЧӘ.')) return;
  var r = await act('setUnitStatus',{unit_id:uid,status:'Ч’ЧЁЧ•Чҳ'},'Ч Ч’ЧЁЧҳ Ч•Ч Ч’ЧЁЧў ЧһЧ”ЧһЧңЧҗЧҷ');
  if(r) unitsModal(iid);
}

/* ================= Ч Ч•ЧӣЧ—Ч•ЧӘ ================= */
// B21: Ч©ЧўЧ•ЧӘ ЧһЧ–ЧӣЧ•ЧӘ = Ч©ЧўЧ•ЧӘ Ч©Ч ЧЁЧ©ЧһЧ• ЧӨЧ—Ч•ЧӘ Ч©ЧўЧ•ЧӘ Ч©Ч ЧӨЧЎЧңЧ•
function attVoid(a){ var h=Number(a.hours)||0, v=Number(a.void_hours)||0; if(v<0)v=0; if(v>h)v=h; return Math.round(v*100)/100; }
function attEff(a){ var h=Number(a.hours)||0; return Math.round((h-attVoid(a))*100)/100; }
var ATT_TAB = 'list';
var ATT_Y = new Date().getFullYear(), ATT_M = new Date().getMonth();
var ATT_EMP = '';
function rAttendance(){
  var isMgr = (ROLE==='ЧһЧ Ч”Чң');
  el('main').innerHTML = '<div class="section-title"><h2>Ч Ч•ЧӣЧ—Ч•ЧӘ</h2>'+(isMgr?'<button class="btn ghost sm" onclick="attForm()">+ ЧЁЧҷЧ©Ч•Чқ ЧҷЧ“Ч Чҷ</button> <button class="btn ghost sm" onclick="doRepairTimeFields()" title="ЧӘЧҷЧ§Ч•Чҹ Ч—Ч“-ЧӨЧўЧһЧҷ ЧңЧЁЧҷЧ©Ч•ЧһЧҷЧқ ЧҷЧ©Ч ЧҷЧқ Ч©Ч”Ч©ЧӘЧ‘Ч©Ч•">ЧӘЧҷЧ§Ч•Чҹ Ч ЧӘЧ•Ч ЧҷЧқ ЧҷЧ©Ч ЧҷЧқ</button>':'')+'</div>'+
    '<div class="card" style="text-align:center"><h3 style="margin-bottom:10px">Ч©ЧўЧ•Чҹ Ч Ч•ЧӣЧ—Ч•ЧӘ</h3>'+
    '<input id="clockPin" type="password" inputmode="numeric" class="scanbox" placeholder="Ч§Ч•Ч“ ЧўЧ•Ч‘Ч“" style="max-width:220px;margin:0 auto 10px" onkeydown="if(event.key===\'Enter\')doClock()">'+
    '<br><button class="btn" id="clockBtn" onclick="doClock()">Ч”Ч—ЧӘЧқ ЧӣЧ ЧҷЧЎЧ” / ЧҷЧҰЧҷЧҗЧ”</button><div id="clockMsg" style="margin-top:10px;min-height:20px"></div></div>'+
    '<div class="row" style="margin:14px 0 8px;gap:6px">'+
      '<button class="btn '+(ATT_TAB==='list'?'':'ghost ')+'sm" onclick="ATT_TAB=\'list\';rAttendance()">ЧЁЧ©ЧҷЧһЧ”</button>'+
      '<button class="btn '+(ATT_TAB==='cal'?'':'ghost ')+'sm" onclick="ATT_TAB=\'cal\';rAttendance()">ЧҷЧ•ЧһЧҹ</button>'+
    '</div>'+
    (ATT_TAB==='cal'? attCalendarHtml() : attListHtml());
}
function attRowLine(a){
  var e = DB.employees.find(x=>x.id===a.employee_id)||{};
  var dts = a.in_date?(esc(a.in_date)+(a.out_date&&a.out_date!==a.in_date?' вҶҗ '+esc(a.out_date):'')):esc(a.date);
  var v = attVoid(a), eff = attEff(a), full = (Number(a.hours)||0);
  var hcell = (a.hours!==''&&a.hours!==undefined)?
    (v>0? '<span style="text-decoration:line-through;color:var(--muted)">'+full+'</span> <b>'+eff+'</b>' : String(a.hours))
    : 'вҖ”';
  var vcell = v>0? '<span class="chip" style="background:var(--danger)">Ч ЧӨЧЎЧңЧ• '+v+'</span> <span class="muted" style="font-size:11px">'+esc(a.void_reason||'')+'</span>' : '<span class="muted">вҖ”</span>';
  return '<tr><td>'+esc(e.name)+'</td><td>'+dts+'</td><td>'+esc(a.in_time)+'</td><td>'+esc(a.out_time||'вҖ”')+'</td><td>'+hcell+'</td><td>'+vcell+'</td>'+
    (ROLE==='ЧһЧ Ч”Чң'?'<td><button class="btn ghost sm" onclick="attVoidForm(\''+a.id+'\')">ЧӨЧЎЧҷЧңЧӘ Ч©ЧўЧ•ЧӘ</button></td>':'')+'</tr>';
}
function attListHtml(){
  var recent = DB.attendance.slice(-40).reverse();
  return '<div class="card">'+
    (recent.length?'<table><tr><th>ЧўЧ•Ч‘Ч“</th><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧӣЧ ЧҷЧЎЧ”</th><th>ЧҷЧҰЧҷЧҗЧ”</th><th>Ч©ЧўЧ•ЧӘ</th><th>ЧӨЧЎЧҷЧңЧ”</th>'+(ROLE==='ЧһЧ Ч”Чң'?'<th></th>':'')+'</tr>'+
      recent.map(attRowLine).join('')+'</table>':'<div class="empty">ЧҗЧҷЧҹ ЧЁЧҷЧ©Ч•ЧһЧҷЧқ</div>')+'</div>';
}
function attCalendarHtml(){
  var first = new Date(ATT_Y, ATT_M, 1);
  var todayIso = new Date().toISOString().slice(0,10);
  var emps = DB.employees.filter(e=>e.active!=='ЧңЧҗ');
  var byDate = {};
  (DB.attendance||[]).forEach(function(a){
    if(ATT_EMP && a.employee_id!==ATT_EMP) return;
    var d = String(a.date||'').substring(0,10); if(!d) return;
    (byDate[d]=byDate[d]||[]).push(a);
  });
  var startOffset = first.getDay();
  var daysInMonth = new Date(ATT_Y, ATT_M+1, 0).getDate();
  var cells = '';
  ['Чҗ','Ч‘','Ч’','Ч“','Ч”','Ч•','Ч©'].forEach(d=>{ cells += '<div class="calhead">'+d+'</div>'; });
  for(var i=0;i<startOffset;i++) cells += '<div></div>';
  var monthEff = 0, monthVoid = 0;
  for(var day=1;day<=daysInMonth;day++){
    var iso = ATT_Y+'-'+('0'+(ATT_M+1)).slice(-2)+'-'+('0'+day).slice(-2);
    var rows = byDate[iso]||[];
    var dEff = rows.reduce((s,a)=>s+attEff(a),0), dVoid = rows.reduce((s,a)=>s+attVoid(a),0);
    dEff = Math.round(dEff*100)/100; dVoid = Math.round(dVoid*100)/100;
    monthEff += dEff; monthVoid += dVoid;
    var isSat = new Date(ATT_Y, ATT_M, day).getDay()===6;
    cells += '<div class="calday'+(iso===todayIso?' today':'')+'" style="'+(isSat?'background:#FDF6E3;':'')+'" onclick="attOpenDay(\''+iso+'\')">'+
      '<span class="dnum">'+day+'</span>'+
      (rows.length? '<div class="calev" style="background:var(--teal)">'+dEff+' Ч©ЧўЧ•ЧӘ В· '+rows.length+' ЧЁЧҷЧ©Ч•ЧһЧҷЧқ</div>'+
        (dVoid>0?'<div class="calev" style="background:var(--danger)">Ч ЧӨЧЎЧңЧ• '+dVoid+'</div>':'')
        : '<div class="muted" style="font-size:10px;margin-top:4px">вҖ”</div>')+
      '</div>';
  }
  var gregTitle = new Intl.DateTimeFormat('he',{month:'long',year:'numeric'}).format(first);
  return '<div class="card"><div class="row" style="margin-bottom:8px;gap:6px">'+
    '<button class="btn ghost sm" onclick="attCalNav(1)">в—Җ Ч”Ч‘Чҗ</button>'+
    '<button class="btn ghost sm" onclick="ATT_Y=new Date().getFullYear();ATT_M=new Date().getMonth();rAttendance()">Ч”ЧҷЧ•Чқ</button>'+
    '<button class="btn ghost sm" onclick="attCalNav(-1)">Ч”Ч§Ч•Ч“Чқ в–¶</button>'+
    '<select style="width:auto" onchange="ATT_EMP=this.value;rAttendance()"><option value="">ЧӣЧң Ч”ЧўЧ•Ч‘Ч“ЧҷЧқ</option>'+
      emps.map(e=>'<option value="'+esc(e.id)+'"'+(ATT_EMP===e.id?' selected':'')+'>'+esc(e.name)+'</option>').join('')+'</select>'+
    '</div>'+
    '<div style="text-align:center;margin-bottom:8px"><b style="font-size:17px">'+esc(gregTitle)+'</b>'+
    '<div class="muted">ЧЎЧ”"Чӣ ЧһЧ–ЧӣЧ” Ч‘Ч—Ч•Ч“Ч©: '+(Math.round(monthEff*100)/100)+' Ч©ЧўЧ•ЧӘ'+(monthVoid>0?' В· Ч ЧӨЧЎЧңЧ• '+(Math.round(monthVoid*100)/100)+' Ч©ЧўЧ•ЧӘ':'')+'</div></div>'+
    '<div class="calgrid">'+cells+'</div></div>';
}
function attCalNav(dir){ ATT_M += dir; if(ATT_M<0){ATT_M=11;ATT_Y--;} if(ATT_M>11){ATT_M=0;ATT_Y++;} rAttendance(); }
function attOpenDay(iso){
  var rows = (DB.attendance||[]).filter(a=>String(a.date||'').substring(0,10)===iso && (!ATT_EMP||a.employee_id===ATT_EMP));
  openModal('<h2>Ч Ч•ЧӣЧ—Ч•ЧӘ вҖ” '+esc(iso)+'</h2>'+
    (rows.length?'<div class="card"><table><tr><th>ЧўЧ•Ч‘Ч“</th><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧӣЧ ЧҷЧЎЧ”</th><th>ЧҷЧҰЧҷЧҗЧ”</th><th>Ч©ЧўЧ•ЧӘ</th><th>ЧӨЧЎЧҷЧңЧ”</th>'+(ROLE==='ЧһЧ Ч”Чң'?'<th></th>':'')+'</tr>'+
      rows.map(attRowLine).join('')+'</table></div>':'<div class="empty">ЧҗЧҷЧҹ ЧЁЧҷЧ©Ч•ЧһЧҷЧқ Ч‘ЧҷЧ•Чқ Ч–Ч”</div>'));
}
// B21: ЧӨЧЎЧҷЧңЧӘ Ч©ЧўЧ•ЧӘ (ЧһЧңЧҗ ЧҗЧ• Ч—ЧңЧ§Чҷ) ЧўЧқ ЧЎЧҷЧ‘Ч” вҖ” ЧһЧ Ч”Чң Ч‘ЧңЧ‘Ч“
function attVoidForm(aid){

      adj.map(a=>'<tr><td>'+esc(a.type)+'</td><td>'+esc(a.category)+'</td><td>'+(a.type==='Ч ЧҷЧӣЧ•Чҷ'?'-':'')+ils(a.amount)+'</td><td>'+esc(a.note||'')+'</td></tr>').join('')+'</table></div>':
      '<div class="card empty">ЧҗЧҷЧҹ ЧӘЧ•ЧЎЧӨЧ•ЧӘ/Ч ЧҷЧӣЧ•ЧҷЧҷЧқ</div>')+
    (p.status!=='Ч©Ч•ЧңЧқ Ч‘ЧһЧңЧ•ЧҗЧ•'?'<div class="row" style="margin-top:8px;gap:6px">'+
      '<select id="f_padjtype" style="width:auto"><option value="ЧӘЧ•ЧЎЧӨЧӘ">ЧӘЧ•ЧЎЧӨЧӘ</option><option value="Ч ЧҷЧӣЧ•Чҷ">Ч ЧҷЧӣЧ•Чҷ</option></select>'+
      '<select id="f_padjcat" style="width:auto">'+PAYROLL_CATEGORIES.map(c=>'<option>'+c+'</option>').join('')+'</select>'+
      '<input id="f_padjamt" type="number" min="0" placeholder="ЧЎЧӣЧ•Чқ" style="width:100px">'+
      '<input id="f_padjnote" placeholder="ЧӨЧҷЧЁЧ•Чҳ" class="grow">'+
      '<button class="btn ghost sm" onclick="savePayrollAdj(\''+pid+'\')">Ч”Ч•ЧЎЧЈ</button></div>':'')+
    '<h3 style="margin:14px 0 6px;cursor:pointer;text-decoration:underline" onclick="payrollBreakdown(\''+pid+'\')" title="ЧңЧ—ЧҘ ЧңЧӨЧҷЧЁЧ•Чҳ ЧЁЧӣЧҷЧ‘Чҷ Ч”Ч©ЧӣЧЁ">ЧЎЧ”"Чӣ Ч•ЧӘЧ©ЧңЧ•ЧһЧҷЧқ <span class="muted" style="font-size:12px;font-weight:400">вҖ” ЧңЧ—ЧҘ ЧңЧӨЧҷЧЁЧ•Чҳ ЧһЧңЧҗ</span></h3>'+
    '<div class="card"><table><tr><td>ЧЎЧ”"Чӣ ЧңЧӘЧ©ЧңЧ•Чқ</td><td class="tot"><b>'+ils(p.total)+'</b></td><td>Ч©Ч•ЧңЧқ</td><td>'+ils(paid)+'</td><td>ЧҷЧӘЧЁЧ”</td><td'+(remaining>0.01?' style="color:var(--danger);font-weight:700"':'')+'>'+ils(remaining)+'</td></tr></table></div>'+
    (pays.length?'<div class="card"><table><tr><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧЎЧӣЧ•Чқ</th><th>ЧҗЧһЧҰЧўЧҷ</th><th>Ч”ЧўЧЁЧ”</th><th>ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ</th></tr>'+
      pays.slice().reverse().map(function(x){
        var d = payDocsOf('payroll',x.id);
        return '<tr><td>'+esc(x.paid_at)+'</td><td>'+ils(x.amount)+'</td><td>'+esc(x.method)+'</td><td>'+esc(x.note||'')+'</td>'+
          '<td><button class="btn ghost sm" onclick="payDocsForm(\'payroll\',\''+x.id+'\',\'payroll\',\''+pid+'\')">'+(d.length?d.length+' ЧһЧҰЧ•ЧЁЧӨЧ•ЧӘ':'Ч”Ч•ЧЎЧЈ')+'</button></td></tr>';
      }).join('')+'</table></div>':'')+
    (p.status==='ЧҳЧҷЧ•ЧҳЧ”'?'<button class="btn" style="margin-top:10px" onclick="doApprovePayroll(\''+pid+'\')">ЧҗЧ©ЧЁ Ч©ЧӣЧЁ</button>':
      (remaining>0.01?
        '<fieldset style="margin-top:14px;border:1px solid var(--line);border-radius:10px;padding:10px 12px 12px">'+
        '<legend style="font-weight:700;font-size:13px;padding:0 6px">ЧӘЧ©ЧңЧ•Чқ Ч©ЧӣЧЁ</legend>'+
        '<div class="muted" style="font-size:12px;margin-bottom:8px">ЧҷЧӘЧЁЧ” ЧңЧӘЧ©ЧңЧ•Чқ: <b>'+ils(remaining)+'</b></div>'+
        '<div class="row" style="gap:6px">'+
        '<input id="f_payamt" type="number" min="0" max="'+remaining+'" placeholder="ЧЎЧӣЧ•Чқ ЧңЧӘЧ©ЧңЧ•Чқ" style="width:120px" value="'+remaining+'">'+
        '<input id="f_paydate" type="date" style="width:auto" value="'+new Date().toISOString().slice(0,10)+'" title="ЧӘЧҗЧЁЧҷЧҡ Ч”ЧӘЧ©ЧңЧ•Чқ вҖ” Ч ЧҷЧӘЧҹ ЧңЧўЧЁЧҷЧӣЧ”">'+
        '<select id="f_paymethod" style="width:auto">'+PAYROLL_METHODS.map(m=>'<option>'+m+'</option>').join('')+'</select>'+
        '<input id="f_paynote" placeholder="Ч”ЧўЧЁЧ”" class="grow">'+
        '<button class="btn" onclick="savePayrollPayment(\''+pid+'\')">ЧЁЧ©Ч•Чқ ЧӘЧ©ЧңЧ•Чқ</button></div></fieldset>':
        '<p class="muted" style="margin-top:10px">Ч”Ч©ЧӣЧЁ Ч©Ч•ЧңЧқ Ч‘ЧһЧңЧ•ЧҗЧ•.</p>'))+
    '<div style="margin-top:10px"><button class="btn ghost sm" onclick="printPayslip(\''+pid+'\')">Ч”Ч“ЧӨЧЎЧӘ ЧһЧЎЧһЧҡ ЧӨЧ ЧҷЧһЧҷ</button></div>');
}
// B22: Ч—ЧңЧ•Чҹ ЧӨЧҷЧЁЧ•Чҳ ЧЁЧӣЧҷЧ‘Чҷ Ч”Ч©ЧӣЧЁ вҖ” ЧңЧ—ЧҷЧҰЧ” ЧўЧң "ЧЎЧ”"Чӣ Ч•ЧӘЧ©ЧңЧ•ЧһЧҷЧқ" Ч‘Ч—ЧңЧ•Чҹ Ч”ЧӨЧЁЧҳЧҷЧқ
function payrollBreakdown(pid){
  var p = DB.payroll.find(x=>x.id===pid); if(!p) return;
  var e = DB.employees.find(x=>x.id===p.employee_id)||{};
  var adj = payrollAdjustments(pid);
  var pays = (DB.payrollPayments||[]).filter(x=>x.payroll_id===pid);
  var paid = payrollPaid(pid), remaining = Math.round((Number(p.total)-paid)*100)/100;
  var glob = isGlobalPayroll(p,e);
  var baseLabel = (glob?'Ч©ЧӣЧЁ Ч’ЧңЧ•Ч‘ЧңЧҷ вҖ” ':'Ч©ЧӣЧЁ Ч‘ЧЎЧҷЧЎ вҖ” ')+monthLabel(p.month);
  var baseSub = glob
    ? 'ЧЎЧӣЧ•Чқ Ч—Ч•Ч“Ч©Чҷ Ч§Ч‘Ч•Чў'+(Number(p.hours)?' В· Ч ЧЁЧ©ЧһЧ• '+p.hours+' Ч©ЧўЧ•ЧӘ Ч Ч•ЧӣЧ—Ч•ЧӘ (ЧҗЧҷЧ Чҹ ЧһЧ©ЧӨЧҷЧўЧ•ЧӘ ЧўЧң Ч”Ч©ЧӣЧЁ)':'')
    : p.hours+' Ч©ЧўЧ•ЧӘ Г— '+ils(p.hourly_rate);
  var rows = '<tr style="cursor:pointer" onclick="payrollHours(\''+pid+'\')" title="ЧңЧ—ЧҘ ЧңЧӘЧҰЧ•Ч’ЧӘ Ч©ЧўЧ•ЧӘ Ч”Ч Ч•ЧӣЧ—Ч•ЧӘ Ч©Чң Ч”Ч—Ч•Ч“Ч©">'+
      '<td><b style="text-decoration:underline">'+esc(baseLabel)+'</b><div class="muted" style="font-size:11.5px">'+esc(baseSub)+'</div></td>'+
      '<td class="tot"><b>'+ils(p.base_pay)+'</b></td></tr>';
  if(Number(p.bonus)) rows += '<tr><td>Ч‘Ч•Ч Ч•ЧЎ (ЧҷЧ©Чҹ)'+(p.bonus_note?'<div class="muted" style="font-size:11.5px">'+esc(p.bonus_note)+'</div>':'')+'</td><td>'+ils(p.bonus)+'</td></tr>';
  rows += adj.map(function(a){
    var neg = a.type==='Ч ЧҷЧӣЧ•Чҷ';
    return '<tr><td>'+esc(a.type)+' В· '+esc(a.category)+(a.note?'<div class="muted" style="font-size:11.5px">'+esc(a.note)+'</div>':'')+'</td>'+
      '<td'+(neg?' style="color:var(--danger)"':'')+'>'+(neg?'-':'')+ils(a.amount)+'</td></tr>';
  }).join('');
  openModal('<h2>ЧӨЧҷЧЁЧ•Чҳ ЧЁЧӣЧҷЧ‘Чҷ Ч©ЧӣЧЁ вҖ” '+esc(e.name)+'</h2>'+
    '<div class="muted" style="margin-bottom:8px">Ч—Ч•Ч“Ч© '+esc(monthLabel(p.month))+' В· ЧЎЧҳЧҳЧ•ЧЎ '+esc(p.status)+'</div>'+
    '<div class="card"><table><tr><th>ЧЁЧӣЧҷЧ‘</th><th>ЧЎЧӣЧ•Чқ</th></tr>'+rows+
      '<tr><td><b>ЧЎЧ”"Чӣ ЧңЧӘЧ©ЧңЧ•Чқ</b></td><td class="tot"><b>'+ils(p.total)+'</b></td></tr>'+
      '<tr><td>Ч©Ч•ЧңЧқ</td><td>'+ils(paid)+'</td></tr>'+
      '<tr><td><b>ЧҷЧӘЧЁЧ”</b></td><td'+(remaining>0.01?' style="color:var(--danger);font-weight:700"':'')+'>'+ils(remaining)+'</td></tr>'+
      '</table></div>'+
    (pays.length?'<h3 style="margin:12px 0 6px">ЧӘЧ©ЧңЧ•ЧһЧҷЧқ Ч©Ч‘Ч•ЧҰЧўЧ•</h3><div class="card"><table><tr><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧЎЧӣЧ•Чқ</th><th>ЧҗЧһЧҰЧўЧҷ</th><th>Ч”ЧўЧЁЧ”</th><th>ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ</th></tr>'+
      pays.slice().reverse().map(function(x){
        var d = payDocsOf('payroll',x.id);
        return '<tr><td>'+esc(x.paid_at)+'</td><td>'+ils(x.amount)+'</td><td>'+esc(x.method)+'</td><td>'+esc(x.note||'')+'</td>'+
          '<td><button class="btn ghost sm" onclick="payDocsForm(\'payroll\',\''+x.id+'\',\'payroll\',\''+pid+'\')">'+(d.length?d.length+' ЧһЧҰЧ•ЧЁЧӨЧ•ЧӘ':'Ч”Ч•ЧЎЧЈ')+'</button></td></tr>';
      }).join('')+'</table></div>':'')+
    '<p class="muted" style="font-size:12px;margin-top:8px">ЧңЧ—ЧҷЧҰЧ” ЧўЧң Ч©Ч•ЧЁЧӘ Ч”Ч©ЧӣЧЁ ЧӨЧ•ЧӘЧ—ЧӘ ЧҗЧӘ ЧЁЧҷЧ©Ч•ЧһЧҷ Ч”Ч Ч•ЧӣЧ—Ч•ЧӘ Ч©Чң Ч”Ч—Ч•Ч“Ч©.</p>'+
    '<div class="row" style="margin-top:10px;gap:6px">'+
      '<button class="btn ghost sm" onclick="payrollDetail(\''+pid+'\')">Ч—Ч–ЧЁЧ”</button>'+
      '<button class="btn ghost sm" onclick="printPayslip(\''+pid+'\')">Ч”Ч“ЧӨЧЎЧӘ ЧһЧЎЧһЧҡ ЧӨЧ ЧҷЧһЧҷ</button></div>');
}
// B22: ЧӘЧҰЧ•Ч’ЧӘ Ч©ЧўЧ•ЧӘ Ч”Ч Ч•ЧӣЧ—Ч•ЧӘ Ч©Чң Ч”Ч—Ч•Ч“Ч© ЧўЧ‘Ч•ЧЁ ЧЁЧ©Ч•ЧһЧӘ Ч©ЧӣЧЁ. ЧҰЧӨЧҷЧҷЧ” Ч‘ЧңЧ‘Ч“.
function payrollHours(pid){
  var p = DB.payroll.find(x=>x.id===pid); if(!p) return;
  var e = DB.employees.find(x=>x.id===p.employee_id)||{};
  var glob = isGlobalPayroll(p,e);
  var rows = (DB.attendance||[]).filter(a=>a.employee_id===p.employee_id && String(a.date||'').substring(0,7)===p.month)
    .slice().sort((a,b)=>String(a.date||'').localeCompare(String(b.date||'')));
  var tot = Math.round(rows.reduce((s,a)=>s+(Number(a.hours)||0),0)*100)/100;
  var eff = Math.round(rows.reduce((s,a)=>s+attEff(a),0)*100)/100;
  var vd  = Math.round(rows.reduce((s,a)=>s+attVoid(a),0)*100)/100;
  openModal('<h2>Ч©ЧўЧ•ЧӘ Ч Ч•ЧӣЧ—Ч•ЧӘ вҖ” '+esc(e.name)+'</h2>'+
    '<div class="muted" style="margin-bottom:8px">Ч—Ч•Ч“Ч© '+esc(monthLabel(p.month))+'</div>'+
    '<div class="card"><b>Ч ЧЁЧ©ЧһЧ•: </b>'+tot+' В· <b>ЧһЧ–ЧӣЧ•ЧӘ: </b>'+eff+
      (vd>0?' В· <span style="color:var(--danger)"><b>Ч ЧӨЧЎЧңЧ•: </b>'+vd+'</span>':'')+
      (glob?'<div class="muted" style="font-size:12px;margin-top:6px">ЧўЧ•Ч‘Ч“ Ч‘Ч©ЧӣЧЁ Ч’ЧңЧ•Ч‘ЧңЧҷ вҖ” Ч”Ч©ЧўЧ•ЧӘ Ч ЧЁЧ©ЧһЧ•ЧӘ ЧңЧһЧўЧ§Ч‘ Ч‘ЧңЧ‘Ч“ Ч•ЧҗЧҷЧ Чҹ ЧһЧ©ЧӨЧҷЧўЧ•ЧӘ ЧўЧң Ч”Ч©ЧӣЧЁ.</div>'
           :'<div class="muted" style="font-size:12px;margin-top:6px">Ч‘ЧЎЧҷЧЎ Ч”Ч©ЧӣЧЁ: '+eff+' Ч©ЧўЧ•ЧӘ Г— '+ils(p.hourly_rate)+' = '+ils(p.base_pay)+'</div>')+'</div>'+
    (rows.length?'<div class="card"><table><tr><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧӣЧ ЧҷЧЎЧ”</th><th>ЧҷЧҰЧҷЧҗЧ”</th><th>Ч©ЧўЧ•ЧӘ</th><th>ЧӨЧЎЧҷЧңЧ”</th></tr>'+
      rows.map(function(a){
        var v = attVoid(a);
        var hc = (a.hours!==''&&a.hours!==undefined)?(v>0?'<span style="text-decoration:line-through;color:var(--muted)">'+(Number(a.hours)||0)+'</span> <b>'+attEff(a)+'</b>':String(a.hours)):'вҖ”';
        return '<tr><td>'+esc(a.date)+'</td><td>'+esc(a.in_time||'вҖ”')+'</td><td>'+esc(a.out_time||'вҖ”')+'</td><td>'+hc+'</td>'+
          '<td>'+(v>0?'<span class="chip" style="background:var(--danger)">'+v+'</span> <span class="muted" style="font-size:11px">'+esc(a.void_reason||'')+'</span>':'<span class="muted">вҖ”</span>')+'</td></tr>';
      }).join('')+'</table></div>'
      :'<div class="card empty">ЧҗЧҷЧҹ ЧЁЧҷЧ©Ч•ЧһЧҷ Ч Ч•ЧӣЧ—Ч•ЧӘ ЧңЧ—Ч•Ч“Ч© Ч–Ч”</div>')+
    '<div style="margin-top:10px"><button class="btn ghost sm" onclick="payrollBreakdown(\''+pid+'\')">Ч—Ч–ЧЁЧ” ЧңЧӨЧҷЧЁЧ•Чҳ</button></div>');
}
async function savePayrollAdj(pid){
  var amt = Number(el('f_padjamt').value)||0;
  if(amt<=0) return toast('ЧЎЧӣЧ•Чқ ЧңЧҗ ЧӘЧ§ЧҷЧҹ', true);
  var r = await act('addPayrollAdjustment',{payroll_id:pid,type:el('f_padjtype').value,category:el('f_padjcat').value,amount:amt,note:el('f_padjnote').value},'ЧўЧ•Ч“ЧӣЧҹ');
  if(r) payrollDetail(pid);
}
async function savePayrollPayment(pid){
  var amt = Number(el('f_payamt').value)||0;
  if(amt<=0) return toast('ЧЎЧӣЧ•Чқ ЧңЧҗ ЧӘЧ§ЧҷЧҹ', true);
  var r = await act('payPayroll',{payroll_id:pid,amount:amt,method:el('f_paymethod').value,note:el('f_paynote').value,paid_at:(el('f_paydate')?el('f_paydate').value:'')},'Ч”ЧӘЧ©ЧңЧ•Чқ Ч ЧЁЧ©Чқ');
  // B27: ЧһЧҷЧ“ ЧҗЧ—ЧЁЧҷ ЧЁЧҷЧ©Ч•Чқ Ч”ЧӘЧ©ЧңЧ•Чқ вҖ” ЧһЧЎЧҡ ЧҰЧҷЧЁЧ•ЧЈ ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ (ЧҗЧӨЧ©ЧЁ ЧӣЧһЧ”)
  if(r && r.pay_id) payDocsForm('payroll', r.pay_id, 'payroll', pid);
  else if(r) payrollDetail(pid);
}
async function doApprovePayroll(pid){
  if(!confirm('ЧңЧҗЧ©ЧЁ ЧҗЧӘ Ч”Ч©ЧӣЧЁ? Ч”ЧЎЧӣЧ•Чқ ЧҷЧҷЧӣЧ ЧЎ Чң"Ч”Ч•ЧҰЧҗЧ•ЧӘ ЧўЧӘЧҷЧ“ЧҷЧ•ЧӘ" ЧўЧ“ ЧңЧӘЧ©ЧңЧ•Чқ Ч‘ЧӨЧ•ЧўЧң.')) return;
  var r = await act('approvePayroll',{payroll_id:pid},'Ч”Ч©ЧӣЧЁ ЧҗЧ•Ч©ЧЁ');
  if(r) payrollDetail(pid);
}
function printPayslip(pid){
  var p = DB.payroll.find(x=>x.id===pid); if(!p) return;
  var e = DB.employees.find(x=>x.id===p.employee_id)||{};
  var adj = payrollAdjustments(pid);
  var paid = payrollPaid(pid);
  printDoc('ЧЎЧҷЧӣЧ•Чқ Ч©ЧӣЧЁ ЧӨЧ ЧҷЧһЧҷ', null,
    '<p><b>ЧўЧ•Ч‘Ч“:</b> '+esc(e.name)+' В· <b>Ч—Ч•Ч“Ч©:</b> '+esc(p.month)+'</p>'+
    '<table><tr><th>Ч©ЧўЧ•ЧӘ</th><th>ЧӘЧўЧЁЧҷЧЈ</th><th>Ч‘ЧЎЧҷЧЎ</th><th>ЧЎЧ”"Чӣ</th><th>Ч©Ч•ЧңЧқ</th></tr>'+
    '<tr><td>'+p.hours+'</td><td>'+ils(p.hourly_rate)+'</td><td>'+ils(p.base_pay)+'</td><td class="tot">'+ils(p.total)+'</td><td>'+ils(paid)+'</td></tr></table>'+
    (adj.length?'<table><tr><th>ЧЎЧ•Ч’</th><th>Ч§ЧҳЧ’Ч•ЧЁЧҷЧ”</th><th>ЧЎЧӣЧ•Чқ</th><th>Ч”ЧўЧЁЧ”</th></tr>'+
      adj.map(a=>'<tr><td>'+esc(a.type)+'</td><td>'+esc(a.category)+'</td><td>'+(a.type==='Ч ЧҷЧӣЧ•Чҷ'?'-':'')+ils(a.amount)+'</td><td>'+esc(a.note||'')+'</td></tr>').join('')+'</table>':'')+
    '<p class="muted" style="font-size:12px">ЧһЧЎЧһЧҡ ЧӨЧ ЧҷЧһЧҷ вҖ” ЧҗЧҷЧ Ч• ЧӘЧңЧ•Ч© Ч©ЧӣЧЁ ЧЁЧ©ЧһЧҷ. ЧӘЧңЧ•Ч© ЧЁЧ©ЧһЧҷ ЧһЧ•ЧӨЧ§ Ч‘ЧӘЧ•ЧӣЧ ЧӘ Ч©ЧӣЧЁ ЧһЧ•ЧЁЧ©ЧҷЧӘ.</p>', {signatures:true});

async function saveSettings(){
  var btn = el('setSaveBtn'), origTxt = btn?btn.textContent:'';
  if(btn){ btn.disabled=true; btn.style.opacity='.6'; btn.textContent='Ч©Ч•ЧһЧЁ...'; }
  showBusy(true);
  try{
    var keys = SETTING_FIELDS.map(f=>f[0]).concat(['agreement_text','ui_theme']);
    for(var i=0;i<keys.length;i++){
      var fld = el('set_'+keys[i]);
      if(!fld) continue; // Ч©Ч“Ч” Ч©ЧңЧҗ Ч§ЧҷЧҷЧқ Ч‘ЧһЧЎЧҡ вҖ” ЧңЧҗ ЧһЧӨЧҷЧңЧҷЧқ ЧҗЧӘ ЧӣЧң Ч”Ч©ЧһЧҷЧЁЧ”
      var r = await api('updateSetting',{key:keys[i],value:fld.value});
      if(!r || !r.ok){ toast((r&&r.error)||('Ч©ЧһЧҷЧЁЧӘ Ч”Ч”Ч’Ч“ЧЁЧ” "'+keys[i]+'" Ч ЧӣЧ©ЧңЧ”'), true); return; }
    }
    var g = await api('getAll'); if(g.ok) DB=g.db;
    applyTheme(); toast('Ч”Ч”Ч’Ч“ЧЁЧ•ЧӘ Ч Ч©ЧһЧЁЧ• вң“'); rSettings();
  }catch(e){
    toast('Ч©Ч’ЧҷЧҗЧӘ ЧӘЧ§Ч©Ч•ЧЁЧӘ Ч‘Ч©ЧһЧҷЧЁЧӘ Ч”Ч”Ч’Ч“ЧЁЧ•ЧӘ вҖ” Ч ЧЎЧ” Ч©Ч•Ч‘', true);
  }finally{
    showBusy(false);
    if(btn && document.body.contains(btn)){ btn.disabled=false; btn.style.opacity='1'; btn.textContent=origTxt; }
  }
}

/* ================= ЧҷЧ•ЧһЧҹ ================= */
var CAL_Y = new Date().getFullYear(), CAL_M = new Date().getMonth();
var HEBCAL_CACHE = {};
async function fetchHebcal(y, m){
  var key = y+'-'+m;
  if(HEBCAL_CACHE[key]) return HEBCAL_CACHE[key];
  try{
    var res = await fetch('https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&min=off&nx=off&mf=off&ss=off&c=on&M=on&i=on&lg=he&geonameid=293703&year='+y+'&month='+(m+1));
    var data = await res.json();
    HEBCAL_CACHE[key] = data.items||[];
  }catch(e){ HEBCAL_CACHE[key] = []; }
  return HEBCAL_CACHE[key];
}
function hebFmt(d, opts){ try{ return new Intl.DateTimeFormat('he-u-ca-hebrew', opts).format(d); }catch(e){ return ''; } }
function calEvents(){
  var events = [];
  DB.orders.filter(o=>['ЧһЧҗЧ•Ч©ЧЁЧӘ','ЧЎЧ•ЧӨЧ§Ч”'].includes(o.status)).forEach(function(o){
    events.push({date:o.start_date, label:'ЧҗЧЎЧӨЧ§Ч”: '+cust(o.customer_id), color:'var(--teal)', click:"openOrder('"+o.id+"')"});
    events.push({date:o.end_date, label:'ЧҗЧҷЧЎЧ•ЧЈ: '+cust(o.customer_id), color:'var(--amber)', click:"openOrder('"+o.id+"')"});
  });
  DB.tasks.filter(t=>t.status!=='Ч”Ч•Ч©ЧңЧһЧ”'&&t.due_date).forEach(function(t){
    events.push({date:t.due_date, label:'ЧһЧ©ЧҷЧһЧ”: '+t.title, color:'var(--navy2)', click:"openTask('"+t.id+"')"});
  });
  DB.meetings.forEach(function(m){
    events.push({date:m.date, label:'ЧӨЧ’ЧҷЧ©Ч”'+(m.time?' '+m.time:'')+': '+m.title, color:'var(--danger)', click:"openMeeting('"+m.id+"')"});
  });
  DB.machines.filter(m=>m.next_service).forEach(function(m){
    events.push({date:m.next_service, label:'ЧҳЧҷЧӨЧ•Чң: '+m.id, color:'#94A3B8', click:"go('assets')"});
  });
  DB.vehicles.forEach(function(v){
    if(v.test_date) events.push({date:v.test_date, label:'ЧҳЧЎЧҳ: '+(v.plate||v.id), color:'#94A3B8', click:"go('fleet')"});
    if(v.insurance_expiry) events.push({date:v.insurance_expiry, label:'Ч‘ЧҷЧҳЧ•Ч—: '+(v.plate||v.id), color:'#94A3B8', click:"go('fleet')"});
    if(v.next_service_date) events.push({date:v.next_service_date, label:'ЧҳЧҷЧӨЧ•Чң ЧЁЧӣЧ‘: '+(v.plate||v.id), color:'#94A3B8', click:"go('fleet')"});
  });
  return events;
}
function rCalendar(){ rCalendarDraw([]); fetchHebcal(CAL_Y, CAL_M).then(function(items){ rCalendarDraw(items); }); }
function rCalendarDraw(hebItems){
  var first = new Date(CAL_Y, CAL_M, 1);
  var today = new Date().toISOString().slice(0,10);
  var byDate = {};
  calEvents().forEach(e=>{ if(e.date) (byDate[e.date]=byDate[e.date]||[]).push(e); });
  var holyDays = {};
  (hebItems||[]).forEach(function(it){
    var d = String(it.date).substring(0,10);
    if(it.category==='candles'){ (byDate[d]=byDate[d]||[]).push({date:d,label:it.title,color:'#B7791F',plain:true}); holyDays[d==d?String(new Date(new Date(d).getTime()+864e5).toISOString().slice(0,10)):d]=1; }
    if(it.category==='havdalah') (byDate[d]=byDate[d]||[]).push({date:d,label:it.title,color:'#B7791F',plain:true});
    if(it.category==='holiday'){ (byDate[d]=byDate[d]||[]).push({date:d,label:it.title,color:'var(--danger)',plain:true}); if(it.yomtov) holyDays[d]=1; }
  });
  var startOffset = first.getDay(); // 0=ЧЁЧҗЧ©Ч•Чҹ
  var daysInMonth = new Date(CAL_Y, CAL_M+1, 0).getDate();
  var lastDate = new Date(CAL_Y, CAL_M, daysInMonth);
  var hebRange = hebFmt(first,{month:'long',year:'numeric'});
  var hebEnd = hebFmt(lastDate,{month:'long',year:'numeric'});
  if(hebEnd && hebEnd!==hebRange) hebRange = hebFmt(first,{month:'long'})+'вҖ“'+hebEnd;
  var gregTitle = new Intl.DateTimeFormat('he',{month:'long',year:'numeric'}).format(first);
  var overdue = DB.tasks.filter(t=>t.status!=='Ч”Ч•Ч©ЧңЧһЧ”'&&t.due_date&&t.due_date<today);
  var cells = '';
  ['Чҗ','Ч‘','Ч’','Ч“','Ч”','Ч•','Ч©'].forEach(d=>{ cells += '<div class="calhead">'+d+'</div>'; });
  for(var i=0;i<startOffset;i++) cells += '<div></div>';
  for(var day=1;day<=daysInMonth;day++){
    var d = new Date(CAL_Y, CAL_M, day);
    var iso = CAL_Y+'-'+('0'+(CAL_M+1)).slice(-2)+'-'+('0'+day).slice(-2);
    var evs = byDate[iso]||[];
    var isSat = d.getDay()===6;
    cells += '<div class="calday'+(iso===today?' today':'')+'" style="'+((isSat||holyDays[iso])?'background:#FDF6E3;':'')+'" onclick="openDay(\''+iso+'\')">'+
      (isSat?'<span class="chip" style="background:#B8860B;font-size:9px;padding:1px 6px">Ч©Ч‘ЧӘ</span> ':'')+
      '<span class="dnum">'+day+'</span> <span class="dheb">'+esc(hebFmt(d,{day:'numeric'}))+' '+esc(hebFmt(d,{month:'long'}))+'</span>'+
      evs.slice(0,3).map(e=>e.plain?'<span class="calshab">'+esc(e.label)+'</span>':'<div class="calev" style="background:'+e.color+(e.click?';cursor:pointer':'')+'"'+(e.click?' title="ЧңЧ—ЧҘ ЧңЧӨЧӘЧҷЧ—Ч”" onclick="event.stopPropagation();'+e.click+'"':'')+'>'+esc(e.label)+'</div>').join('')+
      (evs.length>3?'<div class="muted">+'+(evs.length-3)+' Ч Ч•ЧЎЧӨЧҷЧқ</div>':'')+'</div>';
  }
  el('main').innerHTML = '<div class="section-title"><h2>ЧҷЧ•ЧһЧҹ</h2><div class="row">'+
    '<button class="btn ghost sm" onclick="calNav(1)">в—Җ Ч”Ч‘Чҗ</button>'+
    '<button class="btn ghost sm" onclick="CAL_Y=new Date().getFullYear();CAL_M=new Date().getMonth();rCalendar()">Ч”ЧҷЧ•Чқ</button>'+
    '<button class="btn ghost sm" onclick="calNav(-1)">Ч”Ч§Ч•Ч“Чқ в–¶</button></div></div>'+
    '<div class="card"><div style="text-align:center;margin-bottom:8px"><b style="font-size:17px">'+esc(gregTitle)+'</b><div class="muted">'+esc(hebRange)+'</div></div>'+
    '<div class="calgrid">'+cells+'</div></div>'+
    (overdue.length?'<div class="card" style="border-color:var(--danger)"><b style="color:var(--danger)">ЧһЧ©ЧҷЧһЧ•ЧӘ Ч‘ЧҗЧҷЧ—Ч•ЧЁ:</b> '+overdue.map(t=>'<span style="cursor:pointer;text-decoration:underline" onclick="openTask(\''+t.id+'\')">'+esc(t.title)+'</span>').join(' В· ')+'</div>':'');
}
function calNav(dir){ CAL_M += dir; if(CAL_M<0){CAL_M=11;CAL_Y--;} if(CAL_M>11){CAL_M=0;CAL_Y++;} rCalendar(); }
function openDay(iso){
  var evs = calEvents().filter(e=>e.date===iso);
  var d = new Date(iso);
  openModal('<h2>'+iso+'</h2><div class="muted" style="margin-bottom:10px">'+esc(hebFmt(d,{weekday:'long',day:'numeric',month:'long',year:'numeric'}))+'</div>'+
    (evs.length? evs.map(e=>'<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line)'+(e.click?';cursor:pointer':'')+'"'+(e.click?' onclick="closeModal();'+e.click+'"':'')+'><span class="chip" style="background:'+e.color+'">вҖў</span><div class="grow">'+esc(e.label)+(e.click?' <span class="muted" style="font-size:11px">вҶ— ЧӨЧӘЧ—</span>':'')+'</div></div>').join(''):'<div class="muted">ЧҗЧҷЧҹ ЧҗЧҷЧЁЧ•ЧўЧҷЧқ Ч‘ЧҷЧ•Чқ Ч–Ч”</div>'));
}

  el('retBody').innerHTML = '<div class="card empty">ЧһЧҗЧӘЧЁ...</div>';
  var r = await api('findOrderByScan',{code:code});
  if(!r.ok){ el('retBody').innerHTML = '<div class="card empty">'+esc(r.error)+'</div>'; return; }
  RET = r;
  renderReturn({});
}
function renderReturn(needMap){
  var r = RET;
  el('retBody').innerHTML = '<div class="card"><b>'+esc(r.order.customer)+'</b> <span class="muted">В· '+esc(r.order.start)+' вҖ” '+esc(r.order.end)+'</span>'+
    r.lines.map(function(l){
      var need = needMap[l.line_id];
      return '<div style="border-top:1px solid var(--line);padding:10px 0;margin-top:10px">'+
        '<b>'+esc(l.item_name)+'</b> В· ЧҷЧҰЧҗЧ• '+l.qty+' ЧҷЧ—\''+
        (l.unit_weight>0?' В· ЧһЧ©Ч§Чң ЧҰЧӨЧ•Чҷ: <b>'+l.expected_weight+' Ч§"Ч’</b> (ЧЎЧҳЧҷЧҷЧ” ЧһЧ•ЧӘЧЁЧӘ '+l.allowed_dev+'%)':' В· <span style="color:var(--amber)">ЧҗЧҷЧҹ ЧһЧ©Ч§Чң ЧңЧӨЧЁЧҷЧҳ вҖ” ЧЎЧӨЧҷЧЁЧ” ЧҷЧ“Ч ЧҷЧӘ</span>')+

        ((need||l.unit_weight<=0)?'<div class="frow"><label style="color:var(--danger)">'+esc(need?need.reason:'ЧЎЧӨЧҷЧЁЧ” ЧҷЧ“Ч ЧҷЧӘ вҖ” ЧӣЧһЧ” Ч—Ч–ЧЁЧ•?')+'</label><input id="rc_'+l.line_id+'" type="number" min="0" max="'+l.qty+'" placeholder="ЧӣЧһЧ•ЧӘ Ч©Ч ЧЎЧӨЧЁЧ”"></div>':'')+

async function submitReturn(){
  var weights = {}, counts = {};
  RET.lines.forEach(function(l){
    var w = el('rw_'+l.line_id); if(w && w.value!=='') weights[l.line_id] = Number(w.value);
    var c = el('rc_'+l.line_id); if(c && c.value!=='') counts[l.line_id] = Number(c.value);
  });
  var r = await act('returnByWeight',{order_id:RET.order.id,weights:weights,counts:counts});
  if(!r){ return; }
  if(r.need_count){ // Ч”ЧһЧ§ЧЁЧ” Ч”Ч–Ч” Ч—Ч•Ч–ЧЁ Чӣ-ok:false Ч•ЧңЧӣЧҹ act Ч”ЧҰЧҷЧ’ ЧҳЧ•ЧЎЧҳ вҖ” Ч ЧҳЧӨЧң ЧҷЧ“Ч ЧҷЧӘ
    return;
  }
  el('retBody').innerHTML = '<div class="card" style="text-align:center"><h3 style="color:var(--ok)">вң“ Ч”Ч”Ч—Ч–ЧЁЧ” Ч Ч§ЧңЧҳЧ”</h3>'+
    (r.shortage_charge>0?'<p style="color:var(--danger);font-weight:600">Ч ЧЁЧ©Чқ Ч—ЧҷЧ•Ч‘ Ч—Ч•ЧЎЧЁЧҷЧқ ЧҗЧ•ЧҳЧ•ЧһЧҳЧҷ: '+ils(r.shortage_charge)+' (Ч ЧӣЧ ЧЎ ЧңЧ—Ч©Ч‘Ч•Ч ЧҷЧӘ)</p>':'<p class="muted">ЧңЧңЧҗ Ч—Ч•ЧЎЧЁЧҷЧқ</p>')+
    '<p class="muted">Ч”ЧӨЧЁЧҷЧҳЧҷЧқ Ч ЧӣЧ ЧЎЧ• ЧңЧӣЧ‘ЧҷЧЎЧ”</p></div>';
  RET = null;
}

function entName(type,id){
  var e = ENT[type]; if(!e) return id||'';
  var r = (e.list()||[]).find(function(x){return String(x.id)===String(id);});
  return r? e.name(r) : '(Ч ЧһЧ—Ч§)'; // NC4: ЧЁЧ©Ч•ЧһЧ” Ч©Ч ЧһЧ—Ч§Ч” вҖ” ЧңЧҗ ЧһЧҰЧҷЧ’ЧҷЧқ ЧһЧ–Ч”Ч” Ч’Ч•ЧңЧһЧҷ
}
function entOpen(type,id){ // NC4: Ч”Ч’Ч Ч” ЧһЧӘЧҷЧ•Ч’ ЧңЧЁЧ©Ч•ЧһЧ” Ч©Ч ЧһЧ—Ч§Ч”
  var e=ENT[type]; if(!e||!e.open) return;
  var exists = (e.list()||[]).some(function(x){ return String(x.id)===String(id); });
  if(!exists){ toast('Ч”ЧЁЧ©Ч•ЧһЧ” Ч”ЧһЧ§Ч•Ч©ЧЁЧӘ Ч ЧһЧ—Ч§Ч”', true); return; }
  e.open(id);
}
// ЧӣЧң Ч”Ч§ЧҷЧ©Ч•ЧЁЧҷЧқ Ч©Чң ЧҷЧ©Ч•ЧӘ вҖ” Ч‘Ч©Ч Чҷ Ч”ЧӣЧҷЧ•Ч•Ч ЧҷЧқ
function linksOf(type,id){
  return (DB.links||[]).filter(function(l){
    return (l.from_type===type && String(l.from_id)===String(id)) || (l.to_type===type && String(l.to_id)===String(id));
  }).map(function(l){
    var isFrom = (l.from_type===type && String(l.from_id)===String(id));
    return {linkId:l.id, otherType:isFrom?l.to_type:l.from_type, otherId:isFrom?l.to_id:l.from_id, note:l.note||''};
  });
}
function tagBtn(type,id){
  var n = linksOf(type,id).length;
  return '<button class="btn ghost sm" onclick="tagDialog(\''+type+'\',\''+id+'\')">ЧӘЧҷЧ•Ч’'+(n?' ('+n+')':'')+'</button>';
}
function linkChip(L, ctxType, ctxId){

  return '<span class="chip" style="background:var(--navy2);cursor:pointer;margin:2px" title="'+esc(e.label||L.otherType)+'" onclick="entOpen(\''+L.otherType+'\',\''+L.otherId+'\')">'+(e.icon||'')+' '+esc(entName(L.otherType,L.otherId))+(L.note?' В· '+esc(L.note):'')+'</span>'+

function linksSection(type,id){
  var ls = linksOf(type,id);
  if(!ls.length) return '';
  return '<div style="margin-top:12px"><h3>ЧһЧ§Ч•Ч©ЧЁ ЧҗЧң:</h3><div style="margin-top:6px;line-height:2.4">'+ls.map(function(L){return linkChip(L,type,id);}).join(' ')+'</div></div>';
}
function delLink(lid, ctxType, ctxId){

function tagBack(){ closeModal(); if(TAG_CTX) entOpen(TAG_CTX.type, TAG_CTX.id); }
function tagSearchDraw(){
  if(!TAG_CTX || !el('tg_type')) return;
  var t = el('tg_type').value, q = (el('tg_q').value||'').trim().toLowerCase();
  var e = ENT[t];
  var list = (e.list()||[]).filter(function(r){
    if(t===TAG_CTX.type && String(r.id)===String(TAG_CTX.id)) return false; // Ч‘ЧңЧҷ Ч§ЧҷЧ©Ч•ЧЁ ЧўЧҰЧһЧҷ
    if(!q) return true;
    return String(e.name(r)).toLowerCase().indexOf(q)>-1 || String(r.id).toLowerCase().indexOf(q)>-1;
  }).slice(0,15);
  el('tg_results').innerHTML = list.length? list.map(function(r){
    return '<div class="row" style="padding:8px 6px;border-bottom:1px solid var(--line);cursor:pointer" onclick="tagSave(\''+t+'\',\''+r.id+'\')"><div class="grow">'+(e.icon||'')+' '+esc(e.name(r))+'</div><span class="muted">ЧңЧ—ЧҘ ЧңЧ§ЧҷЧ©Ч•ЧЁ</span></div>';
  }).join('') : '<div class="muted" style="padding:10px">ЧңЧҗ Ч ЧһЧҰЧҗЧ• ЧӘЧ•ЧҰЧҗЧ•ЧӘ</div>';

async function tagSave(toType, toId){

/* ================= @ЧҗЧ–ЧӣЧ•ЧЁЧҷЧқ Ч‘ЧӨЧЁЧ•ЧҳЧ•Ч§Ч•Чң ЧӨЧ’ЧҷЧ©Ч” ================= */
// ЧЎЧ•Ч’Чҷ Ч”ЧҷЧ©Ч•ЧҷЧ•ЧӘ Ч©ЧҗЧӨЧ©ЧЁ ЧңЧӘЧҷЧҷЧ’ ЧўЧқ @ Ч‘ЧӘЧ•Чҡ ЧҳЧ§ЧЎЧҳ Ч”ЧӨЧЁЧ•ЧҳЧ•Ч§Ч•Чң
var MENTION_TYPES = ['customer','contact','employee','supplier','item'];
var MENTION_CTX = null; // {start,end} вҖ” Ч’Ч‘Ч•ЧңЧ•ЧӘ Ч”Ч§ЧҳЧў '@Ч—ЧңЧ§Чҷ' Ч‘ЧҳЧ§ЧЎЧҳ Ч‘Ч–ЧһЧҹ Ч”Ч”Ч©ЧңЧһЧ”
// ЧӣЧң Ч”ЧҷЧ©Ч•ЧҷЧ•ЧӘ Ч”Ч ЧҷЧӘЧ Ч•ЧӘ ЧңЧӘЧҷЧ•Ч’ вҖ” Ч©Чқ ЧңЧҗ ЧЁЧҷЧ§ Ч‘ЧңЧ‘Ч“
function mentionEntities(){
  var out = [];
  MENTION_TYPES.forEach(function(t){
    var e = ENT[t]; if(!e) return;
    ((e.list && e.list())||[]).forEach(function(r){
      var n = String(e.name(r)||'').trim();
      if(n && r.id!=null && r.id!=='') out.push({type:t, id:r.id, name:n});
    });
  });
  return out;
}
// Ч”Ч©ЧңЧһЧ” ЧҗЧ•ЧҳЧ•ЧһЧҳЧҷЧӘ: ЧһЧ–Ч”Ч” '@Ч§ЧҳЧў' Ч©ЧһЧЎЧӘЧҷЧҷЧқ Ч‘ЧЎЧһЧҹ Ч•ЧһЧҰЧҷЧ’ ЧўЧ“ 8 Ч”ЧӘЧҗЧһЧ•ЧӘ
function mentionAuto(ta){
  var dd = el('mentionDD'); if(!dd || !ta) return;
  var pos = ta.selectionStart, before = ta.value.slice(0, pos);
  var mm = before.match(/(^|[\s.,;:!?()"'-])@([^@\n]{0,40})$/);
  if(!mm){ dd.style.display='none'; MENTION_CTX=null; return; }
  var frag = mm[2], q = frag.trim().toLowerCase();
  var list = mentionEntities().filter(function(e){ return !q || e.name.toLowerCase().indexOf(q)>-1; }).slice(0,8);
  if(!list.length){ dd.style.display='none'; MENTION_CTX=null; return; }
  MENTION_CTX = {start: pos - frag.length - 1, end: pos};
  dd.innerHTML = list.map(function(e){
    var t = ENT[e.type]||{};
    return '<div style="padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--line)" onclick="pickMention(\''+e.type+'\',\''+e.id+'\')">'+(t.icon||'')+' <span class="muted" style="font-size:12px">'+esc(t.label||'')+'</span> <b>'+esc(e.name)+'</b></div>';
  }).join('');
  dd.style.display='block';
}
function hideMentionDD(){ var dd = el('mentionDD'); if(dd) dd.style.display='none'; MENTION_CTX=null; }
// Ч‘Ч—ЧҷЧЁЧӘ Ч©Ч•ЧЁЧ” вҖ” ЧһЧ—ЧңЧҷЧЈ ЧҗЧӘ '@Ч§ЧҳЧў' Ч‘'@Ч©Чқ Ч”ЧһЧңЧҗ ' Ч•ЧһЧ—Ч–ЧҷЧЁ ЧӨЧ•Ч§Ч•ЧЎ
function pickMention(type, id){
  var ta = el('f_mprotocol'), e = ENT[type];
  var r = e? ((e.list && e.list())||[]).find(function(x){return String(x.id)===String(id);}) : null;
  if(ta && r && MENTION_CTX){
    var name = String(e.name(r)), v = ta.value;
    ta.value = v.slice(0, MENTION_CTX.start) + '@' + name + ' ' + v.slice(MENTION_CTX.end);
    var np = MENTION_CTX.start + name.length + 2;
    ta.focus(); ta.setSelectionRange(np, np);
  }
  hideMentionDD();
}
// ЧЎЧ’ЧҷЧЁЧӘ Ч”ЧЁЧ©ЧҷЧһЧ” Ч‘ЧңЧ—ЧҷЧҰЧ” ЧһЧ—Ч•ЧҘ ЧңЧ”
document.addEventListener('click', function(ev){
  var dd = el('mentionDD');
  if(dd && dd.style.display!=='none' && !dd.contains(ev.target) && !(ev.target && ev.target.id==='f_mprotocol')) hideMentionDD();
});
// ЧӣЧң Ч”ЧҗЧ–ЧӣЧ•ЧЁЧҷЧқ Ч”ЧһЧ–Ч•Ч”ЧҷЧқ Ч‘ЧҳЧ§ЧЎЧҳ вҖ” Ч”ЧӘЧҗЧһЧ” ЧһЧ“Ч•ЧҷЧ§ЧӘ ЧңЧ©Чқ, Ч”Ч©Чқ Ч”ЧҗЧЁЧ•Чҡ Ч‘ЧҷЧ•ЧӘЧЁ Ч§Ч•Ч“Чқ
function protocolMentionsIn(text){
  var found = [];
  text = String(text==null?'':text);
  if(text.indexOf('@')===-1) return found;
  var ents = mentionEntities().sort(function(a,b){ return b.name.length - a.name.length; });
  if(!ents.length) return found;
  var i = 0;
  while((i = text.indexOf('@', i)) > -1){
    var rest = text.slice(i+1), hit = null;
    for(var k=0;k<ents.length;k++){ if(rest.indexOf(ents[k].name)===0){ hit = ents[k]; break; } }
    if(hit){ found.push({index:i, len:hit.name.length+1, ent:hit}); i += hit.name.length + 1; }
    else i++;
  }
  return found;
}
// ЧӨЧЁЧ•ЧҳЧ•Ч§Ч•Чң Чӣ-HTML: ЧҗЧ–ЧӣЧ•ЧЁ ЧһЧ–Ч•Ч”Ч” Ч”Ч•ЧӨЧҡ ЧңЧӘЧ’ЧҷЧӘ ЧһЧ•Ч“Ч’Ч©ЧӘ (ЧңЧ—ЧҷЧҰЧ” = Ч ЧҷЧ•Ч•Чҳ), Ч”Ч©ЧҗЧЁ ЧҳЧ§ЧЎЧҳ ЧЁЧ’ЧҷЧң
function renderProtocolHTML(text, clickable){
  text = String(text==null?'':text);
  var ms = protocolMentionsIn(text);
  if(!ms.length) return esc(text);
  var html = '', pos = 0;
  ms.forEach(function(mm){
    html += esc(text.slice(pos, mm.index));
    var t = ENT[mm.ent.type]||{};
    var label = (t.icon||'')+' '+esc('@'+mm.ent.name);
    html += clickable
      ? '<span style="background:var(--navy2);color:#fff;border-radius:8px;padding:1px 7px;cursor:pointer;font-weight:600" title="'+esc(t.label||'')+'" onclick="entOpen(\''+mm.ent.type+'\',\''+mm.ent.id+'\')">'+label+'</span>'
      : '<b style="text-decoration:underline">'+label+'</b>';
    pos = mm.index + mm.len;
  });
  html += esc(text.slice(pos));
  return html;
}
// ЧҷЧҰЧҷЧЁЧӘ Ч§ЧҷЧ©Ч•ЧЁЧҷ links ЧһЧ”ЧҗЧ–ЧӣЧ•ЧЁЧҷЧқ вҖ” ЧӣЧӨЧ•ЧңЧҷЧқ ЧһЧ“Ч•ЧңЧ’ЧҷЧқ, Ч©Ч’ЧҷЧҗЧ•ЧӘ Ч Ч‘ЧңЧўЧ•ЧӘ, ЧңЧўЧ•ЧңЧқ ЧңЧҗ Ч—Ч•ЧЎЧқ Ч©ЧһЧҷЧЁЧ”
async function syncProtocolMentions(mid, text){
  try{
    if(!mid) return;
    var ms = protocolMentionsIn(text), seen = {};
    for(var i=0;i<ms.length;i++){
      var e = ms[i].ent, key = e.type+'|'+e.id;
      if(seen[key]) continue; seen[key] = 1;
      var exists = (DB.links||[]).some(function(l){
        return l.from_type==='meeting' && String(l.from_id)===String(mid) && l.to_type===e.type && String(l.to_id)===String(e.id);
      });
      if(exists) continue;
      try{ await act('create',{table:'links',row:{from_type:'meeting',from_id:mid,to_type:e.type,to_id:e.id,note:'ЧӘЧ•ЧҷЧ’ Ч‘ЧӨЧЁЧ•ЧҳЧ•Ч§Ч•Чң'}}); }catch(err){}
    }
  }catch(err){}
}

var NOTE_TYPES = {customer:'ЧңЧ§Ч•Ч—',item:'ЧӨЧЁЧҷЧҳ',order:'Ч”Ч–ЧһЧ Ч”',employee:'ЧўЧ•Ч‘Ч“',supplier:'ЧЎЧӨЧ§',vehicle:'ЧЁЧӣЧ‘',machine:'ЧһЧӣЧ•Ч Ч”',cart:'ЧўЧ’ЧңЧ”',task:'ЧһЧ©ЧҷЧһЧ”',meeting:'ЧӨЧ’ЧҷЧ©Ч”',expense:'Ч”Ч•ЧҰЧҗЧ”'};
function noteEntityName(type,id){
  var m = {customer:['customers','name'],item:['items','name'],employee:['employees','name'],supplier:['suppliers','name'],
    vehicle:['vehicles','plate'],machine:['machines','id'],cart:['carts','id'],task:['tasks','title'],meeting:['meetings','title']};
  if(type==='order'){ var o=DB.orders.find(x=>x.id===id); return o?cust(o.customer_id)+' '+o.start_date:id; }
  if(type==='expense'){ var x=DB.expenses.find(e=>e.id===id); return x?x.category+' '+x.date:id; }
  var mm = m[type]; if(!mm) return id;
  var rec = DB[FE_MAP[mm[0]]||mm[0]].find(r=>r.id===id);
  return rec?(rec[mm[1]]||id):id;
}

function highlightNote(noteId, onMiss, tries){
  tries = (tries==null)? 12 : tries;
  // ЧҷЧҷЧӘЧӣЧҹ Ч©-id="note-..." Ч§ЧҷЧҷЧқ Ч’Чқ Ч‘ЧЁЧ©ЧҷЧһЧ” Ч”ЧЁЧҗЧ©ЧҷЧӘ (ЧһЧҗЧ—Ч•ЧЁЧҷ Ч”ЧһЧ•Ч“Чң) Ч•Ч’Чқ Ч‘ЧӘЧ•Чҡ ЧһЧ•Ч“Чң ЧӨЧӘЧ•Ч— (ЧӘЧҰЧ•Ч’ЧӘ 360 / notesModal) вҖ”
  // getElementById ЧўЧңЧ•Чң ЧңЧһЧҰЧ•Чҗ ЧҗЧӘ Ч”Ч”ЧўЧӘЧ§ Ч”ЧһЧ•ЧЎЧӘЧЁ; ЧһЧўЧ“ЧҷЧӨЧҷЧқ Ч‘ЧһЧӨЧ•ЧЁЧ© Ч”ЧўЧӘЧ§ Ч©Ч‘ЧӘЧ•Чҡ Ч”ЧһЧ•Ч“Чң Ч”Ч’ЧңЧ•Чҷ ЧҗЧқ Ч§ЧҷЧҷЧқ
  var modalEl = el('modal');
  var sel = '#note-'+String(noteId).replace(/([^\w-])/g,'\\$1');
  var node = (modalEl && modalEl.querySelector(sel)) || document.getElementById('note-'+noteId);
  if(!node){
    if(tries>0) setTimeout(function(){ highlightNote(noteId, onMiss, tries-1); }, 150);
    else if(onMiss) onMiss();
    return;
  }
  try{ node.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){ node.scrollIntoView(); }
  node.classList.add('hl-fade');
  // Ч”ЧЎЧЁЧ” ЧһЧ•Ч§Ч“ЧһЧӘ Ч‘ЧңЧ—ЧҷЧҰЧ” ЧӣЧңЧ©Ч”Чҷ вҖ” Ч ЧЁЧ©Чқ Ч‘ЧҗЧҷЧ—Ч•ЧЁ Ч§Чң ЧӣЧ“Чҷ Ч©Ч”ЧңЧ—ЧҷЧҰЧ” Ч©ЧӨЧӘЧ—Ч” ЧҗЧӘ Ч”Ч ЧҷЧ•Ч•Чҳ ЧңЧҗ ЧӘЧЎЧҷЧЁ ЧһЧҷЧ“
  setTimeout(function(){
    document.addEventListener('click', function(){ node.classList.remove('hl-fade'); }, {once:true});
  }, 300);
}

async function saveNote(type,id,replyTo){
  var txt = el('f_ntext').value;
  if(!txt.trim()) return toast('ЧӣЧӘЧ•Ч‘ ЧӘЧЁЧ©Ч•ЧһЧӘ', true);
  var r = await act('create',{table:'notes',row:{entity_type:type,entity_id:id,text:txt,link_note_id:replyTo||'',ts:nowTs()}});
  if(!r) return;
  var f = el('f_nfile').files[0];
  if(f){
    if(f.size > 4*1024*1024) toast('Ч”Ч§Ч•Ч‘ЧҘ Ч’Ч“Ч•Чң Чһ-4MB вҖ” Ч”ЧӘЧЁЧ©Ч•ЧһЧӘ Ч Ч©ЧһЧЁЧ” Ч‘ЧңЧҷ ЧҰЧЁЧ•ЧӨЧ”', true);
    else{
      toast('ЧһЧўЧңЧ” ЧһЧЎЧһЧҡ...');
      var b64 = await new Promise(function(res){ var rd=new FileReader(); rd.onload=function(){res(rd.result.split(',')[1]);}; rd.readAsDataURL(f); });
      var u = await api('attachNoteFile',{note_id:r.row.id,base64:b64,mime:f.type,name:f.name});
      if(u.ok){ var g=await api('getAll'); if(g.ok) DB=g.db; }
      else toast(u.error, true);
    }
  }
  toast('Ч”ЧӘЧЁЧ©Ч•ЧһЧӘ Ч Ч©ЧһЧЁЧ”'); notesModal(type,id);
}

  }
  if(dep.status==='ЧһЧҗЧ•Ч©ЧЁ'){
    return box+'<div class="row"><div class="grow"><b style="color:var(--ok)">вң“ ЧўЧЁЧ‘Ч•ЧӘ Ч—ЧңЧ•ЧӨЧҷЧӘ ЧһЧҗЧ•Ч©ЧЁЧӘ</b>'+
      (dep.guarantee_type?' <span class="muted">('+esc(dep.guarantee_type)+')</span>':'')+'</div></div></div>';

    return box+'<div class="row"><div class="grow"><b style="color:var(--amber)">Ч‘Ч§Ч©ЧӘ ЧўЧЁЧ‘Ч•ЧӘ ЧһЧһЧӘЧҷЧ Ч” ЧңЧҗЧҷЧ©Ч•ЧЁ Ч”ЧһЧ©ЧЁЧ“</b>'+
      (dep.guarantee_type?' <span class="muted">('+esc(dep.guarantee_type)+')</span>':'')+'</div></div>'+
      '<div class="muted" style="font-size:12px;margin-top:4px">Ч ЧҰЧҷЧ’ ЧҷЧҷЧҰЧ•ЧЁ ЧҗЧҷЧӘЧҡ Ч§Ч©ЧЁ ЧҳЧңЧӨЧ•Ч Чҷ ЧңЧ”Ч©ЧңЧһЧӘ Ч”ЧҗЧҷЧ©Ч•ЧЁ.</div></div>';
  }

    '<button style="width:100%;background:var(--teal);color:#fff;padding:10px;border-radius:8px;font-weight:600" onclick="portalStartVerification()">'+(pending?'Ч”ЧһЧ©Чҡ ЧҗЧҷЧһЧ•ЧӘ ЧӣЧЁЧҳЧҷЧЎ':'ЧҗЧҷЧһЧ•ЧӘ ЧӣЧЁЧҳЧҷЧЎ ЧҗЧ©ЧЁЧҗЧҷ (вӮӘ1)')+'</button>'+
    '<label class="row" style="gap:6px;margin-top:10px;font-size:13px;cursor:pointer"><input type="checkbox" id="p_guar_cb" style="width:auto" onchange="el(\'p_guar_box\').style.display=this.checked?\'block\':\'none\'">'+

    '<div id="p_guar_box" style="display:none;margin-top:8px;background:var(--bg,#F4F6F8);border-radius:8px;padding:9px">'+

      '<label style="font-size:13.5px;cursor:pointer"><input type="radio" name="p_guar_type" value="ЧўЧЁЧ‘" style="width:auto"> ЧўЧЁЧ‘</label>'+
      '<button style="width:100%;background:var(--navy);color:#fff;padding:9px;border-radius:8px;font-weight:600;margin-top:8px" onclick="portalRequestGuarantee()">Ч©ЧңЧ— Ч‘Ч§Ч©ЧӘ ЧўЧЁЧ‘Ч•ЧӘ ЧңЧҗЧҷЧ©Ч•ЧЁ</button>'+
      '<div class="muted" style="font-size:11.5px;margin-top:5px">Ч”Ч‘Ч§Ч©Ч” ЧӘЧ•ЧўЧ‘ЧЁ ЧңЧҗЧҷЧ©Ч•ЧЁ Ч”ЧһЧ©ЧЁЧ“ Ч•Ч ЧҰЧҷЧ’ ЧҷЧҷЧҰЧ•ЧЁ ЧҗЧҷЧӘЧҡ Ч§Ч©ЧЁ ЧҳЧңЧӨЧ•Ч Чҷ.</div>'+
    '</div>'+
    '<div id="pDepErr" style="color:var(--danger);font-size:12.5px;margin-top:5px"></div></div>';
}
/* Ч”ЧӘЧ—ЧңЧӘ ЧҗЧҷЧһЧ•ЧӘ: Ч”Ч©ЧЁЧӘ ЧһЧ—Ч–ЧҷЧЁ redirect_url (stub ЧҗЧ• ЧЎЧӨЧ§ ЧҗЧһЧҷЧӘЧҷ) вҖ” Ч ЧӨЧӘЧ— Ч‘Ч—ЧңЧ•Чҹ Ч—Ч“Ч© */
async function portalStartVerification(){
  if(BUSY) return;
  el('pDepErr') && (el('pDepErr').textContent = '');
  var r = await apiBusy('portalB3StartVerification',{code:PORTAL.code});
  if(!r){ return; }
  if(!r.ok){ el('pDepErr').textContent = r.error||'Ч©Ч’ЧҷЧҗЧ”'; return; }
  if(r.already_verified){ PORTAL.data.deposit = r.deposit; renderPortal(); return; }
  window.open(r.redirect_url, '_blank');
  openModal('<h2>ЧҗЧҷЧһЧ•ЧӘ ЧӣЧЁЧҳЧҷЧЎ ЧҗЧ©ЧЁЧҗЧҷ</h2>'+
    '<p style="font-size:14px">Ч ЧӨЧӘЧ— Ч—ЧңЧ•Чҹ ЧһЧҗЧ•Ч‘ЧҳЧ— ЧңЧҗЧҷЧһЧ•ЧӘ Ч‘Ч—ЧҷЧ•Ч‘ вӮӘ1'+(r.stub?' <span class="muted">(ЧһЧҰЧ‘ Ч”Ч“Ч’ЧһЧ” вҖ” ЧҳЧЁЧқ Ч—Ч•Ч‘ЧЁ ЧЎЧӨЧ§ ЧЎЧңЧҷЧ§Ч”)</span>':'')+'.</p>'+

    '<p class="muted" style="font-size:12.5px">ЧңЧҗЧ—ЧЁ ЧЎЧҷЧ•Чқ Ч”ЧҗЧҷЧһЧ•ЧӘ Ч‘Ч—ЧңЧ•Чҹ, Ч—Ч–Ч•ЧЁ ЧңЧӣЧҗЧҹ Ч•ЧңЧ—ЧҘ ЧўЧң Ч”ЧӣЧӨЧӘЧ•ЧЁ:</p>'+
    '<button class="btn" style="width:100%" onclick="portalDepositRefresh()">ЧЎЧҷЧҷЧһЧӘЧҷ ЧҗЧӘ Ч”ЧҗЧҷЧһЧ•ЧӘ вҖ” ЧЁЧўЧ Чҹ ЧһЧҰЧ‘</button>'+
    '<div id="pDepModalMsg" class="muted" style="font-size:12.5px;margin-top:6px"></div>');
}
/* Ч‘Ч§Ч©ЧӘ ЧўЧЁЧ‘Ч•ЧӘ Ч—ЧңЧ•ЧӨЧҷЧӘ (Ч©ЧҷЧ§/ЧўЧЁЧ‘) вҖ” ЧўЧ•Ч‘ЧЁЧӘ ЧңЧҗЧҷЧ©Ч•ЧЁ ЧһЧ Ч”Чң (approval_pending) */
async function portalRequestGuarantee(){
  if(BUSY) return;
  var sel = document.querySelector('input[name="p_guar_type"]:checked');
  var gt = sel ? sel.value : '';
  if(!gt){ el('pDepErr').textContent = 'Ч‘Ч—ЧЁ ЧЎЧ•Ч’ ЧўЧЁЧ‘Ч•ЧӘ'; return; }
  el('pDepErr').textContent = '';
  var r = await apiBusy('portalB3RequestGuarantee',{code:PORTAL.code, guarantee_type:gt});
  if(!r){ return; }
  if(!r.ok){ el('pDepErr').textContent = r.error||'Ч©Ч’ЧҷЧҗЧ”'; return; }
  PORTAL.data.deposit = r.deposit;
  renderPortal();
}
/* ЧЁЧўЧ Ч•Чҹ ЧһЧҰЧ‘ Ч”ЧӨЧ§Ч“Ч•Чҹ ЧҗЧ—ЧЁЧҷ Ч—Ч–ЧЁЧ” ЧһЧһЧЎЧҡ Ч”ЧЎЧңЧҷЧ§Ч” */
async function portalDepositRefresh(){
  if(BUSY) return;
  var m = el('pDepModalMsg'); if(m) m.textContent = '';
  var r = await apiBusy('portalGetData',{code:PORTAL.code});
  if(!r){ return; }
  if(!r.ok){ if(m) m.textContent = r.error||'Ч©Ч’ЧҷЧҗЧ”'; return; }
  PORTAL.data = r;
  if(r.deposit && r.deposit.verified){ closeModal(); renderPortal(); }
  else if(m) m.textContent = 'Ч”ЧҗЧҷЧһЧ•ЧӘ ЧўЧ“ЧҷЧҷЧҹ ЧңЧҗ Ч Ч§ЧңЧҳ. Ч•Ч“Чҗ Ч©ЧЎЧҷЧҷЧһЧӘ ЧҗЧӘ Ч”ЧӘЧ”ЧңЧҷЧҡ Ч‘Ч—ЧңЧ•Чҹ Ч”ЧҗЧҷЧһЧ•ЧӘ Ч•Ч ЧЎЧ” Ч©Ч•Ч‘.';
}
/* NC2: ЧӣЧЁЧҳЧҷЧЎ ЧӣЧ‘ЧҷЧЎЧ” Ч‘ЧӨЧ•ЧЁЧҳЧң вҖ” Ч©ЧңЧ‘ Ч Ч•ЧӣЧ—Чҷ, Ч–ЧһЧҹ ЧһЧ©Ч•ЧўЧЁ, ЧһЧ©Ч§Чң Ч•Ч—ЧҷЧ•Ч‘ */
function portalLaundryHtml(lk){

}

/* B20: ЧӣЧЁЧҳЧҷЧЎ ЧўЧ•Ч‘Ч“ ЧһЧЁЧ•ЧӣЧ– вҖ” Ч Ч•ЧӣЧ—Ч•ЧӘ, Ч©ЧӣЧЁ, ЧһЧ©ЧҷЧһЧ•ЧӘ Ч•ЧӘЧЁЧ©Ч•ЧһЧ•ЧӘ Ч‘ЧһЧ§Ч•Чқ ЧҗЧ—Ч“ (Ч§ЧЁЧҷЧҗЧ” Ч‘ЧңЧ‘Ч“ ЧһЧ ЧӘЧ•Ч ЧҷЧқ Ч§ЧҷЧҷЧһЧҷЧқ) */
var EMP_TAB = 'details';
function openEmp(eid, tab){
  if(tab) EMP_TAB = tab;
  var e = DB.employees.find(x=>x.id===eid); if(!e) return;
  var tabs = [['details','ЧӨЧЁЧҳЧҷЧқ'],['attendance','Ч Ч•ЧӣЧ—Ч•ЧӘ'],['payroll','Ч©ЧӣЧЁ'],['tasks','ЧһЧ©ЧҷЧһЧ•ЧӘ'],['notes','ЧӘЧЁЧ©Ч•ЧһЧ•ЧӘ']];
  var body;
  if(EMP_TAB==='attendance') body = empTabAttendance(eid);
  else if(EMP_TAB==='payroll') body = empTabPayroll(eid);
  else if(EMP_TAB==='tasks') body = empTabTasks(eid);
  else if(EMP_TAB==='notes') body = empTabNotes(eid);
  else body = empTabDetails(eid);
  openModal('<h2>'+esc(e.name)+' В· '+esc(e.role)+'</h2>'+
    '<div class="muted" style="margin-bottom:10px">'+contactBtns(e.phone,e.email)+(e.active==='ЧңЧҗ'?' В· <span class="chip Ч‘Ч•ЧҳЧңЧ”">ЧңЧҗ ЧӨЧўЧҷЧң</span>':'')+'</div>'+
    '<div class="tabs">'+tabs.map(function(t){return '<button class="'+(EMP_TAB===t[0]?'on':'')+'" onclick="openEmp(\''+eid+'\',\''+t[0]+'\')">'+t[1]+'</button>';}).join('')+'</div>'+
    body);
}
function empTabDetails(eid){
  var e = DB.employees.find(x=>x.id===eid)||{};
  return '<div class="frow"><label>ЧӘЧўЧ•Ч“ЧӘ Ч–Ч”Ч•ЧӘ</label><div>'+(e.national_id?esc(e.national_id):'<span class="muted">вҖ”</span>')+'</div></div>'+
    '<div class="frow"><label>ЧӣЧӘЧ•Ч‘ЧӘ</label><div>'+(e.address?esc(e.address):'<span class="muted">вҖ”</span>')+'</div></div>'+
    '<div class="frow"><label>ЧӘЧҗЧЁЧҷЧҡ ЧӘЧ—ЧҷЧңЧӘ ЧўЧ‘Ч•Ч“Ч”</label><div>'+(e.start_date?esc(e.start_date):'<span class="muted">вҖ”</span>')+'</div></div>'+
    '<div class="frow"><label>ЧЎЧ•Ч’ Ч©ЧӣЧЁ</label><div>'+(e.pay_type==='Ч’ЧңЧ•Ч‘ЧңЧҷ'?'Ч’ЧңЧ•Ч‘ЧңЧҷ вҖ” ЧЎЧӣЧ•Чқ Ч—Ч•Ч“Ч©Чҷ Ч§Ч‘Ч•Чў':'Ч©ЧўЧӘЧҷ')+'</div></div>'+
    (e.pay_type==='Ч’ЧңЧ•Ч‘ЧңЧҷ'
      ? '<div class="frow"><label>Ч©ЧӣЧЁ Ч’ЧңЧ•Ч‘ЧңЧҷ ЧңЧ—Ч•Ч“Ч©</label><div>'+ils(e.monthly_salary)+'</div></div>'
      : '<div class="frow"><label>ЧӘЧўЧЁЧҷЧЈ ЧңЧ©ЧўЧ”</label><div>'+ils(e.hourly_rate)+'</div></div>')+
    '<div class="frow"><label>ЧҗЧҷЧ© Ч§Ч©ЧЁ ЧңЧ—ЧҷЧЁЧ•Чқ</label><div>'+(e.emergency_name?esc(e.emergency_name)+(e.emergency_phone?' В· '+esc(e.emergency_phone):''):'<span class="muted">вҖ”</span>')+'</div></div>'+
    '<div class="frow"><label>ЧӨЧЁЧҳЧҷ Ч‘Ч Ч§</label><div>'+(e.bank_details?esc(e.bank_details):'<span class="muted">вҖ”</span>')+'</div></div>'+
    (e.role==='Ч Ч”Ч’'?'<div class="frow"><label>ЧЁЧҷЧ©ЧҷЧ•Чҹ Ч Ч”ЧҷЧ’Ч”</label><div>'+(e.license_number?esc(e.license_number)+(e.license_expiry?' В· ЧӘЧ•Ч§ЧЈ '+esc(e.license_expiry):''):'<span class="muted">вҖ”</span>')+'</div></div>':'')+
    '<div class="frow"><label>Ч”ЧўЧЁЧ•ЧӘ ЧӣЧңЧңЧҷЧ•ЧӘ</label><div>'+(e.notes?esc(e.notes):'<span class="muted">вҖ”</span>')+'</div></div>'+
    '<div style="margin-top:10px" class="row">'+
    '<button class="btn ghost sm" onclick=\'empForm('+JSON.stringify(e).replace(/'/g,'&#39;')+')\'>ЧўЧЁЧҷЧӣЧ”</button>'+
    (ROLE==='ЧһЧ Ч”Чң'?'<button class="btn ghost sm" onclick="resetEmpPassword(\''+eid+'\')">ЧҗЧҷЧӨЧ•ЧЎ ЧЎЧҷЧЎЧһЧ”</button>':'')+
    '</div>';
}
function empTabAttendance(eid){
  var rows = (DB.attendance||[]).filter(a=>a.employee_id===eid).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  var totalHours = Math.round(rows.reduce((s,a)=>s+(Number(a.hours)||0),0)*100)/100;
  var effHours = Math.round(rows.reduce((s,a)=>s+attEff(a),0)*100)/100;
  var voidHours = Math.round(rows.reduce((s,a)=>s+attVoid(a),0)*100)/100;
  return '<div class="card"><b>ЧЎЧ”"Чӣ Ч©ЧўЧ•ЧӘ Ч©Ч ЧЁЧ©ЧһЧ•: </b>'+totalHours+' В· <b>ЧһЧ–ЧӣЧ•ЧӘ Ч‘Ч©ЧӣЧЁ: </b>'+effHours+
    (voidHours>0?' В· <span style="color:var(--danger)"><b>Ч ЧӨЧЎЧңЧ•: </b>'+voidHours+'</span>':'')+'</div>'+
    (rows.length? '<div class="card"><table><tr><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧӣЧ ЧҷЧЎЧ”</th><th>ЧҷЧҰЧҷЧҗЧ”</th><th>Ч©ЧўЧ•ЧӘ</th><th>ЧӨЧЎЧҷЧңЧ”</th></tr>'+
    rows.map(function(a){var dts=a.in_date?(esc(a.in_date)+(a.out_date&&a.out_date!==a.in_date?' вҶҗ '+esc(a.out_date):'')):esc(a.date);
      var v=attVoid(a);
      var hc=(a.hours!==''&&a.hours!==undefined)?(v>0?'<span style="text-decoration:line-through;color:var(--muted)">'+(Number(a.hours)||0)+'</span> <b>'+attEff(a)+'</b>':String(a.hours)):'вҖ”';
      return '<tr><td>'+dts+'</td><td>'+esc(a.in_time)+'</td><td>'+esc(a.out_time||'вҖ”')+'</td><td>'+hc+'</td><td>'+(v>0?'<span class="chip" style="background:var(--danger)">'+v+'</span> <span class="muted" style="font-size:11px">'+esc(a.void_reason||'')+'</span>':'<span class="muted">вҖ”</span>')+'</td></tr>';}).join('')+'</table></div>'
    : '<div class="card empty">ЧҗЧҷЧҹ ЧЁЧҷЧ©Ч•ЧһЧҷ Ч Ч•ЧӣЧ—Ч•ЧӘ</div>');
}
function empTabPayroll(eid){
  var rows = (DB.payroll||[]).filter(p=>p.employee_id===eid).slice().sort((a,b)=>(b.month||'').localeCompare(a.month||''));
  return rows.length? '<div class="card"><table><tr><th>Ч—Ч•Ч“Ч©</th><th>Ч©ЧўЧ•ЧӘ</th><th>ЧЎЧ”"Чӣ</th><th>Ч©Ч•ЧңЧқ</th><th>ЧҷЧӘЧЁЧ”</th><th>ЧЎЧҳЧҳЧ•ЧЎ</th><th></th></tr>'+

      return '<tr><td>'+esc(p.month)+'</td><td>'+p.hours+'</td><td class="tot">'+ils(p.total)+'</td><td>'+ils(paid)+'</td><td'+(remaining>0.01?' style="color:var(--danger);font-weight:700"':'')+'>'+ils(remaining)+'</td>'+

      '<td>'+(ROLE!=='Ч Ч”Ч’'?'<button class="btn ghost sm" onclick="payrollDetail(\''+p.id+'\')">ЧӨЧЁЧҳЧҷЧқ</button>':'')+'</td></tr>';}).join('')+'</table></div>'

}
function empTabTasks(eid){

function empTabNotes(eid){

async function saveEmp(id){
  if(!el('f_ename').value||!el('f_epin').value) return toast('Ч©Чқ Ч•Ч§Ч•Ч“ Ч—Ч•Ч‘Ч”', true);
  if(!id && !DB.employees.length && el('f_erole').value!=='ЧһЧ Ч”Чң') return toast('Ч”ЧўЧ•Ч‘Ч“ Ч”ЧЁЧҗЧ©Ч•Чҹ Ч—ЧҷЧҷЧ‘ ЧңЧ”ЧҷЧ•ЧӘ ЧһЧ Ч”Чң', true);
  var views = Array.from(document.querySelectorAll('.evw:checked')).map(x=>x.value).join(',');
  var row = {name:el('f_ename').value,role:el('f_erole').value,pin:el('f_epin').value,phone:el('f_ephone').value,
    username:(el('f_euser').value||'').trim().toLowerCase(),
    hourly_rate:Number(el('f_erate').value)||0,can_edit:el('f_eedit').value,views:views,active:'ЧӣЧҹ',
    pay_type:el('f_eptype').value,monthly_salary:Number(el('f_esal').value)||0,
    national_id:el('f_enid').value,address:el('f_eaddr').value,email:el('f_eemail').value,start_date:el('f_estart').value,
    emergency_name:el('f_eemname').value,emergency_phone:el('f_eemphone').value,bank_details:el('f_ebank').value,notes:el('f_enotes').value,license_number:el('f_elic').value,license_expiry:el('f_elicexp').value};
  /* B29: ЧЎЧҷЧЎЧһЧ” ЧҗЧ•ЧӨЧҰЧҷЧ•Ч ЧңЧҷЧӘ Ч‘Ч”Ч§ЧһЧӘ ЧўЧ•Ч‘Ч“ Ч—Ч“Ч© вҖ” Ч Ч§Ч‘ЧўЧӘ ЧһЧҷЧ“ ЧҗЧ—ЧЁЧҷ Ч”ЧҷЧҰЧҷЧЁЧ” Ч“ЧЁЧҡ setPassword Ч”Ч§ЧҷЧҷЧқ */
  var newPw = (!id && el('f_epw'))? String(el('f_epw').value||'').trim() : '';
  if(newPw && newPw.length < 6) return toast('Ч”ЧЎЧҷЧЎЧһЧ” Ч—ЧҷЧҷЧ‘ЧӘ ЧңЧ”ЧӣЧҷЧң ЧңЧӨЧ—Ч•ЧӘ 6 ЧӘЧ•Ч•ЧҷЧқ', true);
  if(newPw && !row.username) return toast('ЧӣЧ“Чҷ ЧңЧ§Ч‘Ч•Чў ЧЎЧҷЧЎЧһЧ” ЧҷЧ© ЧңЧ”Ч–ЧҷЧҹ Ч’Чқ Ч©Чқ ЧһЧ©ЧӘЧһЧ©', true);
  var r = id? await act('update',{table:'employees',id:id,row:row},'ЧўЧ•Ч“ЧӣЧҹ') : await act('create',{table:'employees',row:row},'Ч”ЧўЧ•Ч‘Ч“ Ч Ч•ЧЎЧЈ');
  if(!r) return;
  if(!id && newPw && r.row && r.row.id){
    var rp = await apiBusy('setPassword',{employee_id:r.row.id, new_password:newPw, username:row.username});
    if(!rp || !rp.ok){ closeModal(); return toast((rp&&rp.error)||'Ч”ЧўЧ•Ч‘Ч“ Ч Ч•ЧҰЧЁ ЧҗЧҡ Ч”ЧЎЧҷЧЎЧһЧ” ЧңЧҗ Ч Ч§Ч‘ЧўЧ” вҖ” Ч§Ч‘Чў ЧҗЧ•ЧӘЧ” Ч‘ЧӣЧӨЧӘЧ•ЧЁ "ЧӨЧЁЧҳЧҷ ЧӣЧ ЧҷЧЎЧ”"', true); }
    var eNew=(DB.employees||[]).find(x=>x.id===r.row.id); if(eNew) eNew.username=row.username;
    return openModal('<h2>Ч”ЧўЧ•Ч‘Ч“ Ч Ч•ЧЎЧЈ вҖ” ЧӨЧЁЧҳЧҷ ЧӣЧ ЧҷЧЎЧ”</h2><p>Ч©Чқ ЧһЧ©ЧӘЧһЧ©:</p>'+

      '<button class="btn" onclick="closeModal()">ЧЎЧ’Ч•ЧЁ</button>');
  }

// F2: ЧЎЧҷЧЎЧһЧ” ЧҗЧ§ЧЁЧҗЧҷЧӘ Ч‘ЧӘ 8 ЧӘЧ•Ч•ЧҷЧқ вҖ” ЧңЧңЧҗ ЧӘЧ•Ч•ЧҷЧқ Ч“Ч•-ЧһЧ©ЧһЧўЧҷЧҷЧқ (0/O, 1/l/I)
function genPassword(){
  var CH = 'abcdefghjkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789', out = '';
  var a = new Uint32Array(8); crypto.getRandomValues(a);
  for(var i=0;i<8;i++) out += CH.charAt(a[i] % CH.length);
  return out;
}

    '<p class="muted" style="margin-bottom:10px">Ч©Чқ Ч”ЧһЧ©ЧӘЧһЧ© Ч•Ч”ЧЎЧҷЧЎЧһЧ” Ч Ч§Ч‘ЧўЧҷЧқ ЧӣЧҗЧҹ ЧҷЧ—Ч“. Ч”ЧЎЧҷЧЎЧһЧ” ЧӘЧ•ЧҰЧ’ ЧӨЧўЧқ ЧҗЧ—ЧӘ Ч‘ЧңЧ‘Ч“ вҖ” Ч”ЧўЧ‘ЧЁ ЧҗЧ•ЧӘЧ” ЧңЧўЧ•Ч‘Ч“. Ч”ЧҷЧҗ Ч Ч©ЧһЧЁЧӘ Ч‘Ч©ЧЁЧӘ Ч‘Ч’ЧҷЧ‘Ч•Ч‘ Ч‘ЧңЧ‘Ч“ вҖ” Ч’Чқ ЧңЧһЧҷ Ч©Ч§Ч‘Чў ЧҗЧ•ЧӘЧ” ЧҗЧҷЧҹ Ч“ЧЁЧҡ ЧңЧҰЧӨЧ•ЧӘ Ч‘Ч” Ч©Ч•Ч‘.</p>'+
    '<button class="btn" onclick="doResetEmpPassword(\''+id+'\')">Ч©ЧһЧ•ЧЁ ЧӨЧЁЧҳЧҷ ЧӣЧ ЧҷЧЎЧ”</button>');

async function doResetEmpPassword(id){
  var np = el('f_rp').value;

  el('main').innerHTML = '<div class="section-title"><h2>ЧһЧ Ч”Чң ЧЁЧҗЧ©Чҷ</h2><button class="btn" onclick="empForm()">+ ЧўЧ•Ч‘Ч“ Ч—Ч“Ч©</button></div>'+
    '<p class="muted" style="margin-bottom:10px">Ч”ЧһЧЎЧҡ Ч”Ч–Ч” ЧһЧ–Ч”Ч” ЧҗЧ•ЧӘЧҡ ЧӣЧһЧ Ч”Чң ЧЁЧҗЧ©Чҷ ЧҷЧ©ЧҷЧЁЧ•ЧӘ ЧһЧ”Ч’Ч“ЧЁЧ•ЧӘ Ч”Ч©ЧЁЧӘ вҖ” Ч”Ч•Чҗ ЧҷЧҷЧ©ЧҗЧЁ Ч Ч’ЧҷЧ© Ч’Чқ ЧҗЧқ ЧӘЧӨЧ§ЧҷЧ“ Ч”ЧһЧ Ч”Чң Ч©ЧңЧҡ Ч‘ЧҳЧ‘ЧңЧӘ Ч”ЧўЧ•Ч‘Ч“ЧҷЧқ ЧҷЧ©ЧӘЧ Ч” Ч‘ЧҳЧўЧ•ЧӘ. '+
    'ЧңЧўЧ•ЧңЧқ ЧңЧҗ Ч ЧҷЧӘЧҹ ЧңЧҰЧӨЧ•ЧӘ Ч‘ЧЎЧҷЧЎЧһЧ” Ч§ЧҷЧҷЧһЧӘ вҖ” ЧЁЧ§ ЧңЧ§Ч‘Ч•Чў Ч—Ч“Ч©Ч”. Ч©ЧҷЧ Ч•Чҷ Ч©Чқ ЧһЧ©ЧӘЧһЧ© ЧҗЧӨЧ©ЧЁЧҷ ЧӣЧҗЧҹ Ч’Чқ ЧңЧўЧ•Ч‘Ч“ЧҷЧқ ЧҗЧ—ЧЁЧҷЧқ.</p>'+
    (DB.employees.length? DB.employees.map(function(e){ return '<div class="card"><div class="row"><div class="grow"><b>'+esc(e.name)+'</b> В· '+esc(e.role)+
      '<div class="muted">'+(e.username?'ЧһЧ©ЧӘЧһЧ©: '+esc(e.username):'ЧҗЧҷЧҹ Ч©Чқ ЧһЧ©ЧӘЧһЧ© ЧўЧ“ЧҷЧҷЧҹ')+(e.password_hash?' В· ЧҷЧ© ЧЎЧҷЧЎЧһЧ” ЧһЧ•Ч’Ч“ЧЁЧӘ':' В· ЧҗЧҷЧҹ ЧЎЧҷЧЎЧһЧ” ЧһЧ•Ч’Ч“ЧЁЧӘ')+'</div></div>'+
      '<span class="rowact">'+
      '<button class="btn ghost sm" title="Ч§Ч‘ЧҷЧўЧӘ Ч©Чқ ЧһЧ©ЧӘЧһЧ© Ч•ЧЎЧҷЧЎЧһЧ”" onclick="resetEmpPassword(\''+e.id+'\')">ЧӨЧЁЧҳЧҷ ЧӣЧ ЧҷЧЎЧ”</button>'+
      '<button class="btn ghost sm" title="ЧўЧЁЧҷЧӣЧӘ ЧӨЧЁЧҳЧҷ ЧўЧ•Ч‘Ч“" onclick=\'empForm('+JSON.stringify(e).replace(/'/g,'&#39;')+')\'>ЧўЧЁЧҷЧӣЧ”</button>'+
      '</span></div></div>'; }).join(''):'<div class="card empty">ЧҗЧҷЧҹ ЧўЧ•Ч‘Ч“ЧҷЧқ ЧўЧ“ЧҷЧҷЧҹ</div>');
