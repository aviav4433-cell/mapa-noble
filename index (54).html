}
/* ================= B28: Ч“Ч©Ч‘Ч•ЧЁЧ“ ЧӣЧЎЧӨЧҷЧқ =================
   ЧӣЧң Ч”ЧһЧЎЧӨЧЁЧҷЧқ ЧһЧ—Ч•Ч©Ч‘ЧҷЧқ Ч‘Ч§ЧЁЧҷЧҗЧ” Ч‘ЧңЧ‘Ч“ ЧһЧ ЧӘЧ•Ч ЧҷЧқ Ч©ЧӣЧ‘ЧЁ Ч§ЧҷЧҷЧһЧҷЧқ Ч‘-DB. ЧҗЧҷЧҹ Ч©ЧӣЧӨЧ•Чң Ч ЧӘЧ•Ч ЧҷЧқ. */
function finMonthKey(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2); }
// Ч”ЧӣЧ ЧЎЧ•ЧӘ Ч”Ч—Ч•Ч“Ч© вҖ” ЧңЧӨЧҷ Ч—Ч©Ч‘Ч•Ч ЧҷЧ•ЧӘ Ч©Ч”Ч•ЧӨЧ§Ч• Ч”Ч—Ч•Ч“Ч©, ЧңЧӨЧ Чҷ ЧһЧў"Чһ (Ч–Ч”Ч” ЧңЧ’ЧЁЧЈ Ч”Ч”ЧӣЧ ЧЎЧ•ЧӘ Ч‘ЧңЧ•Ч— Ч”Ч‘Ч§ЧЁЧ”)
function finIncomeMonth(){
  var mk = finMonthKey();
  return (DB.invoices||[]).filter(v=>v.status!=='Ч‘Ч•ЧҳЧңЧ”' && String(v.date||'').slice(0,7)===mk)
    .reduce((s,v)=>s+Number(v.subtotal||0),0);
}
// Ч”Ч•ЧҰЧҗЧ•ЧӘ Ч©Ч ЧЁЧ©ЧһЧ• Ч‘ЧӨЧ•ЧўЧң Ч‘Ч—Ч•Ч“Ч© Ч”Ч Ч•ЧӣЧ—Чҷ вҖ” ЧӣЧ•ЧңЧң ЧһЧў"Чһ
function finExpensesMonth(){
  var mk = finMonthKey();
  return (DB.expenses||[]).filter(x=>String(x.date||'').slice(0,7)===mk)
    .reduce((s,x)=>s+Number(x.amount||0)+Number(x.vat||0),0);
}
function finCustomerDebt(){ return (DB.customers||[]).reduce(function(s,c){ var b=custBalance(c.id); return s+(b>0?b:0); },0); }
function finFutureTotal(){ return fexpOpen().reduce((s,x)=>s+fexpRemain(x),0); }
function finSupplierTotal(){ return fexpOpen().filter(x=>x.supplier_id).reduce((s,x)=>s+fexpRemain(x),0); }
function finPayrollTotal(){ return fexpOpen().filter(x=>x.source==='payroll').reduce((s,x)=>s+fexpRemain(x),0); }
// ЧһЧўЧ‘ЧЁ ЧңЧҳЧҗЧ‘ Ч‘ЧӘЧ•Чҡ ЧһЧЎЧҡ ЧӣЧЎЧӨЧҷЧқ
function goFin(tab){ FIN_TAB = tab; VIEW = 'finance'; render(); window.scrollTo(0,0); }
function finCard(val,label,onclick,alert){
  return '<div class="kpi click'+(alert?' alert':'')+'" onclick="'+onclick+'" title="ЧңЧ—ЧҘ ЧңЧӨЧҷЧЁЧ•Чҳ">'+
    '<div class="v">'+val+'</div><div class="l">'+label+'</div></div>';
}
function finSummaryHtml(){
  var futTot = finFutureTotal(), debt = finCustomerDebt();
  return '<div class="gridkpi" style="margin-bottom:14px">'+
    finCard(ils(finIncomeMonth()),'Ч”ЧӣЧ ЧЎЧ•ЧӘ Ч”Ч—Ч•Ч“Ч©',"goFin('collection')",false)+
    finCard(ils(debt),'Ч—Ч•Ч‘Ч•ЧӘ ЧңЧ§Ч•Ч—Ч•ЧӘ',"goFin('receipts')",debt>0)+
    finCard(ils(finExpensesMonth()),'Ч”Ч•ЧҰЧҗЧ•ЧӘ Ч”Ч—Ч•Ч“Ч©',"goFin('expenses')",false)+
    finCard(ils(futTot),'Ч”Ч•ЧҰЧҗЧ•ЧӘ ЧҰЧӨЧ•ЧҷЧ•ЧӘ',"goFin('future')",futTot>0)+
    finCard(ils(finSupplierTotal()),'ЧҷЧӘЧЁЧ•ЧӘ ЧңЧЎЧӨЧ§ЧҷЧқ',"goFin('future')",false)+
    finCard(ils(finPayrollTotal()),'ЧҷЧӘЧЁЧ•ЧӘ Ч©ЧӣЧЁ',"go('payroll')",false)+
    '</div>';
}

/* ===== B30: Ч’Ч‘ЧҷЧ” Ч‘ЧӨЧ•ЧўЧң + Ч§Ч•ЧӨЧӘ ЧһЧ–Ч•ЧһЧҹ ===== */
function isCashMethod(m){ return String(m||'').indexOf('ЧһЧ–Ч•ЧһЧҹ')>-1; }
function cashBalanceFE(){
  var inn = (DB.payments||[]).reduce((s,x)=>s+(isCashMethod(x.method)?Number(x.amount||0):0),0);
  var outE = (DB.expensePayments||[]).reduce((s,x)=>s+(isCashMethod(x.method)?Number(x.amount||0):0),0);
  var outP = (DB.payrollPayments||[]).reduce((s,x)=>s+(isCashMethod(x.method)?Number(x.amount||0):0),0);
  var outC = (DB.cashMoves||[]).reduce((s,x)=>s+Number(x.amount||0),0);
  return Math.round((inn-outE-outP-outC)*100)/100;
}
var COL_MONTH = '';
function colMonthKey(){ return COL_MONTH || new Date().toISOString().slice(0,7); }
function colPays(){ return (DB.payments||[]).filter(p=>String(p.date||'').slice(0,7)===colMonthKey()); }
function finCollectionHtml(){
  var mk = colMonthKey();
  var pays = colPays();
  var cash = pays.filter(p=>isCashMethod(p.method)), bank = pays.filter(p=>!isCashMethod(p.method));
  var sum = a=>Math.round(a.reduce((s,p)=>s+Number(p.amount||0),0)*100)/100;
  var bal = cashBalanceFE();
  var moves = (DB.cashMoves||[]).slice().sort((a,b)=>String(b.date||'').localeCompare(String(a.date||''))).slice(0,25);
  var box = function(v,l,onclick,color){
    return '<div class="kpi click" onclick="'+onclick+'" style="border-right:4px solid '+color+'"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';
  };
  return '<div class="row" style="margin-bottom:8px;align-items:center;gap:8px"><b>Ч—Ч•Ч“Ч©:</b>'+
    '<input type="month" value="'+esc(mk)+'" onchange="COL_MONTH=this.value;render()" style="width:auto">'+
    '<span class="muted" style="font-size:12px">Ч’Ч‘ЧҷЧ” Ч‘ЧӨЧ•ЧўЧң вҖ” ЧӣЧң Ч§Ч‘ЧңЧ” Ч©Ч ЧЁЧ©ЧһЧ” Ч‘ЧһЧўЧЁЧӣЧӘ (ЧҗЧ©ЧЁЧҗЧҷ, Ч”ЧўЧ‘ЧЁЧ”, Ч©ЧҷЧ§, ЧһЧ–Ч•ЧһЧҹ)</span></div>'+
    '<div class="gridkpi" style="margin-bottom:12px">'+
      box(ils(sum(pays)),'ЧЎЧ”"Чӣ Ч Ч’Ч‘Ч” Ч”Ч—Ч•Ч“Ч©',"colPayList('all')",'var(--navy2)')+
      box(ils(sum(bank)),'Ч‘Ч Ч§ / ЧҗЧ©ЧЁЧҗЧҷ / Ч”ЧўЧ‘ЧЁЧ•ЧӘ',"colPayList('bank')",'var(--teal,#1f7a6b)')+
      box(ils(sum(cash)),'ЧһЧ–Ч•ЧһЧҹ Ч©Ч Ч’Ч‘Ч” Ч”Ч—Ч•Ч“Ч©',"colPayList('cash')",'#8a5a1f')+
    '</div>'+
    '<div class="card" style="border-right:5px solid #8a5a1f"><div class="row" style="align-items:center;flex-wrap:wrap;gap:8px">'+
      '<div class="grow"><h3 style="margin:0">Ч§Ч•ЧӨЧӘ ЧһЧ–Ч•ЧһЧҹ</h3><div class="muted" style="font-size:12px">ЧӣЧң Ч’Ч‘ЧҷЧҷЧӘ ЧһЧ–Ч•ЧһЧҹ Ч ЧӣЧ ЧЎЧӘ ЧңЧ§Ч•ЧӨЧ”; ЧӘЧ©ЧңЧ•Чқ Ч‘ЧһЧ–Ч•ЧһЧҹ (ЧЎЧӨЧ§/Ч©ЧӣЧЁ), Ч”ЧӨЧ§Ч“Ч” ЧңЧ‘Ч Ч§ ЧҗЧ• ЧӘЧ©ЧңЧ•Чқ ЧһЧ”Ч§Ч•ЧӨЧ” вҖ” ЧҷЧ•ЧҰЧҗЧҷЧқ ЧһЧһЧ Ч”.</div></div>'+
      '<div style="font-size:22px;font-weight:800;color:'+(bal>0?'var(--ink)':'var(--muted)')+'">'+ils(bal)+'</div>'+
      (ROLE==='ЧһЧ Ч”Чң'?'<button class="btn sm" onclick="cashMoveForm(\'Ч”ЧӨЧ§Ч“Ч” ЧңЧ‘Ч Ч§\')">Ч”ЧӨЧ§Ч“ЧӘ ЧһЧ–Ч•ЧһЧҹ ЧңЧ‘Ч Ч§</button>'+
        '<button class="btn ghost sm" onclick="cashMoveForm(\'ЧӘЧ©ЧңЧ•Чқ ЧһЧ”Ч§Ч•ЧӨЧ”\')">ЧӘЧ©ЧңЧ•Чқ ЧһЧ”Ч§Ч•ЧӨЧ” Чң...</button>':'')+
    '</div>'+
    (moves.length?'<table style="margin-top:8px"><tr><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧЎЧ•Ч’</th><th>ЧңЧһЧҷ</th><th>ЧЎЧӣЧ•Чқ</th><th>ЧӨЧҷЧЁЧ•Чҳ</th><th>ЧһЧҷ</th></tr>'+
      moves.map(m=>'<tr><td>'+esc(m.date)+'</td><td>'+esc(m.type)+'</td><td>'+esc(m.recipient||'')+'</td><td>'+ils(m.amount)+'</td><td>'+esc(m.note||'')+'</td><td class="muted" style="font-size:11px">'+esc(m.created_by||'')+'</td></tr>').join('')+'</table>'
      :'<div class="muted" style="margin-top:8px;font-size:12px">ЧҗЧҷЧҹ ЧўЧ“ЧҷЧҷЧҹ ЧӘЧ Ч•ЧўЧ•ЧӘ Ч§Ч•ЧӨЧ” (Ч”ЧӨЧ§Ч“Ч•ЧӘ/ЧӘЧ©ЧңЧ•ЧһЧҷЧқ ЧһЧ”Ч§Ч•ЧӨЧ”)</div>')+
    '</div>'+
    '<div class="muted" style="font-size:12px;margin-top:8px">Ч’Ч‘ЧҷЧҷЧӘ ЧӘЧ©ЧңЧ•Чқ ЧһЧңЧ§Ч•Ч— Ч ЧўЧ©ЧҷЧӘ ЧһЧӘЧ•Чҡ Ч”Ч”Ч–ЧһЧ Ч” (ЧӣЧӨЧӘЧ•ЧЁ "+ ЧӘЧ©ЧңЧ•Чқ") ЧҗЧ• ЧһЧ—Ч©Ч‘Ч•Ч ЧҷЧӘ ЧһЧӣЧ‘ЧЎЧ”. ЧӘЧ©ЧңЧ•Чқ ЧңЧЎЧӨЧ§ Ч‘ЧһЧ–Ч•ЧһЧҹ вҖ” Ч‘ЧһЧЎЧҡ "Ч”Ч•ЧҰЧҗЧ•ЧӘ ЧўЧӘЧҷЧ“ЧҷЧ•ЧӘ" вҶҗ "ЧӘЧ©ЧңЧ•Чқ" вҶҗ ЧҗЧһЧҰЧўЧҷ "ЧһЧ–Ч•ЧһЧҹ", Ч•Ч”Ч•Чҗ ЧһЧ§Ч•Ч–Ч– ЧһЧ”Ч§Ч•ЧӨЧ” ЧҗЧ•ЧҳЧ•ЧһЧҳЧҷЧӘ.</div>';
}
/* B30: ЧӨЧҷЧЁЧ•Чҳ Ч”Ч’Ч‘ЧҷЧ” вҖ” ЧЁЧ©ЧҷЧһЧӘ Ч”Ч§Ч‘ЧңЧ•ЧӘ Ч©ЧһЧЁЧӣЧҷЧ‘Ч•ЧӘ ЧҗЧӘ Ч”ЧЎЧӣЧ•Чқ. ЧңЧ—ЧҷЧҰЧ” ЧўЧң Ч©Ч•ЧЁЧ” ЧӨЧ•ЧӘЧ—ЧӘ ЧҗЧӘ Ч”Ч§Ч‘ЧңЧ”. */
function colPayList(which){
  var pays = colPays().filter(p=> which==='all' || (which==='cash'?isCashMethod(p.method):!isCashMethod(p.method)));
  var tot = Math.round(pays.reduce((s,p)=>s+Number(p.amount||0),0)*100)/100;
  var title = which==='cash'?'ЧһЧ–Ч•ЧһЧҹ вҖ” '+colMonthKey() : which==='bank'?'Ч‘Ч Ч§ / ЧҗЧ©ЧЁЧҗЧҷ вҖ” '+colMonthKey() : 'ЧӣЧң Ч”Ч’Ч‘ЧҷЧ” вҖ” '+colMonthKey();
  openModal('<h2>ЧӨЧҷЧЁЧ•Чҳ Ч’Ч‘ЧҷЧ”: '+esc(title)+'</h2>'+
    (pays.length?'<div class="card"><table><tr><th>Ч§Ч‘ЧңЧ”</th><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧңЧ§Ч•Ч—</th><th>ЧЎЧӣЧ•Чқ</th><th>ЧҗЧһЧҰЧўЧҷ</th></tr>'+
      pays.slice().reverse().map(function(p){
        var o=DB.orders.find(x=>x.id===p.order_id); var vI=!o&&p.invoice_id?DB.invoices.find(x=>x.id===p.invoice_id):null;
        var pcid=p.customer_id||(o?o.customer_id:(vI?vI.customer_id:''));
        return '<tr style="cursor:pointer" onclick="closeModal();openReceipt(\''+p.id+'\')"><td><b style="color:var(--navy2);text-decoration:underline">'+esc(p.receipt_number)+'</b></td><td>'+esc(p.date)+'</td><td>'+esc(cust(pcid))+'</td><td>'+ils(p.amount)+'</td><td>'+esc(p.method)+'</td></tr>';
      }).join('')+
      '<tr><td colspan="3"><b>ЧЎЧ”"Чӣ</b></td><td colspan="2"><b>'+ils(tot)+'</b></td></tr></table></div>'
      +'<div class="muted" style="font-size:12px;margin-top:6px">ЧңЧ—ЧҷЧҰЧ” ЧўЧң Ч©Ч•ЧЁЧ” ЧӨЧ•ЧӘЧ—ЧӘ ЧҗЧӘ Ч”Ч§Ч‘ЧңЧ”.</div>'
    :'<div class="card empty">ЧҗЧҷЧҹ Ч§Ч‘ЧңЧ•ЧӘ Ч‘Ч§ЧҳЧ’Ч•ЧЁЧҷЧ” Ч–Ч• Ч”Ч—Ч•Ч“Ч©</div>')+
    '<div style="margin-top:12px"><button class="btn ghost" onclick="closeModal()">ЧЎЧ’Ч•ЧЁ</button></div>');
}
/* B30: ЧӘЧ Ч•ЧўЧӘ Ч§Ч•ЧӨЧ” вҖ” Ч”ЧӨЧ§Ч“Ч” ЧңЧ‘Ч Ч§ / ЧӘЧ©ЧңЧ•Чқ ЧһЧ”Ч§Ч•ЧӨЧ” (ЧһЧ Ч”Чң Ч‘ЧңЧ‘Ч“, ЧҗЧӣЧҷЧӨЧ” Ч’Чқ Ч‘Ч©ЧЁЧӘ) */
function cashMoveForm(type){
  var bal = cashBalanceFE();
  if(bal<=0) return toast('ЧҗЧҷЧҹ ЧҷЧӘЧЁЧӘ ЧһЧ–Ч•ЧһЧҹ Ч‘Ч§Ч•ЧӨЧ”', true);
  openModal('<h2>'+esc(type)+'</h2>'+
    '<div class="muted" style="margin-bottom:8px">ЧҷЧӘЧЁЧӘ Ч”Ч§Ч•ЧӨЧ” ЧӣЧЁЧ’Чў: <b>'+ils(bal)+'</b></div>'+
    '<div class="grid2"><div class="frow"><label>ЧЎЧӣЧ•Чқ</label><input id="f_cmamt" type="number" min="0" step="0.01" max="'+bal+'" value="'+bal+'"></div>'+
    '<div class="frow"><label>ЧӘЧҗЧЁЧҷЧҡ</label><input id="f_cmdate" type="date" value="'+new Date().toISOString().slice(0,10)+'"></div></div>'+
    (type==='ЧӘЧ©ЧңЧ•Чқ ЧһЧ”Ч§Ч•ЧӨЧ”'?'<div class="frow"><label>ЧңЧһЧҷ Ч©Ч•ЧңЧқ (Ч—Ч•Ч‘Ч”)</label><input id="f_cmrcp" placeholder="Ч©Чқ Ч”ЧһЧ§Ч‘Чң"></div>':'')+
    '<div class="frow"><label>ЧӨЧҷЧЁЧ•Чҳ / ЧҗЧЎЧһЧӣЧӘЧҗ</label><input id="f_cmnote" placeholder="ЧһЧЎЧӨЧЁ Ч”ЧӨЧ§Ч“Ч”, ЧЎЧҷЧ‘ЧӘ Ч”ЧӘЧ©ЧңЧ•Чқ"></div>'+
    '<button class="btn" onclick="saveCashMove(\''+type+'\')">Ч©ЧһЧ•ЧЁ</button>');
}
async function saveCashMove(type){
  var amt = Number(el('f_cmamt').value)||0;
  if(amt<=0) return toast('ЧЎЧӣЧ•Чқ ЧңЧҗ ЧӘЧ§ЧҷЧҹ', true);
  var r = await act('addCashMove',{type:type, amount:amt, date:el('f_cmdate').value,
    recipient: el('f_cmrcp')?el('f_cmrcp').value:'', note:el('f_cmnote').value}, 'Ч”ЧӘЧ Ч•ЧўЧ” Ч ЧЁЧ©ЧһЧ”');
  if(r){ if(r.row) (DB.cashMoves=DB.cashMoves||[]).push(r.row); closeModal(); render(); }
}
/* B20: Ч”Ч•ЧҰЧҗЧ•ЧӘ ЧўЧӘЧҷЧ“ЧҷЧ•ЧӘ вҖ” Ч©ЧӣЧЁ Ч©ЧҗЧ•Ч©ЧЁ Ч•ЧҳЧЁЧқ Ч©Ч•ЧңЧқ + Ч”Ч•ЧҰЧҗЧ•ЧӘ ЧһЧӘЧ•ЧӣЧ Ч Ч•ЧӘ ЧҗЧ—ЧЁЧ•ЧӘ.
   B28: ЧӘЧҗЧЁЧҷЧҡ ЧҷЧўЧ“ Ч—Ч•Ч‘Ч”, ЧӨЧҷЧңЧҳЧЁЧҷЧқ ЧңЧӨЧҷ ЧҳЧ•Ч•Ч— Ч–ЧһЧҹ, ЧӨЧҷЧЁЧ•Чҳ Ч”ЧЎЧӣЧ•Чқ Ч”ЧӣЧ•ЧңЧң, Ч•ЧһЧ—ЧҷЧ§Ч” ЧЁЧӣЧ” ЧўЧқ ЧЎЧҷЧ‘Ч”. */
var FEXP_RANGE = 'all', FEXP_UNTIL = '', FEXP_SHOWDEL = false;

// ЧӣЧң Ч”Ч”Ч•ЧҰЧҗЧ•ЧӘ Ч”ЧўЧӘЧҷЧ“ЧҷЧ•ЧӘ Ч©ЧҗЧҷЧ Чҹ ЧһЧ—Ч•Ч§Ч•ЧӘ (ЧһЧ—ЧҷЧ§Ч” ЧЁЧӣЧ” ЧһЧЎЧӘЧҷЧЁЧ” ЧһЧӣЧң ЧӘЧҰЧ•Ч’Ч” Ч•Ч—ЧҷЧ©Ч•Ч‘)
function fexpAll(){ return (DB.futureExpenses||[]).filter(x=>String(x.deleted||'')!=='ЧӣЧҹ'); }
function fexpDeleted(){ return (DB.futureExpenses||[]).filter(x=>String(x.deleted||'')==='ЧӣЧҹ'); }
function fexpOpen(){ return fexpAll().filter(x=>x.status!=='Ч©Ч•ЧңЧқ'); }
// Ч”ЧҗЧқ ЧЁЧ©Ч•ЧһЧ” Ч ЧӣЧ ЧЎЧӘ ЧңЧҳЧ•Ч•Ч— Ч”Ч–ЧһЧҹ Ч©Ч Ч‘Ч—ЧЁ. ЧЁЧ©Ч•ЧһЧ” Ч‘ЧңЧҷ ЧӘЧҗЧЁЧҷЧҡ ЧҷЧўЧ“ ЧңЧҗ Ч ЧӣЧ ЧЎЧӘ ЧңЧҗЧЈ ЧҳЧ•Ч•Ч—.
function fexpInRange(x){
  if(FEXP_RANGE==='all') return true;
  if(!x.due_date) return false;
  var lim;
  if(FEXP_RANGE==='until'){ if(!FEXP_UNTIL) return true; lim = FEXP_UNTIL; }
  else lim = new Date(Date.now()+Number(FEXP_RANGE)*864e5).toISOString().slice(0,10);
  return x.due_date <= lim;
}
function fexpRangeLabel(){
  if(FEXP_RANGE==='all') return 'Ч”ЧӣЧң';
  if(FEXP_RANGE==='until') return FEXP_UNTIL? 'ЧўЧ“ '+FEXP_UNTIL : 'ЧўЧ“ ЧӘЧҗЧЁЧҷЧҡ';
  return 'ЧўЧ“ '+FEXP_RANGE+' ЧҷЧ•Чқ';
}
function setFexpRange(r){ FEXP_RANGE=r; if(r!=='until') FEXP_UNTIL=''; render(); }
function setFexpUntil(v){ FEXP_UNTIL=v; FEXP_RANGE='until'; render(); }

function futureExpensesHtml(){
  var URG_ORDER = {'Ч§ЧЁЧҷЧҳЧҷ':0,'Ч“Ч—Ч•ЧЈ':1,'ЧЁЧ’ЧҷЧң':2};
  var URG_COLOR = {'Ч§ЧЁЧҷЧҳЧҷ':'var(--danger)','Ч“Ч—Ч•ЧЈ':'var(--amber)','ЧЁЧ’ЧҷЧң':'var(--muted)'};
  var openAll = fexpOpen();
  var noDate  = openAll.filter(x=>!x.due_date);
  var withDate= openAll.filter(x=>x.due_date && fexpInRange(x));
  var paid = fexpAll().filter(x=>x.status==='Ч©Ч•ЧңЧқ');
  withDate.sort(function(a,b){
    var u = (URG_ORDER[a.urgency]||9)-(URG_ORDER[b.urgency]||9);
    if(u) return u;
    return (a.due_date||'9999').localeCompare(b.due_date||'9999');
  });
  var today = new Date().toISOString().slice(0,10);
  function row(x){
    var overdue = x.due_date && x.due_date < today;
    var emp = x.employee_id? DB.employees.find(e=>e.id===x.employee_id):null;
    var pd = fexpPaid(x.id), rem = fexpRemain(x);
    return '<tr>'+
      '<td><span style="color:'+(URG_COLOR[x.urgency]||'inherit')+';font-weight:600">'+esc(x.urgency||'ЧЁЧ’ЧҷЧң')+'</span></td>'+
      '<td>'+esc(x.category)+(emp?' В· '+esc(emp.name):'')+(x.supplier_id?' В· '+esc(supp(x.supplier_id)):'')+'</td>'+
      '<td>'+esc(x.description||(x.source==='payroll'?'ЧҷЧӘЧЁЧӘ Ч©ЧӣЧЁ ЧңЧӘЧ©ЧңЧ•Чқ':''))+'</td>'+
      '<td'+(overdue?' style="color:var(--danger);font-weight:700"':'')+'>'+
        (x.due_date?esc(x.due_date):'<button class="btn ghost sm" onclick="fexpDueForm(\''+x.id+'\')">Ч”Ч©ЧңЧқ ЧӘЧҗЧЁЧҷЧҡ</button>')+
        (overdue?' вҡ ':'')+'</td>'+
      '<td class="tot">'+ils(x.amount)+'</td>'+
      '<td>'+(pd>0?ils(pd):'вҖ”')+'</td>'+
      '<td'+(rem>0.01?' style="color:var(--danger);font-weight:700"':'')+'>'+ils(rem)+'</td>'+
      '<td><div class="row" style="gap:4px;flex-wrap:nowrap">'+(x.source==='payroll'?
        '<button class="btn ghost sm" onclick="go(\'payroll\')">ЧңЧһЧЎЧҡ Ч©ЧӣЧЁ</button>':
        '<button class="btn sm" onclick="payFexpForm(\''+x.id+'\')">ЧӘЧ©ЧңЧ•Чқ</button>'+
        '<button class="btn ghost sm" onclick="fexpBreakdown(\''+x.id+'\')">ЧӨЧҷЧЁЧ•Чҳ</button>'+
        (ROLE==='ЧһЧ Ч”Чң' && fexpPaid(x.id)<=0 ?'<button class="btn danger sm" onclick="fexpDeleteForm(\''+x.id+'\')">ЧһЧ—Ч§</button>':''))+
      '</div></td>'+
    '</tr>';
  }
  var HEAD = '<tr><th>Ч“Ч—ЧҷЧӨЧ•ЧӘ</th><th>Ч§ЧҳЧ’Ч•ЧЁЧҷЧ”</th><th>ЧӘЧҷЧҗЧ•ЧЁ</th><th>ЧӘЧҗЧЁЧҷЧҡ ЧҷЧўЧ“</th><th>ЧЎЧӣЧ•Чқ</th><th>Ч©Ч•ЧңЧқ</th><th>ЧҷЧӘЧЁЧ”</th><th></th></tr>';
  var totalRange = withDate.reduce((s,x)=>s+fexpRemain(x),0);
  var totalNoDate = noDate.reduce((s,x)=>s+fexpRemain(x),0);

  var ranges = [['all','Ч”ЧӣЧң'],['30','ЧўЧ“ 30 ЧҷЧ•Чқ'],['60','ЧўЧ“ 60 ЧҷЧ•Чқ'],['90','ЧўЧ“ 90 ЧҷЧ•Чқ']];
  var filterBar = '<div class="card"><div class="row" style="flex-wrap:wrap;gap:6px;align-items:center">'+
    '<b style="margin-left:4px">ЧҳЧ•Ч•Ч— Ч–ЧһЧҹ:</b>'+
    ranges.map(r=>'<button class="btn '+(FEXP_RANGE===r[0]?'':'ghost ')+'sm" onclick="setFexpRange(\''+r[0]+'\')">'+r[1]+'</button>').join('')+
    '<span style="margin-right:6px">ЧўЧ“ ЧӘЧҗЧЁЧҷЧҡ:</span>'+
    '<input type="date" value="'+esc(FEXP_UNTIL)+'" onchange="setFexpUntil(this.value)" style="max-width:165px">'+
    '</div></div>';

  var totalCard = '<div class="card" style="cursor:pointer" onclick="fexpTotalBreakdown()" title="ЧңЧ—ЧҘ ЧңЧӨЧҷЧЁЧ•Чҳ">'+
    '<div class="row" style="align-items:center;flex-wrap:wrap">'+
    '<b class="grow">ЧЎЧ”"Чӣ ЧҰЧӨЧ•Чҷ ЧңЧӘЧ©ЧңЧ•Чқ В· '+esc(fexpRangeLabel())+'</b>'+
    '<span class="tot" style="font-size:20px;text-decoration:underline">'+ils(totalRange)+'</span></div>'+
    '<div class="muted" style="font-size:12px;margin-top:4px">'+withDate.length+' ЧЁЧ©Ч•ЧһЧ•ЧӘ В· ЧңЧ—ЧҘ ЧңЧӨЧҷЧЁЧ•Чҳ ЧһЧңЧҗ</div></div>';

  var noDateCard = noDate.length?
    '<h3 style="margin:14px 0 8px;color:var(--amber)">ЧңЧңЧҗ ЧӘЧҗЧЁЧҷЧҡ ЧҷЧўЧ“ вҖ” '+noDate.length+' ЧЁЧ©Ч•ЧһЧ•ЧӘ В· '+ils(totalNoDate)+'</h3>'+
    '<div class="card"><div class="muted" style="font-size:12px;margin-bottom:6px">ЧЁЧ©Ч•ЧһЧ•ЧӘ Ч©Ч Ч•ЧҰЧЁЧ• ЧңЧӨЧ Чҷ Ч©Ч”ЧӘЧҗЧЁЧҷЧҡ Ч”ЧӨЧҡ ЧңЧ©Ч“Ч” Ч—Ч•Ч‘Ч”. Ч”Чҹ ЧҗЧҷЧ Чҹ Ч ЧӣЧ ЧЎЧ•ЧӘ ЧңЧҗЧЈ ЧҳЧ•Ч•Ч— Ч–ЧһЧҹ ЧўЧ“ Ч©ЧҷЧ•Ч©ЧңЧқ Ч”ЧӘЧҗЧЁЧҷЧҡ.</div>'+
    '<table>'+HEAD+noDate.map(row).join('')+'</table></div>' : '';

  var delCard = '';
  if(FEXP_SHOWDEL){
    var dl = fexpDeleted().slice().reverse();
    delCard = '<h3 style="margin:14px 0 8px">Ч”Ч•ЧҰЧҗЧ•ЧӘ Ч©Ч ЧһЧ—Ч§Ч•</h3>'+
      (dl.length? '<div class="card"><table><tr><th>Ч§ЧҳЧ’Ч•ЧЁЧҷЧ”</th><th>ЧӘЧҷЧҗЧ•ЧЁ</th><th>ЧЎЧӣЧ•Чқ</th><th>ЧЎЧҷЧ‘ЧӘ Ч”ЧһЧ—ЧҷЧ§Ч”</th><th>Ч ЧһЧ—Ч§ ЧўЧң ЧҷЧ“Чҷ</th><th>ЧһЧӘЧҷ</th></tr>'+
        dl.map(x=>'<tr style="opacity:.6"><td>'+esc(x.category)+'</td><td>'+esc(x.description||'')+'</td><td>'+ils(x.amount)+'</td>'+
          '<td>'+esc(x.delete_reason||'')+'</td><td>'+esc(x.deleted_by||'')+'</td><td class="muted">'+esc(fmtTs(x.deleted_at))+'</td></tr>').join('')+
        '</table></div>' : '<div class="card empty">ЧҗЧҷЧҹ Ч”Ч•ЧҰЧҗЧ•ЧӘ Ч©Ч ЧһЧ—Ч§Ч•</div>');
  }

  return filterBar + totalCard +
    (withDate.length? '<div class="card"><table>'+HEAD+withDate.map(row).join('')+'</table></div>'
      : '<div class="card empty">ЧҗЧҷЧҹ Ч”Ч•ЧҰЧҗЧ•ЧӘ ЧўЧӘЧҷЧ“ЧҷЧ•ЧӘ ЧӨЧӘЧ•Ч—Ч•ЧӘ Ч‘ЧҳЧ•Ч•Ч— Ч©Ч Ч‘Ч—ЧЁ</div>')+
    noDateCard +
    (paid.length? '<h3 style="margin:14px 0 8px">Ч©Ч•ЧңЧһЧ•</h3><div class="card"><table><tr><th>Ч§ЧҳЧ’Ч•ЧЁЧҷЧ”</th><th>ЧӘЧҷЧҗЧ•ЧЁ</th><th>ЧЎЧӣЧ•Чқ</th><th></th></tr>'+
      paid.slice().reverse().slice(0,20).map(x=>'<tr><td>'+esc(x.category)+'</td><td>'+esc(x.description||'')+'</td><td>'+ils(x.amount)+'</td>'+
        '<td>'+(x.source==='payroll'?'':'<button class="btn ghost sm" onclick="fexpBreakdown(\''+x.id+'\')">ЧӨЧҷЧЁЧ•Чҳ</button>')+'</td></tr>').join('')+'</table></div>':'')+
    '<div class="row" style="margin-top:12px">'+
      '<button class="btn ghost sm" onclick="FEXP_SHOWDEL='+(FEXP_SHOWDEL?'false':'true')+';render()">'+(FEXP_SHOWDEL?'Ч”ЧЎЧӘЧЁ ЧһЧ—Ч•Ч§Ч•ЧӘ':'Ч”ЧҰЧ’ ЧһЧ—Ч•Ч§Ч•ЧӘ')+'</button></div>'+
    delCard;
}

// B28: ЧӨЧҷЧЁЧ•Чҳ ЧһЧңЧҗ Ч©Чң Ч”ЧЎЧӣЧ•Чқ "ЧЎЧ”"Чӣ ЧҰЧӨЧ•Чҷ ЧңЧӘЧ©ЧңЧ•Чқ" вҖ” Ч©Ч•ЧЁЧ” ЧңЧӣЧң ЧЁЧ©Ч•ЧһЧ” Ч©ЧһЧЁЧӣЧҷЧ‘Ч” ЧҗЧ•ЧӘЧ•
function fexpTotalBreakdown(){
  var list = fexpOpen().filter(x=>x.due_date && fexpInRange(x))
    .sort((a,b)=>(a.due_date||'9999').localeCompare(b.due_date||'9999'));
  var tot = list.reduce((s,x)=>s+fexpRemain(x),0);
  var today = new Date().toISOString().slice(0,10);
  openModal('<h2>ЧӨЧҷЧЁЧ•Чҳ Ч”ЧЎЧӣЧ•Чқ Ч”ЧҰЧӨЧ•Чҷ</h2>'+
    '<div class="muted" style="margin-bottom:8px">ЧҳЧ•Ч•Ч—: '+esc(fexpRangeLabel())+' В· '+list.length+' ЧЁЧ©Ч•ЧһЧ•ЧӘ</div>'+
    (list.length? '<div class="card"><table><tr><th>ЧӘЧҗЧЁЧҷЧҡ ЧҷЧўЧ“</th><th>Ч§ЧҳЧ’Ч•ЧЁЧҷЧ”</th><th>ЧӘЧҷЧҗЧ•ЧЁ</th><th>ЧҷЧӘЧЁЧ”</th><th></th></tr>'+
      list.map(function(x){
        var overdue = x.due_date < today;
        return '<tr><td'+(overdue?' style="color:var(--danger);font-weight:700"':'')+'>'+esc(x.due_date)+(overdue?' вҡ ':'')+'</td>'+
          '<td>'+esc(x.category)+(x.supplier_id?'<div class="muted" style="font-size:11.5px">'+esc(supp(x.supplier_id))+'</div>':'')+'</td>'+
          '<td>'+esc(x.description||'')+'</td>'+
          '<td class="tot">'+ils(fexpRemain(x))+'</td>'+
          '<td>'+(x.source==='payroll'?'<button class="btn ghost sm" onclick="closeModal();go(\'payroll\')">Ч©ЧӣЧЁ</button>'
            :'<button class="btn ghost sm" onclick="fexpBreakdown(\''+x.id+'\')">ЧӨЧҷЧЁЧ•Чҳ</button>')+'</td></tr>';
      }).join('')+
      '<tr><td colspan="3"><b>ЧЎЧ”"Чӣ</b></td><td class="tot"><b>'+ils(tot)+'</b></td><td></td></tr>'+
      '</table></div>' : '<div class="card empty">ЧҗЧҷЧҹ ЧЁЧ©Ч•ЧһЧ•ЧӘ Ч‘ЧҳЧ•Ч•Ч— Ч©Ч Ч‘Ч—ЧЁ</div>')+
    '<div class="row" style="margin-top:10px"><button class="btn ghost sm" onclick="closeModal()">ЧЎЧ’Ч•ЧЁ</button></div>');
}

// B28: Ч”Ч©ЧңЧһЧӘ ЧӘЧҗЧЁЧҷЧҡ ЧҷЧўЧ“ ЧңЧЁЧ©Ч•ЧһЧ” ЧҷЧ©Ч Ч”
function fexpDueForm(id){
  var fe = fexpAll().find(x=>x.id===id); if(!fe) return;
  openModal('<h2>Ч”Ч©ЧңЧһЧӘ ЧӘЧҗЧЁЧҷЧҡ ЧӘЧ©ЧңЧ•Чқ ЧһЧ©Ч•ЧўЧЁ</h2>'+
    '<div class="muted" style="margin-bottom:8px">'+esc(fe.category||'')+' В· '+esc(fe.description||'')+' В· '+ils(fe.amount)+'</div>'+
    '<div class="frow"><label>ЧӘЧҗЧЁЧҷЧҡ ЧӘЧ©ЧңЧ•Чқ ЧһЧ©Ч•ЧўЧЁ</label><input id="f_fedue2" type="date"></div>'+
    '<button class="btn" onclick="saveFexpDue(\''+id+'\')">Ч©ЧһЧ•ЧЁ</button>');
}
async function saveFexpDue(id){
  var d = el('f_fedue2').value;
  if(!d) return toast('Ч—Ч•Ч‘Ч” ЧңЧ‘Ч—Ч•ЧЁ ЧӘЧҗЧЁЧҷЧҡ', true);
  var r = await act('setFutureExpenseDue',{id:id, due_date:d},'Ч”ЧӘЧҗЧЁЧҷЧҡ Ч Ч©ЧһЧЁ');
  if(r) closeModal();
}

// B28: ЧһЧ—ЧҷЧ§Ч” ЧЁЧӣЧ” ЧўЧқ ЧЎЧҷЧ‘Ч” Ч—Ч•Ч‘Ч” вҖ” ЧҗЧ•ЧӘЧ• Ч“ЧӨЧ•ЧЎ ЧӣЧһЧ• ЧһЧ—ЧҷЧ§ЧӘ Ч”ЧҷЧ—ЧҷЧ“Ч•ЧӘ Ч‘-B27
function fexpDeleteForm(id){
  var fe = fexpAll().find(x=>x.id===id); if(!fe) return;
  if(fexpPaid(id)>0) return toast('ЧӣЧ‘ЧЁ Ч‘Ч•ЧҰЧў ЧӘЧ©ЧңЧ•Чқ ЧӣЧ Ч’Ч“ Ч”Ч”Ч•ЧҰЧҗЧ” вҖ” ЧҗЧҷ ЧҗЧӨЧ©ЧЁ ЧңЧһЧ—Ч•Ч§', true);
  openModal('<h2>ЧһЧ—ЧҷЧ§ЧӘ Ч”Ч•ЧҰЧҗЧ” ЧўЧӘЧҷЧ“ЧҷЧӘ</h2>'+
    '<div class="card"><table><tr><td>Ч§ЧҳЧ’Ч•ЧЁЧҷЧ”</td><td><b>'+esc(fe.category||'')+'</b></td>'+
      '<td>ЧЎЧӣЧ•Чқ</td><td class="tot">'+ils(fe.amount)+'</td></tr>'+
      '<tr><td>ЧӘЧҷЧҗЧ•ЧЁ</td><td colspan="3">'+esc(fe.description||'')+'</td></tr></table></div>'+
    '<div class="muted" style="font-size:12px;margin:8px 0">Ч”Ч”Ч•ЧҰЧҗЧ” ЧӘЧ•ЧЎЧӘЧЁ ЧһЧӣЧң Ч”ЧӘЧҰЧ•Ч’Ч•ЧӘ Ч•Ч”Ч—ЧҷЧ©Ч•Ч‘ЧҷЧқ, Ч•ЧӘЧҷЧ©ЧҗЧЁ Ч©ЧһЧ•ЧЁЧ” Ч‘Ч”ЧҷЧЎЧҳЧ•ЧЁЧҷЧ” ЧўЧқ Ч”ЧЎЧҷЧ‘Ч”. ЧҗЧӨЧ©ЧЁ ЧңЧЁЧҗЧ•ЧӘ ЧҗЧ•ЧӘЧ” Ч‘ЧӣЧӨЧӘЧ•ЧЁ "Ч”ЧҰЧ’ ЧһЧ—Ч•Ч§Ч•ЧӘ".</div>'+
    '<div class="frow"><label>ЧЎЧҷЧ‘ЧӘ Ч”ЧһЧ—ЧҷЧ§Ч” (Ч—Ч•Ч‘Ч”)</label><input id="f_fedelr" placeholder="ЧңЧһЧ©Чң: Ч ЧЁЧ©Чқ ЧӨЧўЧһЧҷЧҷЧқ Ч‘ЧҳЧўЧ•ЧӘ"></div>'+
    '<button class="btn danger" onclick="saveFexpDelete(\''+id+'\')">ЧһЧ—Ч§</button>');
}
async function saveFexpDelete(id){
  var reason = el('f_fedelr').value.trim();
  if(!reason) return toast('ЧЎЧҷЧ‘ЧӘ Ч”ЧһЧ—ЧҷЧ§Ч” Ч”ЧҷЧҗ Ч©Ч“Ч” Ч—Ч•Ч‘Ч”', true);
  var r = await act('deleteFutureExpense',{id:id, reason:reason},'Ч”Ч”Ч•ЧҰЧҗЧ” Ч ЧһЧ—Ч§Ч”');
  if(r) closeModal();
}

function futureExpForm(){
  openModal('<h2>Ч”Ч•ЧҰЧҗЧ” ЧўЧӘЧҷЧ“ЧҷЧӘ</h2>'+
    '<div class="frow"><label>Ч§ЧҳЧ’Ч•ЧЁЧҷЧ”</label><input id="f_fecat" placeholder="ЧңЧһЧ©Чң: Ч‘ЧҷЧҳЧ•Ч—, Ч©ЧӣЧҷЧЁЧ•ЧӘ, ЧҰЧҷЧ•Ч“"></div>'+
    '<div class="frow"><label>ЧӘЧҷЧҗЧ•ЧЁ</label><input id="f_fedesc"></div>'+
    '<div class="grid2"><div class="frow"><label>ЧЎЧӣЧ•Чқ (вӮӘ)</label><input id="f_feamt" type="number" min="0"></div>'+
    '<div class="frow"><label>ЧӘЧҗЧЁЧҷЧҡ ЧӘЧ©ЧңЧ•Чқ ЧһЧ©Ч•ЧўЧЁ (Ч—Ч•Ч‘Ч”)</label><input id="f_fedate" type="date"></div></div>'+
    '<div class="frow"><label>Ч“Ч—ЧҷЧӨЧ•ЧӘ</label><select id="f_feurg">'+['ЧЁЧ’ЧҷЧң','Ч“Ч—Ч•ЧЈ','Ч§ЧЁЧҷЧҳЧҷ'].map(u=>'<option>'+u+'</option>').join('')+'</select></div>'+
    '<button class="btn" onclick="saveFutureExp()">Ч©ЧһЧ•ЧЁ</button>');
}
async function saveFutureExp(){
  if(!el('f_fecat').value||!el('f_feamt').value) return toast('Ч§ЧҳЧ’Ч•ЧЁЧҷЧ” Ч•ЧЎЧӣЧ•Чқ Ч—Ч•Ч‘Ч”', true);
  if(!el('f_fedate').value) return toast('ЧӘЧҗЧЁЧҷЧҡ ЧӘЧ©ЧңЧ•Чқ ЧһЧ©Ч•ЧўЧЁ Ч”Ч•Чҗ Ч©Ч“Ч” Ч—Ч•Ч‘Ч”', true);
  var r = await act('addFutureExpense',{category:el('f_fecat').value,description:el('f_fedesc').value,amount:Number(el('f_feamt').value),due_date:el('f_fedate').value,urgency:el('f_feurg').value},'Ч”Ч”Ч•ЧҰЧҗЧ” Ч”ЧўЧӘЧҷЧ“ЧҷЧӘ Ч Ч©ЧһЧЁЧ”');
  if(r) closeModal();
}
async function doMarkFutureExpensePaid(id){
  if(!confirm('ЧңЧЎЧһЧҹ ЧӣЧ©Ч•ЧңЧқ? ЧӘЧҷЧЁЧ©Чқ Ч”Ч•ЧҰЧҗЧ” Ч‘ЧӨЧ•ЧўЧң.')) return;
  await act('markFutureExpensePaid',{id:id},'ЧЎЧ•ЧһЧҹ ЧӣЧ©Ч•ЧңЧқ Ч•Ч ЧЁЧ©Чқ ЧӣЧ”Ч•ЧҰЧҗЧ”');
}

/* ================= B27: ЧӨЧҷЧЁЧ•Чҳ ЧҷЧӘЧЁЧ”, ЧӘЧ©ЧңЧ•Чқ ЧһЧӨЧ•ЧҰЧң Ч•ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ =================
   Ч Ч‘Ч Ч” ЧңЧӨЧҷ Ч”ЧһЧ‘Ч Ч” Ч©Чң Ч—ЧңЧ•Чҹ ЧӨЧҷЧЁЧ•Чҳ Ч”Ч©ЧӣЧЁ (B22), ЧўЧқ Ч”ЧӘЧ•ЧЎЧӨЧ•ЧӘ: ЧӘЧ©ЧңЧ•Чқ Ч—ЧңЧ§Чҷ,
   ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ ЧһЧЁЧ•Ч‘Ч•ЧӘ, Ч•ЧӨЧҷЧЁЧ•Чҳ ЧңЧ—ЧҷЧҰЧ” ЧўЧң Ч”ЧҷЧӘЧЁЧ”. Ч—ЧңЧ•Чҹ Ч”Ч©ЧӣЧЁ Ч”Ч§ЧҷЧҷЧқ ЧңЧҗ Ч©Ч•Ч Ч”. */

// ЧӨЧҷЧЁЧ•Чҳ Ч”Ч•ЧҰЧҗЧ” ЧўЧӘЧҷЧ“ЧҷЧӘ вҖ” ЧһЧ” ЧһЧЁЧӣЧҷЧ‘ ЧҗЧӘ Ч”ЧЎЧӣЧ•Чқ, ЧһЧ” Ч©Ч•ЧңЧқ, Ч•ЧһЧ” Ч Ч©ЧҗЧЁ
function fexpBreakdown(id){
  var fe = fexpAll().find(x=>x.id===id); if(!fe) return;
  var paid = fexpPaid(id), rem = fexpRemain(fe);
  var pays = (DB.expensePayments||[]).filter(x=>x.fexp_id===id).slice().reverse();
  var net = Math.round((Number(fe.amount||0)-Number(fe.vat_amount||0))*100)/100;
  var pur = fe.source==='purchase' ? (DB.purchases||[]).find(x=>x.id===fe.ref_id) : null;
  var lines = pur ? (DB.purchaseLines||[]).filter(l=>l.purchase_id===pur.id) : [];
  var rows = '';
  if(lines.length){
    rows += lines.map(function(l){
      return '<tr><td>'+esc(item(l.item_id))+' <span class="muted">Г— '+esc(l.qty)+'</span>'+
        '<div class="muted" style="font-size:11.5px">'+ils(l.unit_cost)+' ЧңЧҷЧ—ЧҷЧ“Ч”</div></td>'+
        '<td>'+ils(Number(l.qty)*Number(l.unit_cost))+'</td></tr>';
    }).join('');
    rows += '<tr><td>ЧЎЧ”"Чӣ ЧңЧӨЧ Чҷ ЧһЧў"Чһ</td><td>'+ils(net)+'</td></tr>';
  } else {
    rows += '<tr><td>'+esc(fe.description||fe.category)+'</td><td>'+ils(net)+'</td></tr>';
  }
  if(Number(fe.vat_amount)) rows += '<tr><td>ЧһЧў"Чһ</td><td>'+ils(fe.vat_amount)+'</td></tr>';
  openModal('<h2>ЧӨЧҷЧЁЧ•Чҳ вҖ” '+esc(fe.category||'')+'</h2>'+
    '<div class="muted" style="margin-bottom:8px">'+esc(fe.description||'')+
      (fe.supplier_id?' В· ЧЎЧӨЧ§ '+esc(supp(fe.supplier_id)):'')+' В· ЧЎЧҳЧҳЧ•ЧЎ '+esc(fe.status||'')+'</div>'+
    '<div class="card"><table><tr><th>ЧЁЧӣЧҷЧ‘</th><th>ЧЎЧӣЧ•Чқ</th></tr>'+rows+
      '<tr><td><b>ЧЎЧ”"Чӣ ЧңЧӘЧ©ЧңЧ•Чқ</b></td><td class="tot"><b>'+ils(fe.amount)+'</b></td></tr>'+
      '<tr><td>Ч©Ч•ЧңЧқ</td><td>'+ils(paid)+'</td></tr>'+
      '<tr><td><b>ЧҷЧӘЧЁЧ”</b></td><td'+(rem>0.01?' style="color:var(--danger);font-weight:700"':'')+'>'+ils(rem)+'</td></tr>'+
      '</table></div>'+
    (pays.length?'<h3 style="margin:12px 0 6px">ЧӘЧ©ЧңЧ•ЧһЧҷЧқ Ч©Ч‘Ч•ЧҰЧўЧ•</h3><div class="card"><table><tr><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧЎЧӣЧ•Чқ</th><th>ЧҗЧһЧҰЧўЧҷ</th><th>ЧӨЧҷЧЁЧ•Чҳ</th><th>ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ</th></tr>'+
      pays.map(function(x){
        var d = payDocsOf('expense',x.id);
        return '<tr><td>'+esc(x.paid_at)+'</td><td>'+ils(x.amount)+'</td><td>'+esc(x.method||'')+'</td><td>'+esc(x.note||'')+'</td>'+
          '<td><button class="btn ghost sm" onclick="payDocsForm(\'expense\',\''+x.id+'\',\'fexp\',\''+id+'\')">'+(d.length?d.length+' ЧһЧҰЧ•ЧЁЧӨЧ•ЧӘ':'Ч”Ч•ЧЎЧЈ')+'</button></td></tr>';
      }).join('')+'</table></div>':'')+
    '<div class="row" style="margin-top:10px;gap:6px">'+
      (rem>0.01?'<button class="btn" onclick="payFexpForm(\''+id+'\')">ЧЁЧ©Ч•Чқ ЧӘЧ©ЧңЧ•Чқ</button>':'<span class="muted">Ч©Ч•ЧңЧқ Ч‘ЧһЧңЧ•ЧҗЧ•.</span>')+
      (fe.supplier_id?'<button class="btn ghost sm" onclick="supBalanceCard(\''+fe.supplier_id+'\')">ЧӣЧЁЧҳЧҷЧЎ Ч”ЧЎЧӨЧ§</button>':'')+
    '</div>');
}

// ЧҳЧ•ЧӨЧЎ ЧӘЧ©ЧңЧ•Чқ ЧӣЧ Ч’Ч“ Ч”Ч•ЧҰЧҗЧ” ЧўЧӘЧҷЧ“ЧҷЧӘ вҖ” ЧһЧңЧҗ ЧҗЧ• Ч—ЧңЧ§Чҷ
function payFexpForm(id){
  var fe = fexpAll().find(x=>x.id===id); if(!fe) return toast('Ч”Ч”Ч•ЧҰЧҗЧ” ЧңЧҗ Ч ЧһЧҰЧҗЧ”', true);
  var rem = fexpRemain(fe);
  if(rem<=0.01) return toast('ЧҗЧҷЧҹ ЧҷЧӘЧЁЧ” ЧңЧӘЧ©ЧңЧ•Чқ', true);
  openModal('<h2>ЧӘЧ©ЧңЧ•Чқ вҖ” '+esc(fe.category||'')+'</h2>'+
    '<div class="muted" style="margin-bottom:8px">'+esc(fe.description||'')+(fe.supplier_id?' В· ЧЎЧӨЧ§ '+esc(supp(fe.supplier_id)):'')+'</div>'+
    '<div class="card"><table><tr><td>ЧЎЧ”"Чӣ</td><td class="tot"><b>'+ils(fe.amount)+'</b></td>'+
      '<td>Ч©Ч•ЧңЧқ</td><td>'+ils(fexpPaid(id))+'</td><td>ЧҷЧӘЧЁЧ”</td><td style="color:var(--danger);font-weight:700">'+ils(rem)+'</td></tr></table></div>'+
    '<fieldset style="margin-top:12px;border:1px solid var(--line);border-radius:10px;padding:10px 12px 12px">'+
    '<legend style="font-weight:700;font-size:13px;padding:0 6px">ЧЁЧҷЧ©Ч•Чқ ЧӘЧ©ЧңЧ•Чқ</legend>'+
    '<div class="grid2">'+
      '<div class="frow"><label>ЧЎЧӣЧ•Чқ ЧңЧӘЧ©ЧңЧ•Чқ</label><input id="f_fpamt" type="number" min="0" step="0.01" max="'+rem+'" value="'+rem+'"></div>'+
      '<div class="frow"><label>ЧӘЧҗЧЁЧҷЧҡ Ч”ЧӘЧ©ЧңЧ•Чқ</label><input id="f_fpdate" type="date" value="'+new Date().toISOString().slice(0,10)+'"></div>'+
      '<div class="frow"><label>ЧҗЧһЧҰЧўЧҷ ЧӘЧ©ЧңЧ•Чқ</label><select id="f_fpmethod">'+
        ['Ч”ЧўЧ‘ЧЁЧ” Ч‘Ч Ч§ЧҗЧҷЧӘ','Ч©ЧҷЧ§','ЧһЧ–Ч•ЧһЧҹ','ЧӣЧЁЧҳЧҷЧЎ ЧҗЧ©ЧЁЧҗЧҷ','Ч”Ч•ЧЁЧҗЧӘ Ч§Ч‘Чў','ЧҗЧ—ЧЁ'].map(m=>'<option>'+m+'</option>').join('')+'</select></div>'+
      '<div class="frow"><label>ЧӨЧҷЧЁЧ•Чҳ / ЧҗЧЎЧһЧӣЧӘЧҗ</label><input id="f_fpnote" placeholder="ЧһЧЎЧӨЧЁ ЧҗЧЎЧһЧӣЧӘЧҗ, ЧһЧЎЧӨЧЁ Ч©ЧҷЧ§, ЧӨЧҷЧЁЧ•Чҳ"></div>'+
    '</div>'+
    '<div class="muted" style="font-size:12px;margin:6px 0 8px">ЧңЧӘЧ©ЧңЧ•Чқ Ч—ЧңЧ§Чҷ вҖ” Ч©Ч Ч” ЧҗЧӘ Ч”ЧЎЧӣЧ•Чқ. Ч”ЧҷЧӘЧЁЧ” ЧӘЧҷЧ©ЧҗЧЁ ЧӨЧӘЧ•Ч—Ч” ЧӣЧ—Ч•Ч‘. ЧӘЧ©ЧңЧ•Чқ Ч‘"ЧһЧ–Ч•ЧһЧҹ" ЧһЧ§Ч•Ч–Ч– ЧҗЧ•ЧҳЧ•ЧһЧҳЧҷЧӘ ЧһЧ§Ч•ЧӨЧӘ Ч”ЧһЧ–Ч•ЧһЧҹ (ЧҷЧӘЧЁЧ” Ч Ч•ЧӣЧ—ЧҷЧӘ: '+ils(cashBalanceFE())+').</div>'+
    '<button class="btn" onclick="savePayFexp(\''+id+'\')">ЧЁЧ©Ч•Чқ ЧӘЧ©ЧңЧ•Чқ Ч•Ч”ЧһЧ©Чҡ ЧңЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ</button></fieldset>');
}
async function savePayFexp(id){
  var amt = Number(el('f_fpamt').value)||0;
  if(amt<=0) return toast('ЧЎЧӣЧ•Чқ ЧңЧҗ ЧӘЧ§ЧҷЧҹ', true);
  var r = await act('payFutureExpense',{id:id, amount:amt, method:el('f_fpmethod').value,
    note:el('f_fpnote').value, paid_at:el('f_fpdate').value}, 'Ч”ЧӘЧ©ЧңЧ•Чқ Ч ЧЁЧ©Чқ');
  if(r) payDocsForm('expense', r.pay_id, 'fexp', id);
}

// ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ ЧңЧӘЧ©ЧңЧ•Чқ вҖ” ЧҗЧӨЧ©ЧЁ ЧңЧҰЧЁЧЈ ЧӣЧһЧ” Ч©ЧЁЧ•ЧҰЧҷЧқ, Ч§Ч•Ч‘ЧҘ Ч•/ЧҗЧ• ЧӨЧҷЧЁЧ•Чҳ Ч‘ЧӣЧӘЧ‘
function payDocsForm(kind, payId, backKind, backId){
  var docs = payDocsOf(kind, payId);
  openModal('<h2>ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ ЧңЧӘЧ©ЧңЧ•Чқ</h2>'+
    '<div class="muted" style="margin-bottom:8px">Ч ЧҷЧӘЧҹ ЧңЧҰЧЁЧЈ ЧӣЧһЧ” ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ ЧңЧҗЧ•ЧӘЧ• ЧӘЧ©ЧңЧ•Чқ вҖ” ЧҰЧҷЧңЧ•Чқ ЧһЧЎЧҡ Ч©Чң Ч”ЧўЧ‘ЧЁЧ”, Ч—Ч©Ч‘Ч•Ч ЧҷЧӘ, Ч©ЧҷЧ§ ЧЎЧЁЧ•Ч§, ЧҗЧ• ЧӨЧҷЧЁЧ•Чҳ Ч‘ЧӣЧӘЧ‘ Ч‘ЧңЧ‘Ч“.</div>'+
    (docs.length?'<div class="card"><table><tr><th>ЧӘЧҷЧҗЧ•ЧЁ</th><th>ЧӨЧҷЧЁЧ•Чҳ</th><th>Ч§Ч•Ч‘ЧҘ</th><th>Ч Ч•ЧҰЧЁ</th></tr>'+
      docs.map(d=>'<tr><td>'+esc(d.name||'вҖ”')+'</td><td>'+esc(d.note||'')+'</td>'+
        '<td>'+(d.url?'<a href="'+esc(d.url)+'" target="_blank">ЧӨЧӘЧ—</a>':'вҖ”')+'</td>'+
        '<td class="muted">'+esc(fmtTs(d.created_at))+'</td></tr>').join('')+'</table></div>'
      :'<div class="card empty">ЧҗЧҷЧҹ ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ ЧўЧ“ЧҷЧҷЧҹ</div>')+
    '<fieldset style="margin-top:12px;border:1px solid var(--line);border-radius:10px;padding:10px 12px 12px">'+
    '<legend style="font-weight:700;font-size:13px;padding:0 6px">Ч”Ч•ЧЎЧӨЧӘ ЧҗЧЎЧһЧӣЧӘЧҗ</legend>'+
    '<div class="grid2">'+
      '<div class="frow"><label>ЧӘЧҷЧҗЧ•ЧЁ Ч§ЧҰЧЁ</label><input id="f_pdname" placeholder="ЧңЧһЧ©Чң: ЧҰЧҷЧңЧ•Чқ Ч”ЧўЧ‘ЧЁЧ” Ч‘Ч Ч§ЧҗЧҷЧӘ"></div>'+
      '<div class="frow"><label>Ч§Ч•Ч‘ЧҘ / ЧҰЧҷЧңЧ•Чқ (ЧўЧ“ 4MB)</label><input id="f_pdfile" type="file" accept="image/*,.pdf"></div>'+
    '</div>'+
    '<div class="frow"><label>ЧӨЧҷЧЁЧ•Чҳ</label><input id="f_pdnote" placeholder="ЧһЧЎЧӨЧЁ ЧҗЧЎЧһЧӣЧӘЧҗ, Ч‘Ч Ч§, Ч”ЧўЧЁЧ•ЧӘ"></div>'+
    '<button class="btn" onclick="addPayDoc(\''+kind+'\',\''+payId+'\',\''+(backKind||'')+'\',\''+(backId||'')+'\')">Ч”Ч•ЧЎЧЈ ЧҗЧЎЧһЧӣЧӘЧҗ</button></fieldset>'+
    '<div class="row" style="margin-top:10px;gap:6px">'+
      (backKind==='fexp'?'<button class="btn ghost sm" onclick="fexpBreakdown(\''+backId+'\')">Ч—Ч–ЧЁЧ” ЧңЧӨЧҷЧЁЧ•Чҳ</button>':'')+
      (backKind==='payroll'?'<button class="btn ghost sm" onclick="payrollDetail(\''+backId+'\')">Ч—Ч–ЧЁЧ” ЧңЧ©ЧӣЧЁ</button>':'')+
      '<button class="btn ghost sm" onclick="closeModal()">ЧЎЧҷЧ•Чқ</button></div>');
}
async function addPayDoc(kind, payId, backKind, backId){
  var name = el('f_pdname').value, note = el('f_pdnote').value;
  var f = el('f_pdfile').files[0];
  if(!f && !note && !name) return toast('ЧҰЧЁЧЈ Ч§Ч•Ч‘ЧҘ ЧҗЧ• ЧӣЧӘЧ•Ч‘ ЧӨЧҷЧЁЧ•Чҳ', true);
  var b64 = '', mime = '';
  if(f){
    if(f.size > 4*1024*1024) return toast('Ч”Ч§Ч•Ч‘ЧҘ Ч’Ч“Ч•Чң Чһ-4MB', true);
    toast('ЧһЧўЧңЧ” Ч§Ч•Ч‘ЧҘ...');
    b64 = await new Promise(function(res){ var rd=new FileReader(); rd.onload=function(){res(rd.result.split(',')[1]);}; rd.readAsDataURL(f); });
    mime = f.type || 'application/octet-stream';
  }
  var r = await act('uploadPaymentDoc',{pay_kind:kind, pay_id:payId, base64:b64, mime:mime, name:name, note:note||name}, 'Ч”ЧҗЧЎЧһЧӣЧӘЧҗ Ч Ч•ЧЎЧӨЧ”');
  if(r) payDocsForm(kind, payId, backKind, backId);
}

// ЧӣЧЁЧҳЧҷЧЎ ЧҷЧӘЧЁЧ” ЧңЧЎЧӨЧ§ вҖ” ЧңЧ—ЧҷЧҰЧ” ЧўЧң Ч”ЧҷЧӘЧЁЧ” ЧһЧҰЧҷЧ’Ч” ЧҗЧӘ Ч”ЧӨЧҷЧЁЧ•Чҳ Ч©ЧһЧЁЧӣЧҷЧ‘ ЧҗЧ•ЧӘЧ”
function supBalanceCard(sid){
  var sp = (DB.suppliers||[]).find(x=>x.id===sid); if(!sp) return;
  var open = supOpenFexp(sid);
  var bal = supBalance(sid);
  var allPays = (DB.expensePayments||[]).filter(x=>String(x.supplier_id||'')===String(sid)).slice().reverse().slice(0,20);
  openModal('<h2>ЧӣЧЁЧҳЧҷЧЎ ЧЎЧӨЧ§ вҖ” '+esc(sp.name)+'</h2>'+
    '<div class="muted" style="margin-bottom:8px">'+esc(sp.contact_name||'')+' '+esc(sp.phone||'')+(sp.payment_terms?' В· '+esc(sp.payment_terms):'')+'</div>'+
    '<div class="card"><div class="row"><b>ЧҷЧӘЧЁЧ” ЧңЧӘЧ©ЧңЧ•Чқ:</b> <span class="tot" style="font-size:18px'+(bal>0.01?';color:var(--danger)':'')+'"><b>'+ils(bal)+'</b></span>'+
      '<span class="muted">ЧһЧ•ЧЁЧӣЧ‘ЧӘ Чһ-'+open.length+' ЧЁЧ©Ч•ЧһЧ•ЧӘ ЧӨЧӘЧ•Ч—Ч•ЧӘ вҖ” ЧңЧ—ЧҘ ЧўЧң Ч©Ч•ЧЁЧ” ЧңЧӨЧҷЧЁЧ•Чҳ</span></div></div>'+
    (open.length?'<div class="card"><table><tr><th>ЧӘЧҷЧҗЧ•ЧЁ</th><th>ЧӘЧҗЧЁЧҷЧҡ ЧҷЧўЧ“</th><th>ЧЎЧ”"Чӣ</th><th>Ч©Ч•ЧңЧқ</th><th>ЧҷЧӘЧЁЧ”</th><th></th></tr>'+
      open.map(function(x){
        var rem = fexpRemain(x);
        return '<tr style="cursor:pointer" onclick="fexpBreakdown(\''+x.id+'\')">'+
          '<td><b style="text-decoration:underline">'+esc(x.description||x.category)+'</b></td>'+
          '<td>'+(x.due_date?esc(x.due_date):'вҖ”')+'</td>'+
          '<td>'+ils(x.amount)+'</td><td>'+ils(fexpPaid(x.id))+'</td>'+
          '<td style="color:var(--danger);font-weight:700">'+ils(rem)+'</td>'+
          '<td><button class="btn sm" onclick="event.stopPropagation();payFexpForm(\''+x.id+'\')">ЧӘЧ©ЧңЧ•Чқ</button></td></tr>';
      }).join('')+'</table></div>':'<div class="card empty">ЧҗЧҷЧҹ Ч—Ч•Ч‘ ЧӨЧӘЧ•Ч— ЧңЧЎЧӨЧ§ Ч–Ч”</div>')+
    (allPays.length?'<h3 style="margin:12px 0 6px">ЧӘЧ©ЧңЧ•ЧһЧҷЧқ ЧҗЧ—ЧЁЧ•Ч ЧҷЧқ</h3><div class="card"><table><tr><th>ЧӘЧҗЧЁЧҷЧҡ</th><th>ЧЎЧӣЧ•Чқ</th><th>ЧҗЧһЧҰЧўЧҷ</th><th>ЧӨЧҷЧЁЧ•Чҳ</th><th>ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ</th></tr>'+
      allPays.map(function(x){
        var d = payDocsOf('expense',x.id);
        return '<tr><td>'+esc(x.paid_at)+'</td><td>'+ils(x.amount)+'</td><td>'+esc(x.method||'')+'</td><td>'+esc(x.note||'')+'</td>'+
          '<td><button class="btn ghost sm" onclick="payDocsForm(\'expense\',\''+x.id+'\',\'\',\'\')">'+(d.length?d.length:'Ч”Ч•ЧЎЧЈ')+'</button></td></tr>';
      }).join('')+'</table></div>':'')+
    '<div style="margin-top:10px"><button class="btn ghost sm" onclick="closeModal()">ЧЎЧ’Ч•ЧЁ</button></div>');
}

function cancelInv(vid){
  confirmModal('ЧңЧ‘ЧҳЧң ЧҗЧӘ Ч”Ч—Ч©Ч‘Ч•Ч ЧҷЧӘ? Ч”ЧӨЧўЧ•ЧңЧ” Ч‘ЧңЧӘЧҷ Ч”ЧӨЧҷЧӣЧ”.', 'Ч‘ЧҳЧң Ч—Ч©Ч‘Ч•Ч ЧҷЧӘ', function(){
    undoToast('ЧһЧ‘ЧҳЧң ЧҗЧӘ Ч”Ч—Ч©Ч‘Ч•Ч ЧҷЧӘ вҖ” Ч ЧҷЧӘЧҹ ЧңЧ‘ЧҳЧң ЧӘЧ•Чҡ 5 Ч©Ч ЧҷЧ•ЧӘ', async function(){

function checkDupeCustomer(){
  var box = el('dupeHint'); if(!box) return;
  var name = (el('f_name')? el('f_name').value : '').trim();
  var phone = (el('f_cphone')? el('f_cphone').value : '').replace(/\D/g,'');
  if(name.length<2 && phone.length<7){ box.innerHTML=''; return; }
  var norm = function(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); };
  var nName = norm(name);
  var seen = {};
  var matches = DB.customers.filter(function(x){
    var xName = norm(x.name), xPhone = String(x.phone||'').replace(/\D/g,'');
    var nameHit = nName.length>=2 && xName && (xName===nName || xName.indexOf(nName)>-1 || nName.indexOf(xName)>-1);
    var phoneHit = phone.length>=7 && xPhone && xPhone===phone;
    return nameHit || phoneHit;
  }).filter(function(x){ return seen[x.id]? false : (seen[x.id]=1); }).slice(0,3);
  if(!matches.length){ box.innerHTML=''; return; }
  box.innerHTML = '<div class="dupe-hint">ЧҗЧ•ЧңЧҷ Ч”ЧӘЧӣЧ•Ч•Ч ЧӘ Чң: '+matches.map(function(m){
    return '<b onclick="closeModal();openCust(\''+m.id+'\')">'+esc(m.name)+(m.phone?' ('+esc(m.phone)+')':'')+'</b>';
  }).join(' В· ')+' ? (ЧңЧ—ЧҷЧҰЧ” ЧӨЧ•ЧӘЧ—ЧӘ ЧҗЧӘ Ч”ЧӣЧЁЧҳЧҷЧЎ Ч”Ч§ЧҷЧҷЧқ)</div>';
}

  var row = {name:el('f_name').value,type:el('f_ctype').value,vat_id:el('f_vatid').value,payment_terms:el('f_terms').value,address:el('f_addr').value,phone:el('f_cphone').value,email:el('f_cemail').value,city:el('f_ccity').value,warehouse_id:(el('f_cwh')?el('f_cwh').value:''),deviation_pct:el('f_cdev').value,price_per_kg:el('f_ckg').value,active:'ЧӣЧҹ'};

}

/* ЧҳЧҗЧ‘: ЧҰЧҷЧЁ Ч–ЧһЧҹ вҖ” ЧҗЧҷЧ—Ч•Ч“ Ч§ЧЁЧҷЧҗЧ” Ч©Чң ЧҷЧ•ЧһЧҹ (ЧӨЧ’ЧҷЧ©Ч•ЧӘ ЧһЧ§Ч•Ч©ЧЁЧ•ЧӘ), Ч”ЧўЧЁЧ•ЧӘ Ч•ЧӘЧ©ЧңЧ•ЧһЧҷЧқ ЧңЧӨЧҷ Ч”ЧңЧ§Ч•Ч— */
function custTabTimeline(cid){
  var items = [];
  (DB.notes||[]).filter(n=>n.entity_type==='customer'&&String(n.entity_id)===String(cid)).forEach(function(n){
    items.push({ts:n.ts||'', type:'ЧӘЧЁЧ©Ч•ЧһЧӘ', text:esc(n.user)+': '+esc(String(n.text).substring(0,90)), onclick:"notesModal('customer','"+cid+"')"});
  });
  linksOf('customer',cid).filter(l=>l.otherType==='meeting').forEach(function(L){
    var m=(DB.meetings||[]).find(x=>x.id===L.otherId)||{};
    items.push({ts:(m.date||'')+' 00:00', type:'ЧӨЧ’ЧҷЧ©Ч”', text:esc(m.title||''), onclick:"openMeeting('"+L.otherId+"')"});
  });
  custPayments(cid).forEach(function(p){
    items.push({ts:(p.date||'')+' 00:00', type:'ЧӘЧ©ЧңЧ•Чқ', text:ils(p.amount)+' В· '+esc(p.method||''), onclick:"openReceipt('"+p.id+"')"});
  });
  items.sort(function(a,b){ return String(b.ts||'').localeCompare(String(a.ts||'')); });
  return '<div class="section-title"><h3>ЧҰЧҷЧЁ Ч–ЧһЧҹ ('+items.length+')</h3></div>'+
    (items.length? items.slice(0,50).map(function(it){ return '<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line);cursor:pointer" onclick="'+it.onclick+'"><div class="grow"><span class="chip">'+esc(it.type)+'</span> '+it.text+'</div><span class="muted">'+esc(fmtTs(it.ts))+'</span></div>'; }).join('') : '<div class="muted">ЧҗЧҷЧҹ ЧӨЧўЧҷЧңЧ•ЧӘ ЧўЧ“ЧҷЧҷЧҹ</div>');
}
/* ЧўЧ–ЧЁ: ЧӣЧң Ч”ЧӘЧ©ЧңЧ•ЧһЧҷЧқ Ч©Ч©ЧҷЧҷЧӣЧҷЧқ ЧңЧңЧ§Ч•Ч— вҖ” Ч“ЧЁЧҡ Ч”Ч–ЧһЧ Ч•ЧӘЧҷЧ• ЧҗЧ• Ч—Ч©Ч‘Ч•Ч ЧҷЧ•ЧӘЧҷЧ• */
function custPayments(cid){
  var oids = {}; DB.orders.filter(o=>o.customer_id===cid).forEach(function(o){ oids[o.id]=1; });
  var vids = {}; DB.invoices.filter(v=>v.customer_id===cid).forEach(function(v){ vids[v.id]=1; });
  return (DB.payments||[]).filter(function(p){ return (p.order_id && oids[p.order_id]) || (p.invoice_id && vids[p.invoice_id]); })
    .slice().sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); });
}

/* B25: Ч”ЧҰЧўЧӘ Ч§ЧҷЧ“Ч•ЧһЧӘ ЧңЧҷЧ—ЧҷЧ“Ч•ЧӘ ЧһЧӘЧ•Чҡ Ч©Чқ ЧўЧ‘ЧЁЧҷ вҖ” ЧӘЧўЧӘЧҷЧ§ ЧӨЧ•Ч ЧҳЧҷ Ч‘ЧЎЧҷЧЎЧҷ, Ч ЧҷЧӘЧҹ ЧңЧўЧЁЧҷЧӣЧ” ЧӘЧһЧҷЧ“ */
function suggestPrefixFromName(nm){
  var MAP = {'Чҗ':'A','Ч‘':'B','Ч’':'G','Ч“':'D','Ч”':'A','Ч•':'O','Ч–':'Z','Ч—':'H','Чҳ':'T','Чҷ':'I','Чӣ':'K','Чҡ':'K','Чң':'L','Чһ':'M','Чқ':'M','Ч ':'N','Чҹ':'N','ЧЎ':'S','Чў':'A','ЧӨ':'P','ЧЈ':'P','ЧҰ':'TZ','ЧҘ':'TZ','Ч§':'K','ЧЁ':'R','Ч©':'SH','ЧӘ':'T'};
  var out=''; nm=String(nm||'');
  for(var i=0;i<nm.length;i++){ out += MAP[nm[i]]||''; }
  return out.slice(0,6).toUpperCase();
}
/* B25: Ч”Ч§ЧңЧ“ЧӘ Ч©Чқ вҖ” ЧҗЧқ ЧӘЧ•ЧҗЧқ Ч•ЧЁЧҷЧҗЧҰЧҷЧ” Ч§ЧҷЧҷЧһЧӘ, Ч©Ч•ЧҗЧ‘ Ч§ЧҷЧ“Ч•ЧһЧӘ/ЧЎЧӨЧ§/ЧһЧҷЧ§Ч•Чқ/ЧһЧ—ЧҷЧЁЧҷЧқ ЧһЧһЧ Ч” ЧӣЧ‘ЧЁЧҷЧЁЧӘ ЧһЧ—Ч“Чң; ЧҗЧқ Ч©Чқ Ч—Ч“Ч©, ЧһЧҰЧҷЧў Ч§ЧҷЧ“Ч•ЧһЧӘ */
/* B26: ЧЁЧ©ЧҷЧһЧӘ ЧўЧЁЧӣЧҷЧқ ЧҷЧҷЧ—Ч•Ч“ЧҷЧҷЧқ ЧңЧўЧһЧ•Ч“ЧӘ ЧӨЧЁЧҷЧҳ (ЧңЧ‘Ч ЧҷЧҷЧӘ ЧӘЧӨЧЁЧҷЧҳЧҷ ЧЎЧ•Ч’/ЧӘЧӘ-ЧЎЧ•Ч’/ЧҰЧ‘Чў) */
function distinctVals(field){
  var seen={}, out=[];
  (DB.items||[]).forEach(function(i){ var v=String(i[field]||'').trim(); if(v && !seen[v]){ seen[v]=1; out.push(v); } });
  return out.sort(function(a,b){ return a.localeCompare(b,'he'); });
}
function catOptions(selVal){
  return '<option value="">вҖ” Ч‘Ч—ЧЁ вҖ”</option>'+distinctVals('category').map(function(c){ return '<option value="'+esc(c)+'"'+(c===selVal?' selected':'')+'>'+esc(c)+'</option>'; }).join('');
}
function subOptions(selVal){
  return '<option value="">вҖ” Ч‘Ч—ЧЁ вҖ”</option>'+distinctVals('subtype').map(function(c){ return '<option value="'+esc(c)+'"'+(c===selVal?' selected':'')+'>'+esc(c)+'</option>'; }).join('');
}

function updItemDefaults(){
  var cat = el('f_icat').value||'', sub = el('f_isub').value||'', color = (el('f_icolor').value||'').trim();
  var w = (el('f_iw').value||'').trim(), h = (el('f_ih').value||'').trim();
  var size = (w && h) ? (w+'Г—'+h) : (w||h||'');
  var famParts = [cat,sub,color].filter(Boolean);
  var defaultName = (famParts.join(' ') + (size?' '+size:'')).trim();
  if(!el('f_icustomname').checked) el('f_iname').value = defaultName;
  if(!cat){ return; }
  var family = DB.items.find(function(i){ return (i.category||'').trim()===cat.trim() && (i.subtype||'').trim()===sub.trim() && (i.color||'').trim()===color; });
  if(family){
    el('f_iprefix').value = family.prefix||'';
    el('f_iprefix').setAttribute('readonly','readonly');
    el('f_iprefixHint').textContent = 'ЧһЧ©ЧӨЧ—ЧӘ ЧһЧ•ЧҰЧЁ Ч§ЧҷЧҷЧһЧӘ вҖ” Ч§ЧҷЧ“Ч•ЧһЧӘ ЧһЧ©Ч•ЧӘЧӨЧӘ (ЧңЧҗ Ч ЧҷЧӘЧ ЧӘ ЧңЧўЧЁЧҷЧӣЧ”)';
    if(!el('f_isup').value) el('f_isup').value = family.supplier_id||'';
    if(!el('f_irent').value || Number(el('f_irent').value)===0) el('f_irent').value = family.rent_price||0;
    if(!el('f_iwash').value || Number(el('f_iwash').value)===0) el('f_iwash').value = family.wash_price||0;
  } else {
    el('f_iprefix').removeAttribute('readonly');
    el('f_iprefixHint').textContent = 'Ч”ЧҰЧўЧ” ЧҗЧ•ЧҳЧ•ЧһЧҳЧҷЧӘ ЧңЧ§ЧҷЧ“Ч•ЧһЧӘ, Ч ЧҷЧӘЧҹ ЧңЧўЧЁЧ•Чҡ ЧңЧӨЧ Чҷ Ч©ЧһЧҷЧЁЧ”';
    el('f_iprefix').value = suggestPrefixFromName(famParts.join(''));
  }
}

async function saveItem(){
  if(!el('f_iname').value) return toast('Ч©Чқ Ч—Ч•Ч‘Ч”', true);
  if(!el('f_iprefix').value) return toast('Ч§ЧҷЧ“Ч•ЧһЧӘ ЧңЧҷЧ—ЧҷЧ“Ч•ЧӘ Ч—Ч•Ч‘Ч”', true);
  var id = el('f_iid').value;
  var w = (el('f_iw').value||'').trim(), h = (el('f_ih').value||'').trim();
  var size = (w && h) ? (w+'Г—'+h) : (w||h||'');
  var row = {name:el('f_iname').value,category:el('f_icat').value,subtype:el('f_isub').value,size:size,color:el('f_icolor').value,
    rent_price:Number(el('f_irent').value)||0,wash_price:Number(el('f_iwash').value)||0,min_stock:el('f_imin').value,
    supplier_id:el('f_isup').value,purchase_cost:Number(el('f_icost').value)||'',location:el('f_ishelf').value,notes:el('f_inotes').value,
    weight_kg:el('f_iweight').value,deviation_pct:el('f_idev').value,replacement_price:el('f_irepl').value};
  if(!id){ row.prefix = el('f_iprefix').value.toUpperCase().replace(/[^A-Z0-9]/g,''); row.active='ЧӣЧҹ'; }
  var r = id ? await act('update',{table:'items',id:id,row:row},'Ч”ЧӨЧЁЧҷЧҳ ЧўЧ•Ч“ЧӣЧҹ') : await act('create',{table:'items',row:row},'Ч”ЧӨЧЁЧҷЧҳ Ч Ч•ЧЎЧЈ');
  if(!r) return;
  var savedId = id || (r.row && r.row.id);
  var f = el('f_iimg').files[0];
  if(f){
    if(f.size > 4*1024*1024) toast('Ч”ЧӘЧһЧ•Ч Ч” Ч’Ч“Ч•ЧңЧ” Чһ-4MB вҖ” ЧңЧҗ Ч”Ч•ЧўЧңЧӘЧ”', true);
    else{
      toast('ЧһЧўЧңЧ” ЧӘЧһЧ•Ч Ч”...');
      var b64 = await new Promise(function(res){ var rd=new FileReader(); rd.onload=function(){res(rd.result.split(',')[1]);}; rd.readAsDataURL(f); });
      var u = await api('uploadItemImage',{item_id:savedId, base64:b64, mime:f.type});
      if(u.ok){ var itm=(DB.items||[]).find(x=>x.id===savedId); if(itm) itm.image_url=u.url; }
      else toast(u.error, true);
    }
  }
  closeModal(); render();
}

async function saveMove(){
  var q = Number(el('f_mqty').value);
  if(!q) return toast('ЧӣЧһЧ•ЧӘ Ч—Ч•Ч‘Ч”', true);
  var type = el('f_mtype').value;
  if(type==='Ч’ЧЁЧҷЧўЧ”') q = -Math.abs(q);
  var r = await act('create',{table:'stock_moves',row:{date:new Date().toISOString().slice(0,10),item_id:el('f_mitem').value,type:type,qty:q,note:el('f_mnote').value}},'Ч”ЧӘЧ Ч•ЧўЧ” Ч ЧЁЧ©ЧһЧ”');
  if(r) closeModal();
}

async function runAvail(iid){

      '<div class="frow"><label>Ч‘ЧЁЧ§Ч•Ч“</label><input id="f_pnibar"></div>'+
      '<div class="frow"><label>ЧһЧңЧҗЧҷ ЧһЧҷЧ ЧҷЧһЧ•Чқ</label><input id="f_pnimin" type="number"></div></div>'+

function togglePurNewItem(){
  var isNew = el('f_plitem').value==='__new__';
  el('purNewItem').style.display = isNew?'block':'none';
}
async function savePurLine(pid){
  var q = Number(el('f_plqty').value);
  if(!(q>0)) return toast('ЧӣЧһЧ•ЧӘ Ч—Ч•Ч‘Ч”', true);
  var itemId = el('f_plitem').value;
  // ЧӨЧЁЧҷЧҳ Ч—Ч“Ч© вҖ” Ч§Ч•Ч“Чқ Ч ЧҷЧҰЧ•ЧЁ ЧҗЧ•ЧӘЧ• Ч‘ЧһЧңЧҗЧҷ (items) Ч•ЧҗЧ– Ч Ч©ЧӘЧһЧ© Ч‘ЧһЧ–Ч”Ч” Ч©Ч—Ч–ЧЁ
  if(itemId==='__new__'){
    if(!el('f_pniname').value) return toast('Ч©Чқ Ч”ЧӨЧЁЧҷЧҳ Ч”Ч—Ч“Ч© Ч—Ч•Ч‘Ч”', true);
    var ci = await act('create',{table:'items',row:{name:el('f_pniname').value,size:el('f_pnisize').value,color:el('f_pnicolor').value,
      rent_price:Number(el('f_pnirent').value)||0,wash_price:Number(el('f_pniwash').value)||0,barcode:el('f_pnibar').value,
      min_stock:el('f_pnimin').value,purchase_cost:Number(el('f_plcost').value)||'',active:'ЧӣЧҹ'}},'Ч”ЧӨЧЁЧҷЧҳ Ч Ч•ЧҰЧЁ Ч‘ЧһЧңЧҗЧҷ');
    if(!ci) return;
    itemId = ci.row.id;
  }
  var r = await act('create',{table:'purchase_lines',row:{purchase_id:pid,item_id:itemId,qty:q,unit_cost:Number(el('f_plcost').value)||0}},'Ч Ч•ЧЎЧЈ');
  if(r) closeModal();
}
// B27: Ч§Ч‘ЧңЧӘ ЧЁЧӣЧ© вҖ” Ч”ЧһЧңЧҗЧҷ Ч’Ч“Чң Ч•Ч Ч•ЧҰЧЁ Ч—Ч•Ч‘ ЧңЧЎЧӨЧ§ Ч‘"Ч”Ч•ЧҰЧҗЧ•ЧӘ ЧўЧӘЧҷЧ“ЧҷЧ•ЧӘ".
// ЧҗЧқ Ч Ч‘Ч—ЧЁ "Ч©Ч•ЧңЧқ" вҖ” Ч ЧӨЧӘЧ— ЧһЧҷЧ“ Ч—ЧңЧ•Чҹ Ч”ЧӘЧ©ЧңЧ•Чқ ЧўЧң ЧҗЧ•ЧӘЧ• Ч—Ч•Ч‘ (ЧһЧңЧҗ ЧҗЧ• Ч—ЧңЧ§Чҷ + ЧҗЧЎЧһЧӣЧӘЧҗЧ•ЧӘ).
function doReceivePur(pid){
  var pu = DB.purchases.find(x=>x.id===pid)||{};
  var lines = (DB.purchaseLines||[]).filter(l=>l.purchase_id===pid);
  var net = lines.reduce((s,l)=>s+Number(l.qty)*Number(l.unit_cost),0);
  var gross = Math.round(net*(1+VAT_RATE)*100)/100;
  openModal('<h2>Ч§Ч‘ЧңЧӘ ЧЁЧӣЧ© ЧңЧһЧңЧҗЧҷ</h2>'+
    '<div class="card"><table><tr><td>ЧЎЧӨЧ§</td><td><b>'+esc(supp(pu.supplier_id))+'</b></td>'+
      '<td>ЧЎЧӣЧ•Чқ ЧңЧӨЧ Чҷ ЧһЧў"Чһ</td><td>'+ils(net)+'</td><td>ЧңЧӘЧ©ЧңЧ•Чқ ЧӣЧ•ЧңЧң ЧһЧў"Чһ</td><td class="tot"><b>'+ils(gross)+'</b></td></tr></table></div>'+
    (DB.warehouses.length?'<div class="frow"><label>ЧңЧҗЧҷЧ–Ч” ЧһЧ—ЧЎЧҹ?</label><select id="f_rwh">'+whOptions()+'</select></div>':'')+
    '<div class="frow"><label>ЧһЧҰЧ‘ ЧӘЧ©ЧңЧ•Чқ ЧңЧЎЧӨЧ§</label><select id="f_rpaymode">'+
      '<option value="ЧңЧӘЧ©ЧңЧ•Чқ Ч‘Ч”ЧһЧ©Чҡ">ЧңЧӘЧ©ЧңЧ•Чқ Ч‘Ч”ЧһЧ©Чҡ вҖ” ЧҷЧҷЧӣЧ ЧЎ ЧңЧ”Ч•ЧҰЧҗЧ•ЧӘ ЧўЧӘЧҷЧ“ЧҷЧ•ЧӘ</option>'+
      '<option value="Ч©Ч•ЧңЧқ">Ч©Ч•ЧңЧқ вҖ” ЧӨЧӘЧ— ЧўЧӣЧ©ЧҷЧ• ЧҗЧӘ Ч—ЧңЧ•Чҹ Ч”ЧӘЧ©ЧңЧ•Чқ</option></select></div>'+
    '<div class="frow"><label>ЧӘЧҗЧЁЧҷЧҡ ЧӘЧ©ЧңЧ•Чқ ЧһЧ©Ч•ЧўЧЁ ЧңЧЎЧӨЧ§ (Ч—Ч•Ч‘Ч”)</label><input id="f_rdue" type="date"></div>'+
    '<button class="btn" onclick="doReceivePur2(\''+pid+'\')">Ч§Ч‘Чң ЧңЧһЧңЧҗЧҷ</button>');
}
async function doReceivePur2(pid){
  var mode = el('f_rpaymode')?el('f_rpaymode').value:'ЧңЧӘЧ©ЧңЧ•Чқ Ч‘Ч”ЧһЧ©Чҡ';
  if(!el('f_rdue')||!el('f_rdue').value) return toast('ЧӘЧҗЧЁЧҷЧҡ ЧӘЧ©ЧңЧ•Чқ ЧһЧ©Ч•ЧўЧЁ ЧңЧЎЧӨЧ§ Ч”Ч•Чҗ Ч©Ч“Ч” Ч—Ч•Ч‘Ч”', true);  // B28
  var r = await act('receivePurchase',{purchase_id:pid,
    warehouse_id:(el('f_rwh')?el('f_rwh').value:''),
    payment_mode:mode, due_date:(el('f_rdue')?el('f_rdue').value:'')},'Ч”ЧЁЧӣЧ© Ч Ч§ЧңЧҳ ЧңЧһЧңЧҗЧҷ');
  if(!r) return;
  closeModal();
  if(mode==='Ч©Ч•ЧңЧқ' && r.fexp_id) payFexpForm(r.fexp_id);
  else toast('Ч Ч•ЧҰЧЁ Ч—Ч•Ч‘ ЧңЧЎЧӨЧ§ Ч‘ЧЎЧҡ '+ils(r.amount)+' Ч‘ЧһЧЎЧҡ Ч”Ч•ЧҰЧҗЧ•ЧӘ ЧўЧӘЧҷЧ“ЧҷЧ•ЧӘ');
}

/* ===== ЧЎЧЁЧҷЧ§Ч” Ч‘ЧһЧҰЧңЧһЧ”: BarcodeDetector ЧһЧ•Ч‘Ч Ч”, Ч•ЧҗЧқ ЧҗЧҷЧҹ вҖ” ZXing ===== */
var CAM_STREAM = null, CAM_STOP = false, ZX_READER = null;
async function startCam(){
  var ov = el('camOverlay');
  if(!ov){
    ov = document.createElement('div'); ov.id='camOverlay';
    ov.innerHTML = '<video id="camVideo" autoplay playsinline muted></video>'+
      '<p style="color:#fff;margin:12px">ЧӣЧ•Ч•Чҹ ЧҗЧӘ Ч”Ч‘ЧЁЧ§Ч•Ч“ ЧңЧһЧЁЧӣЧ– Ч”ЧһЧЎЧҡ</p>'+
      '<button class="btn danger" onclick="stopCam()">ЧЎЧ’Ч•ЧЁ</button>';
    document.body.appendChild(ov);
  }
  ov.style.display='flex'; CAM_STOP=false;
  try{
    CAM_STREAM = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  }catch(e){ stopCam(); return toast('ЧҗЧҷЧҹ Ч’ЧҷЧ©Ч” ЧңЧһЧҰЧңЧһЧ” вҖ” ЧҗЧ©ЧЁ Ч”ЧЁЧ©ЧҗЧ” Ч‘Ч“ЧӨЧ“ЧӨЧҹ', true); }
  var video = el('camVideo');
  video.srcObject = CAM_STREAM;
  if('BarcodeDetector' in window){
    var det = new BarcodeDetector({formats:['code_128','ean_13','qr_code']});
    (async function loop(){
      if(CAM_STOP) return;
      try{ var codes = await det.detect(video); if(codes.length) return camFound(codes[0].rawValue); }catch(e){}
      setTimeout(loop, 250);
    })();
  } else {
    if(!window.ZXing){
      await new Promise(function(res){ var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/zxing-library/0.21.3/index.min.js';
        s.onload=res; s.onerror=res; document.head.appendChild(s); });
    }
    if(!window.ZXing){ stopCam(); return toast('Ч”Ч“ЧӨЧ“ЧӨЧҹ ЧңЧҗ ЧӘЧ•ЧһЧҡ Ч‘ЧЎЧЁЧҷЧ§Ч” вҖ” Ч”Ч§ЧңЧ“ ЧҷЧ“Ч ЧҷЧӘ', true); }
    ZX_READER = new ZXing.BrowserMultiFormatReader();
    ZX_READER.decodeFromVideoDevice(null, 'camVideo', function(result){ if(result && !CAM_STOP) camFound(result.getText()); });
  }
}
function camFound(text){
  stopCam();
  if(navigator.vibrate) navigator.vibrate(80);
  if(window.FLOOR_CAM){ var fc=FLOOR_CAM; FLOOR_CAM=null; fc(text); return; }
  if(RET_CAM){ RET_CAM=false; if(VIEW!=='returns'){VIEW='returns';render();} setTimeout(function(){ el('retIn').value=text; findReturn(text); },150); return; }
  if(VIEW!=='scan'){ VIEW='scan'; render(); }
  setTimeout(function(){ el('scanIn').value = text; doScan(); }, 150);
}
function stopCam(){
  CAM_STOP = true;
  if(ZX_READER){ try{ ZX_READER.reset(); }catch(e){} ZX_READER=null; }
  if(CAM_STREAM){ CAM_STREAM.getTracks().forEach(t=>t.stop()); CAM_STREAM=null; }
  var ov = el('camOverlay'); if(ov) ov.style.display='none';
}

var AUDIT_FILTER = { q:'', user:'', action:'', from:'', to:'' };
var AUDIT_SHOW = 200; // ЧӣЧһЧ•ЧӘ Ч©Ч•ЧЁЧ•ЧӘ ЧһЧ•ЧҰЧ’Ч•ЧӘ (ЧҳЧўЧҷЧ Ч” Ч”Ч“ЧЁЧ’ЧӘЧҷЧӘ вҖ” Ч”Ч ЧӘЧ•Ч ЧҷЧқ ЧӣЧ‘ЧЁ ЧҳЧўЧ•Ч ЧҷЧқ Ч‘ЧһЧңЧ•ЧҗЧқ Ч‘-DB)
function rAudit(){
  var all = (DB.auditLog||[]).slice().sort((a,b)=> a.ts>b.ts?-1:(a.ts<b.ts?1:0));
  var users = Array.from(new Set(all.map(x=>x.user).filter(Boolean))).sort();
  var actions = Array.from(new Set(all.map(x=>x.action).filter(Boolean))).sort();
  var f = AUDIT_FILTER;
  var rows = all.filter(function(r){
    if(f.user && r.user!==f.user) return false;
    if(f.action && r.action!==f.action) return false;
    if(f.from && String(r.ts).slice(0,10)<f.from) return false;
    if(f.to && String(r.ts).slice(0,10)>f.to) return false;
    if(f.q){
      var s=(r.user+' '+r.action+' '+r.details).toLowerCase();
      if(s.indexOf(f.q.toLowerCase())===-1) return false;
    }
    return true;
  });
  var shown = rows.slice(0, AUDIT_SHOW);
  el('main').innerHTML = '<div class="section-title"><h2>ЧҷЧ•ЧһЧҹ ЧӨЧўЧ•ЧңЧ•ЧӘ</h2><span class="muted">'+rows.length+' ЧЁЧ©Ч•ЧһЧ•ЧӘ (ЧһЧӘЧ•Чҡ '+all.length+' ЧЎЧ”"Чӣ)</span></div>'+
    '<div class="card"><div class="grid3">'+
    '<div class="frow"><label>Ч—ЧҷЧӨЧ•Ч© Ч—Ч•ЧӨЧ©Чҷ</label><input id="au_q" value="'+esc(f.q)+'" placeholder="ЧһЧ©ЧӘЧһЧ© / ЧӨЧўЧ•ЧңЧ” / ЧӨЧЁЧҳЧҷЧқ" oninput="auditSetFilter()"></div>'+
    '<div class="frow"><label>ЧһЧ©ЧӘЧһЧ©</label><select id="au_user" onchange="auditSetFilter()"><option value="">Ч”ЧӣЧң</option>'+users.map(u=>'<option'+(f.user===u?' selected':'')+'>'+esc(u)+'</option>').join('')+'</select></div>'+
    '<div class="frow"><label>ЧӨЧўЧ•ЧңЧ”</label><select id="au_action" onchange="auditSetFilter()"><option value="">Ч”ЧӣЧң</option>'+actions.map(a=>'<option'+(f.action===a?' selected':'')+'>'+esc(a)+'</option>').join('')+'</select></div>'+
    '<div class="frow"><label>ЧһЧӘЧҗЧЁЧҷЧҡ</label><input id="au_from" type="date" value="'+esc(f.from)+'" onchange="auditSetFilter()"></div>'+
    '<div class="frow"><label>ЧўЧ“ ЧӘЧҗЧЁЧҷЧҡ</label><input id="au_to" type="date" value="'+esc(f.to)+'" onchange="auditSetFilter()"></div>'+
    '</div></div>'+
    b4NotificationsWidget()+
    '<div class="card"><table><tr><th>ЧӘЧҗЧЁЧҷЧҡ Ч•Ч©ЧўЧ”</th><th>ЧһЧ©ЧӘЧһЧ©</th><th>ЧӨЧўЧ•ЧңЧ”</th><th>ЧӨЧЁЧҳЧҷЧқ</th></tr>'+
    (shown.length? shown.map(function(r){
      return '<tr><td class="muted" style="white-space:nowrap">'+esc(r.ts)+'</td><td>'+esc(r.user)+'</td><td>'+esc(r.action)+'</td><td style="max-width:520px;word-break:break-word">'+esc(r.details)+'</td></tr>';
    }).join('') : '<tr><td colspan="4" class="muted" style="text-align:center;padding:20px">ЧҗЧҷЧҹ ЧЁЧ©Ч•ЧһЧ•ЧӘ ЧӘЧ•ЧҗЧһЧ•ЧӘ</td></tr>')+
    '</table></div>'+
    (rows.length>AUDIT_SHOW? '<div class="row" style="justify-content:center;margin-top:10px"><button class="btn ghost" onclick="AUDIT_SHOW+=200;rAudit()">ЧҳЧўЧҹ ЧўЧ•Ч“ ('+(rows.length-AUDIT_SHOW)+' Ч Ч•ЧЎЧӨЧ•ЧӘ)</button></div>' : '');
}

      '<table><tr><th>ЧңЧ§Ч•Ч—</th><th>Ч©Ч•ЧҳЧЈ</th><th>30+</th><th>60+</th><th>90+</th><th>ЧЎЧ”&quot;Чӣ</th></tr>'+

      :'<div class="empty">ЧҗЧҷЧҹ Ч—Ч•Ч‘Ч•ЧӘ ЧӨЧӘЧ•Ч—ЧҷЧқ</div>')+
    '</div>';
}
/* B9/E4: Ч“Ч©Ч‘Ч•ЧЁЧ“ Ч—ЧЁЧҷЧ’ЧҷЧқ вҖ” ЧһЧЁЧӣЧ– Ч—ЧһЧҷЧ©Ч” ЧЎЧ•Ч’Чҷ ЧӨЧЁЧҷЧҳЧҷЧқ Ч©Ч“Ч•ЧЁЧ©ЧҷЧқ ЧӘЧ©Ч•ЧһЧӘ ЧңЧ‘ ЧһЧ Ч”Чң. Ч§ЧЁЧҷЧҗЧ” Ч‘ЧңЧ‘Ч“. */
function b9ExcSection(title, list, rowFn){
  list = list||[];
  return '<div class="card" style="margin-bottom:10px"><div class="row" style="margin-bottom:6px"><b class="grow">'+esc(title)+' ('+list.length+')</b></div>'+

}
async function loadExceptionsDashboard(){

  html += b9ExcSection('Ч”Ч—Ч–ЧЁЧ•ЧӘ Ч‘ЧҗЧҷЧ—Ч•ЧЁ', r.overdue_returns, function(x){

      '<div class="grow">Ч”Ч–ЧһЧ Ч” #'+esc(x.order_number)+' В· '+esc(x.customer)+'</div><span class="muted">ЧҷЧўЧ“: '+esc(x.end_date)+'</span></div>';

  html += b9ExcSection('ЧһЧ©ЧңЧ•Ч—ЧҷЧқ ЧӘЧ§Ч•ЧўЧҷЧқ', r.stuck_deliveries, function(x){
    return '<div class="attn-row"><span class="tag" style="background:var(--amber)">'+x.days+' ЧҷЧһЧҷЧқ</span>'+
      '<div class="grow">'+esc(x.kind||'')+' В· '+esc(x.customer||'')+(x.driver?' В· Ч Ч”Ч’ '+esc(x.driver):'')+'</div><span class="muted">'+esc(x.date)+' В· '+esc(x.status)+'</span></div>';
  });
  html += b9ExcSection('ЧҗЧҷЧ©Ч•ЧЁЧҷ ЧўЧЁЧ‘Ч•ЧӘ ЧһЧһЧӘЧҷЧ ЧҷЧқ', r.pending_guarantees, function(x){
    return '<div class="attn-row" style="cursor:pointer" onclick="openCust(\''+x.customer_id+'\')"><span class="tag" style="background:var(--amber)">ЧўЧЁЧ‘Ч•ЧӘ</span>'+
      '<div class="grow">'+esc(x.customer)+(x.guarantee_type?' В· '+esc(x.guarantee_type):'')+'</div></div>';
  });
  html += b9ExcSection('Ч—Ч©Ч‘Ч•Ч ЧҷЧ•ЧӘ ЧҳЧҷЧ•ЧҳЧ” (ЧһЧһЧӘЧҷЧ Ч•ЧӘ ЧңЧҗЧҷЧ©Ч•ЧЁ ЧЁЧ•&quot;Ч—)', r.draft_invoices, function(x){
    return '<div class="attn-row"><span class="tag" style="background:#94A3B8">ЧҳЧҷЧ•ЧҳЧ”</span>'+

/* ================= B14: ЧңЧ•Ч— Ч‘Ч§ЧЁЧ” ЧўЧЎЧ§Чҷ (BI Dashboard, Phase 2/2.1) ================= */
/* Ч§ЧЁЧҷЧҗЧ” Ч‘ЧңЧ‘Ч“ вҖ” Ч ЧӘЧ•Ч ЧҷЧқ ЧһЧ’ЧҷЧўЧҷЧқ Ч‘Ч§ЧЁЧҷЧҗЧӘ Ч©ЧЁЧӘ ЧҗЧ—ЧӘ (b14BiDashboard) Ч•ЧһЧ•ЧҰЧ’ЧҷЧқ ЧһЧ§Ч•ЧһЧҷЧӘ. Ч”ЧҳЧҗЧ‘ЧҷЧқ ЧһЧ©ЧӘЧһЧ©ЧҷЧқ Ч‘ЧҗЧ•ЧӘЧ• ЧһЧҳЧһЧ•Чҹ BI_DATA. */
function rBi(){
  var tabBtn = function(key,lbl){ return '<button class="btn '+(BI_TAB===key?'':'ghost')+' sm" onclick="BI_TAB=\''+key+'\';rBi()">'+lbl+'</button>'; };
  el('main').innerHTML = '<div class="section-title"><h2>ЧңЧ•Ч— Ч‘Ч§ЧЁЧ” ЧўЧЎЧ§Чҷ</h2><button class="btn ghost sm" onclick="BI_DATA=null;rBi()" title="ЧһЧ©Ч•Чҡ Ч ЧӘЧ•Ч ЧҷЧқ ЧһЧўЧ•Ч“ЧӣЧ ЧҷЧқ">ЧЁЧўЧ Ч•Чҹ Ч ЧӘЧ•Ч ЧҷЧқ</button></div>'+
    '<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:14px">'+
    tabBtn('overview','ЧЎЧ§ЧҷЧЁЧ” ЧӣЧңЧңЧҷЧӘ')+tabBtn('revenue','Ч”ЧӣЧ ЧЎЧ•ЧӘ')+tabBtn('risk','ЧңЧ§Ч•Ч—Ч•ЧӘ Ч‘ЧЎЧҷЧӣЧ•Чҹ')+tabBtn('inventory','Ч ЧҷЧҰЧ•ЧңЧӘ ЧһЧңЧҗЧҷ')+tabBtn('cashflow','ЧӘЧ–ЧЁЧҷЧқ ЧһЧ–Ч•ЧһЧ ЧҷЧқ')+tabBtn('noble','ЧһЧӣЧ‘ЧЎЧ”')+
    '</div>'+
    '<div id="biBox"><div class="card empty">ЧҳЧ•ЧўЧҹ...</div></div>';
  loadBi();
}
async function loadBi(){
  if(!BI_DATA){
    var r = await api('b14BiDashboard',{});
    if(!r.ok){ var b=el('biBox'); if(b) b.innerHTML='<div class="card empty">'+esc(r.error||'Ч©Ч’ЧҷЧҗЧ” Ч‘ЧҳЧўЧҷЧ Ч”')+'</div>'; return; }
    BI_DATA = r;
  }
  var box = el('biBox'); if(!box) return;
  if(BI_TAB==='revenue') box.innerHTML = biRevenueCard(true);
  else if(BI_TAB==='risk') box.innerHTML = biRiskCard(true);
  else if(BI_TAB==='inventory') box.innerHTML = biInventoryCard(true);
  else if(BI_TAB==='cashflow') box.innerHTML = biCashflowCard(true);
  else if(BI_TAB==='noble'){ box.innerHTML = biNobleCard(true); renderNobleReports('biNobleBox'); }
  else box.innerHTML = biOverviewHtml();
}
/* Ч’ЧЁЧЈ ЧўЧһЧ•Ч“Ч•ЧӘ SVG Ч’Ч ЧЁЧҷ вҖ” ЧһЧ©ЧһЧ© ЧңЧӣЧң ЧӘЧҰЧ•Ч’Ч•ЧӘ Ч”Ч”ЧӣЧ ЧЎЧ•ЧӘ (Ч—Ч•Ч“Ч©/ЧңЧ§Ч•Ч—/ЧЎЧ•Ч’) */
function biBarChartSvg(items){
  var max = Math.max.apply(null, items.map(x=>x.value));
  if(!(max>0)) return '<div class="empty">ЧҗЧҷЧҹ Ч ЧӘЧ•Ч ЧҷЧқ ЧўЧ“ЧҷЧҷЧҹ</div>';
  var n = items.length, W = Math.max(480, n*68), H = 210, pad = 10, bw = Math.floor((W-2*pad)/n);
  var bars = items.map(function(it,idx){
    var v = it.value, bh = Math.round((H-64)*v/max), x = pad+idx*bw+9, y = H-32-bh;
    var lbl = it.label.length>9? it.label.slice(0,8)+'вҖҰ' : it.label;
    return '<g><title>'+esc(it.label)+': вӮӘ'+Math.round(v).toLocaleString('he-IL')+'</title>'+
      '<rect x="'+x+'" y="'+y+'" width="'+(bw-18)+'" height="'+Math.max(bh,2)+'" rx="3" fill="var(--teal)" opacity="'+(idx===n-1?'1':'.75')+'"/>'+
      '<text x="'+(x+(bw-18)/2)+'" y="'+(y-7)+'" text-anchor="middle" font-size="11" font-weight="700" fill="var(--ink)">'+(v?'вӮӘ'+Math.round(v).toLocaleString('he-IL'):'')+'</text>'+
      '<text x="'+(x+(bw-18)/2)+'" y="'+(H-12)+'" text-anchor="middle" font-size="10" fill="var(--muted)">'+esc(lbl)+'</text></g>';
  }).join('');
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ч’ЧЁЧЈ ЧўЧһЧ•Ч“Ч•ЧӘ">'+
    '<line x1="'+pad+'" y1="'+(H-32)+'" x2="'+(W-pad)+'" y2="'+(H-32)+'" stroke="var(--line)" stroke-width="1.5"/>'+bars+'</svg>';
}
/* ЧӣЧЁЧҳЧҷЧЎ Ч”ЧӣЧ ЧЎЧ•ЧӘ вҖ” Ч ЧҷЧӘЧҹ ЧңЧ”Ч—ЧңЧӨЧ” Ч‘ЧҷЧҹ Ч©ЧңЧ•Ч© ЧӘЧҰЧ•Ч’Ч•ЧӘ ЧһЧ‘ЧңЧҷ ЧңЧўЧ–Ч•Ч‘ ЧҗЧӘ Ч”ЧӣЧЁЧҳЧҷЧЎ (Ч”Ч“Ч•Ч’ЧһЧ” Ч©Ч‘ЧҷЧ§Ч© ЧҗЧ‘Чҷ) */
function biRevenueCard(full){
  var modeBtn = function(k,l){ return '<button class="btn '+(BI_REV_MODE===k?'':'ghost')+' sm" onclick="BI_REV_MODE=\''+k+'\';biRenderRevenue()">'+l+'</button>'; };
  return '<div class="card"><div class="row" style="align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px"><h3 class="grow">Ч”ЧӣЧ ЧЎЧ•ЧӘ</h3>'+
    modeBtn('month','ЧңЧӨЧҷ Ч—Ч•Ч“Ч©')+modeBtn('customer','ЧңЧӨЧҷ ЧңЧ§Ч•Ч—')+modeBtn('type','ЧңЧӨЧҷ ЧЎЧ•Ч’')+
    (!full? ' <button class="btn ghost sm" onclick="BI_TAB=\'revenue\';rBi()">ЧӨЧҷЧЁЧ•Чҳ ЧһЧңЧҗ вҶҗ</button>':'')+
    '</div><div id="biRevBody">'+biRevenueBodyHtml(full)+'</div></div>';
}
function biRenderRevenue(){ var b=el('biRevBody'); if(b) b.innerHTML = biRevenueBodyHtml(BI_TAB==='revenue'); }
function biRevenueBodyHtml(full){
  var rev = BI_DATA.revenue, items, colLbl;
  if(BI_REV_MODE==='month'){
    var HEB_M=['ЧҷЧ Ч•','ЧӨЧ‘ЧЁ','ЧһЧЁЧҘ','ЧҗЧӨЧЁ','ЧһЧҗЧҷ','ЧҷЧ•Ч ','ЧҷЧ•Чң','ЧҗЧ•Ч’','ЧЎЧӨЧҳ','ЧҗЧ•Ч§','Ч Ч•Ч‘','Ч“ЧҰЧһ'];
    var list = full? rev.byMonth : rev.byMonth.slice(-6);
    items = list.map(function(m){ return {label: HEB_M[Number(m.month.slice(5,7))-1]+' '+m.month.slice(2,4), value:m.amount}; });
    colLbl = 'Ч—Ч•Ч“Ч©';
  } else if(BI_REV_MODE==='customer'){
    items = rev.byCustomer.slice(0, full?12:5).map(function(c){ return {label:c.customer, value:c.amount}; });
    colLbl = 'ЧңЧ§Ч•Ч—';
  } else {
    items = rev.byType.map(function(t){ return {label:t.type, value:t.amount}; });
    colLbl = 'ЧЎЧ•Ч’';
  }
  var html = biBarChartSvg(items);
  if(full && items.length) html += '<table style="margin-top:12px"><tr><th>'+colLbl+'</th><th>ЧЎЧӣЧ•Чқ (ЧңЧӨЧ Чҷ ЧһЧў&quot;Чһ)</th></tr>'+
    items.map(function(it){ return '<tr><td>'+esc(it.label)+'</td><td>'+ils(it.value)+'</td></tr>'; }).join('')+'</table>';
  return html;
}
/* ЧӣЧЁЧҳЧҷЧЎ ЧңЧ§Ч•Ч—Ч•ЧӘ Ч‘ЧЎЧҷЧӣЧ•Чҹ вҖ” Ч ЧҷЧҰЧ•Чң ЧҗЧ©ЧЁЧҗЧҷ 70%+ Ч•/ЧҗЧ• Ч—Ч•Ч‘ ЧһЧўЧң 90 ЧҷЧ•Чқ (ЧһЧ‘Ч•ЧЎЧЎ b9AgingReport Ч”Ч§ЧҷЧҷЧқ) */
function biRiskCard(full){
  var rows = BI_DATA.at_risk, list = full? rows : rows.slice(0,5);
  var body = list.length? list.map(function(x){
    var tag = x.pct>=90? '<span class="tag" style="background:var(--danger)">'+x.pct+'%</span>' : (x.pct>=70? '<span class="tag" style="background:var(--amber)">'+x.pct+'%</span>' : '<span class="tag" style="background:#94A3B8">Ч—Ч•Ч‘</span>');
    return '<div class="attn-row" style="cursor:pointer" onclick="openCust(\''+x.customer_id+'\')">'+tag+
      '<div class="grow">'+esc(x.customer)+'<div class="muted" style="font-size:12px">'+esc(x.reasons.join(' В· '))+'</div></div>'+
      (x.limit_ag? '<span class="muted">'+ils(fromAg(x.used_ag))+' ЧһЧӘЧ•Чҡ '+ils(fromAg(x.limit_ag))+'</span>':'')+'</div>';
  }).join('') : '<div class="empty">ЧҗЧҷЧҹ ЧңЧ§Ч•Ч—Ч•ЧӘ Ч‘ЧЎЧҷЧӣЧ•Чҹ ЧӣЧЁЧ’Чў вң“</div>';
  return '<div class="card"><div class="row" style="margin-bottom:6px"><h3 class="grow">ЧңЧ§Ч•Ч—Ч•ЧӘ Ч‘ЧЎЧҷЧӣЧ•Чҹ ('+rows.length+')</h3>'+
    (!full && rows.length>5? '<button class="btn ghost sm" onclick="BI_TAB=\'risk\';rBi()">ЧӣЧң Ч”ЧЁЧ©ЧҷЧһЧ” вҶҗ</button>':'')+'</div>'+body+'</div>';
}
/* ЧӣЧЁЧҳЧҷЧЎ Ч ЧҷЧҰЧ•ЧңЧӘ ЧһЧңЧҗЧҷ вҖ” ЧңЧӣЧң ЧӨЧЁЧҷЧҳ: ЧҷЧ—ЧҷЧ“Ч•ЧӘ Ч‘Ч©ЧҷЧһЧ•Ч© (ЧһЧ•Ч©ЧӣЧЁ ЧўЧӣЧ©ЧҷЧ• + Ч‘ЧӣЧ‘ЧҷЧЎЧ”) ЧһЧӘЧ•Чҡ Ч”ЧһЧңЧҗЧҷ Ч”ЧӣЧ•ЧңЧң */
function biInventoryCard(full){
  var items = BI_DATA.inventory.items, list = full? items : items.slice(0,6);
  var bars = list.map(function(it){
    var color = it.pct>=90? 'var(--danger)' : (it.pct>=70? 'var(--amber)' : 'var(--teal)');
    return '<div style="margin-bottom:9px"><div class="row" style="font-size:13px"><span class="grow">'+esc(it.name)+'</span><span class="muted">'+it.in_use+' / '+it.total+' ('+it.pct+'%)</span></div>'+
      '<div style="height:8px;background:var(--linen);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+it.pct+'%;background:'+color+'"></div></div></div>';
  }).join('');
  return '<div class="card"><div class="row" style="margin-bottom:6px"><h3 class="grow">Ч ЧҷЧҰЧ•ЧңЧӘ ЧһЧңЧҗЧҷ вҖ” ЧһЧһЧ•ЧҰЧў '+BI_DATA.inventory.avgPct+'%</h3>'+
    (!full && items.length>6? '<button class="btn ghost sm" onclick="BI_TAB=\'inventory\';rBi()">ЧӣЧң Ч”ЧӨЧЁЧҷЧҳЧҷЧқ вҶҗ</button>':'')+'</div>'+
    (list.length? bars : '<div class="empty">ЧҗЧҷЧҹ Ч ЧӘЧ•Ч Чҷ ЧһЧңЧҗЧҷ</div>')+'</div>';
}
/* ЧӣЧЁЧҳЧҷЧЎ ЧӘЧ—Ч–ЧҷЧӘ ЧӘЧ–ЧЁЧҷЧқ ЧһЧ–Ч•ЧһЧ ЧҷЧқ вҖ” ЧҷЧӘЧЁЧ•ЧӘ ЧӨЧӘЧ•Ч—Ч•ЧӘ ЧһЧ§Ч•Ч‘ЧҰЧ•ЧӘ ЧңЧӨЧҷ Ч—ЧңЧ•Чҹ Ч’Ч‘ЧҷЧҷЧ” Ч—Ч–Ч•Чҷ */
function biCashflowCard(full){
  var b = BI_DATA.cashflow.buckets;
  var segs = [
    {k:'overdue_ag', l:'Ч‘ЧҗЧҷЧ—Ч•ЧЁ', color:'var(--danger)'},
    {k:'in_30_ag', l:'ЧўЧ“ 30 ЧҷЧ•Чқ', color:'var(--teal)'},
    {k:'in_60_ag', l:'31вҖ“60 ЧҷЧ•Чқ', color:'var(--navy2)'},
    {k:'in_90_ag', l:'61вҖ“90 ЧҷЧ•Чқ', color:'var(--amber)'},
    {k:'beyond_90_ag', l:'ЧһЧўЧң 90 ЧҷЧ•Чқ', color:'#94A3B8'}
  ];
  var total = segs.reduce((s,x)=>s+Number(b[x.k]||0),0);
  var legend = segs.map(function(x){ return '<div style="display:flex;align-items:center;gap:7px;padding:3px 0;font-size:13px"><span style="width:13px;height:13px;border-radius:4px;background:'+x.color+';flex:none"></span>'+x.l+' вҖ” <b>'+ils(fromAg(b[x.k]))+'</b></div>'; }).join('');
  var bars = total>0? segs.map(function(x){ var pct = Math.round(Number(b[x.k]||0)*100/total); return pct? '<div style="width:'+pct+'%;background:'+x.color+'" title="'+x.l+': '+pct+'%"></div>':''; }).join('') : '';
  var html = '<div class="card"><h3 style="margin-bottom:10px">ЧӘЧ—Ч–ЧҷЧӘ ЧӘЧ–ЧЁЧҷЧқ ЧһЧ–Ч•ЧһЧ ЧҷЧқ вҖ” ЧЎЧ”&quot;Чӣ '+ils(fromAg(total))+'</h3>'+
    (total>0? '<div style="display:flex;height:22px;border-radius:6px;overflow:hidden;margin-bottom:12px">'+bars+'</div>'+legend : '<div class="empty">ЧҗЧҷЧҹ ЧҷЧӘЧЁЧ•ЧӘ ЧӨЧӘЧ•Ч—Ч•ЧӘ</div>');
  if(full){
    var rows = BI_DATA.cashflow.rows;

  }

}

/* B15: ЧӣЧЁЧҳЧҷЧЎ Ч‘ЧҷЧҰЧ•ЧўЧҷ ЧһЧӣЧ‘ЧЎЧ” Ч‘ЧңЧ•Ч— Ч”Ч‘Ч§ЧЁЧ” Ч”ЧўЧЎЧ§Чҷ вҖ” ЧҗЧ•ЧӘЧ• ЧһЧ§Ч•ЧЁ ЧҗЧһЧӘ (DB.laundryEvents/DB.laundryIntakes) ЧӣЧһЧ• Ч‘ЧһЧЎЧҡ "Ч“Ч•Ч—Ч•ЧӘ", Ч‘ЧңЧҷ ЧңЧ•Ч’ЧҷЧ§Ч” Ч—Ч“Ч©Ч”. ЧӘЧ§ЧҰЧҷЧЁ Ч§ЧңЧҷЧҳЧ•ЧӘ/ЧһЧ©Ч§Чң/Ч”ЧӣЧ ЧЎЧ•ЧӘ ЧңЧӘЧҰЧ•Ч’ЧӘ ЧЎЧ§ЧҷЧЁЧ”, Ч•Ч”ЧӨЧҷЧЁЧ•Чҳ Ч”ЧһЧңЧҗ (ЧўЧ•Ч‘Ч“ЧҷЧқ+ЧһЧӣЧ•Ч Ч•ЧӘ) Чў"Чҷ Ч©ЧҷЧһЧ•Ч© Ч—Ч•Ч–ЧЁ Ч‘-renderNobleReports Ч”Ч§ЧҷЧҷЧқ ЧўЧң container ЧҷЧҷЧўЧ•Ч“Чҷ. */
function nobleSummaryData(days){
  var since = Date.now() - days*864e5, incl = inclInternal();
  var kg=0, rev=0, del=0;
  (DB.laundryIntakes||[]).forEach(function(i){
    var t = new Date(String(i.delivered_ts||'').replace(' ','T'));
    if(isNaN(t.getTime()) || t.getTime()<since) return;
    del++;
    if(incl || i.internal!=='ЧӣЧҹ') kg+=Number(i.net_weight_kg)||0;
    rev+=Number(i.total_charge)||0;
  });
  return {kg:Math.round(kg*100)/100, rev:rev, del:del};
}
function biNobleMini(v,l){ return '<div style="flex:1;min-width:120px;text-align:center;padding:8px 4px"><div style="font-size:22px;font-weight:700;color:var(--navy)">'+v+'</div><div class="muted" style="font-size:12px">'+l+'</div></div>'; }
function biNobleToggle(){ renderNobleReports('biNobleBox'); }
function biNobleCard(full){
  if(full) return '<div id="biNobleBox"></div>';
  var s = nobleSummaryData(30);
  return '<div class="card"><div class="row" style="align-items:center;margin-bottom:6px"><h3 class="grow">Ч‘ЧҷЧҰЧ•ЧўЧҷ ЧһЧӣЧ‘ЧЎЧ” (30 ЧҷЧ•Чқ)</h3>'+
    '<button class="btn ghost sm" onclick="BI_TAB=\'noble\';rBi()">ЧӨЧҷЧЁЧ•Чҳ ЧһЧңЧҗ вҶҗ</button></div>'+
    '<div class="row" style="flex-wrap:wrap">'+
    biNobleMini(s.kg,'Ч§&quot;Ч’ (Ч§ЧңЧҷЧҳЧ•ЧӘ Ч©Ч ЧһЧЎЧЁЧ•)')+biNobleMini(ils(s.rev),'Ч”ЧӣЧ ЧЎЧ•ЧӘ (ЧңЧӨЧ Чҷ ЧһЧў&quot;Чһ)')+biNobleMini(s.del,'Ч§ЧңЧҷЧҳЧ•ЧӘ Ч ЧһЧЎЧЁЧ•')+
    '</div></div>';
}

var NOBLE_REP_DAYS = 30;
function nobleRepRange(d, containerId){ NOBLE_REP_DAYS = d; renderNobleReports(containerId); }
/* NC3/B15: containerId ЧһЧҗЧӨЧ©ЧЁ Ч©ЧҷЧһЧ•Ч© Ч—Ч•Ч–ЧЁ Ч‘ЧҗЧ•ЧӘЧ• ЧЁЧҷЧ Ч“Ч•ЧЁ Ч’Чқ Ч‘ЧңЧ•Ч— Ч”Ч‘Ч§ЧЁЧ” Ч”ЧўЧЎЧ§Чҷ (B14) вҖ” Ч‘ЧЁЧҷЧЁЧӘ ЧһЧ—Ч“Чң 'repNoble' Ч©Ч•ЧһЧЁЧӘ ЧўЧң Ч”Ч”ЧӘЧ Ч”Ч’Ч•ЧӘ Ч”Ч§ЧҷЧҷЧһЧӘ Ч‘ЧһЧЎЧҡ Ч“Ч•Ч—Ч•ЧӘ */
function renderNobleReports(containerId){
  containerId = containerId || 'repNoble';
  var box = el(containerId); if(!box) return;
  var evs = DB.laundryEvents||[];
  if(!evs.length){ box.innerHTML=''; return; }
  var parseT = function(x){ var d=new Date(String(x||'').replace(' ','T')); return isNaN(d.getTime())?null:d; };
  var ld = function(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); };
  var since = Date.now() - NOBLE_REP_DAYS*864e5;
  var inSet = internalIntakeSet(), incl = inclInternal();
  var E = []; evs.forEach(function(e){ var t=parseT(e.ts); if(t && t.getTime()>=since) E.push({e:e,t:t}); });
  E.sort(function(a,b){ return a.t-b.t; });

  /* --- ЧЎЧҷЧӣЧ•Чқ ЧӘЧ§Ч•ЧӨЧ”: ЧһЧ”Ч§ЧңЧҷЧҳЧ•ЧӘ Ч©Ч ЧһЧЎЧЁЧ• (Ч”Ч©Ч§ЧҷЧңЧ” Ч”ЧҗЧ—ЧЁЧ•Ч Ч” Ч§Ч•Ч‘ЧўЧӘ вҖ” Ч‘ЧңЧҷ ЧӣЧӨЧҷЧңЧ•ЧҷЧ•ЧӘ ЧһЧ©Ч§ЧҷЧңЧ” Ч—Ч•Ч–ЧЁЧӘ) --- */
  var kg=0, rev=0, del=0;
  (DB.laundryIntakes||[]).forEach(function(i){
    var t=parseT(i.delivered_ts); if(!t||t.getTime()<since) return;
    del++;
    if(incl || i.internal!=='ЧӣЧҹ') kg+=Number(i.net_weight_kg)||0;
    rev+=Number(i.total_charge)||0;
  });

  /* --- Ч ЧҷЧ§Ч•Ч“ ЧўЧ•Ч‘Ч“ЧҷЧқ: 'ЧЎЧҷЧ•Чқ' Ч©Чң ЧўЧ’ЧңЧ” вҶ’ Ч”'Ч”ЧӘЧ—ЧңЧ”' Ч”Ч‘ЧҗЧ” Ч©ЧңЧ”; Ч”ЧӨЧўЧЁ Ч Ч–Ч§ЧЈ ЧңЧўЧ•Ч‘Ч“ Ч©Ч”ЧӘЧ—ЧҷЧң ЧҗЧӘ Ч”Ч©ЧңЧ‘ Ч”Ч‘Чҗ --- */
  var lastEnd={}, workers={};
  var W=function(n){ return workers[n]=workers[n]||{name:n,acts:0,moves:0,lag:0}; };
  E.forEach(function(x){
    var e=x.e, k=e.intake_id+'|'+e.cart_id;
    if(e.worker_name) W(e.worker_name).acts++;
    if(e.event_type==='ЧЎЧҷЧ•Чқ') lastEnd[k]=x.t;
    else if(e.event_type==='Ч”ЧӘЧ—ЧңЧ”'){
      if(lastEnd[k] && e.worker_name){ var m=(x.t-lastEnd[k])/60000; if(m>=0 && m<=1440){ var w=W(e.worker_name); w.moves++; w.lag+=m; } }
      delete lastEnd[k];
    }
  });
  var lb = Object.keys(workers).map(function(n){return workers[n];}).filter(function(w){return w.moves>0;})
    .map(function(w){ return {name:w.name, acts:w.acts, moves:w.moves, avg:Math.round(w.lag/w.moves)}; })
    .sort(function(a,b){ return a.avg-b.avg; });

  /* --- Ч ЧҷЧҰЧ•ЧңЧӘ ЧһЧӣЧ•Ч Ч•ЧӘ: Ч–Ч•Ч’Ч•ЧӘ Ч”ЧӘЧ—ЧңЧ”вҶ’ЧЎЧҷЧ•Чқ ЧңЧһЧӣЧ•Ч Ч”. Ч©ЧңЧ‘ ЧӨЧӘЧ•Ч— Ч ЧЎЧӨЧЁ ЧўЧ“ ЧўЧӣЧ©ЧҷЧ• (ЧңЧӣЧң Ч”ЧҷЧ•ЧӘЧЁ 24 Ч©ЧўЧ•ЧӘ) --- */
  var openM={}, segs=[];
  E.forEach(function(x){
    var e=x.e; if(!e.machine_id) return;
    var k=e.intake_id+'|'+e.cart_id+'|'+e.machine_id;
    if(e.event_type==='Ч”ЧӘЧ—ЧңЧ”') openM[k]={m:e.machine_id,t:x.t};
    else if(e.event_type==='ЧЎЧҷЧ•Чқ' && openM[k]){ if(x.t>openM[k].t) segs.push({m:e.machine_id,a:openM[k].t,b:x.t}); delete openM[k]; }
  });
  Object.keys(openM).forEach(function(k){ var o=openM[k], b=new Date(Math.min(Date.now(), o.t.getTime()+864e5)); if(b>o.t) segs.push({m:o.m,a:o.t,b:b}); });
  var busyTot={}, busyWin={}, dayAny={}, daySpan={};
  segs.forEach(function(sg){
    busyTot[sg.m]=(busyTot[sg.m]||0)+(sg.b-sg.a)/60000;
    var cur=new Date(sg.a);
    while(cur<sg.b){ /* ЧӨЧҷЧЁЧ•Ч§ ЧңЧҷЧһЧһЧ•ЧӘ + Ч—ЧҷЧӘЧ•Чҡ ЧңЧ—ЧңЧ•Чҹ 05:00вҖ“17:00 */
      var dayEnd=new Date(cur); dayEnd.setHours(24,0,0,0);
      var segEnd=sg.b<dayEnd?sg.b:dayEnd, day=ld(cur);
      dayAny[day]=1;
      if(!daySpan[day]) daySpan[day]={a:cur.getTime(),b:segEnd.getTime()};
      else { if(cur.getTime()<daySpan[day].a) daySpan[day].a=cur.getTime(); if(segEnd.getTime()>daySpan[day].b) daySpan[day].b=segEnd.getTime(); }
      var w1=new Date(cur); w1.setHours(5,0,0,0); var w2=new Date(cur); w2.setHours(17,0,0,0);
      var ca=Math.max(cur.getTime(),w1.getTime()), cb=Math.min(segEnd.getTime(),w2.getTime());
      if(cb>ca) busyWin[sg.m]=(busyWin[sg.m]||0)+(cb-ca)/60000;
      cur=dayEnd;
    }
  });
  var days=Object.keys(dayAny), winTotal=days.length*720, spanTotal=0;
  days.forEach(function(d){ spanTotal+=(daySpan[d].b-daySpan[d].a)/60000; });
  var maxBusy=0; Object.keys(busyTot).forEach(function(m){ if(busyTot[m]>maxBusy) maxBusy=busyTot[m]; });
  var pct=function(x,y){ return y>0?Math.min(100,Math.round(x/y*100)):0; };
  var bar=function(p,color){ return '<div style="background:var(--line);border-radius:6px;height:8px;overflow:hidden"><div style="width:'+p+'%;height:100%;background:'+color+'"></div></div>'; };
  var machRows = DB.machines.map(function(m){
    var bt=busyTot[m.id]||0;
    return {id:m.id, stage:m.auto_stage||'', bt:bt, a:pct(busyWin[m.id]||0,winTotal), b:pct(bt,spanTotal), c:pct(bt,maxBusy)};
  }).sort(function(x,y){ return y.bt-x.bt; });

  /* --- ЧЁЧҷЧ Ч“Ч•ЧЁ --- */
  var rng=function(d,l){ return '<button class="btn '+(NOBLE_REP_DAYS===d?'':'ghost')+' sm" onclick="nobleRepRange('+d+',\''+containerId+'\')">'+l+'</button>'; };
  var mini=function(v,l){ return '<div style="flex:1;min-width:120px;text-align:center;padding:8px 4px"><div style="font-size:22px;font-weight:700;color:var(--navy)">'+v+'</div><div class="muted" style="font-size:12px">'+l+'</div></div>'; };
  var medals=['рҹҘҮ','рҹҘҲ','рҹҘү'];
  var h='<h3 style="margin:16px 0 8px">ЧһЧӣЧ‘ЧЎЧ” вҖ” Ч‘ЧҷЧҰЧ•ЧўЧҷЧқ</h3>'+
    '<div class="card"><div class="row" style="align-items:center;flex-wrap:wrap"><div class="row grow" style="gap:6px">'+rng(7,'7 ЧҷЧһЧҷЧқ')+rng(30,'30 ЧҷЧ•Чқ')+rng(90,'90 ЧҷЧ•Чқ')+'</div>'+internalChk(containerId==='repNoble'?'renderNobleReports':'biNobleToggle')+'</div>'+
    '<div class="row" style="flex-wrap:wrap;margin-top:6px">'+mini(Math.round(kg*100)/100,'Ч§&quot;Ч’ (Ч§ЧңЧҷЧҳЧ•ЧӘ Ч©Ч ЧһЧЎЧЁЧ•)')+mini(ils(rev),'Ч”ЧӣЧ ЧЎЧ•ЧӘ ЧһЧӣЧ‘ЧЎЧ” (ЧңЧӨЧ Чҷ ЧһЧў&quot;Чһ)')+mini(del,'Ч§ЧңЧҷЧҳЧ•ЧӘ Ч ЧһЧЎЧЁЧ•')+'</div></div>';
  h+='<div class="card"><h3>ЧўЧ•Ч‘Ч“ЧҷЧқ вҖ” ЧһЧ”ЧҷЧЁЧ•ЧӘ ЧһЧўЧ‘ЧЁ Ч‘ЧҷЧҹ Ч©ЧңЧ‘ЧҷЧқ</h3><div class="muted" style="font-size:12px;margin:2px 0 6px">ЧӣЧһЧ” Ч–ЧһЧҹ ЧўЧ‘ЧЁ ЧһЧЎЧҷЧ•Чқ Ч©ЧңЧ‘ Ч©Чң ЧўЧ’ЧңЧ” Ч•ЧўЧ“ Ч©Ч”ЧўЧ•Ч‘Ч“ Ч”ЧӘЧ—ЧҷЧң Ч‘Ч” ЧҗЧӘ Ч”Ч©ЧңЧ‘ Ч”Ч‘Чҗ. ЧӨЧ—Ч•ЧӘ = ЧҳЧ•Ч‘ ЧҷЧ•ЧӘЧЁ.</div>'+
    (lb.length?'<table><tr><th></th><th>ЧўЧ•Ч‘Ч“</th><th>ЧһЧўЧ‘ЧЁЧҷЧқ</th><th>Ч–ЧһЧҹ ЧһЧўЧ‘ЧЁ ЧһЧһЧ•ЧҰЧў</th><th>ЧӨЧўЧ•ЧңЧ•ЧӘ Ч‘ЧӘЧ§Ч•ЧӨЧ”</th></tr>'+
      lb.map(function(w,i){ return '<tr><td>'+(medals[i]||(i+1))+'</td><td><b>'+esc(w.name)+'</b></td><td>'+w.moves+'</td><td>'+(w.avg?fmtMin(w.avg):'ЧһЧҷЧҷЧ“Чҷ вҡЎ')+'</td><td>'+w.acts+'</td></tr>'; }).join('')+'</table>'
    :'<div class="empty">ЧҗЧҷЧҹ ЧўЧ“ЧҷЧҷЧҹ ЧһЧўЧ‘ЧЁЧҷ Ч©ЧңЧ‘ЧҷЧқ Ч‘ЧӘЧ§Ч•ЧӨЧ”</div>')+'</div>';
  h+='<div class="card"><h3>Ч ЧҷЧҰЧ•ЧңЧӘ ЧһЧӣЧ•Ч Ч•ЧӘ</h3><div class="muted" style="font-size:12px;margin:2px 0 8px">'+days.length+' ЧҷЧһЧҷ ЧўЧ‘Ч•Ч“Ч” Ч‘ЧӘЧ§Ч•ЧӨЧ” В· Ч©ЧңЧ•Ч©Ч” ЧһЧ“Ч“ЧҷЧқ: ЧҷЧ•Чқ ЧўЧ‘Ч•Ч“Ч” 05:00вҖ“17:00 В· ЧһЧ”ЧӨЧўЧңЧ” ЧЁЧҗЧ©Ч•Ч Ч” ЧўЧ“ ЧўЧҰЧҷЧЁЧ” ЧҗЧ—ЧЁЧ•Ч Ч” В· ЧҷЧ—ЧЎЧҷЧӘ ЧңЧһЧӣЧ•Ч Ч” Ч”ЧўЧһЧ•ЧЎЧ” Ч‘ЧҷЧ•ЧӘЧЁ.</div>';
  if(!machRows.length) h+='<div class="empty">ЧңЧҗ Ч”Ч•Ч’Ч“ЧЁЧ• ЧһЧӣЧ•Ч Ч•ЧӘ</div>';
  machRows.forEach(function(m){
    h+='<div style="padding:6px 0;border-top:1px solid var(--line)"><div class="row"><b class="grow">'+esc(m.id)+'</b><span class="muted" style="font-size:12px">'+esc(m.stage)+(m.stage?' В· ':'')+Math.round(m.bt/6)/10+' Ч©ЧўЧ•ЧӘ ЧўЧ‘Ч•Ч“Ч”</span></div>'+
      '<div class="grid3" style="gap:8px;margin-top:4px">'+
      '<div><div class="muted" style="font-size:11px">ЧҷЧ•Чқ ЧўЧ‘Ч•Ч“Ч” (05:00вҖ“17:00): <b>'+m.a+'%</b></div>'+bar(m.a,'var(--teal)')+'</div>'+
      '<div><div class="muted" style="font-size:11px">ЧһЧ”ЧӘЧ ЧўЧ” ЧўЧ“ ЧўЧҰЧҷЧЁЧ”: <b>'+m.b+'%</b></div>'+bar(m.b,'var(--navy)')+'</div>'+
      '<div><div class="muted" style="font-size:11px">ЧҷЧ—ЧЎЧҷЧӘ ЧңЧўЧһЧ•ЧЎЧ” Ч‘ЧҷЧ•ЧӘЧЁ: <b>'+m.c+'%</b></div>'+bar(m.c,'var(--amber)')+'</div>'+
      '</div></div>';
  });
  h+='</div>';
  box.innerHTML=h;
}

  el('main').innerHTML = '<div class="section-title"><h2>Ч‘ЧЁЧ§Ч•Ч“ЧҷЧқ</h2><button class="btn" onclick="printBarcodes()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Ч”Ч“ЧӨЧЎ ЧһЧ“Ч‘Ч§Ч•ЧӘ</button></div>'+

    '<div class="frow"><label>Ч—ЧҷЧӨЧ•Ч© ЧһЧ–Ч”Ч”</label><input id="bc_search" oninput="renderBarcodeList()" placeholder="MAPA00..."></div>'+
    '</div></div><div id="bcList" class="grid3"></div>';
  renderBarcodeList();

function barcodeEntries(){
  var kind = el('bc_kind').value, itemF = el('bc_item').value, q = (el('bc_search').value||'').toUpperCase();
  var list = [];
  if(kind==='units') list = DB.units.filter(u=>u.status!=='Ч’ЧЁЧ•Чҳ').map(u=>({code:String(u.barcode), label:item(u.item_id), item_id:u.item_id}));
  if(kind==='items') list = DB.items.filter(i=>i.barcode).map(i=>({code:String(i.barcode), label:i.name, item_id:i.id}));
  if(kind==='carts') list = DB.carts.filter(c=>c.barcode).map(c=>({code:String(c.barcode), label:'ЧўЧ’ЧңЧ” '+c.id, item_id:''}));
  if(kind==='packages') list = DB.laundryTasks.filter(t=>t.package_barcode).map(t=>({code:String(t.package_barcode), label:'ЧҗЧЁЧҷЧ–Ч” В· '+item(t.item_id), item_id:t.item_id}));
  if(itemF) list = list.filter(x=>x.item_id===itemF);
  if(q) list = list.filter(x=>x.code.toUpperCase().includes(q));
  return list;
}
function safeBarcode(code){
  try{ return code128Svg(code); }catch(e){ return '<div class="muted" style="padding:14px">Ч‘ЧЁЧ§Ч•Ч“ Ч—ЧҷЧҷЧ‘ ЧҗЧ•ЧӘЧҷЧ•ЧӘ/ЧЎЧӨЧЁЧ•ЧӘ Ч‘ЧҗЧ Ч’ЧңЧҷЧӘ</div>'; }
}
function renderBarcodeList(){
  var list = barcodeEntries();
  el('bcList').innerHTML = list.length? list.slice(0,200).map(b=>'<div class="card" style="text-align:center">'+safeBarcode(b.code)+'<div class="muted">'+esc(b.label)+'</div></div>').join('')
    : '<div class="card empty" style="grid-column:1/-1">ЧҗЧҷЧҹ Ч‘ЧЁЧ§Ч•Ч“ЧҷЧқ ЧңЧӨЧҷЧңЧҳЧЁ Ч–Ч”. ЧҷЧ—ЧҷЧ“Ч•ЧӘ ЧҷЧ•ЧҰЧЁЧҷЧқ ЧһЧһЧЎЧҡ ЧӨЧЁЧҷЧҳЧҷЧқ вҶҗ "ЧҷЧ—ЧҷЧ“Ч•ЧӘ"</div>';
}
function printBarcodes(){
  var list = barcodeEntries();
  if(!list.length) return toast('ЧҗЧҷЧҹ Ч‘ЧЁЧ§Ч•Ч“ЧҷЧқ ЧңЧ”Ч“ЧӨЧЎЧ”', true);
  var w = window.open('','_blank');
  w.document.write('<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><style>body{font-family:Arial;display:flex;flex-wrap:wrap;gap:6px;padding:8px}'+
    '.lbl{border:1px dashed #999;padding:8px;text-align:center;font-size:11px;page-break-inside:avoid}</style></head><body>'+
    list.map(b=>'<div class="lbl">'+safeBarcode(b.code)+'<div>'+esc(b.label)+'</div></div>').join('')+
    '<script>window.onload=function(){window.print();}<\/script></body></html>');
  w.document.close();
}

function liveUnits(iid){ return (DB.units||[]).filter(u=>u.item_id===iid && u.deleted!=='ЧӣЧҹ'); }
function fexpPaid(id){ return Math.round(((DB.expensePayments||[]).filter(x=>x.fexp_id===id).reduce((s,x)=>s+Number(x.amount||0),0))*100)/100; }
function fexpRemain(fe){ return Math.round((Number(fe.amount||0)-fexpPaid(fe.id))*100)/100; }
function supOpenFexp(sid){ return fexpAll().filter(x=>String(x.supplier_id||'')===String(sid) && x.status!=='Ч©Ч•ЧңЧқ'); }
function supBalance(sid){ return Math.round(supOpenFexp(sid).reduce((s,x)=>s+fexpRemain(x),0)*100)/100; }
function payDocsOf(kind,pid){ return (DB.paymentDocs||[]).filter(d=>d.pay_kind===kind && String(d.pay_id)===String(pid)); }
var UNITS_SHOW_DEL = false;

// B27: Ч—ЧңЧ•Чҹ ЧһЧЎЧӨЧ•ЧЁ Ч”ЧҷЧ—ЧҷЧ“Ч•ЧӘ вҖ” Ч”ЧЎЧ‘ЧЁ ЧһЧӨЧ•ЧЁЧ© ЧһЧ” Ч–Ч” ЧўЧ•Ч©Ч”, Ч‘Ч—ЧҷЧЁЧ” ЧһЧЁЧ•Ч‘Ч”, Ч•ЧһЧ—ЧҷЧ§Ч” ЧЁЧӣЧ”/ЧһЧңЧҗЧ”
function unitsModal(iid){

  var all = (DB.units||[]).filter(u=>u.item_id===iid);
  var units = UNITS_SHOW_DEL ? all : all.filter(u=>u.deleted!=='ЧӣЧҹ');
  var delCount = all.filter(u=>u.deleted==='ЧӣЧҹ').length;
  var liveCount = all.filter(u=>u.deleted!=='ЧӣЧҹ').length;
  var isMgr = ROLE==='ЧһЧ Ч”Чң';
  openModal('<h2>ЧһЧЎЧӨЧ•ЧЁ ЧҷЧ—ЧҷЧ“Ч•ЧӘ вҖ” '+esc(it.name)+'</h2>'+
