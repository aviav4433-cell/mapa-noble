<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MAPA·NOBLE — מערכת ניהול</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --linen:#F7F6F2; --ink:#1C2B36; --navy:#16324F; --navy2:#1F4468;
  --teal:#0E9594; --teal-d:#0B7A79; --amber:#E8A33D; --danger:#C44536;
  --ok:#2E8B57; --line:#E3E0D8; --card:#FFFFFF; --muted:#6B7A86;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--linen);color:var(--ink);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none}
input,select{font-family:inherit;font-size:15px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;width:100%}
input:focus,select:focus{outline:2px solid var(--teal);outline-offset:1px}
h1,h2,h3{font-weight:800}
#login{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:100}
#login .box{background:var(--card);border-radius:16px;padding:34px 28px;width:min(360px,90vw);text-align:center}
#login .logo{font-size:26px;font-weight:800;color:var(--navy);letter-spacing:1px}
#login .logo span{color:var(--teal)}
#login p{color:var(--muted);font-size:13px;margin:6px 0 20px}
#login input{margin-bottom:12px;text-align:center}
#login button{width:100%;background:var(--teal);color:#fff;padding:12px;border-radius:8px;font-size:16px;font-weight:600}
#loginErr{color:var(--danger);font-size:13px;min-height:18px;margin-top:8px}
#app{display:none}
header{background:var(--navy);color:#fff;padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20}
header .logo{font-weight:800;font-size:18px;letter-spacing:.5px}
header .logo span{color:#7BD8D7}
header .who{margin-inline-start:auto;font-size:12px;color:#9FB3C4}
nav{display:flex;background:#fff;border-bottom:1px solid var(--line);overflow-x:auto;position:sticky;top:48px;z-index:19;-webkit-overflow-scrolling:touch}
nav button{background:none;padding:12px 14px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap}
nav button.on{color:var(--navy);border-bottom-color:var(--teal)}
main{padding:16px;max-width:1080px;margin:0 auto;padding-bottom:40px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.grow{flex:1}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;background:#8C9BA5}
.chip.טיוטה{background:#8C9BA5}.chip.מאושרת{background:var(--teal)}.chip.סופקה{background:var(--amber)}
.chip.הוחזרה{background:var(--navy2)}.chip.הושלמה{background:var(--ok)}.chip.בוטלה,.chip.בוטל{background:var(--danger)}
.chip.פתוחה{background:var(--amber)}.chip.שולמה{background:var(--ok)}.chip.מתוכנן{background:var(--navy2)}.chip.בוצע{background:var(--ok)}
.chip.התקבלה{background:var(--ok)}
.muted{color:var(--muted);font-size:13px}
.big{font-size:20px;font-weight:800}
.btn{background:var(--teal);color:#fff;padding:9px 16px;border-radius:8px;font-size:14px;font-weight:600}
.btn:hover{background:var(--teal-d)}
.btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--line)}
.btn.warn{background:var(--amber)}
.btn.danger{background:var(--danger)}
.btn.sm{padding:5px 12px;font-size:13px}
.section-title{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px;flex-wrap:wrap;gap:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:640px){.grid3{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
.kpi .v{font-size:24px;font-weight:800;color:var(--navy)}
.kpi .l{font-size:12px;color:var(--muted)}
.kpi.alert .v{color:var(--danger)}
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.kcol{min-width:230px;flex:1;background:#EFEDE7;border-radius:12px;padding:10px}
.kcol h3{font-size:14px;color:var(--navy);margin-bottom:8px;display:flex;justify-content:space-between}
.kcol h3 .cnt{background:var(--navy);color:#fff;border-radius:12px;padding:0 8px;font-size:12px}
.ktask{background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;font-size:13px}
.ktask .t{font-weight:600}
#modalBg{position:fixed;inset:0;background:rgba(22,50,79,.55);display:none;align-items:flex-end;justify-content:center;z-index:50}
@media(min-width:641px){#modalBg{align-items:center}}
#modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:20px}
@media(min-width:641px){#modal{border-radius:16px}}
#modal h2{margin-bottom:14px;color:var(--navy)}
.frow{margin-bottom:10px}
.frow label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--navy)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:right;color:var(--muted);font-weight:600;padding:6px 4px;border-bottom:1px solid var(--line)}
td{padding:7px 4px;border-bottom:1px solid #F0EEE8}
#toast{position:fixed;bottom:20px;right:50%;transform:translateX(50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;display:none;z-index:99;max-width:90vw}
#toast.err{background:var(--danger)}
@media(min-width:900px){
  nav{position:fixed;top:48px;right:0;bottom:0;width:190px;flex-direction:column;border-bottom:none;border-left:1px solid var(--line);overflow-y:auto;overflow-x:hidden}
  nav button{text-align:right;border-bottom:none;border-right:4px solid transparent;padding:12px 16px;font-size:15px}
  nav button.on{border-right-color:var(--teal);background:var(--linen)}
  main{margin-right:190px;max-width:none;padding:20px 26px}
}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calhead{text-align:center;font-weight:800;color:var(--navy);font-size:13px;padding:4px 0}
.calday{background:var(--card);border:1px solid var(--line);border-radius:8px;min-height:86px;padding:4px;font-size:11px;cursor:pointer;overflow:hidden}
.calday.today{border-color:var(--teal);border-width:2px}
.calday.other{opacity:.35}
.calday .dnum{font-weight:800;font-size:13px}
.calday .dheb{color:var(--muted);font-size:10px}
.calev{border-radius:4px;color:#fff;padding:1px 4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#camOverlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
#camOverlay video{width:min(94vw,560px);border-radius:12px}
.empty{text-align:center;color:var(--muted);padding:28px;font-size:14px}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tabs button{background:#fff;border:1px solid var(--line);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--muted)}
.tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.scanbox{font-size:22px;text-align:center;letter-spacing:2px}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div class="logo">MAPA<span>·</span>NOBLE</div>
    <p>מערכת ניהול השכרה, כביסה וכספים</p>
    <input id="pw" type="password" placeholder="סיסמת מערכת">
    <input id="pin" type="password" inputmode="numeric" placeholder="קוד עובד (אם הוגדר)" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">כניסה</button>
    <button style="background:none;color:var(--teal);margin-top:10px;font-size:14px;text-decoration:underline" onclick="showPortalLogin()">כניסת לקוחות (פורטל הזמנות)</button>
    <div id="loginErr"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">MAPA<span>·</span>NOBLE</div>
    <div class="who" id="whoLbl"></div>
    <button class="btn sm ghost" onclick="refresh()">רענון</button>
  </header>
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<div id="modalBg" onclick="if(event.target===this)closeModal()"><div id="modal"></div></div>
<div id="toast"></div>

<script>
/* ================= הגדרות ================= */
var API_URL = 'https://script.google.com/macros/s/AKfycbyAFqEJrLLbRT-o5D7slN9lieaIjR8YKFiToy20iHgjS5F4QbDptfD-7al2Ywhs6WA1Hg/exec';
var PASS = '', USER = '', ROLE = '', CAN_EDIT = true, USER_VIEWS = '';
var DB = null, VIEW = 'dash', FIN_TAB = 'invoices';
var STAGES = ['התקבל','בכביסה','בייבוש','בגיהוץ וקיפול','מוכן'];

/* ================= API ================= */
async function api(action, payload){
  var res = await fetch(API_URL, { method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({ password: PASS, user: USER, action: action, payload: payload||{} })});
  return res.json();
}
async function doLogin(){
  PASS = el('pw').value;
  el('loginErr').textContent = 'מתחבר...';
  try{
    var lg = await api('login', { pin: el('pin').value });
    if(!lg.ok){ el('loginErr').textContent = lg.error; return; }
    USER = lg.user; ROLE = lg.role; CAN_EDIT = lg.can_edit !== false; USER_VIEWS = lg.views || '';
    var r = await api('getAll');
    if(!r.ok){ el('loginErr').textContent = r.error; return; }
    DB = r.db;
    el('login').style.display='none';
    el('app').style.display='block';
    el('whoLbl').textContent = USER + ' · ' + ROLE;
    render();
  }catch(e){ el('loginErr').textContent = 'שגיאת חיבור — בדוק את כתובת השרת'; }
}
async function refresh(){ var r = await api('getAll'); if(r.ok){ DB=r.db; render(); toast('עודכן'); } }
async function act(action, payload, okMsg){
  if(!CAN_EDIT && !['clock'].includes(action)) { toast('למשתמש זה הרשאת צפייה בלבד', true); return null; }
  var r = await api(action, payload);
  if(!r.ok){ toast(r.error, true); return null; }
  var g = await api('getAll'); if(g.ok) DB=g.db;
  render(); if(okMsg) toast(okMsg);
  return r;
}

/* ================= helpers ================= */
function el(id){ return document.getElementById(id); }
function toast(msg, err){
  var t = el('toast'); t.textContent = msg; t.className = err?'err':''; t.style.display='block';
  clearTimeout(t._h); t._h=setTimeout(function(){ t.style.display='none'; }, 3500);
}
function esc(s){ return String(s==null?'':s).replace(/</g,'&lt;'); }
function cust(id){ var c=DB.customers.find(x=>x.id===id); return c?c.name:(id||''); }
function item(id){ var i=DB.items.find(x=>x.id===id); return i?i.name:id; }
function supp(id){ var s=DB.suppliers.find(x=>x.id===id); return s?s.name:(id||''); }
function ils(n){ return '₪' + Number(n||0).toLocaleString('he-IL',{maximumFractionDigits:2}); }
function orderTotal(oid){ return DB.orderLines.filter(l=>l.order_id===oid).reduce((s,l)=>s+Number(l.qty)*Number(l.unit_price),0); }
function orderPaid(oid){ return DB.payments.filter(p=>p.order_id===oid).reduce((s,p)=>s+Number(p.amount),0); }
function orderBalance(oid){
  var inv = DB.invoices.find(v=>v.order_id===oid && v.status!=='בוטלה');
  return (inv? Number(inv.total) : orderTotal(oid)) - orderPaid(oid);
}
function closeModal(){ el('modalBg').style.display='none'; }
function openModal(html){ el('modal').innerHTML = html; el('modalBg').style.display='flex'; }
function sel(id, arr, labelFn, valFn){
  return '<select id="'+id+'">'+arr.map(x=>'<option value="'+(valFn?valFn(x):x.id)+'">'+esc(labelFn(x))+'</option>').join('')+'</select>';
}

function setting(k){ var s=(DB.settings||[]).find(x=>x.key===k); return s?String(s.value):''; }

/* ===== ברקוד Code128 — עבר בדיקות תקן ===== */
// Code128-B — מחולל תקני
var C128 = ('212222 222122 222221 121223 121322 131222 122213 122312 132212 221213 '+
'221312 231212 112232 122132 122231 113222 123122 123221 223211 221132 '+
'221231 213212 223112 312131 311222 321122 321221 312212 322112 322211 '+
'212123 212321 232121 111323 131123 131321 112313 132113 132311 211313 '+
'231113 231311 112133 112331 132131 113123 113321 133121 313121 211331 '+
'231131 213113 213311 213131 311123 311321 331121 312113 312311 332111 '+
'314111 221411 431111 111224 111422 121124 121421 141122 141221 112214 '+
'112412 122114 122411 142112 142211 241211 221114 413111 241112 134111 '+
'111242 121142 121241 114212 124112 124211 411212 421112 421211 212141 '+
'214121 412121 111143 111341 131141 114113 114311 411113 411311 113141 '+
'114131 311141 411131 211412 211214 211232').split(' ');
var C128_STOP = '2331112';

function code128Widths(text) {
  var vals = [104]; // Start-B
  for (var i = 0; i < text.length; i++) {
    var v = text.charCodeAt(i) - 32;
    if (v < 0 || v > 94) throw new Error('תו לא נתמך בברקוד: ' + text[i]);
    vals.push(v);
  }
  var sum = vals[0];
  for (var j = 1; j < vals.length; j++) sum += vals[j] * j;
  vals.push(sum % 103); // checksum
  var widths = '';
  vals.forEach(function(v){ widths += C128[v]; });
  return widths + C128_STOP;
}

function code128Svg(text, h) {
  h = h || 46;
  var w = code128Widths(text);
  var scale = 2, x = 0, bars = '';
  for (var i = 0; i < w.length; i++) {
    var ww = Number(w[i]) * scale;
    if (i % 2 === 0) bars += '<rect x="'+x+'" y="0" width="'+ww+'" height="'+h+'" fill="#000"/>';
    x += ww;
  }
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+x+'" height="'+(h+16)+'" viewBox="0 0 '+x+' '+(h+16)+'">'+bars+
    '<text x="'+(x/2)+'" y="'+(h+13)+'" text-anchor="middle" font-family="monospace" font-size="12">'+text+'</text></svg>';
}



/* ===== מנוע הדפסת מסמכים רשמיים ===== */
function docHeader(title, num, date){
  var logo = setting('logo_url');
  return '<div class="dhead"><div>'+
    (logo?'<img src="'+esc(logo)+'" style="max-height:60px;max-width:180px">':'')+
    '<div class="bname">'+esc(setting('business_name'))+'</div>'+
    '<div class="bsub">'+esc(setting('business_address'))+(setting('business_phone')?' · טל׳ '+esc(setting('business_phone')):'')+(setting('business_vat')?' · ע.מ/ח.פ '+esc(setting('business_vat')):'')+'</div>'+
    '</div><div style="text-align:left"><div class="dtitle">'+esc(title)+(num?' מס׳ '+num:'')+'</div><div class="bsub">תאריך: '+esc(date||new Date().toISOString().slice(0,10))+'</div></div></div>';
}
function printDoc(title, num, bodyHtml, opts){
  opts = opts||{};
  var w = window.open('', '_blank');
  w.document.write('<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><title>'+esc(title)+'</title><style>'+
  'body{font-family:Arial,sans-serif;color:#1C2B36;padding:24px;max-width:760px;margin:0 auto;font-size:14px}'+
  '.dhead{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #16324F;padding-bottom:12px;margin-bottom:18px}'+
  '.bname{font-size:22px;font-weight:800;color:#16324F}.bsub{font-size:12px;color:#666}.dtitle{font-size:18px;font-weight:800}'+
  'table{width:100%;border-collapse:collapse;margin:10px 0}th{background:#16324F;color:#fff;padding:7px;text-align:right;font-size:13px}'+
  'td{padding:7px;border-bottom:1px solid #ddd}.tot{font-weight:800;font-size:15px}'+
  '.sig{display:flex;justify-content:space-between;margin-top:50px}.sig div{width:40%;border-top:1px solid #333;padding-top:6px;text-align:center;font-size:13px}'+
  '.foot{margin-top:30px;text-align:center;font-size:12px;color:#888;border-top:1px solid #ddd;padding-top:10px}'+
  'pre{white-space:pre-wrap;font-family:inherit;line-height:1.7}@media print{body{padding:0}}'+
  '</style></head><body>'+docHeader(title, opts.num, opts.date)+bodyHtml+
  (opts.signatures?'<div class="sig"><div>חתימת הלקוח</div><div>חתימת נציג '+esc(setting('business_name'))+'</div></div>':'')+
  '<div class="foot">'+esc(setting('doc_footer'))+'</div>'+
  '<script>window.onload=function(){window.print();}<\/script></body></html>');
  w.document.close();
}
function linesTable(lines, withReturned){
  return '<table><tr><th>פריט</th><th>כמות</th><th>מחיר יח׳</th><th>סה"כ</th>'+(withReturned?'<th>הוחזר</th>':'')+'</tr>'+
    lines.map(l=>'<tr><td>'+esc(item(l.item_id))+'</td><td>'+l.qty+'</td><td>'+ils(l.unit_price)+'</td><td>'+ils(Number(l.qty)*Number(l.unit_price))+'</td>'+(withReturned?'<td>'+(l.returned_qty===''?'—':l.returned_qty)+'</td>':'')+'</tr>').join('')+'</table>';
}
function custBlock(cid){
  var c = DB.customers.find(x=>x.id===cid)||{};
  var k = DB.contacts.find(x=>x.customer_id===cid&&x.is_primary==='כן')||DB.contacts.find(x=>x.customer_id===cid)||{};
  return '<p><b>לקוח:</b> '+esc(c.name)+(c.vat_id?' · ח.פ '+esc(c.vat_id):'')+(c.address?' · '+esc(c.address):'')+
    (k.name?'<br><b>איש קשר:</b> '+esc(k.name)+(k.phone?' · '+esc(k.phone):''):'')+'</p>';
}
function printDeliveryNote(did){
  var d = DB.deliveries.find(x=>x.id===did); if(!d) return;
  var o = DB.orders.find(x=>x.id===d.order_id)||{};
  var lines = DB.orderLines.filter(l=>l.order_id===d.order_id);
  printDoc('תעודת משלוח — '+d.kind, d.note_number,
    custBlock(o.customer_id)+
    '<p><b>תאריך '+(d.kind==='אספקה'?'אספקה':'איסוף')+':</b> '+esc(d.date)+(d.driver?' · <b>נהג:</b> '+esc(d.driver):'')+' · <b>הזמנה:</b> '+esc(o.start_date)+' — '+esc(o.end_date)+'</p>'+
    linesTable(lines, d.kind==='איסוף'), {num:d.note_number, date:d.date, signatures:true});
}
function printOrderForm(oid){
  var o = DB.orders.find(x=>x.id===oid); if(!o) return;
  var lines = DB.orderLines.filter(l=>l.order_id===oid);
  var total = orderTotal(oid);
  printDoc(o.status==='הצעת מחיר'?'הצעת מחיר':'טופס הזמנה', null,
    custBlock(o.customer_id)+
    '<p><b>סוג:</b> '+esc(o.type)+' · <b>מתאריך:</b> '+esc(o.start_date)+' · <b>עד:</b> '+esc(o.end_date)+(o.notes?'<br><b>הערות:</b> '+esc(o.notes):'')+'</p>'+
    linesTable(lines)+
    '<p class="tot">סה"כ (לפני מע"מ): '+ils(total)+' · מע"מ 18%: '+ils(total*0.18)+' · <u>סה"כ לתשלום: '+ils(total*1.18)+'</u></p>',
    {date:o.created_at, signatures:true});
}
function printInvoice(vid){
  var v = DB.invoices.find(x=>x.id===vid); if(!v) return;
  var lines = DB.orderLines.filter(l=>l.order_id===v.order_id);
  printDoc('חשבונית עסקה', v.number,
    custBlock(v.customer_id)+linesTable(lines)+
    '<p class="tot">סכום: '+ils(v.subtotal)+' · מע"מ '+(Number(v.vat_rate)*100)+'%: '+ils(v.vat)+' · <u>סה"כ: '+ils(v.total)+'</u></p>'+
    (v.status==='בוטלה'?'<p style="color:#C44536;font-weight:800">— מבוטלת —</p>':''),
    {num:v.number, date:v.date});
}
function printReceipt(pid){
  var p = DB.payments.find(x=>x.id===pid); if(!p) return;
  var o = DB.orders.find(x=>x.id===p.order_id)||{};
  printDoc('קבלה', p.receipt_number,
    custBlock(o.customer_id)+
    '<table><tr><th>תאריך</th><th>אמצעי תשלום</th><th>סכום</th></tr><tr><td>'+esc(p.date)+'</td><td>'+esc(p.method)+'</td><td class="tot">'+ils(p.amount)+'</td></tr></table>',
    {num:p.receipt_number, date:p.date});
}
function printAgreement(cid){
  printDoc('הסכם שירות', null,
    custBlock(cid)+'<pre>'+esc(setting('agreement_text'))+'</pre>', {signatures:true});
}

  ['laundry','כביסה'],['deliveries','משלוחים'],['finance','כספים'],
  ['customers','לקוחות'],['items','פריטים ומלאי'],['purchasing','רכש וספקים'],['scan','סריקה'],['barcodes','ברקודים'],
  ['reports','דוחות'],['assets','עגלות ומכונות'],['staff','עובדים'],['attendance','נוכחות'],['payroll','שכר'],['settings','מיתוג והגדרות']];
function render(){
  var views = VIEWS.filter(function(v){
    if(USER_VIEWS) return USER_VIEWS.split(',').map(s=>s.trim()).includes(v[0]);
    if(ROLE==='מכבסה') return ['dash','laundry','scan','assets','attendance','tasks'].includes(v[0]);

    staff:rStaff,attendance:rAttendance,payroll:rPayroll,settings:rSettings})[VIEW]();
}
function go(v){ VIEW=v; render(); window.scrollTo(0,0); }

/* ================= לוח בקרה ================= */
function rDash(){
  var today = new Date().toISOString().slice(0,10);
  var week = new Date(Date.now()+6*864e5).toISOString().slice(0,10);
  var upcoming = DB.orders.filter(o=>o.type==='השכרה' && o.status==='מאושרת' && o.start_date<=week && o.end_date>=today);
  var out = DB.orders.filter(o=>o.status==='סופקה');
  var inWash = DB.laundryTasks.filter(t=>t.stage!=='מוכן');
  var debt = DB.customers.reduce((s,c)=>s+custBalance(c.id),0);
  var delToday = DB.deliveries.filter(d=>d.status==='מתוכנן' && d.date<=today);
  var openInv = DB.invoices.filter(v=>v.status==='פתוחה').length;
  el('main').innerHTML =
    '<div class="grid3">'+
    kpi(delToday.length,'משלוחים להיום', delToday.length>0)+
    kpi(upcoming.length,'אספקות השבוע')+
    kpi(out.length,'הזמנות בחוץ')+
    kpi(inWash.reduce((s,t)=>s+Number(t.qty),0),'פריטים בכביסה')+
    kpi(ils(debt),'יתרות לגבייה', debt>0)+
    kpi(openInv,'חשבוניות פתוחות', openInv>0)+
    '</div>'+
    (delToday.length?'<div class="section-title"><h2>משלוחים להיום</h2></div>'+delToday.map(delivCard).join(''):'')+
    '<div class="section-title"><h2>אספקות קרובות</h2></div>'+
    (upcoming.length? upcoming.sort((a,b)=>a.start_date>b.start_date?1:-1).map(orderCard).join('') : '<div class="card empty">אין אספקות מתוכננות השבוע</div>');
}
function kpi(v,l,alert){ return '<div class="kpi'+(alert?' alert':'')+'"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>'; }
function custBalance(cid){
  return DB.orders.filter(o=>o.customer_id===cid && !['בוטלה','טיוטה','הצעת מחיר'].includes(o.status)).reduce((s,o)=>s+orderBalance(o.id),0);
}

    '<div class="muted">'+esc(o.start_date)+' ← '+esc(o.end_date)+'</div></div>'+
    (bal>0.01?'<div class="muted">יתרה '+ils(bal)+'</div>':'')+
    '<span class="chip '+esc(o.status)+'">'+esc(o.status)+'</span></div></div>';
}
function rOrders(){

async function createOrder(isQuote){
  var r = await act('create',{table:'orders',row:{type:el('f_type').value,customer_id:el('f_cust').value,
    start_date:el('f_start').value,end_date:el('f_end').value,notes:el('f_notes').value,status:isQuote?'הצעת מחיר':'טיוטה'}},'נשמר — הוסף פריטים');
  if(r){ closeModal(); openOrder(r.row.id); }
}
function openOrder(oid){
  var o = DB.orders.find(x=>x.id===oid); if(!o) return;
  var lines = DB.orderLines.filter(l=>l.order_id===oid);
  var pays = DB.payments.filter(p=>p.order_id===oid);
  var inv = DB.invoices.find(v=>v.order_id===oid && v.status!=='בוטלה');
  var delivs = DB.deliveries.filter(d=>d.order_id===oid);
  var total = orderTotal(oid), bal = orderBalance(oid);
  var editable = (o.status==='טיוטה'||o.status==='הצעת מחיר');
  var actions = '';
  if(o.status==='הצעת מחיר') actions = '<button class="btn" onclick="doAct(\'convertQuote\',\''+oid+'\',\'הומרה להזמנה\')">המר להזמנה</button> <button class="btn danger sm" onclick="doCancel(\''+oid+'\')">בטל</button>';
  if(o.status==='טיוטה') actions = '<button class="btn" onclick="doAct(\'approveOrder\',\''+oid+'\',\'אושרה — המלאי שוריין ונוצרו משלוחים\')">אשר (בדיקת מלאי)</button> <button class="btn danger sm" onclick="doCancel(\''+oid+'\')">בטל</button>';
  if(o.status==='מאושרת') actions = '<button class="btn warn" onclick="doAct(\'deliverOrder\',\''+oid+'\',\'סומנה כסופקה\')">סמן כסופקה</button>'+(inv?'':' <button class="btn ghost" onclick="doInvoice(\''+oid+'\')">הפק חשבונית</button>')+' <button class="btn danger sm" onclick="doCancel(\''+oid+'\')">בטל</button>';
  if(o.status==='סופקה') actions = '<button class="btn" onclick="returnForm(\''+oid+'\')">קבל החזרה</button>'+(inv?'':' <button class="btn ghost" onclick="doInvoice(\''+oid+'\')">הפק חשבונית</button>');
  if((o.status==='הוחזרה'||o.status==='הושלמה')&&!inv) actions = '<button class="btn ghost" onclick="doInvoice(\''+oid+'\')">הפק חשבונית</button>';
  openModal('<h2>'+esc(cust(o.customer_id))+' <span class="chip '+esc(o.status)+'">'+esc(o.status)+'</span></h2>'+
    '<div class="muted" style="margin-bottom:12px">'+esc(o.type)+' · '+esc(o.start_date)+' ← '+esc(o.end_date)+(o.notes?' · '+esc(o.notes):'')+'</div>'+
    '<h3>פריטים</h3><table><tr><th>פריט</th><th>כמות</th><th>מחיר</th><th>הוחזר</th></tr>'+
    lines.map(l=>'<tr><td>'+esc(item(l.item_id))+'</td><td>'+l.qty+'</td><td>'+ils(l.unit_price)+'</td><td>'+(l.returned_qty===''?'—':l.returned_qty)+'</td></tr>').join('')+
    '</table>'+
    (editable?'<div style="margin:10px 0"><button class="btn ghost sm" onclick="addLineForm(\''+oid+'\')">+ הוסף פריט</button></div>':'')+
    '<h3 style="margin-top:14px">כספים</h3>'+
    '<div class="row" style="margin:6px 0"><div class="grow">סה"כ: <b>'+ils(total)+'</b>'+
    (inv?' · חשבונית '+inv.number+' (כולל מע"מ '+ils(inv.total)+') <span class="chip '+esc(inv.status)+'">'+esc(inv.status)+'</span>':'')+
    ' · יתרה: <b style="color:'+(bal>0.01?'var(--danger)':'var(--ok)')+'">'+ils(bal)+'</b></div>'+
    (bal>0.01 && !editable?'<button class="btn ghost sm" onclick="payForm(\''+oid+'\')">+ תשלום</button>':'')+'</div>'+
    (pays.length?'<table><tr><th>קבלה</th><th>תאריך</th><th>סכום</th><th>אמצעי</th></tr>'+pays.map(p=>'<tr><td>'+p.receipt_number+'</td><td>'+esc(p.date)+'</td><td>'+ils(p.amount)+'</td><td>'+esc(p.method)+'</td></tr>').join('')+'</table>':'')+
    (delivs.length?'<h3 style="margin-top:14px">משלוחים</h3>'+delivs.map(d=>'<div class="row" style="padding:5px 0"><div class="grow">'+esc(d.kind)+' · '+esc(d.date)+(d.driver?' · '+esc(d.driver):'')+'</div><span class="chip '+esc(d.status)+'">'+esc(d.status)+'</span></div>').join(''):'')+
    '<div style="margin-top:16px" class="row">'+actions+' <button class="btn ghost sm" onclick="printOrderForm(\''+oid+'\')">🖨 '+(o.status==='הצעת מחיר'?'הצעת מחיר':'טופס הזמנה')+'</button></div>');
}

/* ===== סריקה במצלמה: BarcodeDetector מובנה, ואם אין — ZXing ===== */
var CAM_STREAM = null, CAM_STOP = false, ZX_READER = null;
async function startCam(){
  var ov = el('camOverlay');
  if(!ov){
    ov = document.createElement('div'); ov.id='camOverlay';
    ov.innerHTML = '<video id="camVideo" autoplay playsinline muted></video>'+
      '<p style="color:#fff;margin:12px">כוון את הברקוד למרכז המסך</p>'+
      '<button class="btn danger" onclick="stopCam()">סגור</button>';
    document.body.appendChild(ov);
  }
  ov.style.display='flex'; CAM_STOP=false;
  try{
    CAM_STREAM = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  }catch(e){ stopCam(); return toast('אין גישה למצלמה — אשר הרשאה בדפדפן', true); }
  var video = el('camVideo');
  video.srcObject = CAM_STREAM;
  if('BarcodeDetector' in window){
    var det = new BarcodeDetector({formats:['code_128','ean_13','qr_code']});
    (async function loop(){
      if(CAM_STOP) return;
      try{ var codes = await det.detect(video); if(codes.length) return camFound(codes[0].rawValue); }catch(e){}
      setTimeout(loop, 250);
    })();
  } else {
    if(!window.ZXing){
      await new Promise(function(res){ var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/zxing-library/0.21.3/index.min.js';
        s.onload=res; s.onerror=res; document.head.appendChild(s); });
    }
    if(!window.ZXing){ stopCam(); return toast('הדפדפן לא תומך בסריקה — הקלד ידנית', true); }
    ZX_READER = new ZXing.BrowserMultiFormatReader();
    ZX_READER.decodeFromVideoDevice(null, 'camVideo', function(result){ if(result && !CAM_STOP) camFound(result.getText()); });
  }
}
function camFound(text){
  stopCam();
  if(navigator.vibrate) navigator.vibrate(80);
  if(VIEW!=='scan'){ VIEW='scan'; render(); }
  setTimeout(function(){ el('scanIn').value = text; doScan(); }, 150);
}
function stopCam(){
  CAM_STOP = true;
  if(ZX_READER){ try{ ZX_READER.reset(); }catch(e){} ZX_READER=null; }
  if(CAM_STREAM){ CAM_STREAM.getTracks().forEach(t=>t.stop()); CAM_STREAM=null; }
  var ov = el('camOverlay'); if(ov) ov.style.display='none';
}

/* ================= יומן ================= */
var CAL_Y = new Date().getFullYear(), CAL_M = new Date().getMonth();
function hebFmt(d, opts){ try{ return new Intl.DateTimeFormat('he-u-ca-hebrew', opts).format(d); }catch(e){ return ''; } }
function calEvents(){
  var events = [];
  DB.orders.filter(o=>['מאושרת','סופקה'].includes(o.status)).forEach(function(o){
    events.push({date:o.start_date, label:'אספקה: '+cust(o.customer_id), color:'var(--teal)'});
    events.push({date:o.end_date, label:'איסוף: '+cust(o.customer_id), color:'var(--amber)'});
  });
  DB.tasks.filter(t=>t.status!=='הושלמה'&&t.due_date).forEach(function(t){
    events.push({date:t.due_date, label:'משימה: '+t.title, color:'var(--navy2)', click:"openTask('"+t.id+"')"});
  });
  DB.meetings.forEach(function(m){
    events.push({date:m.date, label:'פגישה'+(m.time?' '+m.time:'')+': '+m.title, color:'var(--danger)', click:"openMeeting('"+m.id+"')"});
  });
  DB.machines.filter(m=>m.next_service).forEach(function(m){
    events.push({date:m.next_service, label:'טיפול: '+m.id, color:'#8C9BA5'});
  });
  return events;
}
function rCalendar(){
  var first = new Date(CAL_Y, CAL_M, 1);
  var today = new Date().toISOString().slice(0,10);
  var byDate = {};
  calEvents().forEach(e=>{ if(e.date) (byDate[e.date]=byDate[e.date]||[]).push(e); });
  var startOffset = first.getDay(); // 0=ראשון
  var daysInMonth = new Date(CAL_Y, CAL_M+1, 0).getDate();
  var lastDate = new Date(CAL_Y, CAL_M, daysInMonth);
  var hebRange = hebFmt(first,{month:'long',year:'numeric'});
  var hebEnd = hebFmt(lastDate,{month:'long',year:'numeric'});
  if(hebEnd && hebEnd!==hebRange) hebRange = hebFmt(first,{month:'long'})+'–'+hebEnd;
  var gregTitle = new Intl.DateTimeFormat('he',{month:'long',year:'numeric'}).format(first);
  var overdue = DB.tasks.filter(t=>t.status!=='הושלמה'&&t.due_date&&t.due_date<today);
  var cells = '';
  ['א','ב','ג','ד','ה','ו','ש'].forEach(d=>{ cells += '<div class="calhead">'+d+'</div>'; });
  for(var i=0;i<startOffset;i++) cells += '<div></div>';
  for(var day=1;day<=daysInMonth;day++){
    var d = new Date(CAL_Y, CAL_M, day);
    var iso = CAL_Y+'-'+('0'+(CAL_M+1)).slice(-2)+'-'+('0'+day).slice(-2);
    var evs = byDate[iso]||[];
    cells += '<div class="calday'+(iso===today?' today':'')+'" onclick="openDay(\''+iso+'\')">'+
      '<span class="dnum">'+day+'</span> <span class="dheb">'+esc(hebFmt(d,{day:'numeric'}))+' '+esc(hebFmt(d,{month:'long'}))+'</span>'+
      evs.slice(0,3).map(e=>'<div class="calev" style="background:'+e.color+'">'+esc(e.label)+'</div>').join('')+
      (evs.length>3?'<div class="muted">+'+(evs.length-3)+' נוספים</div>':'')+'</div>';
  }
  el('main').innerHTML = '<div class="section-title"><h2>יומן</h2><div class="row">'+
    '<button class="btn ghost sm" onclick="calNav(1)">◀ הבא</button>'+
    '<button class="btn ghost sm" onclick="CAL_Y=new Date().getFullYear();CAL_M=new Date().getMonth();rCalendar()">היום</button>'+
    '<button class="btn ghost sm" onclick="calNav(-1)">הקודם ▶</button></div></div>'+
    '<div class="card"><div style="text-align:center;margin-bottom:8px"><b style="font-size:17px">'+esc(gregTitle)+'</b><div class="muted">'+esc(hebRange)+'</div></div>'+
    '<div class="calgrid">'+cells+'</div></div>'+
    (overdue.length?'<div class="card" style="border-color:var(--danger)"><b style="color:var(--danger)">משימות באיחור:</b> '+overdue.map(t=>'<span style="cursor:pointer;text-decoration:underline" onclick="openTask(\''+t.id+'\')">'+esc(t.title)+'</span>').join(' · ')+'</div>':'');
}
function calNav(dir){ CAL_M += dir; if(CAL_M<0){CAL_M=11;CAL_Y--;} if(CAL_M>11){CAL_M=0;CAL_Y++;} rCalendar(); }
function openDay(iso){
  var evs = calEvents().filter(e=>e.date===iso);
  var d = new Date(iso);
  openModal('<h2>'+iso+'</h2><div class="muted" style="margin-bottom:10px">'+esc(hebFmt(d,{weekday:'long',day:'numeric',month:'long',year:'numeric'}))+'</div>'+
    (evs.length? evs.map(e=>'<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line)"'+(e.click?' onclick="closeModal();'+e.click+'" style="cursor:pointer"':'')+'><span class="chip" style="background:'+e.color+'">•</span><div class="grow">'+esc(e.label)+'</div></div>').join(''):'<div class="muted">אין אירועים ביום זה</div>'));
}

    d.items.map((i,ix)=>'<div class="row" style="border-bottom:1px solid var(--line);padding:7px 0"><div class="grow" style="font-size:14px"><b>'+esc(i.name)+'</b> <span class="muted">'+esc(i.size||'')+' '+esc(i.color||'')+' · '+ils(i.price)+' ליח\'</span></div>'+
      '<input type="number" min="0" placeholder="0" data-item="'+i.id+'" class="pqty" style="width:70px;text-align:center"></div>').join('')+
    '<div class="frow" style="margin-top:8px"><input id="p_notes" placeholder="הערות (רשות)"></div>'+
    '<button style="width:100%;background:var(--teal);color:#fff;padding:12px;border-radius:8px;font-size:16px;font-weight:600" onclick="portalSubmit()">שלח בקשת הזמנה</button>'+
    '<div id="loginErr"></div>'+
    (d.orders.length?'<h3 style="color:var(--navy);margin:16px 0 6px">ההזמנות שלי</h3>'+
      d.orders.slice(-8).reverse().map(o=>'<div class="row" style="padding:5px 0;border-bottom:1px solid var(--line);font-size:13px"><div class="grow">'+esc(o.start)+' — '+esc(o.end)+'</div><span class="chip '+esc(o.status)+'">'+esc(o.status)+'</span></div>').join(''):'')+
    '</div>';
}
async function portalSubmit(){
  var lines = Array.from(document.querySelectorAll('.pqty')).map(x=>({item_id:x.dataset.item,qty:Number(x.value)||0})).filter(l=>l.qty>0);
  var r = await api('portalCreateOrder',{code:PORTAL.code,start_date:el('p_start').value,end_date:el('p_end').value,lines:lines,notes:el('p_notes').value});
  if(!r.ok){ el('loginErr').textContent = r.error; return; }
  el('login').innerHTML = '<div class="box"><div class="logo">MAPA<span>·</span>NOBLE</div>'+
    '<h3 style="color:var(--ok);margin:14px 0">✓ הבקשה התקבלה!</h3>'+
    '<p>סה"כ משוער: '+ils(r.total)+' (לפני מע"מ)<br>נציג יחזור אליך לאישור סופי.</p>'+
    '<button onclick="location.reload()" style="margin-top:14px;background:var(--teal);color:#fff;padding:10px 20px;border-radius:8px">סגור</button></div>';
}
if(location.search.includes('portal=1')) window.addEventListener('load', showPortalLogin);

/* ================= עגלות ומכונות ================= */
function rAssets(){
  el('main').innerHTML =
    '<div class="section-title"><h2>עגלות</h2><button class="btn ghost sm" onclick="cartForm()">+ עגלה</button></div>'+
    (DB.carts.length?'<div class="grid3">'+DB.carts.map(c=>'<div class="kpi"><div class="v" style="font-size:17px">'+esc(c.id)+'</div><div class="l">'+esc(c.location||'')+(c.barcode?' · ⎘'+esc(c.barcode):'')+'</div><span class="chip" style="background:'+(c.status==='פנויה'?'var(--ok)':'var(--amber)')+';margin-top:6px">'+esc(c.status)+'</span></div>').join('')+'</div>':'<div class="card empty">אין עגלות</div>')+
    '<div class="section-title"><h2>מכונות</h2><button class="btn ghost sm" onclick="machForm()">+ מכונה</button></div>'+
    (DB.machines.length? DB.machines.map(m=>'<div class="card"><div class="row"><div class="grow"><b>'+esc(m.id)+'</b> · '+esc(m.type)+'<div class="muted">טיפול הבא: '+esc(m.next_service||'לא נקבע')+'</div></div><span class="chip" style="background:'+(m.status==='פעילה'?'var(--ok)':'var(--danger)')+'">'+esc(m.status)+'</span></div></div>').join(''):'<div class="card empty">אין מכונות</div>');
}
function cartForm(){
  openModal('<h2>עגלה חדשה</h2><div class="grid2"><div class="frow"><label>מזהה</label><input id="f_cartid" placeholder="CART-06"></div>'+
    '<div class="frow"><label>מיקום</label><input id="f_cartloc"></div>'+
    '<div class="frow"><label>ברקוד</label><input id="f_cartbar"></div></div>'+
    '<button class="btn" onclick="saveCart()">שמור</button>');
}
async function saveCart(){
  if(!el('f_cartid').value) return toast('מזהה חובה', true);
  var r = await act('create',{table:'carts',row:{id:el('f_cartid').value,location:el('f_cartloc').value,barcode:el('f_cartbar').value,status:'פנויה'}},'העגלה נוספה');
  if(r) closeModal();
}
function machForm(){
  openModal('<h2>מכונה חדשה</h2><div class="grid2"><div class="frow"><label>מזהה</label><input id="f_mid" placeholder="MACH-04"></div>'+
    '<div class="frow"><label>סוג</label><input id="f_mtype2" placeholder="מכונת כביסה"></div>'+
    '<div class="frow"><label>סטטוס</label><select id="f_mstat"><option>פעילה</option><option>בתיקון</option><option>מושבתת</option></select></div>'+
    '<div class="frow"><label>טיפול הבא</label><input id="f_mnext" type="date"></div></div>'+
    '<button class="btn" onclick="saveMach()">שמור</button>');
}
async function saveMach(){
  if(!el('f_mid').value) return toast('מזהה חובה', true);
  var r = await act('create',{table:'machines',row:{id:el('f_mid').value,type:el('f_mtype2').value,status:el('f_mstat').value,next_service:el('f_mnext').value}},'המכונה נוספה');
  if(r) closeModal();
}

/* ================= עובדים ================= */
function rStaff(){
  el('main').innerHTML = '<div class="section-title"><h2>עובדים</h2><button class="btn" onclick="empForm()">+ עובד</button></div>'+
    '<p class="muted" style="margin-bottom:10px">ברגע שקיים עובד אחד, הכניסה למערכת דורשת קוד עובד. תפקיד קובע אילו מסכים רואים: מכבסה — רק לוח כביסה וסריקה; נהג — רק משלוחים.</p>'+
    (DB.employees.length? DB.employees.map(e=>'<div class="card"><div class="row"><div class="grow"><b>'+esc(e.name)+'</b> · '+esc(e.role)+(e.can_edit==='לא'?' · <span class="chip" style="background:var(--amber)">צפייה בלבד</span>':'')+'<div class="muted">'+esc(e.phone||'')+(e.views?' · מסכים: '+e.views.split(',').length:'')+'</div></div>'+
    '<button class="btn ghost sm" onclick=\'empForm('+JSON.stringify(e).replace(/'/g,'&#39;')+')\'>ערוך הרשאות</button></div></div>').join(''):'<div class="card empty">אין עובדים — לכולם גישת מנהל</div>')+
    '<p class="muted" style="margin-top:10px">כניסות ייעודיות: נהג/עובד מכבסה נכנסים באותו קישור עם הקוד האישי — ורואים רק את המסכים שלהם. קישור פורטל ללקוחות: הוסף ?portal=1 לכתובת האתר. קוד הפורטל של כל לקוח מופיע בכרטיס הלקוח.</p>';
}
function empForm(emp){
  emp = emp||{};
  openModal('<h2>'+(emp.id?'עריכת עובד':'עובד חדש')+'</h2><div class="frow"><label>שם</label><input id="f_ename" value="'+esc(emp.name||'')+'"></div>'+
    '<div class="grid2"><div class="frow"><label>תפקיד</label><select id="f_erole">'+['מנהל','משרד','מכבסה','נהג'].map(t=>'<option'+(emp.role===t?' selected':'')+'>'+t+'</option>').join('')+'</select></div>'+
    '<div class="frow"><label>קוד כניסה</label><input id="f_epin" inputmode="numeric" placeholder="4 ספרות" value="'+esc(emp.pin||'')+'"></div>'+
    '<div class="frow"><label>טלפון</label><input id="f_ephone" value="'+esc(emp.phone||'')+'"></div>'+
    '<div class="frow"><label>תעריף לשעה (₪)</label><input id="f_erate" type="number" min="0" step="0.5" value="'+esc(emp.hourly_rate||'')+'"></div>'+
    '<div class="frow"><label>הרשאת עריכה</label><select id="f_eedit"><option value="כן"'+(emp.can_edit!=='לא'?' selected':'')+'>עריכה מלאה</option><option value="לא"'+(emp.can_edit==='לא'?' selected':'')+'>צפייה בלבד</option></select></div></div>'+
    '<div class="frow"><label>מסכים מותרים (ריק = לפי תפקיד)</label><div class="row" style="gap:6px">'+VIEWS.map(v=>'<label style="font-size:12px;font-weight:400;border:1px solid var(--line);border-radius:14px;padding:3px 9px"><input type="checkbox" class="evw" value="'+v[0]+'"'+((emp.views||'').split(',').includes(v[0])?' checked':'')+' style="width:auto"> '+v[1]+'</label>').join('')+'</div></div>'+
    (emp.id?'':'<p class="muted" style="margin-bottom:10px">שים לב: העובד הראשון חייב להיות מנהל — אחרת תינעל בחוץ.</p>')+
    '<button class="btn" onclick="saveEmp(\''+(emp.id||'')+'\')">שמור</button>');
}
async function saveEmp(id){
  if(!el('f_ename').value||!el('f_epin').value) return toast('שם וקוד חובה', true);
  if(!id && !DB.employees.length && el('f_erole').value!=='מנהל') return toast('העובד הראשון חייב להיות מנהל', true);
  var views = Array.from(document.querySelectorAll('.evw:checked')).map(x=>x.value).join(',');
  var row = {name:el('f_ename').value,role:el('f_erole').value,pin:el('f_epin').value,phone:el('f_ephone').value,
    hourly_rate:Number(el('f_erate').value)||0,can_edit:el('f_eedit').value,views:views,active:'כן'};
  var r = id? await act('update',{table:'employees',id:id,row:row},'עודכן') : await act('create',{table:'employees',row:row},'העובד נוסף');
  if(r) closeModal();
}
</script>
</body>
</html>
