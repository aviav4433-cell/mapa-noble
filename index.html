<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MAPA·NOBLE — מערכת ניהול</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2316324F'/%3E%3Crect x='6' y='6' width='52' height='52' rx='10' fill='none' stroke='%230E7C86' stroke-width='3'/%3E%3Ctext x='32' y='43' font-family='Arial,Helvetica,sans-serif' font-size='26' font-weight='bold' fill='%23FFFFFF' text-anchor='middle'%3EMN%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --linen:#F7F8FA; --ink:#1F2A37; --navy:#16324F; --navy2:#1E4260;
  --teal:#0E7C86; --teal-d:#0A6470; --amber:#B7791F; --danger:#B42318;
  --ok:#1E7E4E; --line:#E6E9EF; --card:#FFFFFF; --muted:#64748B;
  --sb:#12263A; --sb-hi:rgba(255,255,255,.04); --sb-tx:#AEBACB; --sb-mut:#6C7A8F;
  --shadow:0 1px 2px rgba(16,24,40,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:var(--linen);color:var(--ink);min-height:100vh;font-size:15px}
button{font-family:inherit;cursor:pointer;border:none}
/* Task 9: any disabled button turns gray with a default cursor — applied globally while a save is in flight */
button:disabled{opacity:.5;cursor:default;filter:saturate(.4)}
/* Task 8: visual hierarchy in detail views — body text dominant, metadata subdued */
.doc-body{font-size:16px;font-weight:600;line-height:1.7;color:var(--ink);white-space:pre-wrap;margin:4px 0 10px}
.doc-meta{font-size:12px;color:var(--muted);font-weight:400}
button svg,a svg{vertical-align:-3px}
input,select{font-family:inherit;font-size:15px;padding:9px 12px;border:1px solid #D7DEE8;border-radius:6px;background:#fff;width:100%;color:var(--ink)}
input:focus,select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(14,124,134,.12)}
h1,h2,h3{font-weight:600;color:var(--navy)}
/* ===== מסך כניסה ===== */
#login{position:fixed;inset:0;background:var(--linen);display:flex;align-items:center;justify-content:center;z-index:100}
#login .box{background:#fff;border:1px solid var(--line);border-radius:8px;padding:42px 36px;width:min(390px,92vw);text-align:center;box-shadow:0 1px 3px rgba(16,24,40,.06)}
#login .logo{font-size:23px;font-weight:700;color:var(--navy);letter-spacing:2.5px}
#login .logo span{color:var(--teal)}
#login p{color:var(--muted);font-size:13.5px;margin:8px 0 26px}
#login input{margin-bottom:12px;text-align:center}
#login button{width:100%;background:var(--navy);color:#fff;padding:11px;border-radius:6px;font-size:15px;font-weight:600}
#login button:hover{background:#0F2438}
#loginErr{color:var(--danger);font-size:13.5px;min-height:18px;margin-top:10px}
#app{display:none}
/* ===== סרגל עליון ===== */
header{background:var(--sb);color:#fff;height:54px;padding:0 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20;border-bottom:1px solid rgba(255,255,255,.06)}
header .logo{font-weight:600;font-size:16px;letter-spacing:.6px;display:flex;align-items:center;gap:8px}
header .logo span{color:#7FB0B6}
header .who{margin-inline-start:auto;font-size:12.5px;color:var(--sb-mut)}
header .btn,header .btn.sm{background:transparent;border:1px solid rgba(255,255,255,.2);color:#D6DEE7;font-weight:400;border-radius:6px;padding:6px 14px;font-size:13px}
header .btn:hover,header .btn.sm:hover{background:rgba(255,255,255,.07);color:#fff}
header .brandimg{max-height:28px;border-radius:4px}
header .qnav{display:flex;gap:6px}
header .qnav button{background:transparent;border:1px solid rgba(255,255,255,.14);border-radius:6px;width:32px;height:32px;color:#B9C4D0;display:inline-flex;align-items:center;justify-content:center;padding:0}
header .qnav button:hover{background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.28)}
nav{display:flex;background:var(--sb);border-bottom:1px solid rgba(255,255,255,.06);overflow-x:auto;position:sticky;top:54px;z-index:19;-webkit-overflow-scrolling:touch}
main{padding:20px;max-width:1080px;margin:0 auto;padding-bottom:48px}
/* ===== כרטיסים ===== */
.card{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow)}
.card h3{font-size:15px;font-weight:600;color:var(--navy)}
.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.grow{flex:1}
.muted{color:var(--muted);font-size:13.5px}
.big{font-size:21px;font-weight:700}
/* ===== תגיות סטטוס — מילון אחיד (E9) ===== */
.chip{display:inline-block;padding:4px 12px;border-radius:5px;font-size:12px;font-weight:600;color:#fff;background:#94A3B8}
/* טיוטה → אפור */
.chip.טיוטה{background:rgba(100,116,139,.12);color:#475569}
/* בתהליך → כחול */
.chip.מאושרת,.chip.הוחזרה,.chip.מתוכנן{background:rgba(30,66,96,.12);color:#1E4260}
/* ממתין → כתום */
.chip.סופקה,.chip.פתוחה{background:rgba(183,121,31,.13);color:#8A5A17}
/* הושלם → ירוק */
.chip.הושלמה,.chip.שולמה,.chip.בוצע,.chip.התקבלה{background:rgba(30,126,78,.12);color:#1B6B44}
/* חריגה/בוטל → אדום */
.chip.בוטלה,.chip.בוטל{background:rgba(180,35,24,.1);color:#9A1F15}
/* ===== כפתורים ===== */
.btn{background:var(--navy);color:#fff;padding:9px 18px;border-radius:6px;font-size:14px;font-weight:600;transition:background .15s}
.btn:hover{background:#0F2438}
.btn.ghost{background:#fff;color:#344054;border:1px solid #D7DEE8}
.btn.ghost:hover{background:#F5F7FA;border-color:#C3CCD9}
.btn.warn{background:var(--amber)}
.btn.warn:hover{background:#96621A}
.btn.danger{background:var(--danger)}
.btn.danger:hover{background:#9A1F15}
.btn.sm{padding:6px 13px;font-size:13px}
.section-title{display:flex;align-items:center;justify-content:space-between;margin:24px 0 12px;flex-wrap:wrap;gap:8px}
.section-title h2{font-size:18px;font-weight:600;color:var(--navy)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:640px){.grid3{grid-template-columns:1fr 1fr}.grid2{grid-template-columns:1fr}}
/* ===== KPI ===== */
.kpi{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px 18px;text-align:start;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:4px}
.kpi .v{font-size:27px;font-weight:700;color:var(--navy);line-height:1.15;order:2}
.kpi .l{font-size:12.5px;color:var(--muted);order:1}
.kpi .ico{display:none}
.kpi.alert .v::after{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--danger);margin-inline-start:7px;vertical-align:middle}
.kpi.click{cursor:pointer;transition:border-color .12s,box-shadow .12s}
.kpi.click:hover{border-color:#C9D3E0;box-shadow:0 2px 8px rgba(16,24,40,.08)}
/* ===== קנבן ===== */
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}
.kcol{min-width:230px;flex:1;background:#F1F4F8;border:1px solid var(--line);border-radius:8px;padding:10px}
.kcol h3{font-size:13px;color:var(--navy);margin-bottom:8px;display:flex;justify-content:space-between}
.kcol h3 .cnt{background:#E2E8F0;color:#334155;border-radius:4px;padding:0 8px;font-size:12px;font-weight:600}
.ktask{background:#fff;border:1px solid var(--line);border-radius:6px;padding:10px;margin-bottom:8px;font-size:13.5px;box-shadow:var(--shadow)}
.ktask .t{font-weight:600}
/* ===== מודלים ===== */
#modalBg{position:fixed;inset:0;background:rgba(16,24,40,.5);display:none;align-items:flex-end;justify-content:center;z-index:50}
@media(min-width:641px){#modalBg{align-items:center}}
#modal{background:#fff;border-radius:8px 8px 0 0;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;padding:24px;position:relative;border:1px solid var(--line)}
@media(min-width:641px){#modal{border-radius:8px}}
#modal h2{margin-bottom:14px;color:var(--navy);font-size:19px}
.mclose{position:absolute;top:12px;left:12px;background:#F1F4F8;border:1px solid var(--line);border-radius:6px;width:30px;height:30px;font-size:14px;color:#475569;font-weight:600}
.mclose:hover{background:#E6EBF2}
.frow{margin-bottom:12px}
.frow label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:#344054}
/* ===== טבלאות ===== */
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:right;background:#F8FAFC;color:#64748B;font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);font-size:12px}
td{padding:10px 12px;border-bottom:1px solid #EEF1F5}
tr:hover td{background:#F8FAFC}
#toast{position:fixed;bottom:20px;right:50%;transform:translateX(50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:6px;font-size:14px;display:none;z-index:99;max-width:90vw;box-shadow:0 4px 16px rgba(16,24,40,.22)}
#toast.err{background:var(--danger)}
#busy{position:fixed;top:62px;right:50%;transform:translateX(50%);background:var(--navy);color:#fff;padding:6px 16px;border-radius:6px;font-size:13px;display:none;z-index:98;box-shadow:0 2px 8px rgba(16,24,40,.2)}
#busy .dot{display:inline-block;animation:blink 1s infinite;font-size:9px;vertical-align:1px}
@keyframes blink{50%{opacity:.2}}
/* ===== B10/E10: Undo Toast ===== */
.undo-box{position:fixed;bottom:20px;right:50%;transform:translateX(50%);background:var(--navy);color:#fff;padding:10px 12px 10px 16px;border-radius:6px;font-size:14px;z-index:100;max-width:92vw;box-shadow:0 4px 16px rgba(16,24,40,.22);display:flex;align-items:center;gap:12px}
.undo-box button{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:5px;padding:5px 12px;font-weight:600;font-size:13px;white-space:nowrap}
.undo-box button:hover{background:rgba(255,255,255,.26)}
/* ===== B10/E5: תג מונה בתפריט ===== */
.navbadge{display:inline-block;background:var(--danger);color:#fff;font-size:10px;font-weight:700;border-radius:9px;min-width:16px;height:16px;line-height:16px;text-align:center;padding:0 4px;margin-inline-start:4px;vertical-align:2px}
/* ===== B10/E11: הצעת כפילות בהקמת לקוח ===== */
.dupe-hint{background:#FFF7ED;border:1px solid #FED7AA;border-radius:6px;padding:7px 10px;font-size:12.5px;color:#9A5B13;margin-top:-6px;margin-bottom:10px}
.dupe-hint b{cursor:pointer;text-decoration:underline}
@media(min-width:900px){
  nav{position:fixed;top:54px;right:0;bottom:0;width:228px;flex-direction:column;border-bottom:none;overflow-y:auto;overflow-x:hidden;padding-top:10px}
  main{margin-right:228px;max-width:none;padding:26px 32px;padding-bottom:52px}
}
/* ===== יומן ===== */
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calhead{text-align:center;font-weight:600;color:var(--muted);font-size:12px;padding:4px 0}
.calday{background:var(--card);border:1px solid var(--line);border-radius:6px;min-height:86px;padding:4px;font-size:11px;cursor:pointer;overflow:hidden}
.calday.today{border-color:var(--teal);box-shadow:inset 0 0 0 1px var(--teal)}
.calday.other{opacity:.4}
.calday .dnum{font-weight:600;font-size:13px;color:var(--navy)}
.calday .dheb{color:var(--muted);font-size:10px}
.calev{border-radius:3px;color:#fff;padding:1px 4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.calshab{display:block;color:var(--muted);font-size:9px;line-height:1.3;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#camOverlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
#camOverlay video{width:min(94vw,560px);border-radius:8px}
.empty{text-align:center;color:var(--muted);padding:28px;font-size:14px}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.tabs button{background:#fff;border:1px solid #D7DEE8;border-radius:6px;padding:7px 14px;font-size:13px;font-weight:600;color:#475569}
.tabs button.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.scanbox{font-size:22px;text-align:center;letter-spacing:2px}
/* ===== פעולות בתוך שורה ===== */
.rowact{display:inline-flex;gap:6px;align-items:center}
.rowact button{background:#fff;border:1px solid #D7DEE8;border-radius:6px;width:30px;height:30px;color:#475569;line-height:1;display:inline-flex;align-items:center;justify-content:center;padding:0}
.rowact button:hover{background:#F5F7FA;border-color:#C3CCD9;color:var(--navy)}
.rowact button.del:hover{background:rgba(180,35,24,.06);border-color:var(--danger);color:var(--danger)}
/* ===== כפתורי קשר מהיר ===== */
.cbtns{display:inline-flex;gap:5px;vertical-align:middle}
.cbtns a{text-decoration:none;background:#fff;border:1px solid #D7DEE8;border-radius:6px;width:29px;height:29px;color:#475569;display:inline-flex;align-items:center;justify-content:center}
.cbtns a:hover{background:#F5F7FA;color:var(--navy);border-color:#C3CCD9}
/* ===== דשבורד ===== */
.gridkpi{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(min-width:900px){.gridkpi{grid-template-columns:repeat(6,1fr)}}
.chartgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
@media(max-width:760px){.chartgrid{grid-template-columns:1fr}}
.attn-row{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid #EEF1F5;cursor:pointer;font-size:14px;flex-wrap:wrap}
.attn-row:last-child{border-bottom:none}
.attn-row:hover{background:#F8FAFC}
.attn-row .tag{font-size:11px;font-weight:600;color:#fff;border-radius:4px;padding:2px 8px;white-space:nowrap}
/* ===== ניווט מקובץ — סרגל צד ===== */
nav .ghead{background:none;display:flex;align-items:center;gap:9px;font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--sb-mut);padding:12px 16px 6px;white-space:nowrap}
nav .ghead svg{flex:none}
nav .ghead .arr{margin-inline-start:auto;font-size:9px}
nav .ghead:hover{color:#C6D0DB}
nav .nitem{background:none;padding:9px 16px;font-size:14px;font-weight:400;color:var(--sb-tx);white-space:nowrap}
nav .nitem:hover{color:#fff}
nav .nitem.on{color:#fff}
@media(max-width:899px){
  nav{align-items:center;padding:4px 6px;gap:2px}
  nav .ngrp{display:flex;align-items:center}
  nav .ghead{border:1px solid rgba(255,255,255,.14);border-radius:6px;padding:6px 12px;margin:2px;font-size:12.5px;letter-spacing:.02em}
  nav .ghead .arr{margin-inline-start:5px}
  nav .ngrp.open .ghead{color:#fff;border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.06)}
  nav .nitem{border-radius:6px;padding:6px 12px}
  nav .nitem.on{background:rgba(255,255,255,.06);box-shadow:inset 0 -2px 0 var(--teal)}
  nav .nitem.lone{border:1px solid rgba(255,255,255,.14);border-radius:6px;padding:6px 12px;margin:2px}
  nav .nitem.lone.on{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.35);box-shadow:inset 0 -2px 0 var(--teal)}
}
@media(min-width:900px){
  nav .ngrp{border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:6px;margin-bottom:4px}
  nav .ghead{width:100%;text-align:right}
  nav .nitem{width:100%;display:block;text-align:right;border-right:3px solid transparent;padding:9px 28px 9px 12px}
  nav .nitem:hover{background:var(--sb-hi)}
  nav .nitem.on{border-right-color:var(--teal);background:rgba(255,255,255,.06);font-weight:600}
  nav .nitem.lone{width:100%;display:block;text-align:right;font-weight:600;color:var(--sb-tx);padding:12px 16px;border-right:3px solid transparent;border-bottom:1px solid rgba(255,255,255,.06)}
  nav .nitem.lone:hover{background:var(--sb-hi);color:#fff}
  nav .nitem.lone.on{border-right-color:var(--teal);background:rgba(255,255,255,.06);color:#fff}
}
/* הדגשת תרשומת שמנווטים אליה — רקע שדוהה לאורך ~10 שניות */
.hl-fade{animation:hlfade 10s ease-out forwards;border-radius:6px}
@keyframes hlfade{0%{background-color:#FDF3D6}100%{background-color:transparent}}
/* ===== E6: כפתור יצירה מהירה (Quick Create) ===== */
.quick-create-btn{position:fixed;bottom:20px;left:20px;width:56px;height:56px;border-radius:50%;background:var(--navy);color:#fff;font-size:28px;font-weight:300;line-height:1;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:30;transition:all .2s;display:flex;align-items:center;justify-content:center}
.quick-create-btn:hover{background:#0F2438;box-shadow:0 6px 16px rgba(0,0,0,.2)}
.quick-create-menu{position:fixed;bottom:80px;left:20px;z-index:30;display:flex;flex-direction:column;gap:8px}
.quick-create-menu button{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:10px 14px;font-size:13px;font-weight:500;color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.1);cursor:pointer;transition:all .15s;width:max-content}
.quick-create-menu button:hover{background:#F5F7FA;border-color:var(--teal)}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div class="logo">MAPA<span>·</span>NOBLE</div>
    <p>מערכת ניהול השכרה, כביסה וכספים</p>
    <input id="lg_user" type="text" autocomplete="username" placeholder="שם משתמש" style="direction:ltr" onkeydown="if(event.key==='Enter')doLogin()">
    <input id="lg_pass" type="password" autocomplete="current-password" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()">
    <label style="display:flex;align-items:center;justify-content:center;gap:7px;font-size:13.5px;color:var(--muted);margin-bottom:14px;font-weight:400;cursor:pointer"><input type="checkbox" id="lg_remember" style="width:auto"> זכור אותי במכשיר</label>
    <button onclick="doLogin()">כניסה</button>
    <button style="background:none;color:var(--teal);margin-top:10px;font-size:14px;text-decoration:underline" onclick="showPortalLogin()">כניסת לקוחות (פורטל הזמנות)</button>
    <div id="loginErr"></div>
    <div class="muted" style="margin-top:14px;font-size:11.5px;font-weight:400">גרסה v4.1-B10 · 12.07.2026</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo" id="brandLbl">MAPA<span>·</span>NOBLE</div>
    <div class="qnav" id="qnav"></div>
    <div class="who" id="whoLbl"></div>
    <button class="btn sm" onclick="changeMyPassword()" title="שינוי סיסמה למשתמש המחובר">שינוי סיסמה</button>
    <button class="btn sm" onclick="doLogout()" title="יציאה מהמערכת ומחיקת ההתחברות ממכשיר זה">יציאה</button>
    <button class="btn sm" onclick="refresh()" title="משיכת נתונים עדכניים מהשרת"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg> רענון</button>
  </header>
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<div id="modalBg" onclick="if(event.target===this)closeModal()"><div id="modal"></div></div>
<div id="toast"></div>
<!-- B10/E10: Undo Toast — מוצג לפני שליחת פעולה הרסנית לשרת, עם 5 שניות לביטול -->
<div id="undoBox" class="undo-box" style="display:none"></div>
<div id="busy"><span class="dot">●</span> שומר...</div>
<!-- E6: כפתור יצירה מהירה -->
<div id="quickCreateMenu" class="quick-create-menu" style="display:none">
  <button onclick="quickCreate('customer')">+ לקוח חדש</button>
  <button onclick="quickCreate('order')">+ הזמנה חדשה</button>
  <button onclick="quickCreate('task')">+ משימה חדשה</button>
  <button onclick="quickCreate('note')">+ הערה חדשה</button>
</div>
<button class="quick-create-btn" onclick="el('quickCreateMenu').style.display=el('quickCreateMenu').style.display==='none'?'flex':'none'" title="יצירה מהירה">+</button>

<script>
/* ================= הגדרות ================= */
var API_URL = 'https://script.google.com/macros/s/AKfycbyAFqEJrLLbRT-o5D7slN9lieaIjR8YKFiToy20iHgjS5F4QbDptfD-7al2Ywhs6WA1Hg/exec';
var PASS = '', USER = '', ROLE = '', CAN_EDIT = true, USER_VIEWS = '';
var APPROVALS_COUNT = 0; // B10/E5: מונה מרכז אישורים — מוצג כתג בתפריט למנהל/משרד
var TOKEN = ''; // F2: טוקן סשן — מחליף את סיסמת המערכת בכל בקשה
var IS_SUPER_ADMIN = false; // B7: מנהל ראשי — מגיע מהשרת (ScriptProperties), לא נקבע בממשק
var DB = null, VIEW = 'dash', FIN_TAB = 'invoices';
var STAGES = ['התקבל','בכביסה','בייבוש','בגיהוץ וקיפול','מוכן'];
/* NC1: זרימת מכבסת NOBLE — נפרדת מ-STAGES של כביסת השכרה (מוגן רגרסיה) */
var NOBLE_STAGES = ['התקבל','בכביסה','בייבוש','בגיהוץ וקיפול','באריזה','מוכן','במשלוח','נמסר'];
var NOBLE_MACHINE_STAGES = ['בכביסה','בייבוש','בגיהוץ וקיפול','באריזה'];

/* ================= E7: תצוגות שמורות (localStorage) ================= */
// שמירת שילוב פילטרים בשם
function savedViews(){ return JSON.parse(localStorage.getItem('mn_views')||'{}'); }
function saveView(name, filters){ var v=savedViews(); v[name]=filters; localStorage.setItem('mn_views',JSON.stringify(v)); toast('תצוגה שמורה: '+name); }
function delView(name){ var v=savedViews(); delete v[name]; localStorage.setItem('mn_views',JSON.stringify(v)); }

/* ================= E8: נצפו לאחרונה (localStorage) ================= */
// מעקב אחרי 5 הרשומות האחרונות שנפתחו
function trackRecent(type, id, name){ 
  var r=JSON.parse(localStorage.getItem('mn_recent')||'[]');
  r=r.filter(x=>!(x.type===type&&x.id===id)); // הסרה אם כבר קיים
  r.unshift({type,id,name,at:new Date().getTime()});
  localStorage.setItem('mn_recent',JSON.stringify(r.slice(0,5)));
}
function getRecent(){ return JSON.parse(localStorage.getItem('mn_recent')||'[]'); }

/* ================= E6: כפתור יצירה מהירה ================= */
function quickCreate(what){
  if(what==='customer') return openForm('customers');
  else if(what==='order') return openForm('orders');
  else if(what==='task') return openForm('tasks');
  else if(what==='note') return openForm('notes');
}

/* ================= API ================= */
// F2: קריאת רשת גולמית — כשיש טוקן סשן הוא נשלח בתוך ה-payload במקום סיסמת המערכת.
// פעולות פורטל (portal*) ציבוריות — נשלחות תמיד ללא טוקן.
async function apiRaw(action, payload){
  payload = payload || {};
  var body = { user: USER, action: action, payload: payload };
  if (TOKEN && String(action).indexOf('portal') !== 0) payload.token = TOKEN;
  else body.password = PASS; // ללא טוקן — התנהגות ישנה (פורטל / טרום-כניסה)
  var res = await fetch(API_URL, { method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(body)});
  return res.json();
}
// F2: שמירת פרטי הסשן מתשובת login / resumeSession
function applyLogin(lg){
  USER = lg.user; ROLE = lg.role; CAN_EDIT = lg.can_edit !== false; USER_VIEWS = lg.views || '';
  IS_SUPER_ADMIN = lg.is_super_admin === true; // B7
  if (lg.token){ TOKEN = lg.token; sessionStorage.setItem('mn_token', TOKEN); }
  sessionStorage.setItem('mn_sess', JSON.stringify({ user: USER, role: ROLE, views: USER_VIEWS, can_edit: CAN_EDIT, is_super_admin: IS_SUPER_ADMIN }));

}
// F2: ניסיון חידוש שקוף מטוקן המכשיר ("זכור אותי") — מנפיק טוקן סשן טרי
async function tryResume(){
  var dt = localStorage.getItem('mn_devtoken');
  if (!dt) return false;
  try{
    var r = await apiRaw('loginByRemember', { remember_token: dt });
    if (r && r.ok){ applyLogin(r); return true; }
  }catch(e){ return false; } // תקלת רשת — לא מוחקים את טוקן המכשיר
  localStorage.removeItem('mn_devtoken'); // השרת דחה — הטוקן פג/בוטל
  return false;
}
// F2: פקיעת סשן — ניקוי הטוקנים וחזרה למסך הכניסה
function authExpired(){
  TOKEN = ''; IS_SUPER_ADMIN = false; sessionStorage.removeItem('mn_token'); sessionStorage.removeItem('mn_sess');
  el('app').style.display='none';
  el('login').style.display='flex';
  var e = el('loginErr'); if(e) e.textContent = 'פג תוקף החיבור — יש להתחבר מחדש';
}
// F2: עטיפת ה-API — אם השרת דחה את הטוקן ('סיסמה שגויה'), מנסים חידוש שקוף
// פעם אחת מטוקן המכשיר וחוזרים על הבקשה; אחרת חוזרים למסך הכניסה.
// G1: טקסטים ארוכים — getAll מחזיר תצוגה מקדימה (300 תווים) עם דגל <שדה>_trunc.
// לפני הצגה/עריכה של רשומה קטועה — שולפים את הטקסט המלא ומעדכנים את DB בזיכרון.
var LONG_FIELDS = { notes:['text'], tasks:['details'], meetings:['protocol'], task_comments:['text'] };
async function ensureFullTexts(table, recs){
  var fields = LONG_FIELDS[table]; if(!fields || !recs) return;
  var need = recs.filter(function(r){ return r && fields.some(function(f){ return r[f+'_trunc']; }); });
  if(!need.length) return;
  var r = await api('getFullTexts', { table: table, ids: need.map(function(x){ return x.id; }) });
  if(!r || !r.ok){ toast(r && r.error ? r.error : 'שגיאה בטעינת הטקסט המלא', true); return; }
  need.forEach(function(rec){
    var t = r.texts && r.texts[rec.id]; if(!t) return;
    fields.forEach(function(f){ if(t[f]!==undefined){ rec[f]=t[f]; delete rec[f+'_trunc']; } });
  });
}
function anyTrunc(table, recs){
  var fields = LONG_FIELDS[table];
  return recs.some(function(r){ return r && fields.some(function(f){ return r[f+'_trunc']; }); });
}
async function api(action, payload){
  var r = await apiRaw(action, payload);
  if (r && !r.ok && r.error === 'סיסמה שגויה' && TOKEN && String(action).indexOf('portal') !== 0 && action !== 'login'){
    if (await tryResume()) return apiRaw(action, payload);
    authExpired();
  }
  return r;
}
// F2: כניסה בשם משתמש + סיסמה (+ "זכור אותי")
async function doLogin(){
  var un = (el('lg_user').value || '').trim(), pw = el('lg_pass').value || '';
  if(!un || !pw){ el('loginErr').textContent = 'יש להזין שם משתמש וסיסמה'; return; }
  el('loginErr').textContent = 'מתחבר...';
  try{
    var lg = await api('login', { username: un, password: pw, remember: el('lg_remember').checked });
    if(!lg.ok){ el('loginErr').textContent = lg.error; return; }
    applyLogin(lg);
    // B7 (סעיף 3): כניסה מפורשת תמיד ללוח הבקרה — לא למסך שנשאר שמור מסשן קודם באותו טאב
    VIEW = 'dash'; try{ sessionStorage.setItem('mn_view', 'dash'); }catch(e){}
    if(el('lg_remember').checked && TOKEN){
      try{ var rm = await apiRaw('rememberLogin', { token: TOKEN });
        if(rm && rm.ok && rm.remember_token) localStorage.setItem('mn_devtoken', rm.remember_token);
      }catch(e){}
    }
    await enterApp();
  }catch(e){ el('loginErr').textContent = 'שגיאת חיבור — בדוק את כתובת השרת'; }
}
// טעינת הנתונים והצגת המערכת — משותף לכניסה, לחידוש ולכניסה אוטומטית
async function enterApp(){
  var r = await api('getAll');
  if(!r.ok){
    var e = el('loginErr');
    if(e && r.error !== 'סיסמה שגויה') e.textContent = r.error; // בכשל טוקן authExpired כבר הציג הודעה
    return false;
  }
  DB = r.db;
  try{ var sv = sessionStorage.getItem('mn_view'); if(sv) VIEW = sv; }catch(e){} // NC4: חזרה למסך האחרון אחרי רענון (render מוודא הרשאה)
  el('login').style.display='none';
  el('app').style.display='block';
  el('whoLbl').textContent = USER + ' · ' + ROLE;
  applyTheme();
  render();
  refreshApprovalsCount(); // B10/E5: תג מונה בתפריט — לא חוסם את הרינדור הראשוני
  return true;
}
// B10/E5: מונה מרכז אישורים — נטען רק למנהל/משרד, מרענן את התפריט בלי לגעת במסך הפתוח
async function refreshApprovalsCount(){
  if(!['מנהל','משרד'].includes(ROLE)){ APPROVALS_COUNT = 0; return; }
  try{
    var r = await api('b10ApprovalsInbox', {});
    APPROVALS_COUNT = (r && r.ok) ? r.counts.total : 0;
  }catch(e){ /* תקלת רשת חולפת — לא חוסם */ }
  renderNav();
}
// F2: יציאה — ביטול טוקן הסשן וטוקן המכשיר בשרת, ניקוי מקומי וחזרה למסך הכניסה
async function doLogout(){
  if(typeof floorTablet==='function' && floorTablet()){ // NC4 (משימה 8): במצב טאבלט משותף אין יציאה בלי קוד מנהל
    confirmManagerPin('יציאה מהמערכת בזמן מצב טאבלט משותף.', 'אשר יציאה', function(){ localStorage.setItem('mn_floor_tablet','0'); doLogout(); });
    return;
  }
  var dt = localStorage.getItem('mn_devtoken');
  try{ await apiRaw('logout', { token: TOKEN, deviceToken: dt || undefined }); }catch(e){}
  TOKEN = ''; IS_SUPER_ADMIN = false; sessionStorage.removeItem('mn_token'); sessionStorage.removeItem('mn_sess');
  sessionStorage.removeItem('mn_view'); // B7 (סעיף 3): שלא יישאר מסך ישן לכניסה הבאה
  localStorage.removeItem('mn_devtoken');
  location.reload();
}
// F2: כניסה אוטומטית בטעינה — קודם טוקן סשן פעיל, ואם אין: "זכור אותי" מהמכשיר
async function autoLogin(){
  if(location.search.includes('portal=1') || location.search.includes('shop=1')) return;
  var t = sessionStorage.getItem('mn_token');
  if(t){
    TOKEN = t;
    try{ var ss = JSON.parse(sessionStorage.getItem('mn_sess') || '{}');
      USER = ss.user || ''; ROLE = ss.role || ''; USER_VIEWS = ss.views || ''; CAN_EDIT = ss.can_edit !== false;
      IS_SUPER_ADMIN = ss.is_super_admin === true;
    }catch(e){}
    try{ if(await enterApp()) return; }catch(e){}
    if(TOKEN) return; // כשל שאינו פקיעת טוקן (למשל רשת) — נשארים במסך הכניסה
  }
  if(localStorage.getItem('mn_devtoken')){
    el('loginErr').textContent = 'מתחבר...';
    try{ if(await tryResume() && await enterApp()) return; }catch(e){}
    if(el('loginErr').textContent === 'מתחבר...') el('loginErr').textContent = '';
  }
}
window.addEventListener('load', autoLogin);
/* NC4 (משימה 7): נעילה אוטומטית אחרי 10 דקות ללא פעילות — למעט מצב טאבלט משותף.
   רענון דפדפן בתוך חלון הפעילות לא מוציא החוצה (הטוקן נשמר בסשן הדפדפן). */
var IDLE_LIMIT_MS = 10*60*1000, LAST_ACTIVITY = Date.now();
['click','keydown','touchstart','scroll'].forEach(function(ev){
  document.addEventListener(ev, function(){ LAST_ACTIVITY = Date.now(); }, {passive:true});
});
// B7 (סעיף 2): לפני התיקון, נעילת חוסר-פעילות ניקתה רק את הממשק —
// טוקן "זכור אותי" נשאר תקף בשרת, כך שרענון דף אחרי הנעילה החזיר פנימה בשקט, בלי הודעה ובלי סיסמה.
// עכשיו: הנעילה מבטלת גם את טוקן הסשן וגם את טוקן המכשיר בפועל בשרת, ומוחקת אותו מהמכשיר.
// התנהגות אחת בלבד: יציאה עם הודעה ברורה, וחזרה רק דרך הקלדת שם משתמש וסיסמה מחדש.
async function idleLock(){
  var dt = localStorage.getItem('mn_devtoken');
  var tok = TOKEN;
  TOKEN = ''; IS_SUPER_ADMIN = false; sessionStorage.removeItem('mn_token'); sessionStorage.removeItem('mn_sess');
  localStorage.removeItem('mn_devtoken');
  try{ closeModal(); }catch(e){}
  el('app').style.display='none'; el('login').style.display='flex';
  var e = el('loginErr'); if(e) e.textContent = 'המערכת ננעלה לאחר 10 דקות ללא פעילות — יש להתחבר מחדש';
  try{ await apiRaw('logout', { token: tok, deviceToken: dt || undefined }); }catch(err){}
}
setInterval(function(){
  if(!TOKEN) return;
  if(typeof floorTablet==='function' && floorTablet()) return; // טאבלט משותף לא ננעל — הזיהוי שם בקוד עובד לכל פעולה
  if(Date.now() - LAST_ACTIVITY > IDLE_LIMIT_MS) idleLock();
}, 30000);
// B7 (סעיף 4-א): בדיקה קלה כל 30 שניות אם יש נתונים חדשים — לא מושכת את כל ה-DB בכל בדיקה,
// רק כשחותמת הגרסה בשרת השתנתה. "רענון שלא זורק": לא נוגעת בסשן, ולא מרעננת מסך אם מודל פתוח (לא לקטוע עריכה).
var DATA_VERSION = null;
async function pollDataVersion(){
  if(!TOKEN || !DB) return;
  try{
    var r = await apiRaw('checkVersion', {});
    if(!r || !r.ok) return;
    if(DATA_VERSION===null){ DATA_VERSION = r.version; return; } // בסיס ראשוני — בלי רענון
    if(r.version === DATA_VERSION) return; // שום דבר לא השתנה
    DATA_VERSION = r.version;
    var g = await api('getAll');
    if(g && g.ok){
      DB = g.db;
      var modalOpen = el('modalBg') && el('modalBg').style.display === 'flex';
      if(!modalOpen) render(); // לא קוטעים עריכה פתוחה — הנתונים בזיכרון מתעדכנים בכל מקרה
      refreshApprovalsCount(); // B10/E5: תג מונה מתעדכן יחד עם שאר הנתונים
    }
  }catch(e){ /* תקלת רשת חולפת — לא נוגעים בסשן */ }
}
setInterval(pollDataVersion, 30000);
// F2: שינוי סיסמה של המשתמש המחובר — השרת מאמת "עצמי" לפי הטוקן (ללא סיסמה ישנה)
function changeMyPassword(){
  var me = ((DB && DB.employees) || []).find(function(x){ return x.name === USER; });
  if(!me){ toast('לא נמצא עובד תואם למשתמש המחובר', true); return; }
  openModal('<h2>שינוי סיסמה</h2>'+
    '<div class="frow"><label>סיסמה חדשה (לפחות 6 תווים)</label><input id="f_np1" type="password" autocomplete="new-password"></div>'+
    '<div class="frow"><label>אימות סיסמה</label><input id="f_np2" type="password" autocomplete="new-password" onkeydown="if(event.key===\'Enter\')saveMyPassword(\''+me.id+'\')"></div>'+
    '<button class="btn" onclick="saveMyPassword(\''+me.id+'\')">שמור</button>');
}
async function saveMyPassword(id){
  var p1 = el('f_np1').value, p2 = el('f_np2').value;
  if(String(p1).length < 6) return toast('הסיסמה חייבת להכיל לפחות 6 תווים', true);
  if(p1 !== p2) return toast('הסיסמאות אינן תואמות', true);
  var r = await apiBusy('setPassword', { employee_id: id, new_password: p1 });
  if(!r || !r.ok) return toast((r && r.error) || 'שגיאה בעדכון הסיסמה', true);
  closeModal(); toast('הסיסמה עודכנה');
}
async function refresh(){ // NC4 (משימה 6): רענון עם משוב ברור — גם בהצלחה וגם בכשל
  var b = document.querySelector('button[onclick="refresh()"]');
  if(b && b.disabled) return;
  if(b){ b.disabled = true; b.style.opacity='.55'; }
  toast('מעדכן נתונים...');
  try{
    var r = await api('getAll');
    if(r && r.ok){ DB=r.db; render(); toast('הנתונים עודכנו'); }
    else toast((r && r.error) || 'הרענון נכשל — נסה שוב', true);
  }catch(e){ toast('שגיאת רשת — נסה שוב', true); }
  if(b){ b.disabled = false; b.style.opacity=''; }
}
var BUSY = false;
var FE_MAP = {customers:'customers',contacts:'contacts',customer_prices:'customerPrices',items:'items',units:'units',
  stock_moves:'stockMoves',suppliers:'suppliers',purchases:'purchases',purchase_lines:'purchaseLines',orders:'orders',
  order_lines:'orderLines',deliveries:'deliveries',expenses:'expenses',carts:'carts',machines:'machines',shelves:'shelves',
  employees:'employees',attendance:'attendance',payroll:'payroll',tasks:'tasks',task_comments:'taskComments',meetings:'meetings',links:'links'};
function showBusy(on){
  el('busy').style.display = on?'block':'none';
  // Task 9: נטרול כל הכפתורים במסמך בזמן שמירה — מונע לחיצה כפולה שיוצרת רשומות כפולות.
  // מסמנים רק כפתורים שנוטרלו על ידינו, כדי לא "לשחרר" בטעות כפתור שנוטרל מסיבה אחרת.
  Array.from(document.querySelectorAll('button')).forEach(function(b){
    if(on){ if(!b.disabled){ b.disabled = true; b.dataset.busylock = '1'; } }
    else if(b.dataset.busylock){ b.disabled = false; delete b.dataset.busylock; }
  });
}
// Task 9: עטיפת קריאת שרת בודדת במנגנון הנעילה — לשימוש בזרימות שאינן עוברות דרך act()
async function apiBusy(action, payload){
  if(BUSY) return null;
  BUSY = true; showBusy(true);
  try{ return await api(action, payload); }
  catch(e){ return {ok:false, error:'שגיאת תקשורת — נסה שוב'}; }
  finally{ BUSY = false; showBusy(false); }
}
async function act(action, payload, okMsg){
  if(BUSY) return null; // מונע לחיצה כפולה — הפעולה הקודמת עוד רצה
  if(!CAN_EDIT && !['clock'].includes(action)) { toast('למשתמש זה הרשאת צפייה בלבד', true); return null; }
  BUSY = true; showBusy(true);
  try{
    var r = await api(action, payload);
    if(!r.ok){
      if(action==='returnByWeight' && r.need_count){
        var nm = {}; r.need_count.forEach(function(x){ nm[x.line_id]=x; });
        renderReturn(nm); toast(r.error, true);
        return null;
      }
      toast(r.error, true); return null;
    }
    // עדכון מקומי מיידי במקום סבב שרת נוסף — פי 2 מהיר
    var t = payload && payload.table, cascades = ['customers','items'];
    if(action==='create' && r.row && FE_MAP[t]) (DB[FE_MAP[t]]=DB[FE_MAP[t]]||[]).push(r.row);
    else if(action==='update' && r.row && FE_MAP[t]){ var arr=DB[FE_MAP[t]]; var i=arr.findIndex(x=>x.id===payload.id); if(i>-1) arr[i]=r.row; }
    else if(action==='delete' && FE_MAP[t] && !cascades.includes(t)) DB[FE_MAP[t]] = (DB[FE_MAP[t]]||[]).filter(x=>x.id!==payload.id);
    else { var g = await api('getAll'); if(g.ok) DB=g.db; }
    render(); if(okMsg) toast(okMsg);
    return r;

function fmtTs(ts){
  var s = String(ts==null?'':ts);

/* ===== ברקוד Code128 — עבר בדיקות תקן ===== */
// Code128-B — מחולל תקני
var C128 = ('212222 222122 222221 121223 121322 131222 122213 122312 132212 221213 '+
'221312 231212 112232 122132 122231 113222 123122 123221 223211 221132 '+
'221231 213212 223112 312131 311222 321122 321221 312212 322112 322211 '+
'212123 212321 232121 111323 131123 131321 112313 132113 132311 211313 '+
'231113 231311 112133 112331 132131 113123 113321 133121 313121 211331 '+
'231131 213113 213311 213131 311123 311321 331121 312113 312311 332111 '+
'314111 221411 431111 111224 111422 121124 121421 141122 141221 112214 '+
'112412 122114 122411 142112 142211 241211 221114 413111 241112 134111 '+
'111242 121142 121241 114212 124112 124211 411212 421112 421211 212141 '+
'214121 412121 111143 111341 131141 114113 114311 411113 411311 113141 '+
'114131 311141 411131 211412 211214 211232').split(' ');
var C128_STOP = '2331112';

function code128Widths(text) {
  var vals = [104]; // Start-B
  for (var i = 0; i < text.length; i++) {
    var v = text.charCodeAt(i) - 32;
    if (v < 0 || v > 94) throw new Error('תו לא נתמך בברקוד: ' + text[i]);
    vals.push(v);
  }
  var sum = vals[0];
  for (var j = 1; j < vals.length; j++) sum += vals[j] * j;
  vals.push(sum % 103); // checksum
  var widths = '';
  vals.forEach(function(v){ widths += C128[v]; });
  return widths + C128_STOP;
}

function code128Svg(text, h) {
  h = h || 46;
  var w = code128Widths(text);
  var scale = 2, x = 0, bars = '';
  for (var i = 0; i < w.length; i++) {
    var ww = Number(w[i]) * scale;
    if (i % 2 === 0) bars += '<rect x="'+x+'" y="0" width="'+ww+'" height="'+h+'" fill="#000"/>';
    x += ww;
  }
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+x+'" height="'+(h+16)+'" viewBox="0 0 '+x+' '+(h+16)+'">'+bars+
    '<text x="'+(x/2)+'" y="'+(h+13)+'" text-anchor="middle" font-family="monospace" font-size="12">'+text+'</text></svg>';
}

/* ===== B10/E10: Undo Toast — דוחה שליחת פעולה הרסנית לשרת ב-5 שניות, עם אפשרות "בטל" ===== */
var UNDO_PENDING = null; // {timer, commit}
function undoToast(msg, commitFn){
  // undo קודם שעוד פתוח מתבצע מיד (לא מצטבר) — לפני שמתחילים המתנה חדשה
  if(UNDO_PENDING){ clearTimeout(UNDO_PENDING.timer); UNDO_PENDING.commit(); }
  var box = el('undoBox');
  box.innerHTML = '<span>'+esc(msg)+'</span><button onclick="undoCancel()">בטל</button>';
  box.style.display = 'flex';
  var done = false;
  var run = function(){ if(done) return; done=true; box.style.display='none'; UNDO_PENDING=null; commitFn(); };
  var timer = setTimeout(run, 5000);
  UNDO_PENDING = { timer: timer, commit: run };
}
function undoCancel(){
  if(!UNDO_PENDING) return;
  clearTimeout(UNDO_PENDING.timer); UNDO_PENDING = null;
  el('undoBox').style.display = 'none';
  toast('הפעולה בוטלה — לא נשלח דבר לשרת');
}

function rDash(){
  var today = new Date().toISOString().slice(0,10);

  var openOrd = DB.orders.filter(o=>['מאושרת','סופקה'].includes(o.status));
  var delToday = DB.deliveries.filter(d=>d.status==='מתוכנן' && d.date===today);
  var delDue = DB.deliveries.filter(d=>d.status==='מתוכנן' && d.date<=today).sort((a,b)=>a.date>b.date?1:-1);
  var debt = DB.customers.reduce(function(s,c){ var b=custBalance(c.id); return s+(b>0?b:0); },0);
  var openTasks = DB.tasks.filter(t=>t.status!=='הושלמה');
  var lateTasks = openTasks.filter(t=>t.due_date && t.due_date<today).sort((a,b)=>a.due_date>b.due_date?1:-1);
  var inWash = DB.laundryTasks.filter(t=>t.stage!=='מוכן');
  var lateWash = inWash.filter(t=>t.target_date && t.target_date<today);
  var low = DB.items.filter(function(i){
    if(i.min_stock==='' || i.min_stock==null) return false;
    var total = DB.stockMoves.filter(m=>m.item_id===i.id).reduce((s,m)=>s+Number(m.qty),0);
    var wash = DB.laundryTasks.filter(t=>t.item_id===i.id&&t.stage!=='מוכן').reduce((s,t)=>s+Number(t.qty),0);
    return (total-wash) < Number(i.min_stock);
  });

/* גרף עמודות הכנסות — SVG טהור, ללא ספריות */
function revenueChartSvg(){
  var months = [], now = new Date();
  for(var i=5;i>=0;i--){
    var d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    months.push(d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2));
  }
  var sums = months.map(function(mk){
    return (DB.invoices||[]).filter(v=>v.status!=='בוטלה' && String(v.date||'').slice(0,7)===mk)
      .reduce((s,v)=>s+Number(v.subtotal||0),0);
  });
  var max = Math.max.apply(null, sums);

  var HEB_M = ['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצמ'];
  var W=480, H=210, pad=10, bw=Math.floor((W-2*pad)/6);
  var bars = months.map(function(mk,idx){
    var v = sums[idx], bh = Math.round((H-64)*v/max), x = pad+idx*bw+9, y = H-32-bh;

      '<rect x="'+(pad+idx*bw)+'" y="0" width="'+bw+'" height="'+(H-32)+'" fill="transparent"/>'+
      '<rect x="'+x+'" y="'+y+'" width="'+(bw-18)+'" height="'+Math.max(bh,2)+'" rx="3" fill="'+(idx===5?'var(--teal)':'var(--navy2)')+'" opacity="'+(idx===5?'1':'.72')+'"/>'+

      '<text x="'+(x+(bw-18)/2)+'" y="'+(H-12)+'" text-anchor="middle" font-size="11" fill="var(--muted)">'+lbl+'</text></g>';

function custBalance(cid){
  var b = DB.orders.filter(o=>o.customer_id===cid && !['בוטלה','טיוטה','הצעת מחיר'].includes(o.status)).reduce((s,o)=>s+orderBalance(o.id),0);
  // NC3: חשבוניות מכבסה מרוכזות (ללא הזמנה) נכנסות ליתרת הלקוח
  DB.invoices.filter(v=>v.customer_id===cid && !v.order_id && v.status!=='בוטלה').forEach(function(v){
    var paid = DB.payments.filter(p=>p.invoice_id===v.id).reduce((s,p)=>s+Number(p.amount||0),0);
    b += Math.max(0, Number(v.total)-paid);
  });
  return b;
}

function toAg(n){ return Math.round(Number(n||0)*100); }
function fromAg(ag){ return Math.round(Number(ag||0))/100; }
function genTxnId(){ return 'TXN-'+Date.now().toString(36).toUpperCase()+Math.floor(Math.random()*9000+1000); }
// מצב אשראי מקומי לתצוגה (מקור האמת: השרת — b2CreditStatus)
function creditStatus(cid){
  var c = DB.customers.find(x=>x.id===cid)||{};
  var limitAg = toAg(c.credit_limit), usedAg = toAg(custBalance(cid));
  var pct = limitAg>0? Math.round(usedAg*100/limitAg) : (usedAg>0?100:0);
  return {limit_ag:limitAg, used_ag:usedAg, available_ag:limitAg-usedAg, pct:pct};
}

  return '<div style="margin:8px 0">'+

    ' · מסגרת '+ils(fromAg(cr.limit_ag))+' · חוב '+ils(fromAg(cr.used_ag))+' · פנוי <b style="color:'+(cr.available_ag<0?'var(--danger)':'var(--ink)')+'">'+ils(fromAg(cr.available_ag))+'</b></div>'+

}

/* B2: מסך תשלום D9 — סכום הזמנה, חוב קודם, גרף ניצול, קיזוז חוב אופציונלי, קבלה מיידית (D15) */
var PAY_CTX = null;
async function paymentScreen(oid){
  var o = DB.orders.find(x=>x.id===oid); if(!o) return;
  var ctx = await api('b2PaymentContext',{order_id:oid});
  if(!ctx.ok) return toast(ctx.error, true);
  // txn_id נוצר עם פתיחת המסך — לחיצה כפולה/שליחה חוזרת לא תחייב פעמיים (idempotency בשרת)
  PAY_CTX = {oid:oid, cid:ctx.customer_id, txn:genTxnId()};
  var bal = fromAg(ctx.order_balance_ag), debt = fromAg(ctx.prior_debt_ag);
  openModal('<h2>תשלום — הזמנה '+(o.order_number||oid)+'</h2>'+
    '<div class="row" style="padding:4px 0"><div class="grow">סכום ההזמנה (יתרה):</div><b>'+ils(bal)+'</b></div>'+
    (debt>0.001?'<div class="row" style="padding:4px 0"><div class="grow">חוב קודם:</div><b style="color:var(--danger)">'+ils(debt)+'</b></div>':'')+
    creditBarHtml(ctx.credit)+
    '<div class="grid2"><div class="frow"><label>תשלום על ההזמנה (₪)</label><input id="b2_ord" type="number" min="0" step="0.01" value="'+bal+'" oninput="b2Sum()"></div>'+
    (debt>0.001?'<div class="frow"><label>תשלום נוסף לקיזוז חוב (רשות, עד '+ils(debt)+')</label><input id="b2_debt" type="number" min="0" step="0.01" value="0" oninput="b2Sum()"></div>':'')+
    '<div class="frow"><label>אמצעי תשלום</label><select id="b2_method"><option>אשראי</option><option>העברה</option><option>מזומן</option><option>צ׳ק</option></select></div></div>'+
    '<div class="row" style="padding:8px 0;border-top:1px solid var(--line);font-size:16px"><div class="grow"><b>סכום לתשלום:</b></div><b id="b2_total">'+ils(bal)+'</b></div>'+
    '<button class="btn" onclick="doB2Pay()">בצע תשלום ורשום קבלה</button>'+
    '<p class="muted" style="font-size:12px;margin-top:8px">הקבלה מופקת מיד ונשמרת לצמיתות — זמינה גם בפורטל הלקוח. החישוב באגורות (ללא שגיאות עיגול).</p>');
}
function b2Sum(){
  var t = (Number(el('b2_ord').value)||0) + (el('b2_debt')?(Number(el('b2_debt').value)||0):0);
  el('b2_total').textContent = ils(t);
}
async function doB2Pay(){
  var ordAmt = Number(el('b2_ord').value)||0;
  var debtAmt = el('b2_debt')? (Number(el('b2_debt').value)||0) : 0;
  if(ordAmt+debtAmt<=0) return toast('סכום חובה', true);
  if(ordAmt<0||debtAmt<0) return toast('סכום שלילי אינו חוקי', true);
  var r = await act('b2ProcessPayment',{customer_id:PAY_CTX.cid, order_id:PAY_CTX.oid,
    order_amount_ag:toAg(ordAmt), debt_amount_ag:toAg(debtAmt),
    method:el('b2_method').value, txn_id:PAY_CTX.txn});
  if(r){
    toast(r.duplicate?'התשלום כבר נרשם — קבלה '+r.receipt_number:'קבלה מספר '+r.receipt_number+' הופקה · '+ils(r.total));
    closeModal(); openOrder(PAY_CTX.oid);
  }
}

        (t.target_date?'<br>יעד שחרור: <b style="color:'+(t.target_date<new Date().toISOString().slice(0,10)?'var(--danger)':'var(--ink)')+'">'+esc(t.target_date)+'</b> (ימי עסקים, בלי שבת/חג)':'')+(st==='מוכן'&&t.package_barcode?'<br>אריזה: <b>'+esc(t.package_barcode)+'</b>':'')+'</div>'+
        (st!=='מוכן'?'<div class="row" style="margin-top:8px">'+
          '<button class="btn sm" onclick="doAdvance(\''+t.id+'\')">קדם ←</button>'+
          (!t.cart_id&&freeCarts.length?'<select id="cart_'+t.id+'" style="width:auto;font-size:12px;padding:5px">'+freeCarts.map(c=>'<option>'+c.id+'</option>').join('')+'</select><button class="btn ghost sm" onclick="doAssignCart(\''+t.id+'\')">שייך עגלה</button>':'')+
        '</div>':'')+'</div>';
      }).join('')+'</div>';
  }).join('');
  el('main').innerHTML = '<div class="section-title"><h2>לוח כביסה</h2><span class="muted">"מוכן" מציג 3 ימים אחרונים</span></div><div class="kanban">'+cols+'</div>';

function rDeliveries(){
  if(ROLE==='נהג') return rDriverRoute(); // B5: Driver-Lite — הנהג רואה רק את המסלול שלו
  var DONE_STATUSES = ['בוצע','בוצעה','הושלמה','הושלם','בוטל','בוטלה'];
  var open = DB.deliveries.filter(d=>d.status==='מתוכנן' && !DONE_STATUSES.includes(d.status)).sort((a,b)=>a.date>b.date?1:-1);
  var done = DB.deliveries.filter(d=>d.status!=='מתוכנן').slice(-15).reverse();
  el('main').innerHTML = '<div class="section-title"><h2>משלוחים</h2><span class="muted">נוצרים אוטומטית באישור הזמנה</span></div>'+
    (open.length? open.map(delivCard).join(''):'<div class="card empty">אין משלוחים פתוחים</div>')+
    (done.length?'<div class="section-title"><h3>אחרונים</h3></div>'+done.map(delivCard).join(''):'');
}

/* ===== B5: Driver-Lite — דשבורד נהג: מסלול, ניווט, תיעוד שיחות, סטטוס ללקוח (D12/D13/D14) ===== */
var B5_OPEN_STATUSES = ['מתוכנן','בדרך'];
function b5MyRoute(){
  return DB.deliveries.filter(d=>d.driver===USER && B5_OPEN_STATUSES.includes(d.status))
    .sort((a,b)=>{ var ra=Number(a.route_order)||999999, rb=Number(b.route_order)||999999; return ra!==rb?ra-rb:(a.id<b.id?-1:1); });
}
function rDriverRoute(){
  var mine = b5MyRoute();
  var history = DB.deliveries.filter(d=>d.driver===USER && !B5_OPEN_STATUSES.includes(d.status)).slice(-10).reverse();
  el('main').innerHTML = '<div class="section-title"><h2>המסלול שלי</h2><span class="muted">'+mine.length+' עצירות פתוחות</span></div>'+
    (mine.length? mine.map((d,i)=>driverStopCard(d,i,mine.length,false)).join('') : '<div class="card empty">אין משלוחים פתוחים במסלול שלך</div>')+
    (history.length? '<div class="section-title"><h3>אחרונים</h3></div>'+history.map(d=>driverStopCard(d,-1,0,true)).join(''):'');
}
function driverStopCard(d,idx,total,isHistory){
  var o = DB.orders.find(x=>x.id===d.order_id)||{};
  var c = o.customer_id? DB.customers.find(x=>x.id===o.customer_id) : null;
  var addr = c? (c.address||'') : '';
  var wazeUrl = addr? 'https://waze.com/ul?q='+encodeURIComponent(addr)+'&navigate=yes' : '';
  var gmapUrl = addr? 'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(addr) : '';
  return '<div class="card"><div class="row"><div class="grow"><b>'+esc(c?c.name:'—')+'</b>'+(d.kind?' · '+esc(d.kind):'')+
    '<div class="muted">'+esc(addr||'אין כתובת רשומה בכרטיס הלקוח')+'</div>'+
    (d.note?'<div class="muted" style="font-size:12px">'+esc(d.note)+'</div>':'')+
    (d.eta_text?'<div style="margin-top:4px"><span class="chip" style="background:var(--navy2)">'+esc(d.eta_text)+'</span></div>':'')+
    '</div><span class="chip '+esc(d.status)+'">'+esc(d.status)+'</span></div>'+
    (!isHistory?'<div class="row" style="margin-top:8px;flex-wrap:wrap;gap:6px">'+
      (total>1&&idx>0?'<button class="btn ghost sm" onclick="driverMove(\''+d.id+'\',-1)">▲ למעלה</button>':'')+
      (total>1&&idx<total-1?'<button class="btn ghost sm" onclick="driverMove(\''+d.id+'\',1)">▼ למטה</button>':'')+
      (wazeUrl?'<a class="btn ghost sm" href="'+wazeUrl+'" target="_blank" rel="noopener">ניווט Waze</a>':'')+
      (gmapUrl?'<a class="btn ghost sm" href="'+gmapUrl+'" target="_blank" rel="noopener">ניווט Google Maps</a>':'')+
      (c&&c.phone?'<a class="btn ghost sm" href="tel:'+encodeURIComponent(c.phone)+'">חייג ללקוח</a>':'')+
      '<button class="btn ghost sm" onclick="driverLogCallForm(\''+d.id+'\')">תיעוד שיחה</button>'+
      '<button class="btn sm" onclick="driverMarkTransit(\''+d.id+'\')">'+(d.status==='בדרך'?'עדכן סטטוס':'יצאתי לדרך')+'</button>'+
      '<button class="btn ghost sm" style="color:var(--danger)" onclick="driverRemoveForm(\''+d.id+'\')">הסר מהמסלול</button>'+
    '</div>':'')+
  '</div>';
}
async function driverMove(did,delta){
  var mine = b5MyRoute();
  var idx = mine.findIndex(d=>d.id===did), swapIdx = idx+delta;
  if(idx<0||swapIdx<0||swapIdx>=mine.length) return;
  var tmp = mine[idx]; mine[idx]=mine[swapIdx]; mine[swapIdx]=tmp;
  await act('b5SetRoute',{ids:mine.map(d=>d.id)},'סדר המסלול עודכן');
}
async function driverMarkTransit(did){
  var r = await act('b5MarkInTransit',{delivery_id:did},'הסטטוס עודכן — הלקוח קיבל התראה');
}
function driverRemoveForm(did){
  openModal('<h2>הסרת כתובת מהמסלול</h2><p class="muted" style="font-size:13px">נא לפרט את הסיבה — ההנהלה תקבל התראה מיידית.</p>'+
    '<div class="frow"><textarea id="f_rmreason" rows="3" placeholder="למשל: הלקוח לא ענה, הכתובת שגויה..."></textarea></div>'+
    '<button class="btn" style="background:var(--danger)" onclick="driverRemoveConfirm(\''+did+'\')">הסר מהמסלול</button>');
}
async function driverRemoveConfirm(did){
  var reason = (el('f_rmreason').value||'').trim();
  if(reason.length<3) return toast('יש לפרט סיבה (לפחות 3 תווים)', true);
  var r = await act('b5RemoveFromRoute',{delivery_id:did,reason:reason},'הכתובת הוסרה מהמסלול — ההנהלה קיבלה התראה');
  if(r) closeModal();
}
function driverLogCallForm(did){
  openModal('<h2>תיעוד שיחה</h2>'+
    '<div class="frow"><label>תוצאת השיחה</label><select id="f_calloutcome" onchange="el(\'f_callnote_wrap\').style.display=this.value===\'אחר\'?\'block\':\'none\'">'+
      '<option>תיאום משלוח</option><option>לקוח לא נמצא</option><option>אחר</option></select></div>'+
    '<div id="f_callnote_wrap" style="display:none" class="frow"><label>פירוט</label><input id="f_callnote" placeholder="פרט..."></div>'+
    '<button class="btn" onclick="driverLogCallSave(\''+did+'\')">שמור</button>');
}
async function driverLogCallSave(did){
  var outcome = el('f_calloutcome').value;
  var noteEl = el('f_callnote');

function deliveryPhoto(did){
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.setAttribute('capture','environment');
  inp.onchange = async function(){
    var f = inp.files[0];
    if(!f) return;
    if(f.size > 4*1024*1024) return toast('הקובץ גדול מ-4MB — צלם באיכות נמוכה יותר', true);
    toast('מעלה צילום מסירה...');
    var b64 = await new Promise(function(res){ var rd=new FileReader(); rd.onload=function(){res(rd.result.split(',')[1]);}; rd.readAsDataURL(f); });
    var u = await api('deliverPhoto',{delivery_id:did,base64:b64,mime:f.type});
    if(u.ok){ toast('הצילום נשמר'); var g = await api('getAll'); if(g.ok){ DB=g.db; render(); } }
    else toast(u.error, true);
  };
  inp.click();
}

function finLaundryHtml(){
  var open = (DB.laundryIntakes||[]).filter(i=>i.internal!=='כן' && i.status==='נמסר' && !String(i.invoice_id||'').trim() && Number(i.total_charge)>0);
  var byCust = {};
  open.forEach(function(i){ (byCust[i.customer_id]=byCust[i.customer_id]||[]).push(i); });
  var ids = Object.keys(byCust);
  var h = '<div class="muted" style="font-size:12.5px;margin-bottom:8px">כל קליטה שנשקלה ונמסרה נרשמת כאן כחיוב פתוח על חשבון הלקוח. בסוף התקופה מפיקים חשבונית מרוכזת אחת בלחיצה.</div>';
  if(!ids.length) return h + '<div class="card empty">אין חיובי מכבסה פתוחים</div>';
  ids.sort((a,b)=>cust(a)>cust(b)?1:-1).forEach(function(cid){
    var rows = byCust[cid].slice().sort((a,b)=>String(a.delivered_ts)>String(b.delivered_ts)?1:-1);
    var sum = rows.reduce((s,i)=>s+Number(i.total_charge||0),0), kg = rows.reduce((s,i)=>s+Number(i.net_weight_kg||0),0);
    h += '<div class="card"><div class="row" style="align-items:center;flex-wrap:wrap"><b class="grow" style="font-size:15px">'+esc(cust(cid))+'</b>'+
      '<span class="muted" style="margin-inline-end:10px">'+rows.length+' קליטות · '+(Math.round(kg*100)/100)+' ק"ג · <b style="color:var(--navy)">'+ils(sum)+'</b> לפני מע"מ</span>'+
      (CAN_EDIT?'<button class="btn sm" onclick="nobleInvoice(\''+cid+'\')">הפק חשבונית מרוכזת</button>':'')+'</div>'+
      '<table style="margin-top:6px"><tr><th>נמסר</th><th>קליטה</th><th>ק"ג נטו</th><th>₪ לק"ג</th><th>חיוב</th></tr>'+
      rows.map(i=>'<tr><td>'+esc(String(i.delivered_ts||'').slice(0,10))+'</td><td>'+esc(i.id)+'</td><td>'+(Number(i.net_weight_kg)||0)+'</td><td>'+(Number(i.price_per_kg)||0)+'</td><td>'+ils(i.total_charge)+'</td></tr>').join('')+'</table></div>';
  });
  return h;
}

/* B10/E11: זיהוי כפילויות בהקמת לקוח חדש — השוואה מקומית לרשימה הטעונה, בלי קריאת שרת */
function checkDupeCustomer(){
  var box = el('dupeHint'); if(!box) return;
  var name = (el('f_name')? el('f_name').value : '').trim();
  var phone = (el('f_cphone')? el('f_cphone').value : '').replace(/\D/g,'');
  if(name.length<2 && phone.length<7){ box.innerHTML=''; return; }
  var norm = function(s){ return String(s||'').trim().toLowerCase().replace(/\s+/g,' '); };
  var nName = norm(name);
  var seen = {};
  var matches = DB.customers.filter(function(x){
    var xName = norm(x.name), xPhone = String(x.phone||'').replace(/\D/g,'');
    var nameHit = nName.length>=2 && xName && (xName===nName || xName.indexOf(nName)>-1 || nName.indexOf(xName)>-1);
    var phoneHit = phone.length>=7 && xPhone && xPhone===phone;
    return nameHit || phoneHit;
  }).filter(function(x){ return seen[x.id]? false : (seen[x.id]=1); }).slice(0,3);
  if(!matches.length){ box.innerHTML=''; return; }
  box.innerHTML = '<div class="dupe-hint">אולי התכוונת ל: '+matches.map(function(m){
    return '<b onclick="closeModal();openCust(\''+m.id+'\')">'+esc(m.name)+(m.phone?' ('+esc(m.phone)+')':'')+'</b>';
  }).join(' · ')+' ? (לחיצה פותחת את הכרטיס הקיים)</div>';
}
async function saveCust(id){
  var row = {name:el('f_name').value,type:el('f_ctype').value,vat_id:el('f_vatid').value,payment_terms:el('f_terms').value,address:el('f_addr').value,phone:el('f_cphone').value,email:el('f_cemail').value,city:el('f_ccity').value,warehouse_id:(el('f_cwh')?el('f_cwh').value:''),deviation_pct:el('f_cdev').value,price_per_kg:el('f_ckg').value,active:'כן'};
  if(!row.name) return toast('שם חובה', true);
  var r = id? await act('update',{table:'customers',id:id,row:row},'עודכן') : await act('create',{table:'customers',row:row},'הלקוח נוסף');
  if(r){ closeModal(); if(!id) openCust(r.row.id); }
}

    (contacts.length?'<table><tr><th>שם</th><th>תפקיד</th><th>טלפון</th><th>קשר</th><th>ראשי</th></tr>'+

    cust360(cid)+

/* B3-3 (D5): תמונת מצב פקדון/ערבות בכרטיס הלקוח + כניסה לטופס back office */
function custDepositCard(cid){
  var pr = (DB.creditProfiles||[]).find(function(p){ return p.customer_id===cid; });
  var body;
  if(pr && pr.status==='מאומת' && pr.gateway_token){
    body = '<span style="color:var(--ok)">✓ כרטיס אשראי מאומת</span>'+(pr.verified_at?' <span class="muted">· '+esc(String(pr.verified_at).slice(0,10))+'</span>':'');
  } else if(pr && pr.status==='מאושר'){
    body = '<span style="color:var(--ok)">✓ ערבות חלופית מאושרת'+(pr.guarantee_type?' ('+esc(pr.guarantee_type)+')':'')+'</span>'+b3GuaranteeDetail(pr);
  } else if(pr && pr.approval_pending==='כן'){
    body = '<span style="color:var(--amber)">בקשת ערבות ממתינה לאישור'+(pr.guarantee_type?' ('+esc(pr.guarantee_type)+')':'')+'</span>'+b3GuaranteeDetail(pr)+
      (ROLE==='מנהל'?'<div style="margin-top:6px"><button class="btn sm" onclick="approveB3(\''+cid+'\')">אשר ערבות</button></div>':'');
  } else {
    body = '<span class="muted">אין פקדון/ערבות רשומים</span>';
  }
  return '<div class="card" style="margin:8px 0;padding:10px 12px"><div class="row" style="align-items:flex-start"><div class="grow">'+
    '<b>פקדון ואימות אשראי</b><div style="margin-top:4px">'+body+'</div></div>'+
    (['מנהל','משרד'].includes(ROLE)?'<button class="btn ghost sm" onclick="b3GuaranteeForm(\''+cid+'\')">רישום שיק/ערב</button>':'')+
    '</div></div>';
}
function b3GuaranteeDetail(pr){
  if(pr.guarantee_type==='שיק') return '<div class="muted" style="font-size:12.5px">שיק מס\' '+esc(pr.check_number||'')+(pr.check_bank?' · בנק '+esc(pr.check_bank):'')+'</div>';
  if(pr.guarantee_type==='ערב') return '<div class="muted" style="font-size:12.5px">ערב: '+esc(pr.guarantor_name||'')+(pr.guarantor_phone?' · '+esc(pr.guarantor_phone):'')+(pr.guarantor_id?' · ת.ז '+esc(pr.guarantor_id):'')+'</div>';
  return '';
}
/* Back office (מנהל/משרד): רישום ידני של שיק בטחון / ערב — D5. לעולם לא פרטי כרטיס אשראי */
function b3GuaranteeForm(cid){
  var c = DB.customers.find(x=>x.id===cid)||{};
  var pr = (DB.creditProfiles||[]).find(function(p){ return p.customer_id===cid; })||{};
  var gt = pr.guarantee_type==='ערב' ? 'ערב' : 'שיק';
  openModal('<h2>רישום ערבות — '+esc(c.name)+'</h2>'+
    '<p class="muted" style="margin-bottom:10px">רישום ידני בלבד. לעולם לא נשמרים כאן פרטי כרטיס אשראי.</p>'+
    '<div class="frow"><label>סוג ערבות</label><select id="f_b3type" onchange="b3ToggleFields()">'+
      '<option value="שיק"'+(gt==='שיק'?' selected':'')+'>שיק בטחון</option>'+
      '<option value="ערב"'+(gt==='ערב'?' selected':'')+'>ערב</option></select></div>'+
    '<div id="b3_check_box" class="grid2">'+
      '<div class="frow"><label>מספר שיק</label><input id="f_b3checkno" value="'+esc(pr.check_number||'')+'"></div>'+
      '<div class="frow"><label>בנק</label><input id="f_b3checkbank" value="'+esc(pr.check_bank||'')+'"></div></div>'+
    '<div id="b3_guar_box">'+
      '<div class="frow"><label>שם הערב</label><input id="f_b3gname" value="'+esc(pr.guarantor_name||'')+'"></div>'+
      '<div class="grid2"><div class="frow"><label>טלפון ערב</label><input id="f_b3gphone" type="tel" value="'+esc(pr.guarantor_phone||'')+'"></div>'+
      '<div class="frow"><label>ת.ז. ערב</label><input id="f_b3gid" value="'+esc(pr.guarantor_id||'')+'"></div></div></div>'+
    '<div id="b3formErr" style="color:var(--danger);font-size:12.5px;margin:4px 0"></div>'+
    '<button class="btn" onclick="saveB3Guarantee(\''+cid+'\')">שמור</button>');
  b3ToggleFields();
}
function b3ToggleFields(){
  var t = el('f_b3type').value;
  el('b3_check_box').style.display = t==='שיק'?'grid':'none';
  el('b3_guar_box').style.display = t==='ערב'?'block':'none';
}
async function saveB3Guarantee(cid){
  var t = el('f_b3type').value;
  var row = {customer_id:cid, guarantee_type:t};
  if(t==='שיק'){
    if(!el('f_b3checkno').value){ el('b3formErr').textContent='חסר מספר שיק'; return; }
    row.check_number = el('f_b3checkno').value; row.check_bank = el('f_b3checkbank').value;
  } else {
    if(!el('f_b3gname').value){ el('b3formErr').textContent='חסר שם ערב'; return; }
    row.guarantor_name = el('f_b3gname').value; row.guarantor_phone = el('f_b3gphone').value; row.guarantor_id = el('f_b3gid').value;
  }
  var r = await act('b3SaveGuarantee', row, 'הערבות נרשמה — ממתינה לאישור מנהל');
  if(r) openCust(cid);
}
/* מנהל בלבד — נאכף גם בשרת (MANAGER_ONLY) */
async function approveB3(cid){
  var r = await act('b3ApproveGuarantee', {customer_id:cid}, 'הערבות אושרה');
  if(r){ closeModal(); if(DB.customers.some(x=>x.id===cid)) openCust(cid); }
}

    '<p class="muted">עובד עם כל אקדח ברקוד או מקלדת. סורק פריטים ועגלות.</p>';

/* ===== סריקה במצלמה: BarcodeDetector מובנה, ואם אין — ZXing ===== */
var CAM_STREAM = null, CAM_STOP = false, ZX_READER = null;
async function startCam(){
  var ov = el('camOverlay');
  if(!ov){
    ov = document.createElement('div'); ov.id='camOverlay';
    ov.innerHTML = '<video id="camVideo" autoplay playsinline muted></video>'+
      '<p style="color:#fff;margin:12px">כוון את הברקוד למרכז המסך</p>'+
      '<button class="btn danger" onclick="stopCam()">סגור</button>';
    document.body.appendChild(ov);
  }
  ov.style.display='flex'; CAM_STOP=false;
  try{
    CAM_STREAM = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
  }catch(e){ stopCam(); return toast('אין גישה למצלמה — אשר הרשאה בדפדפן', true); }
  var video = el('camVideo');
  video.srcObject = CAM_STREAM;
  if('BarcodeDetector' in window){
    var det = new BarcodeDetector({formats:['code_128','ean_13','qr_code']});
    (async function loop(){
      if(CAM_STOP) return;
      try{ var codes = await det.detect(video); if(codes.length) return camFound(codes[0].rawValue); }catch(e){}
      setTimeout(loop, 250);
    })();
  } else {
    if(!window.ZXing){
      await new Promise(function(res){ var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/zxing-library/0.21.3/index.min.js';
        s.onload=res; s.onerror=res; document.head.appendChild(s); });
    }
    if(!window.ZXing){ stopCam(); return toast('הדפדפן לא תומך בסריקה — הקלד ידנית', true); }
    ZX_READER = new ZXing.BrowserMultiFormatReader();
    ZX_READER.decodeFromVideoDevice(null, 'camVideo', function(result){ if(result && !CAM_STOP) camFound(result.getText()); });
  }
}
function camFound(text){
  stopCam();
  if(navigator.vibrate) navigator.vibrate(80);
  if(window.FLOOR_CAM){ var fc=FLOOR_CAM; FLOOR_CAM=null; fc(text); return; }
  if(RET_CAM){ RET_CAM=false; if(VIEW!=='returns'){VIEW='returns';render();} setTimeout(function(){ el('retIn').value=text; findReturn(text); },150); return; }
  if(VIEW!=='scan'){ VIEW='scan'; render(); }
  setTimeout(function(){ el('scanIn').value = text; doScan(); }, 150);
}
function stopCam(){
  CAM_STOP = true;
  if(ZX_READER){ try{ ZX_READER.reset(); }catch(e){} ZX_READER=null; }
  if(CAM_STREAM){ CAM_STREAM.getTracks().forEach(t=>t.stop()); CAM_STREAM=null; }
  var ov = el('camOverlay'); if(ov) ov.style.display='none';
}
async function doUnitStatus(uid, st){
  var r = await act('setUnitStatus',{unit_id:uid,status:st},'עודכן ל'+st);
  if(r && VIEW==='scan'){ el('scanIn').value=uid; doScan(); }

      '<div class="muted" style="margin:6px 0">'+esc(r.item?r.item.name:'')+'</div>'+
      (r.entity.status!=='גרוט'?'<div class="row">'+['פנוי','אצל לקוח','בכביסה'].filter(s=>s!==r.entity.status).map(s=>'<button class="btn ghost sm" onclick="doUnitStatus(\''+r.entity.id+'\',\''+s+'\')">'+s+'</button>').join('')+
      '<button class="btn danger sm" onclick="if(confirm(\'לגרוט? נגרע מהמלאי — סופי\'))doUnitStatus(\''+r.entity.id+'\',\'גרוט\')">גרוט</button></div>':'')+'</div>';
  } else {
    el('scanRes').innerHTML = '<div class="card"><b>עגלה '+esc(r.entity.id)+'</b> <span class="chip" style="background:'+(r.entity.status==='פנויה'?'var(--ok)':'var(--amber)')+'">'+esc(r.entity.status)+'</span>'+
      (r.task?'<div class="muted" style="margin-top:6px">משימה עליה: '+esc(item(r.task.item_id))+' × '+r.task.qty+' · שלב: '+esc(r.task.stage)+'</div>'+
      '<button class="btn sm" style="margin-top:8px" onclick="doAdvance(\''+r.task.id+'\');setTimeout(doScan,600)">קדם שלב ←</button>':'')+'</div>';
  }
  el('scanIn').value=''; el('scanIn').focus();
}

var AUDIT_FILTER = { q:'', user:'', action:'', from:'', to:'' };
var AUDIT_SHOW = 200; // כמות שורות מוצגות (טעינה הדרגתית — הנתונים כבר טעונים במלואם ב-DB)
function rAudit(){
  var all = (DB.auditLog||[]).slice().sort((a,b)=> a.ts>b.ts?-1:(a.ts<b.ts?1:0));
  var users = Array.from(new Set(all.map(x=>x.user).filter(Boolean))).sort();
  var actions = Array.from(new Set(all.map(x=>x.action).filter(Boolean))).sort();
  var f = AUDIT_FILTER;
  var rows = all.filter(function(r){
    if(f.user && r.user!==f.user) return false;
    if(f.action && r.action!==f.action) return false;
    if(f.from && String(r.ts).slice(0,10)<f.from) return false;
    if(f.to && String(r.ts).slice(0,10)>f.to) return false;
    if(f.q){
      var s=(r.user+' '+r.action+' '+r.details).toLowerCase();
      if(s.indexOf(f.q.toLowerCase())===-1) return false;
    }
    return true;
  });
  var shown = rows.slice(0, AUDIT_SHOW);
  el('main').innerHTML = '<div class="section-title"><h2>יומן פעולות</h2><span class="muted">'+rows.length+' רשומות (מתוך '+all.length+' סה"כ)</span></div>'+
    '<div class="card"><div class="grid3">'+
    '<div class="frow"><label>חיפוש חופשי</label><input id="au_q" value="'+esc(f.q)+'" placeholder="משתמש / פעולה / פרטים" oninput="auditSetFilter()"></div>'+
    '<div class="frow"><label>משתמש</label><select id="au_user" onchange="auditSetFilter()"><option value="">הכל</option>'+users.map(u=>'<option'+(f.user===u?' selected':'')+'>'+esc(u)+'</option>').join('')+'</select></div>'+
    '<div class="frow"><label>פעולה</label><select id="au_action" onchange="auditSetFilter()"><option value="">הכל</option>'+actions.map(a=>'<option'+(f.action===a?' selected':'')+'>'+esc(a)+'</option>').join('')+'</select></div>'+
    '<div class="frow"><label>מתאריך</label><input id="au_from" type="date" value="'+esc(f.from)+'" onchange="auditSetFilter()"></div>'+
    '<div class="frow"><label>עד תאריך</label><input id="au_to" type="date" value="'+esc(f.to)+'" onchange="auditSetFilter()"></div>'+
    '</div></div>'+
    b4NotificationsWidget()+
    '<div class="card"><table><tr><th>תאריך ושעה</th><th>משתמש</th><th>פעולה</th><th>פרטים</th></tr>'+
    (shown.length? shown.map(function(r){
      return '<tr><td class="muted" style="white-space:nowrap">'+esc(r.ts)+'</td><td>'+esc(r.user)+'</td><td>'+esc(r.action)+'</td><td style="max-width:520px;word-break:break-word">'+esc(r.details)+'</td></tr>';
    }).join('') : '<tr><td colspan="4" class="muted" style="text-align:center;padding:20px">אין רשומות תואמות</td></tr>')+
    '</table></div>'+
    (rows.length>AUDIT_SHOW? '<div class="row" style="justify-content:center;margin-top:10px"><button class="btn ghost" onclick="AUDIT_SHOW+=200;rAudit()">טען עוד ('+(rows.length-AUDIT_SHOW)+' נוספות)</button></div>' : '');
}
function auditSetFilter(){
  AUDIT_FILTER = { q: el('au_q').value, user: el('au_user').value, action: el('au_action').value, from: el('au_from').value, to: el('au_to').value };
  AUDIT_SHOW = 200;
  rAudit();
}
// B4: תקציר תור ההתראות + כפתור הרצה ידנית (למנהל) — לבדיקות, בלי להמתין לטריגר היומי (08:00)
function b4NotificationsWidget(){
  var list = (DB.notifications||[]).slice().sort((a,b)=> (a.sent_at||a.scheduled_for)<(b.sent_at||b.scheduled_for)?1:-1);
  var pending = list.filter(n=>n.status==='ממתין').length;
  var failed = list.filter(n=>n.status==='נכשל').length;
  var recent = list.slice(0,8);
  return '<div class="card" style="margin-bottom:14px"><div class="row" style="align-items:center;margin-bottom:6px">'+
    '<h3 class="grow">התראות (אימייל) — B4</h3>'+
    '<span class="muted">ממתינות: '+pending+' · נכשלו: '+failed+'</span> '+
    '<button class="btn sm" onclick="doB4RunNow()">הרץ סריקה עכשיו</button></div>'+
    (recent.length? recent.map(function(n){
      var vars={}; try{ vars=JSON.parse(n.payload||'{}'); }catch(e){}
      var color = n.status==='נשלח'?'var(--ok)':(n.status==='נכשל'?'var(--danger)':'var(--amber)');
      return '<div class="attn-row"><span class="tag" style="background:'+color+'">'+esc(n.status)+'</span>'+
        '<div class="grow">'+esc(n.type)+' · '+esc(n.recipient)+(vars.customer_name?' ('+esc(vars.customer_name)+')':'')+'</div>'+
        '<span class="muted">'+esc(n.sent_at||n.scheduled_for||'')+'</span></div>';
    }).join('') : '<div class="muted" style="padding:6px 2px">אין התראות עדיין</div>')+
    '</div>';
}
async function doB4RunNow(){
  var r = await act('b4RunNow',{}, null);
  if(r) toast('הסריקה הושלמה — נוספו לתור: '+r.queued+' · נשלחו: '+r.sent);
}

async function runOrdersReport(){
  var f = {from:el('rf_from').value,to:el('rf_to').value,customer_id:el('rf_cust').value,status:el('rf_status').value,type:el('rf_type').value};
  Object.keys(f).forEach(k=>{ if(!f[k]) delete f[k]; });
  el('repRes').innerHTML = '<div class="card empty">מפיק...</div>';
  var r = await api('ordersReport', f);
  if(!r.ok) return el('repRes').innerHTML = '<div class="card empty">'+esc(r.error)+'</div>';
  LAST_REPORT = {filters:f, data:r};
  el('repRes').innerHTML = '<div class="card"><div class="row" style="margin-bottom:8px"><b class="grow">תוצאות: '+r.rows.length+' הזמנות · '+ils(r.total)+'</b>'+
    '<button class="btn ghost sm" onclick="printReport()"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> הדפס דוח רשמי</button></div>'+
    (r.rows.length?'<table><tr><th>תאריך</th><th>לקוח</th><th>סוג</th><th>סטטוס</th><th>סכום</th><th>שולם</th><th>יתרה</th></tr>'+
    r.rows.map(x=>'<tr><td>'+esc(x.date)+'</td><td>'+esc(x.customer)+'</td><td>'+esc(x.type)+'</td><td>'+esc(x.status)+'</td><td>'+ils(x.total)+'</td><td>'+ils(x.paid)+'</td><td>'+ils(x.balance)+'</td></tr>').join('')+'</table>':'<div class="empty">אין תוצאות לפילטר זה</div>')+'</div>';
}
function printReport(){
  if(!LAST_REPORT) return;
  var f = LAST_REPORT.filters, r = LAST_REPORT.data;
  var fdesc = [];

/* ================= NC3: מכבסה — ביצועים (עובדים + מכונות, מחושב מקומית מיומן האירועים) ================= */
var NOBLE_REP_DAYS = 30;
function nobleRepRange(d){ NOBLE_REP_DAYS = d; renderNobleReports(); }
function renderNobleReports(){
  var box = el('repNoble'); if(!box) return;
  var evs = DB.laundryEvents||[];
  if(!evs.length){ box.innerHTML=''; return; }
  var parseT = function(x){ var d=new Date(String(x||'').replace(' ','T')); return isNaN(d.getTime())?null:d; };
  var ld = function(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); };
  var since = Date.now() - NOBLE_REP_DAYS*864e5;
  var inSet = internalIntakeSet(), incl = inclInternal();
  var E = []; evs.forEach(function(e){ var t=parseT(e.ts); if(t && t.getTime()>=since) E.push({e:e,t:t}); });
  E.sort(function(a,b){ return a.t-b.t; });

  /* --- סיכום תקופה: מהקליטות שנמסרו (השקילה האחרונה קובעת — בלי כפילויות משקילה חוזרת) --- */
  var kg=0, rev=0, del=0;
  (DB.laundryIntakes||[]).forEach(function(i){
    var t=parseT(i.delivered_ts); if(!t||t.getTime()<since) return;
    del++;
    if(incl || i.internal!=='כן') kg+=Number(i.net_weight_kg)||0;
    rev+=Number(i.total_charge)||0;
  });

  /* --- ניקוד עובדים: 'סיום' של עגלה → ה'התחלה' הבאה שלה; הפער נזקף לעובד שהתחיל את השלב הבא --- */
  var lastEnd={}, workers={};
  var W=function(n){ return workers[n]=workers[n]||{name:n,acts:0,moves:0,lag:0}; };
  E.forEach(function(x){
    var e=x.e, k=e.intake_id+'|'+e.cart_id;
    if(e.worker_name) W(e.worker_name).acts++;
    if(e.event_type==='סיום') lastEnd[k]=x.t;
    else if(e.event_type==='התחלה'){
      if(lastEnd[k] && e.worker_name){ var m=(x.t-lastEnd[k])/60000; if(m>=0 && m<=1440){ var w=W(e.worker_name); w.moves++; w.lag+=m; } }
      delete lastEnd[k];
    }
  });
  var lb = Object.keys(workers).map(function(n){return workers[n];}).filter(function(w){return w.moves>0;})
    .map(function(w){ return {name:w.name, acts:w.acts, moves:w.moves, avg:Math.round(w.lag/w.moves)}; })
    .sort(function(a,b){ return a.avg-b.avg; });

  /* --- ניצולת מכונות: זוגות התחלה→סיום למכונה. שלב פתוח נספר עד עכשיו (לכל היותר 24 שעות) --- */
  var openM={}, segs=[];
  E.forEach(function(x){
    var e=x.e; if(!e.machine_id) return;
    var k=e.intake_id+'|'+e.cart_id+'|'+e.machine_id;
    if(e.event_type==='התחלה') openM[k]={m:e.machine_id,t:x.t};
    else if(e.event_type==='סיום' && openM[k]){ if(x.t>openM[k].t) segs.push({m:e.machine_id,a:openM[k].t,b:x.t}); delete openM[k]; }
  });
  Object.keys(openM).forEach(function(k){ var o=openM[k], b=new Date(Math.min(Date.now(), o.t.getTime()+864e5)); if(b>o.t) segs.push({m:o.m,a:o.t,b:b}); });
  var busyTot={}, busyWin={}, dayAny={}, daySpan={};
  segs.forEach(function(sg){
    busyTot[sg.m]=(busyTot[sg.m]||0)+(sg.b-sg.a)/60000;
    var cur=new Date(sg.a);
    while(cur<sg.b){ /* פירוק ליממות + חיתוך לחלון 05:00–17:00 */
      var dayEnd=new Date(cur); dayEnd.setHours(24,0,0,0);
      var segEnd=sg.b<dayEnd?sg.b:dayEnd, day=ld(cur);
      dayAny[day]=1;
      if(!daySpan[day]) daySpan[day]={a:cur.getTime(),b:segEnd.getTime()};
      else { if(cur.getTime()<daySpan[day].a) daySpan[day].a=cur.getTime(); if(segEnd.getTime()>daySpan[day].b) daySpan[day].b=segEnd.getTime(); }
      var w1=new Date(cur); w1.setHours(5,0,0,0); var w2=new Date(cur); w2.setHours(17,0,0,0);
      var ca=Math.max(cur.getTime(),w1.getTime()), cb=Math.min(segEnd.getTime(),w2.getTime());
      if(cb>ca) busyWin[sg.m]=(busyWin[sg.m]||0)+(cb-ca)/60000;
      cur=dayEnd;
    }
  });
  var days=Object.keys(dayAny), winTotal=days.length*720, spanTotal=0;
  days.forEach(function(d){ spanTotal+=(daySpan[d].b-daySpan[d].a)/60000; });
  var maxBusy=0; Object.keys(busyTot).forEach(function(m){ if(busyTot[m]>maxBusy) maxBusy=busyTot[m]; });
  var pct=function(x,y){ return y>0?Math.min(100,Math.round(x/y*100)):0; };
  var bar=function(p,color){ return '<div style="background:var(--line);border-radius:6px;height:8px;overflow:hidden"><div style="width:'+p+'%;height:100%;background:'+color+'"></div></div>'; };
  var machRows = DB.machines.map(function(m){
    var bt=busyTot[m.id]||0;
    return {id:m.id, stage:m.auto_stage||'', bt:bt, a:pct(busyWin[m.id]||0,winTotal), b:pct(bt,spanTotal), c:pct(bt,maxBusy)};
  }).sort(function(x,y){ return y.bt-x.bt; });

  /* --- רינדור --- */
  var rng=function(d,l){ return '<button class="btn '+(NOBLE_REP_DAYS===d?'':'ghost')+' sm" onclick="nobleRepRange('+d+')">'+l+'</button>'; };
  var mini=function(v,l){ return '<div style="flex:1;min-width:120px;text-align:center;padding:8px 4px"><div style="font-size:22px;font-weight:700;color:var(--navy)">'+v+'</div><div class="muted" style="font-size:12px">'+l+'</div></div>'; };
  var medals=['🥇','🥈','🥉'];
  var h='<h3 style="margin:16px 0 8px">מכבסה — ביצועים</h3>'+
    '<div class="card"><div class="row" style="align-items:center;flex-wrap:wrap"><div class="row grow" style="gap:6px">'+rng(7,'7 ימים')+rng(30,'30 יום')+rng(90,'90 יום')+'</div>'+internalChk('renderNobleReports')+'</div>'+
    '<div class="row" style="flex-wrap:wrap;margin-top:6px">'+mini(Math.round(kg*100)/100,'ק&quot;ג (קליטות שנמסרו)')+mini(ils(rev),'הכנסות מכבסה (לפני מע&quot;מ)')+mini(del,'קליטות נמסרו')+'</div></div>';
  h+='<div class="card"><h3>עובדים — מהירות מעבר בין שלבים</h3><div class="muted" style="font-size:12px;margin:2px 0 6px">כמה זמן עבר מסיום שלב של עגלה ועד שהעובד התחיל בה את השלב הבא. פחות = טוב יותר.</div>'+
    (lb.length?'<table><tr><th></th><th>עובד</th><th>מעברים</th><th>זמן מעבר ממוצע</th><th>פעולות בתקופה</th></tr>'+
      lb.map(function(w,i){ return '<tr><td>'+(medals[i]||(i+1))+'</td><td><b>'+esc(w.name)+'</b></td><td>'+w.moves+'</td><td>'+(w.avg?fmtMin(w.avg):'מיידי ⚡')+'</td><td>'+w.acts+'</td></tr>'; }).join('')+'</table>'
    :'<div class="empty">אין עדיין מעברי שלבים בתקופה</div>')+'</div>';
  h+='<div class="card"><h3>ניצולת מכונות</h3><div class="muted" style="font-size:12px;margin:2px 0 8px">'+days.length+' ימי עבודה בתקופה · שלושה מדדים: יום עבודה 05:00–17:00 · מהפעלה ראשונה עד עצירה אחרונה · יחסית למכונה העמוסה ביותר.</div>';
  if(!machRows.length) h+='<div class="empty">לא הוגדרו מכונות</div>';
  machRows.forEach(function(m){
    h+='<div style="padding:6px 0;border-top:1px solid var(--line)"><div class="row"><b class="grow">'+esc(m.id)+'</b><span class="muted" style="font-size:12px">'+esc(m.stage)+(m.stage?' · ':'')+Math.round(m.bt/6)/10+' שעות עבודה</span></div>'+
      '<div class="grid3" style="gap:8px;margin-top:4px">'+
      '<div><div class="muted" style="font-size:11px">יום עבודה (05:00–17:00): <b>'+m.a+'%</b></div>'+bar(m.a,'var(--teal)')+'</div>'+
      '<div><div class="muted" style="font-size:11px">מהתנעה עד עצירה: <b>'+m.b+'%</b></div>'+bar(m.b,'var(--navy)')+'</div>'+
      '<div><div class="muted" style="font-size:11px">יחסית לעמוסה ביותר: <b>'+m.c+'%</b></div>'+bar(m.c,'var(--amber)')+'</div>'+
      '</div></div>';
  });
  h+='</div>';
  box.innerHTML=h;
}

}
