var CAL_Y = new Date().getFullYear(), CAL_M = new Date().getMonth();
var HEBCAL_CACHE = {};
async function fetchHebcal(y, m){
  var key = y+'-'+m;
  if(HEBCAL_CACHE[key]) return HEBCAL_CACHE[key];
  try{
    var res = await fetch('https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&min=off&nx=off&mf=off&ss=off&c=on&M=on&i=on&lg=he&geonameid=293703&year='+y+'&month='+(m+1));
    var data = await res.json();
    HEBCAL_CACHE[key] = data.items||[];
  }catch(e){ HEBCAL_CACHE[key] = []; }
  return HEBCAL_CACHE[key];
}
function hebFmt(d, opts){ try{ return new Intl.DateTimeFormat('he-u-ca-hebrew', opts).format(d); }catch(e){ return ''; } }
function calEvents(){
  var events = [];
  DB.orders.filter(o=>['מאושרת','סופקה'].includes(o.status)).forEach(function(o){
    events.push({date:o.start_date, label:'אספקה: '+cust(o.customer_id), color:'var(--teal)', click:"openOrder('"+o.id+"')"});
    events.push({date:o.end_date, label:'איסוף: '+cust(o.customer_id), color:'var(--amber)', click:"openOrder('"+o.id+"')"});
  });
  DB.tasks.filter(t=>t.status!=='הושלמה'&&t.due_date).forEach(function(t){
    events.push({date:t.due_date, label:'משימה: '+t.title, color:'var(--navy2)', click:"openTask('"+t.id+"')"});
  });
  DB.meetings.forEach(function(m){
    events.push({date:m.date, label:'פגישה'+(m.time?' '+m.time:'')+': '+m.title, color:'var(--danger)', click:"openMeeting('"+m.id+"')"});
  });
  DB.machines.filter(m=>m.next_service).forEach(function(m){
    events.push({date:m.next_service, label:'טיפול: '+m.id, color:'#94A3B8', click:"go('assets')"});
  });
  DB.vehicles.forEach(function(v){
    if(v.test_date) events.push({date:v.test_date, label:'טסט: '+(v.plate||v.id), color:'#94A3B8', click:"go('fleet')"});
    if(v.insurance_expiry) events.push({date:v.insurance_expiry, label:'ביטוח: '+(v.plate||v.id), color:'#94A3B8', click:"go('fleet')"});
    if(v.next_service_date) events.push({date:v.next_service_date, label:'טיפול רכב: '+(v.plate||v.id), color:'#94A3B8', click:"go('fleet')"});
  });
  return events;
}
function rCalendar(){ rCalendarDraw([]); fetchHebcal(CAL_Y, CAL_M).then(function(items){ rCalendarDraw(items); }); }
function rCalendarDraw(hebItems){
  var first = new Date(CAL_Y, CAL_M, 1);
  var today = new Date().toISOString().slice(0,10);
  var byDate = {};
  calEvents().forEach(e=>{ if(e.date) (byDate[e.date]=byDate[e.date]||[]).push(e); });
  var holyDays = {};
  (hebItems||[]).forEach(function(it){
    var d = String(it.date).substring(0,10);
    if(it.category==='candles'){ (byDate[d]=byDate[d]||[]).push({date:d,label:it.title,color:'#B7791F',plain:true}); holyDays[d==d?String(new Date(new Date(d).getTime()+864e5).toISOString().slice(0,10)):d]=1; }
    if(it.category==='havdalah') (byDate[d]=byDate[d]||[]).push({date:d,label:it.title,color:'#B7791F',plain:true});
    if(it.category==='holiday'){ (byDate[d]=byDate[d]||[]).push({date:d,label:it.title,color:'var(--danger)',plain:true}); if(it.yomtov) holyDays[d]=1; }
  });
  var startOffset = first.getDay(); // 0=ראשון
  var daysInMonth = new Date(CAL_Y, CAL_M+1, 0).getDate();
  var lastDate = new Date(CAL_Y, CAL_M, daysInMonth);
  var hebRange = hebFmt(first,{month:'long',year:'numeric'});
  var hebEnd = hebFmt(lastDate,{month:'long',year:'numeric'});
  if(hebEnd && hebEnd!==hebRange) hebRange = hebFmt(first,{month:'long'})+'–'+hebEnd;
  var gregTitle = new Intl.DateTimeFormat('he',{month:'long',year:'numeric'}).format(first);
  var overdue = DB.tasks.filter(t=>t.status!=='הושלמה'&&t.due_date&&t.due_date<today);
  var cells = '';
  ['א','ב','ג','ד','ה','ו','ש'].forEach(d=>{ cells += '<div class="calhead">'+d+'</div>'; });
  for(var i=0;i<startOffset;i++) cells += '<div></div>';
  for(var day=1;day<=daysInMonth;day++){
    var d = new Date(CAL_Y, CAL_M, day);
    var iso = CAL_Y+'-'+('0'+(CAL_M+1)).slice(-2)+'-'+('0'+day).slice(-2);
    var evs = byDate[iso]||[];
    var isSat = d.getDay()===6;
    cells += '<div class="calday'+(iso===today?' today':'')+'" style="'+((isSat||holyDays[iso])?'background:#FDF6E3;':'')+'" onclick="openDay(\''+iso+'\')">'+
      (isSat?'<span class="chip" style="background:#B8860B;font-size:9px;padding:1px 6px">שבת</span> ':'')+
      '<span class="dnum">'+day+'</span> <span class="dheb">'+esc(hebFmt(d,{day:'numeric'}))+' '+esc(hebFmt(d,{month:'long'}))+'</span>'+
      evs.slice(0,3).map(e=>e.plain?'<span class="calshab">'+esc(e.label)+'</span>':'<div class="calev" style="background:'+e.color+(e.click?';cursor:pointer':'')+'"'+(e.click?' title="לחץ לפתיחה" onclick="event.stopPropagation();'+e.click+'"':'')+'>'+esc(e.label)+'</div>').join('')+
      (evs.length>3?'<div class="muted">+'+(evs.length-3)+' נוספים</div>':'')+'</div>';
  }
  el('main').innerHTML = '<div class="section-title"><h2>יומן</h2><div class="row">'+
    '<button class="btn ghost sm" onclick="calNav(1)">◀ הבא</button>'+
    '<button class="btn ghost sm" onclick="CAL_Y=new Date().getFullYear();CAL_M=new Date().getMonth();rCalendar()">היום</button>'+
    '<button class="btn ghost sm" onclick="calNav(-1)">הקודם ▶</button></div></div>'+
    '<div class="card"><div style="text-align:center;margin-bottom:8px"><b style="font-size:17px">'+esc(gregTitle)+'</b><div class="muted">'+esc(hebRange)+'</div></div>'+
    '<div class="calgrid">'+cells+'</div></div>'+
    (overdue.length?'<div class="card" style="border-color:var(--danger)"><b style="color:var(--danger)">משימות באיחור:</b> '+overdue.map(t=>'<span style="cursor:pointer;text-decoration:underline" onclick="openTask(\''+t.id+'\')">'+esc(t.title)+'</span>').join(' · ')+'</div>':'');
}
function calNav(dir){ CAL_M += dir; if(CAL_M<0){CAL_M=11;CAL_Y--;} if(CAL_M>11){CAL_M=0;CAL_Y++;} rCalendar(); }
function openDay(iso){
  var evs = calEvents().filter(e=>e.date===iso);
  var d = new Date(iso);
  openModal('<h2>'+iso+'</h2><div class="muted" style="margin-bottom:10px">'+esc(hebFmt(d,{weekday:'long',day:'numeric',month:'long',year:'numeric'}))+'</div>'+
    (evs.length? evs.map(e=>'<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line)'+(e.click?';cursor:pointer':'')+'"'+(e.click?' onclick="closeModal();'+e.click+'"':'')+'><span class="chip" style="background:'+e.color+'">•</span><div class="grow">'+esc(e.label)+(e.click?' <span class="muted" style="font-size:11px">↗ פתח</span>':'')+'</div></div>').join(''):'<div class="muted">אין אירועים ביום זה</div>'));
}

// מסנכרן את הצ'קבוקסים לתוך הטיוטה בלי לרנדר מחדש
function syncMeetParts(){
  if(!MEET_DRAFT) return;
  if(el('f_mtitle')) MEET_DRAFT.title = el('f_mtitle').value;
  if(el('f_mdate')) MEET_DRAFT.date = el('f_mdate').value;
  if(el('f_mtime')) MEET_DRAFT.time = el('f_mtime').value;
  if(el('f_mloc')) MEET_DRAFT.location = el('f_mloc').value;
  MEET_DRAFT.partIds = Array.from(document.querySelectorAll('.mpart:checked')).map(x=>x.value);
}
// מודל הוספת משתתף חדש — נשמר לצמיתות ב-contacts (לא בלקוחות), עם פרטים אופציונליים ותפקיד/הקשר בפגישה
function addParticipantForm(){
  syncMeetParts();

    '<p class="muted" style="margin-bottom:8px">יישמר במאגר אנשי הקשר הקבוע וישמש גם בפגישות עתידיות.</p>'+
    '<div class="frow"><label>שם</label><input id="f_pnname"></div>'+
    '<div class="frow"><label>תפקיד / הקשר בפגישה</label><input id="f_pnrole" placeholder="למשל: ספק, יועץ, נציג לקוח"></div>'+

async function saveParticipant(){
  if(!el('f_pnname').value) return toast('שם חובה', true);
  var r = await act('create',{table:'contacts',row:{customer_id:'',name:el('f_pnname').value,role:el('f_pnrole').value,
    phone:el('f_pnphone').value,email:el('f_pnemail').value,note:el('f_pnnote').value,is_primary:''}},'המשתתף נוסף למאגר');
  if(!r) return;
  // מוסיפים אוטומטית את המשתתף החדש לפגישה הנוכחית
  if(MEET_DRAFT && r.row && r.row.id) MEET_DRAFT.partIds.push(r.row.id);
  drawMeetingForm();
}
async function saveMeeting(){
  syncMeetParts();
  var d = MEET_DRAFT;
  if(!d.title||!d.date) return toast('נושא ותאריך חובה', true);
  // מחרוזת קריאה לתאימות לאחור עם התצוגה הקיימת (m.participants)
  var names = d.partIds.map(function(id){ var k=(DB.contacts||[]).find(x=>x.id===id); return k?k.name:''; }).filter(Boolean);
  var r = await act('create',{table:'meetings',row:{title:d.title,date:d.date,time:d.time,location:d.location||'',
    participants:names.join(', '),participant_ids:d.partIds.join(','),protocol:''}},'הפגישה נוצרה');
  if(r){ MEET_DRAFT=null; closeModal(); await syncProtocolMentions(r.row.id, r.row.protocol||''); openMeeting(r.row.id); }
}
async function openMeeting(mid){

async function saveProtocol(mid){

async function doTaskFromMeeting(mid){

  el('login').innerHTML = '<div class="box"><div class="logo">MAPA<span>·</span>NOBLE</div><p>טוען קטלוג...</p></div>';

function shopTotal(){
  var sub = 0;
  document.querySelectorAll('.sqty').forEach(function(x){
    var it = SHOP.items.find(i=>i.id===x.dataset.item);
    sub += (Number(x.value)||0) * it.price;
  });

  var vat = Math.round(sub*SHOP.vat_rate*100)/100;
  el('shopSum').innerHTML = sub>0 ? 'סה"כ: '+ils(sub)+(SHOP.delivery_fee?' (כולל שינוע '+ils(SHOP.delivery_fee)+')':'')+' + מע"מ '+ils(vat)+' = <b>'+ils(sub+vat)+'</b>' : 'בחר פריטים לצפייה במחיר';

/* ================= @אזכורים בפרוטוקול פגישה ================= */
// סוגי הישויות שאפשר לתייג עם @ בתוך טקסט הפרוטוקול
var MENTION_TYPES = ['customer','contact','employee','supplier','item'];
var MENTION_CTX = null; // {start,end} — גבולות הקטע '@חלקי' בטקסט בזמן ההשלמה
// כל הישויות הניתנות לתיוג — שם לא ריק בלבד
function mentionEntities(){
  var out = [];
  MENTION_TYPES.forEach(function(t){
    var e = ENT[t]; if(!e) return;
    ((e.list && e.list())||[]).forEach(function(r){
      var n = String(e.name(r)||'').trim();
      if(n && r.id!=null && r.id!=='') out.push({type:t, id:r.id, name:n});
    });
  });
  return out;
}
// השלמה אוטומטית: מזהה '@קטע' שמסתיים בסמן ומציג עד 8 התאמות
function mentionAuto(ta){
  var dd = el('mentionDD'); if(!dd || !ta) return;
  var pos = ta.selectionStart, before = ta.value.slice(0, pos);
  var mm = before.match(/(^|[\s.,;:!?()"'-])@([^@\n]{0,40})$/);
  if(!mm){ dd.style.display='none'; MENTION_CTX=null; return; }
  var frag = mm[2], q = frag.trim().toLowerCase();
  var list = mentionEntities().filter(function(e){ return !q || e.name.toLowerCase().indexOf(q)>-1; }).slice(0,8);
  if(!list.length){ dd.style.display='none'; MENTION_CTX=null; return; }
  MENTION_CTX = {start: pos - frag.length - 1, end: pos};
  dd.innerHTML = list.map(function(e){
    var t = ENT[e.type]||{};
    return '<div style="padding:7px 10px;cursor:pointer;border-bottom:1px solid var(--line)" onclick="pickMention(\''+e.type+'\',\''+e.id+'\')">'+(t.icon||'')+' <span class="muted" style="font-size:12px">'+esc(t.label||'')+'</span> <b>'+esc(e.name)+'</b></div>';
  }).join('');
  dd.style.display='block';
}
function hideMentionDD(){ var dd = el('mentionDD'); if(dd) dd.style.display='none'; MENTION_CTX=null; }
// בחירת שורה — מחליף את '@קטע' ב'@שם המלא ' ומחזיר פוקוס
function pickMention(type, id){
  var ta = el('f_mprotocol'), e = ENT[type];
  var r = e? ((e.list && e.list())||[]).find(function(x){return String(x.id)===String(id);}) : null;
  if(ta && r && MENTION_CTX){
    var name = String(e.name(r)), v = ta.value;
    ta.value = v.slice(0, MENTION_CTX.start) + '@' + name + ' ' + v.slice(MENTION_CTX.end);
    var np = MENTION_CTX.start + name.length + 2;
    ta.focus(); ta.setSelectionRange(np, np);
  }
  hideMentionDD();
}
// סגירת הרשימה בלחיצה מחוץ לה
document.addEventListener('click', function(ev){
  var dd = el('mentionDD');
  if(dd && dd.style.display!=='none' && !dd.contains(ev.target) && !(ev.target && ev.target.id==='f_mprotocol')) hideMentionDD();
});
// כל האזכורים המזוהים בטקסט — התאמה מדויקת לשם, השם הארוך ביותר קודם
function protocolMentionsIn(text){
  var found = [];
  text = String(text==null?'':text);
  if(text.indexOf('@')===-1) return found;
  var ents = mentionEntities().sort(function(a,b){ return b.name.length - a.name.length; });
  if(!ents.length) return found;
  var i = 0;
  while((i = text.indexOf('@', i)) > -1){
    var rest = text.slice(i+1), hit = null;
    for(var k=0;k<ents.length;k++){ if(rest.indexOf(ents[k].name)===0){ hit = ents[k]; break; } }
    if(hit){ found.push({index:i, len:hit.name.length+1, ent:hit}); i += hit.name.length + 1; }
    else i++;
  }
  return found;
}
// פרוטוקול כ-HTML: אזכור מזוהה הופך לתגית מודגשת (לחיצה = ניווט), השאר טקסט רגיל
function renderProtocolHTML(text, clickable){
  text = String(text==null?'':text);
  var ms = protocolMentionsIn(text);
  if(!ms.length) return esc(text);
  var html = '', pos = 0;
  ms.forEach(function(mm){
    html += esc(text.slice(pos, mm.index));
    var t = ENT[mm.ent.type]||{};
    var label = (t.icon||'')+' '+esc('@'+mm.ent.name);
    html += clickable
      ? '<span style="background:var(--navy2);color:#fff;border-radius:8px;padding:1px 7px;cursor:pointer;font-weight:600" title="'+esc(t.label||'')+'" onclick="entOpen(\''+mm.ent.type+'\',\''+mm.ent.id+'\')">'+label+'</span>'
      : '<b style="text-decoration:underline">'+label+'</b>';
    pos = mm.index + mm.len;
  });
  html += esc(text.slice(pos));
  return html;
}
// יצירת קישורי links מהאזכורים — כפולים מדולגים, שגיאות נבלעות, לעולם לא חוסם שמירה
async function syncProtocolMentions(mid, text){
  try{
    if(!mid) return;
    var ms = protocolMentionsIn(text), seen = {};
    for(var i=0;i<ms.length;i++){
      var e = ms[i].ent, key = e.type+'|'+e.id;
      if(seen[key]) continue; seen[key] = 1;
      var exists = (DB.links||[]).some(function(l){
        return l.from_type==='meeting' && String(l.from_id)===String(mid) && l.to_type===e.type && String(l.to_id)===String(e.id);
      });
      if(exists) continue;
      try{ await act('create',{table:'links',row:{from_type:'meeting',from_id:mid,to_type:e.type,to_id:e.id,note:'תויג בפרוטוקול'}}); }catch(err){}
    }
  }catch(err){}
}

var NOTE_TYPES = {customer:'לקוח',item:'פריט',order:'הזמנה',employee:'עובד',supplier:'ספק',vehicle:'רכב',machine:'מכונה',cart:'עגלה',task:'משימה',meeting:'פגישה',expense:'הוצאה'};
function noteEntityName(type,id){
  var m = {customer:['customers','name'],item:['items','name'],employee:['employees','name'],supplier:['suppliers','name'],
    vehicle:['vehicles','plate'],machine:['machines','id'],cart:['carts','id'],task:['tasks','title'],meeting:['meetings','title']};
  if(type==='order'){ var o=DB.orders.find(x=>x.id===id); return o?cust(o.customer_id)+' '+o.start_date:id; }
  if(type==='expense'){ var x=DB.expenses.find(e=>e.id===id); return x?x.category+' '+x.date:id; }
  var mm = m[type]; if(!mm) return id;
  var rec = DB[FE_MAP[mm[0]]||mm[0]].find(r=>r.id===id);
  return rec?(rec[mm[1]]||id):id;
}
/* ניווט הקשר מתרשומת — פתיחת ההורה שעליו נכתבה + הדגשת התרשומת שם */
var NOTE_SCREEN = {vehicle:'fleet', item:'items', employee:'staff', supplier:'purchasing', machine:'assets', cart:'assets', expense:'finance'};
function noteNav(noteId){
  var n = (DB.notes||[]).find(function(x){return String(x.id)===String(noteId);});
  if(!n) return;
  var t = n.entity_type, id = n.entity_id;
  if(!t || !id){ closeModal(); go('notes'); highlightNote(noteId); return; } // אין הקשר — פשוט מציגים את התרשומת
  if(t==='customer'){ // תצוגת 360 מציגה תרשומות בפנים — מדגישים שם, ואם לא נמצאה (ישנה) נפתח את מודל התרשומות
    openCust(id);
    highlightNote(noteId, function(){ notesModal('customer',id); highlightNote(noteId); });
    return;
  }
  if(t==='order') openOrder(id);
  else if(t==='task') openTask(id);
  else if(t==='meeting') openMeeting(id);
  else if(NOTE_SCREEN[t]){ closeModal(); go(NOTE_SCREEN[t]); }
  // ההורה לא מציג תרשומות בפנים — פותחים את מודל התרשומות שלו עם הדגשה
  notesModal(t,id);
  highlightNote(noteId);
}
function highlightNote(noteId, onMiss, tries){
  tries = (tries==null)? 12 : tries;
  // ייתכן ש-id="note-..." קיים גם ברשימה הראשית (מאחורי המודל) וגם בתוך מודל פתוח (תצוגת 360 / notesModal) —
  // getElementById עלול למצוא את ההעתק המוסתר; מעדיפים במפורש העתק שבתוך המודל הגלוי אם קיים
  var modalEl = el('modal');
  var sel = '#note-'+String(noteId).replace(/([^\w-])/g,'\\$1');
  var node = (modalEl && modalEl.querySelector(sel)) || document.getElementById('note-'+noteId);
  if(!node){
    if(tries>0) setTimeout(function(){ highlightNote(noteId, onMiss, tries-1); }, 150);
    else if(onMiss) onMiss();
    return;
  }
  try{ node.scrollIntoView({behavior:'smooth', block:'center'}); }catch(e){ node.scrollIntoView(); }
  node.classList.add('hl-fade');
  // הסרה מוקדמת בלחיצה כלשהי — נרשם באיחור קל כדי שהלחיצה שפתחה את הניווט לא תסיר מיד
  setTimeout(function(){
    document.addEventListener('click', function(){ node.classList.remove('hl-fade'); }, {once:true});
  }, 300);
}
function notesBtn(type,id){
  var n = DB.notes.filter(x=>x.entity_type===type&&String(x.entity_id)===String(id)).length;
  return '<button class="btn ghost sm" onclick="notesModal(\''+type+'\',\''+id+'\')">תרשומות'+(n?' ('+n+')':'')+'</button>';
}

  if(anyTrunc('notes',list)){ // G1
    openModal('<div class="muted">טוען תרשומות...</div>');
    await ensureFullTexts('notes',list);
  }
  openModal('<h2>תרשומות — '+esc(NOTE_TYPES[type]||type)+': '+esc(noteEntityName(type,id))+'</h2>'+
    '<div class="frow"><textarea id="f_ntext" rows="3" style="width:100%;font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:8px" placeholder="'+(replyTo?'תרשומת המשך...':'תרשומת חדשה... (לא ניתנת למחיקה או עריכה)')+'"></textarea></div>'+
    (replyTo?'<p class="muted">↩ בהמשך לתרשומת מ-'+esc(fmtTs((DB.notes.find(n=>n.id===replyTo)||{}).ts||''))+'</p>':'')+

    '<button class="btn sm" onclick="saveNote(\''+type+'\',\''+id+'\',\''+(replyTo||'')+'\')">שמור תרשומת</button></div>'+
    '<div style="max-height:320px;overflow-y:auto;margin-top:12px">'+
    (list.length? list.map(function(n){
      var parent = n.link_note_id? DB.notes.find(x=>x.id===n.link_note_id) : null;
      return '<div id="note-'+n.id+'" style="border-bottom:1px solid var(--line);padding:8px 0'+(parent?';margin-right:14px;border-right:3px solid var(--teal);padding-right:8px':'')+'">'+
        '<span class="doc-meta">'+esc(fmtTs(n.ts))+' · <b>'+esc(n.user)+'</b></span>'+
        (parent?'<div class="doc-meta" style="font-size:11px">↩ בהמשך ל: "'+esc(String(parent.text).substring(0,40))+'..."</div>':'')+
        '<div style="font-size:15px;font-weight:600;line-height:1.6;white-space:pre-wrap">'+esc(n.text)+'</div>'+
        '<div class="row" style="margin-top:4px">'+(n.attachment_url?'<a href="'+esc(n.attachment_url)+'" target="_blank"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg> מסמך מצורף</a>':'')+
        '<button class="btn ghost sm" onclick="notesModal(\''+type+'\',\''+id+'\',\''+n.id+'\')">↩ המשך</button> '+tagBtn('note',n.id)+'</div>'+linksSection('note',n.id)+'</div>';
    }).join(''):'<div class="muted">אין תרשומות עדיין</div>')+'</div>');
}
async function saveNote(type,id,replyTo){
  var txt = el('f_ntext').value;
  if(!txt.trim()) return toast('כתוב תרשומת', true);
  var r = await act('create',{table:'notes',row:{entity_type:type,entity_id:id,text:txt,link_note_id:replyTo||'',ts:nowTs()}});
  if(!r) return;
  var f = el('f_nfile').files[0];
  if(f){
    if(f.size > 4*1024*1024) toast('הקובץ גדול מ-4MB — התרשומת נשמרה בלי צרופה', true);
    else{
      toast('מעלה מסמך...');
      var b64 = await new Promise(function(res){ var rd=new FileReader(); rd.onload=function(){res(rd.result.split(',')[1]);}; rd.readAsDataURL(f); });
      var u = await api('attachNoteFile',{note_id:r.row.id,base64:b64,mime:f.type,name:f.name});
      if(u.ok){ var g=await api('getAll'); if(g.ok) DB=g.db; }
      else toast(u.error, true);
    }
  }
  toast('התרשומת נשמרה'); notesModal(type,id);
}

    :'<div class="card empty">אין תרשומות'+(filter||q?' לסינון הזה':'')+'</div>');

function portalDepositHtml(dep){
  dep = dep || {exists:false,status:'',verified:false,guarantee_type:'',approval_pending:false,verified_at:''};
  var box = '<div style="border:1px solid var(--line);border-radius:10px;padding:10px;margin-bottom:8px;font-size:13.5px">';
  if(dep.verified){
    return box+'<div class="row"><div class="grow"><b style="color:var(--ok)">✓ כרטיס אשראי מאומת</b>'+
      (dep.verified_at?'<div class="muted" style="font-size:12px">אומת בתאריך: '+esc(String(dep.verified_at).slice(0,10))+'</div>':'')+
      '</div></div><div class="muted" style="font-size:12px;margin-top:4px">האימות בוצע פעם אחת ואינו נדרש שוב.</div></div>';
  }
  if(dep.status==='מאושר'){
    return box+'<div class="row"><div class="grow"><b style="color:var(--ok)">✓ ערבות חלופית מאושרת</b>'+
      (dep.guarantee_type?' <span class="muted">('+esc(dep.guarantee_type)+')</span>':'')+'</div></div></div>';

/* התחלת אימות: השרת מחזיר redirect_url (stub או ספק אמיתי) — נפתח בחלון חדש */
async function portalStartVerification(){
  if(BUSY) return;
  el('pDepErr') && (el('pDepErr').textContent = '');
  var r = await apiBusy('portalB3StartVerification',{code:PORTAL.code});
  if(!r){ return; }
  if(!r.ok){ el('pDepErr').textContent = r.error||'שגיאה'; return; }
  if(r.already_verified){ PORTAL.data.deposit = r.deposit; renderPortal(); return; }
  window.open(r.redirect_url, '_blank');
  openModal('<h2>אימות כרטיס אשראי</h2>'+
    '<p style="font-size:14px">נפתח חלון מאובטח לאימות בחיוב ₪1'+(r.stub?' <span class="muted">(מצב הדגמה — טרם חובר ספק סליקה)</span>':'')+'.</p>'+
    '<p style="font-size:14px">אם החלון לא נפתח — <a href="'+esc(r.redirect_url)+'" target="_blank"><b>לחץ כאן</b></a>.</p>'+
    '<p class="muted" style="font-size:12.5px">לאחר סיום האימות בחלון, חזור לכאן ולחץ על הכפתור:</p>'+
    '<button class="btn" style="width:100%" onclick="portalDepositRefresh()">סיימתי את האימות — רענן מצב</button>'+
    '<div id="pDepModalMsg" class="muted" style="font-size:12.5px;margin-top:6px"></div>');
}
/* בקשת ערבות חלופית (שיק/ערב) — עוברת לאישור מנהל (approval_pending) */
async function portalRequestGuarantee(){
  if(BUSY) return;
  var sel = document.querySelector('input[name="p_guar_type"]:checked');
  var gt = sel ? sel.value : '';
  if(!gt){ el('pDepErr').textContent = 'בחר סוג ערבות'; return; }
  el('pDepErr').textContent = '';
  var r = await apiBusy('portalB3RequestGuarantee',{code:PORTAL.code, guarantee_type:gt});
  if(!r){ return; }
  if(!r.ok){ el('pDepErr').textContent = r.error||'שגיאה'; return; }
  PORTAL.data.deposit = r.deposit;
  renderPortal();
}
/* רענון מצב הפקדון אחרי חזרה ממסך הסליקה */
async function portalDepositRefresh(){
  if(BUSY) return;
  var m = el('pDepModalMsg'); if(m) m.textContent = '';
  var r = await apiBusy('portalGetData',{code:PORTAL.code});
  if(!r){ return; }
  if(!r.ok){ if(m) m.textContent = r.error||'שגיאה'; return; }
  PORTAL.data = r;
  if(r.deposit && r.deposit.verified){ closeModal(); renderPortal(); }
  else if(m) m.textContent = 'האימות עדיין לא נקלט. ודא שסיימת את התהליך בחלון האימות ונסה שוב.';
}

function portalLaundryHtml(lk){
  var idx=NOBLE_STAGES.indexOf(lk.status);

    var on=i<=idx, cur=i===idx&&lk.status!=='נמסר';
    return '<div style="flex:1;text-align:center;min-width:0"><div style="height:7px;border-radius:4px;margin:0 1px;background:'+(on?(cur?'var(--amber)':'var(--teal)'):'var(--line)')+'"></div><div style="font-size:9px;color:'+(on?'var(--ink)':'var(--muted)')+';margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(s)+'</div></div>';
  }).join('');
  var eta = (lk.status!=='נמסר'&&lk.eta_min)? '<div class="muted" style="font-size:12px;margin-top:5px">זמן משוער לסיום: '+fmtMin(lk.eta_min)+'</div>' : '';
  var wt = lk.net? '<div class="muted" style="font-size:12px">נשקל: '+lk.net+' ק&quot;ג'+(lk.charge?' · לתשלום: '+ils(lk.charge):'')+'</div>' : '';

/* B2: checkout פורטל — S1 (בתוך המסגרת עוברת ללא כסף) / D7 (שני מוצאים לחריגה) */
function portalCheckout(r){
  var cr = r.credit||{limit_ag:0,used_ag:0,available_ag:0,pct:0};
  var totalAg = r.total_ag!=null? r.total_ag : toAg(r.total);
  var within = totalAg <= cr.available_ag;
  el('login').innerHTML = '<div class="box" style="max-height:92vh;overflow-y:auto;text-align:right;width:min(480px,94vw)">'+
    '<div class="logo" style="text-align:center">MAPA<span>·</span>NOBLE</div>'+
    '<h3 style="color:var(--navy);margin:10px 0">השלמת הזמנה — תשלום</h3>'+
    '<div class="row" style="padding:4px 0;font-size:14px"><div class="grow">סכום ההזמנה (לפני מע"מ):</div><b>'+ils(fromAg(totalAg))+'</b></div>'+
    (cr.used_ag>0?'<div class="row" style="padding:4px 0;font-size:14px"><div class="grow">חוב קודם:</div><b style="color:var(--danger)">'+ils(fromAg(cr.used_ag))+'</b></div>':'')+
    creditBarHtml(cr)+
    (within?
      '<button style="width:100%;background:var(--teal);color:#fff;padding:12px;border-radius:8px;font-size:16px;font-weight:600" onclick="portalPayChoice(\''+r.order_id+'\',\'credit\')">אשר הזמנה במסגרת האשראי (ללא תשלום כעת)</button>'
      :
      '<div style="background:#FDECEA;border:1px solid var(--danger);border-radius:8px;padding:10px;margin:8px 0;font-size:13.5px">ההזמנה חורגת מיתרת האשראי ב-<b>'+ils(fromAg(totalAg-Math.max(0,cr.available_ag)))+'</b>. בחר אחת מהאפשרויות:</div>'+
      '<button style="width:100%;background:var(--teal);color:#fff;padding:12px;border-radius:8px;font-weight:600;margin-bottom:8px" onclick="portalPayChoice(\''+r.order_id+'\',\'partial\')">תשלום ההפרש בכסף + היתרה במסגרת</button>'+
      '<button style="width:100%;background:var(--navy);color:#fff;padding:12px;border-radius:8px;font-weight:600" onclick="portalPayChoice(\''+r.order_id+'\',\'approval\')">בקשת אישור ממרכז ההזמנות</button>')+
    '<p class="muted" style="font-size:12px;margin-top:10px">ללא השלמת שלב זה ההזמנה לא תטופל.</p>'+
    '<div id="loginErr"></div></div>';
}
async function portalPayChoice(orderId, choice){
  if(BUSY) return;
  el('loginErr').textContent = '';
  var r = await apiBusy('portalB2Checkout',{code:PORTAL.code, order_id:orderId, choice:choice});
  if(!r){ return; }
  if(!r.ok){ el('loginErr').textContent = r.error + (r.over?' — בחר "תשלום ההפרש" או "בקשת אישור"':''); return; }
  var html = '<div class="box"><div class="logo">MAPA<span>·</span>NOBLE</div>';
  if(r.mode==='credit'){
    html += '<h3 style="color:var(--ok);margin:14px 0">✓ ההזמנה אושרה במסגרת האשראי!</h3><p>נציג יאשר את המלאי ותקבלו עדכון. יתרת המסגרת עודכנה.</p>';
  } else if(r.mode==='partial'){
    html += '<h3 style="color:var(--amber);margin:14px 0">נותר לשלם הפרש: '+ils(fromAg(r.gap_ag))+'</h3>'+
      (r.payment_link?'<a href="'+esc(r.payment_link)+'" style="display:block;background:var(--teal);color:#fff;padding:12px;border-radius:8px;margin:12px 0;text-decoration:none;font-weight:600">מעבר לתשלום</a>':'<p>נציג ייצור איתך קשר לגביית ההפרש.</p>')+
      (r.order_center_phone?'<p class="muted">מרכז הזמנות: <a href="tel:'+esc(r.order_center_phone)+'">'+esc(r.order_center_phone)+'</a></p>':'');
  } else {
    html += '<h3 style="color:var(--navy);margin:14px 0">הבקשה הועברה לאישור</h3><p>ניצור איתך קשר בהקדם.</p>'+
      (r.order_center_phone?'<p>לזירוז: <a href="tel:'+esc(r.order_center_phone)+'"><b>'+esc(r.order_center_phone)+'</b></a></p>':'');
  }
  html += '<button onclick="location.reload()" style="margin-top:14px;background:var(--teal);color:#fff;padding:10px 20px;border-radius:8px">סגור</button></div>';
  el('login').innerHTML = html;
}

var FLOOR_TAB = 'work', FLOOR_INFO = null, FLOOR_BC = '', FLOOR_INTAKE_CARTS = [];
function floorTablet(){ return localStorage.getItem('mn_floor_tablet')==='1'; }
function floorTabletToggle(){ // NC4 (משימה 8): כניסה ויציאה ממצב טאבלט משותף — בקוד מנהל בלבד
  var on = floorTablet();
  rFloor(); // מחזיר את הצ'קבוקס למצבו עד לאישור בקוד
  confirmManagerPin(on?'יציאה ממצב טאבלט משותף.':'הפעלת מצב טאבלט משותף — כל פעולה תדרוש קוד עובד אישי.', on?'אשר יציאה':'אשר הפעלה', function(){
    localStorage.setItem('mn_floor_tablet', on?'0':'1');
    toast(on?'מצב טאבלט משותף כובה':'מצב טאבלט משותף הופעל');
    rFloor();
  });
}
function floorPin(){ var e=el('fl_pin'); return e? e.value.trim() : ''; }
/* עטיפת פעולת רצפה: בדיקת הרשאה, קוד עובד במצב טאבלט, נעילת לחיצה כפולה */
async function floorAct(action, payload, okMsg){
  if(!CAN_EDIT){ toast('למשתמש זה הרשאת צפייה בלבד', true); return null; }
  payload = payload||{};
  if(floorTablet()){
    if(!floorPin()){ toast('מצב טאבלט: הזן קוד עובד אישי לפני כל פעולה', true); var pe=el('fl_pin'); if(pe) pe.focus(); return null; }
    payload.worker_pin = floorPin();
  }
  var r = await apiBusy(action, payload);
  if(!r){ return null; }
  if(!r.ok){ toast(r.error||'שגיאה', true); return null; }
  if(okMsg) toast(okMsg);
  if(floorTablet()){ var pe2=el('fl_pin'); if(pe2) pe2.value=''; } // העובד הבא מזדהה מחדש
  return r;
}

var FLOOR_BOARD=null, FLOOR_BOARD_TIMER=null;
function minsSince(ts){ var d=new Date(String(ts||'').replace(' ','T')); return isNaN(d.getTime())?0:Math.max(0,Math.round((Date.now()-d.getTime())/60000)); }
function fmtMin(m){ m=Math.round(m); if(!m) return ''; if(m<60) return 'כ-'+m+' דק\''; var h=Math.floor(m/60), r=m%60; return 'כ-'+h+(r?':'+('0'+r).slice(-2):'')+' שע\''; }
async function floorBoardTab(){
  el('floorBody').innerHTML='<div class="card empty">טוען לוח חי...</div>';
  await floorBoardRefresh();
}
async function floorBoardRefresh(){
  if(VIEW!=='floor'||FLOOR_TAB!=='board') return;
  var r=await api('nobleBoard',{});
  if(VIEW!=='floor'||FLOOR_TAB!=='board') return;
  var b=el('floorBody'); if(!b) return;
  if(!r||!r.ok){ b.innerHTML='<div class="card empty">'+esc((r&&r.error)||'שגיאה בטעינת הלוח')+'</div>'; return; }
  FLOOR_BOARD=r; floorBoardRender();
  clearTimeout(FLOOR_BOARD_TIMER);
  FLOOR_BOARD_TIMER=setTimeout(floorBoardRefresh,60000);
}
function floorBoardRender(){
  var r=FLOOR_BOARD, b=el('floorBody'); if(!b) return;
  var busyCount=r.machines.filter(m=>m.busy).length;
  var mini=function(v,l){return '<div style="flex:1;min-width:100px;text-align:center;padding:8px 4px"><div style="font-size:22px;font-weight:700;color:var(--navy)">'+v+'</div><div class="muted" style="font-size:12px">'+l+'</div></div>';};
  var h='<div class="card"><div class="row" style="flex-wrap:wrap">'+
    mini(r.intakes.length,'קליטות פעילות')+mini(busyCount+'/'+r.machines.length,'מכונות בעבודה')+
    mini(Math.round(((Number(r.today.kg)||0)-(inclInternal()?0:(Number(r.today.kg_internal)||0)))*100)/100,'ק&quot;ג נשקל היום')+mini(r.today.opened,'נפתחו היום')+mini(r.today.delivered,'נמסרו היום')+
    '</div><div class="row" style="align-items:center"><div class="grow">'+internalChk('floorBoardRender')+'</div><div class="muted" style="font-size:11px">מתעדכן אוטומטית כל דקה · עודכן '+new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})+'</div></div></div>';
  if(!r.intakes.length) h+='<div class="card empty">אין קליטות פעילות כרגע</div>';
  r.intakes.forEach(function(ik){
    var clr = ik.status==='מוכן'||ik.status==='במשלוח'?'var(--teal)':'var(--amber)';
    var idx = NOBLE_STAGES.indexOf(ik.status);
    var strip = NOBLE_STAGES.map(function(s,i){
      var cur=i===idx, done=i<idx;
      return '<span style="flex:1;text-align:center;font-size:10.5px;padding:4px 1px;border-radius:6px;white-space:nowrap;'+
        (cur?'background:'+clr+';color:#fff;font-weight:700':done?'background:var(--line);color:var(--ink)':'color:var(--muted)')+'">'+esc(s)+'</span>';
    }).join('');
    var carts = ik.carts.map(function(c){
      var line='<b>עגלה '+esc(c.cart_id)+'</b>';
      if(c.open) line+=' — '+esc(c.open)+(c.machine?' במכונה '+esc(c.machine):'')+' <span style="color:var(--amber);font-weight:600">('+minsSince(c.open_ts)+' דק\')</span>';
      else if(c.done.length) line+=' — הושלם: '+c.done.map(esc).join(', ');
      else line+=' — ממתינה לתחילת עבודה';
      return '<div style="font-size:13px;padding:3px 0">'+line+'</div>';
    }).join('');
    h+='<div class="card"><div class="row" style="flex-wrap:wrap"><div class="grow"><b style="font-size:16px">'+esc(ik.customer)+'</b> <span class="muted">· '+esc(ik.id)+'</span>'+
      (ik.eta_min?'<span class="muted" style="margin-inline-start:8px">· זמן משוער לסיום: '+fmtMin(ik.eta_min)+'</span>':'')+
      (ik.net?'<span class="muted" style="margin-inline-start:8px">· '+ik.net+' ק&quot;ג'+(ik.charge?' · '+ils(ik.charge):'')+'</span>':'')+
      '</div><span class="chip" style="background:'+clr+'">'+esc(ik.status)+'</span></div>'+
      '<div class="row" style="gap:3px;margin:8px 0 4px;flex-wrap:nowrap;overflow-x:auto">'+strip+'</div>'+carts+'</div>';
  });
  h+='<div class="section-title"><h2>מכונות</h2></div><div class="row" style="flex-wrap:wrap;gap:8px">';
  if(!r.machines.length) h+='<div class="card empty grow">לא הוגדרו מכונות — הוסף במסך עגלות ומכונות</div>';
  r.machines.forEach(function(m){

    '<div class="frow"><label>אימייל</label><input id="f_eemail" type="email" value="'+esc(emp.email||'')+'"></div>'+
    '<div class="frow"><label>תאריך תחילת עבודה</label><input id="f_estart" type="date" value="'+esc(emp.start_date||'')+'"></div>'+
    '<div class="frow"><label>איש קשר לחירום</label><input id="f_eemname" value="'+esc(emp.emergency_name||'')+'"></div>'+
    '<div class="frow"><label>טלפון חירום</label><input id="f_eemphone" value="'+esc(emp.emergency_phone||'')+'"></div>'+
    '<div class="frow"><label>פרטי בנק</label><input id="f_ebank" value="'+esc(emp.bank_details||'')+'" placeholder="בנק / סניף / חשבון"></div>'+
    '<div class="frow"><label>מס\' רישיון נהיגה</label><input id="f_elic" value="'+esc(emp.license_number||'')+'"></div>'+
    '<div class="frow"><label>תוקף רישיון</label><input id="f_elicexp" type="date" value="'+esc(emp.license_expiry||'')+'"></div>'+
    '<div class="frow"><label>הערות</label><input id="f_enotes" value="'+esc(emp.notes||'')+'"></div></div>'+
    '<div class="frow"><label>מסכים מותרים (ריק = לפי תפקיד)</label><div class="row" style="gap:6px">'+VIEWS.map(v=>'<label style="font-size:12px;font-weight:400;border:1px solid var(--line);border-radius:14px;padding:3px 9px"><input type="checkbox" class="evw" value="'+v[0]+'"'+((emp.views||'').split(',').includes(v[0])?' checked':'')+' style="width:auto"> '+v[1]+'</label>').join('')+'</div></div>'+
    (emp.id?'':'<p class="muted" style="margin-bottom:10px">שים לב: העובד הראשון חייב להיות מנהל — אחרת תינעל בחוץ.</p>')+
    '<button class="btn" onclick="saveEmp(\''+(emp.id||'')+'\')">שמור</button>');
}
async function saveEmp(id){
  if(!el('f_ename').value||!el('f_epin').value) return toast('שם וקוד חובה', true);
  if(!id && !DB.employees.length && el('f_erole').value!=='מנהל') return toast('העובד הראשון חייב להיות מנהל', true);
  var views = Array.from(document.querySelectorAll('.evw:checked')).map(x=>x.value).join(',');
  var row = {name:el('f_ename').value,role:el('f_erole').value,pin:el('f_epin').value,phone:el('f_ephone').value,
    username:(el('f_euser').value||'').trim().toLowerCase(),
    hourly_rate:Number(el('f_erate').value)||0,can_edit:el('f_eedit').value,views:views,active:'כן',
    national_id:el('f_enid').value,address:el('f_eaddr').value,email:el('f_eemail').value,start_date:el('f_estart').value,
    emergency_name:el('f_eemname').value,emergency_phone:el('f_eemphone').value,bank_details:el('f_ebank').value,notes:el('f_enotes').value,license_number:el('f_elic').value,license_expiry:el('f_elicexp').value};
  var r = id? await act('update',{table:'employees',id:id,row:row},'עודכן') : await act('create',{table:'employees',row:row},'העובד נוסף');
  if(r) closeModal();
}
// F2: סיסמה אקראית בת 8 תווים — ללא תווים דו-משמעיים (0/O, 1/l/I)
function genPassword(){
  var CH = 'abcdefghjkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789', out = '';
  var a = new Uint32Array(8); crypto.getRandomValues(a);
  for(var i=0;i<8;i++) out += CH.charAt(a[i] % CH.length);
  return out;
}
// F2: איפוס סיסמה לעובד (מנהל בלבד) — מוצעת סיסמה אקראית, מוצגת פעם אחת בלבד
function resetEmpPassword(id){
  var emp = (DB.employees||[]).find(function(x){ return x.id === id; });
  if(!emp) return;
  openModal('<h2>פרטי כניסה — '+esc(emp.name)+'</h2>'+
    '<div class="frow"><label>שם משתמש (לכניסה)</label><input id="f_ru" value="'+esc(emp.username||'')+'" placeholder="באנגלית, ללא רווחים" style="direction:ltr;text-align:left"></div>'+
    '<div class="frow"><label>סיסמה (לפחות 6 תווים — אפשר להקליד סיסמה משלך, כולל ישנה שאתה זוכר)</label>'+
    '<div class="row" style="gap:6px"><input id="f_rp" value="'+genPassword()+'" style="direction:ltr;text-align:left;font-family:monospace;flex:1">'+
    '<button type="button" class="btn ghost sm" title="הגרל סיסמה חדשה" onclick="el(\'f_rp\').value=genPassword()">🎲 הגרלה</button></div></div>'+
    '<p class="muted" style="margin-bottom:10px">שם המשתמש והסיסמה נקבעים כאן יחד. הסיסמה תוצג פעם אחת בלבד — העבר אותה לעובד. היא נשמרת בשרת בגיבוב בלבד — גם למי שקבע אותה אין דרך לצפות בה שוב.</p>'+
    '<button class="btn" onclick="doResetEmpPassword(\''+id+'\')">שמור פרטי כניסה</button>');
}
async function doResetEmpPassword(id){
  var np = el('f_rp').value;
  if(String(np).length < 6) return toast('הסיסמה חייבת להכיל לפחות 6 תווים', true);
  var r = await apiBusy('setPassword', { employee_id: id, new_password: np, username: (el('f_ru')?el('f_ru').value:undefined) });
  if(!r || !r.ok) return toast((r && r.error) || 'שגיאה באיפוס הסיסמה', true);
  var g0=await api('getAll'); if(g0&&g0.ok) DB=g0.db; // רענון שם המשתמש בתצוגה
  openModal('<h2>פרטי הכניסה עודכנו</h2><p>הסיסמה החדשה:</p>'+
    '<div class="card" style="font-family:monospace;font-size:18px;direction:ltr;text-align:center;user-select:all">'+esc(np)+'</div>'+
    '<p class="muted" style="margin-bottom:10px">רשום או העבר אותה כעת — היא לא תוצג שוב.</p>'+
    '<button class="btn" onclick="closeModal()">סגור</button>');
}

/* ================= B7: מנהל ראשי ================= */
// המסך הזה נגיש רק למי שמזוהה בשרת כ"מנהל ראשי" (SUPER_ADMIN_ID ב-ScriptProperties) —
// זיהוי עצמאי משדה role בגיליון, כדי שלא ניתן יהיה לנעול את אבי בחוץ בטעות.
// כל הפעולות כאן משתמשות באותן פונקציות קיימות של מסך "עובדים" (empForm / resetEmpPassword) —
// אין כאן לוגיקת שרת חדשה מעבר להרשאה עצמה.
function rSuperAdmin(){
  if(!IS_SUPER_ADMIN){ el('main').innerHTML = '<div class="card empty">מסך זה מיועד למנהל הראשי בלבד</div>'; return; }
  el('main').innerHTML = '<div class="section-title"><h2>מנהל ראשי</h2><button class="btn" onclick="empForm()">+ עובד חדש</button></div>'+
    '<p class="muted" style="margin-bottom:10px">המסך הזה מזהה אותך כמנהל ראשי ישירות מהגדרות השרת — הוא יישאר נגיש גם אם תפקיד המנהל שלך בטבלת העובדים ישתנה בטעות. '+
    'לעולם לא ניתן לצפות בסיסמה קיימת — רק לקבוע חדשה. שינוי שם משתמש אפשרי כאן גם לעובדים אחרים.</p>'+
    (DB.employees.length? DB.employees.map(function(e){ return '<div class="card"><div class="row"><div class="grow"><b>'+esc(e.name)+'</b> · '+esc(e.role)+
      '<div class="muted">'+(e.username?'משתמש: '+esc(e.username):'אין שם משתמש עדיין')+(e.password_hash?' · יש סיסמה מוגדרת':' · אין סיסמה מוגדרת')+'</div></div>'+
      '<span class="rowact">'+
      '<button class="btn ghost sm" title="קביעת שם משתמש וסיסמה" onclick="resetEmpPassword(\''+e.id+'\')">פרטי כניסה</button>'+
      '<button class="btn ghost sm" title="עריכת פרטי עובד" onclick=\'empForm('+JSON.stringify(e).replace(/'/g,'&#39;')+')\'>עריכה</button>'+
      '</span></div></div>'; }).join(''):'<div class="card empty">אין עובדים עדיין</div>');
}
